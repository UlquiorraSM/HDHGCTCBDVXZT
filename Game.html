<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>StoryKI – Game</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                scrollbar-width: thin;
                scrollbar-color: rgba(255, 255, 255, 0.12) transparent;
            }
            *::-webkit-scrollbar {
                width: 4px;
            }
            *::-webkit-scrollbar-track {
                background: transparent;
            }
            *::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.12);
                border-radius: 2px;
            }

            

            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                font-family: "Segoe UI", Arial, sans-serif;
            }

            body {
                background: #0a0a0a;
                color: #fff;
                opacity: 0;
                transition: opacity 0.4s ease-in-out;
            }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.68);
                z-index: 0;
                pointer-events: none;
            }

            /* ─── Background Layer ─── */
            #bg-layer {
                position: fixed;
                inset: 0;
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
                z-index: -1;
                filter: blur(3px) brightness(0.38);
                transition: background-image 0.6s ease;
            }

            /* ─── App Shell ─── */
            #app {
                position: relative;
                z-index: 1;
                display: flex;
                flex-direction: column;
                height: 100vh;
                max-width: 820px;
                margin: 0 auto;
            }

            /* ════════════════════════════════════
               HEADER / TOP NAV
            ════════════════════════════════════ */
            #header {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 14px 20px;
                flex-shrink: 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.07);
                background: rgba(8, 8, 8, 0.55);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
            }

            .nav-back-btn {
                width: 36px;
                height: 36px;
                border-radius: 50%;
                border: 2px solid rgba(255, 255, 255, 0.18);
                background: rgba(28, 28, 28, 0.75);
                color: #fff;
                font-size: 15px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition:
                    background 0.2s,
                    border-color 0.2s;
                flex-shrink: 0;
            }
            .nav-back-btn:hover {
                background: rgba(55, 55, 55, 0.95);
                border-color: rgba(255, 255, 255, 0.4);
            }

            #header-title .story-label {
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: rgba(255, 255, 255, 0.35);
                margin-bottom: 2px;
            }
            #header-title .story-name {
                font-size: 15px;
                font-weight: 700;
                color: #fff;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 260px;
            }

            /* Info Block (Time/Loc) */
            #header-info {
                flex: 1;
                display: none;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                margin: 0 10px;
                text-align: center;
            }
            #header-location {
                font-size: 12px;
                font-weight: 700;
                color: rgba(255, 255, 255, 0.9);
                letter-spacing: 0.05em;
                text-transform: uppercase;
            }
            #header-time {
                font-size: 11px;
                color: rgba(255, 255, 255, 0.5);
                font-family: monospace;
                margin-top: 2px;
            }

            /* Character badge in header */
            #char-badge {
                display: none;
                align-items: center;
                gap: 8px;
                padding: 6px 12px;
                background: rgba(30, 30, 40, 0.8);
                border: 1.5px solid rgba(255, 255, 255, 0.1);
                border-radius: 20px;
                flex-shrink: 0;
            }
            #char-badge.visible {
                display: flex;
            }
            .char-avatar-sm {
                width: 24px;
                height: 24px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 13px;
                flex-shrink: 0;
            }
            .char-avatar-sm.male {
                background: rgba(30, 60, 110, 0.9);
                border: 1.5px solid rgba(80, 140, 220, 0.4);
            }
            .char-avatar-sm.female {
                background: rgba(110, 30, 60, 0.9);
                border: 1.5px solid rgba(220, 80, 140, 0.4);
            }
            .char-name-sm {
                font-size: 12px;
                font-weight: 700;
                color: rgba(255, 255, 255, 0.8);
            }
            .char-race-sm {
                font-size: 10px;
                color: rgba(200, 160, 60, 0.85);
                font-weight: 600;
            }

            /* NPCs Present Bar */
            #present-npcs-bar {
                display: none;
                background: rgba(12, 12, 12, 0.4);
                backdrop-filter: blur(8px);
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                padding: 8px 20px;
                overflow-x: auto;
                white-space: nowrap;
                gap: 12px;
                align-items: center;
                flex-shrink: 0;
            }
            #present-npcs-bar.visible {
                display: flex;
            }
            .npc-item {
                display: flex;
                align-items: center;
                gap: 6px;
                background: rgba(40, 40, 50, 0.6);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 16px;
                padding: 4px 10px;
                cursor: pointer;
                transition: background 0.2s;
            }
            .npc-item:hover {
                background: rgba(60, 60, 80, 0.8);
            }
            .npc-avatar-xs {
                width: 18px;
                height: 18px;
                border-radius: 50%;
                font-size: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #fff;
            }
            .npc-avatar-xs.male { background: #1e3c6e; }
            .npc-avatar-xs.female { background: #6e1e3c; }
            .npc-name-xs {
                font-size: 12px;
                font-weight: 600;
                color: rgba(255, 255, 255, 0.9);
            }

            /* ─── Status indicator ─── */
            #status-dot-wrap {
                display: flex;
                align-items: center;
                gap: 5px;
                flex-shrink: 0;
            }
            .status-dot {
                width: 7px;
                height: 7px;
                border-radius: 50%;
                background: rgba(80, 200, 100, 0.9);
                animation: pulse-dot 2.5s infinite;
            }
            .status-label {
                font-size: 11px;
                color: rgba(80, 200, 100, 0.85);
                font-weight: 600;
            }
            @keyframes pulse-dot {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.35;
                }
            }

            /* ════════════════════════════════════
               MESSAGES
            ════════════════════════════════════ */
            #messages {
                flex: 1;
                overflow-y: auto;
                padding: 24px 20px;
                display: flex;
                flex-direction: column;
                gap: 14px;
            }

            .msg-row {
                display: flex;
                flex-direction: column;
                gap: 3px;
            }
            .msg-row.user {
                align-items: flex-end;
            }
            .msg-row.ai {
                align-items: flex-start;
            }
            .msg-row.follow-up {
                margin-top: -8px;
            }

            .msg-sender {
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.06em;
                text-transform: uppercase;
                padding: 0 6px;
            }
            .msg-row.user .msg-sender {
                color: rgba(255, 255, 255, 0.28);
            }
            .msg-row.ai .msg-sender {
                color: rgba(255, 255, 255, 0.28);
            }

            .msg-bubble {
                padding: 12px 17px;
                border-radius: 16px;
                max-width: 76%;
                word-wrap: break-word;
                line-height: 1.65;
                font-size: 14px;
                white-space: pre-wrap;
            }
            .msg-row.user .msg-bubble {
                background: rgba(26, 26, 26, 0.92);
                border: 1px solid rgba(255, 255, 255, 0.09);
                border-bottom-right-radius: 4px;
                color: rgba(255, 255, 255, 0.88);
            }
            .msg-row.ai .msg-bubble {
                background: rgba(26, 26, 26, 0.92);
                border: 1px solid rgba(255, 255, 255, 0.09);
                border-bottom-left-radius: 4px;
                color: rgba(255, 255, 255, 0.88);
            }
            .msg-bubble.thinking {
                color: rgba(255, 255, 255, 0.35);
                font-style: italic;
                animation: blink 1.4s infinite;
            }
            @keyframes blink {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.5;
                }
            }

            /* Typing dots */
            .typing-dots {
                display: inline-flex;
                gap: 4px;
                align-items: center;
                height: 18px;
            }
            .typing-dots span {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.4);
                animation: typing-bounce 1.2s infinite ease-in-out;
            }
            .typing-dots span:nth-child(2) {
                animation-delay: 0.2s;
            }
            .typing-dots span:nth-child(3) {
                animation-delay: 0.4s;
            }
            @keyframes typing-bounce {
                0%,
                80%,
                100% {
                    transform: translateY(0);
                    opacity: 0.4;
                }
                40% {
                    transform: translateY(-5px);
                    opacity: 1;
                }
            }

            /* Divider */
            .chat-divider {
                display: flex;
                align-items: center;
                gap: 12px;
                margin: 6px 0;
            }
            .chat-divider::before,
            .chat-divider::after {
                content: "";
                flex: 1;
                height: 1px;
                background: rgba(255, 255, 255, 0.07);
            }
            .chat-divider-label {
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: rgba(255, 255, 255, 0.2);
            }

            /* ════════════════════════════════════
               INPUT AREA
            ════════════════════════════════════ */
            #input-section {
                flex-shrink: 0;
                background: rgba(8, 8, 8, 0.55);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                border-top: 1px solid rgba(255, 255, 255, 0.07);
            }

            #input-area {
                display: flex;
                gap: 10px;
                align-items: flex-end;
                padding: 12px 16px 10px 16px;
            }

            #user-input {
                flex: 1;
                padding: 11px 16px;
                background: rgba(20, 20, 20, 0.95);
                border: 1.5px solid rgba(255, 255, 255, 0.1);
                border-radius: 22px;
                color: #fff;
                font-size: 14px;
                outline: none;
                font-family: inherit;
                resize: none;
                line-height: 1.5;
                max-height: 140px;
                overflow-y: auto;
                transition: border-color 0.2s;
            }
            #user-input::placeholder {
                color: rgba(255, 255, 255, 0.22);
            }
            #user-input:focus {
                border-color: rgba(255, 255, 255, 0.25);
            }

            #send-btn {
                width: 42px;
                height: 42px;
                border-radius: 50%;
                border: none;
                background: rgba(35, 85, 165, 0.9);
                color: #fff;
                font-size: 17px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition:
                    background 0.2s,
                    transform 0.15s,
                    opacity 0.2s;
                flex-shrink: 0;
                margin-bottom: 1px;
            }
            #send-btn:hover:not(:disabled) {
                background: rgba(50, 110, 200, 0.99);
                transform: scale(1.06);
            }
            #send-btn:disabled {
                opacity: 0.35;
                cursor: not-allowed;
                transform: none;
            }

            /* ─── Action Bar ─── */
            #action-bar {
                display: flex;
                gap: 7px;
                padding: 0 16px 14px 16px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .act-btn {
                padding: 7px 16px;
                border-radius: 18px;
                border: 1.5px solid rgba(255, 255, 255, 0.1);
                background: rgba(24, 24, 24, 0.9);
                color: rgba(255, 255, 255, 0.65);
                font-size: 12px;
                font-weight: 600;
                cursor: pointer;
                letter-spacing: 0.02em;
                white-space: nowrap;
                transition:
                    background 0.2s,
                    border-color 0.2s,
                    color 0.2s,
                    transform 0.15s;
                display: flex;
                align-items: center;
                gap: 5px;
            }
            .act-btn:hover {
                background: rgba(40, 40, 40, 0.98);
                border-color: rgba(255, 255, 255, 0.22);
                color: #fff;
                transform: translateY(-1px);
            }
            .act-btn:active {
                transform: translateY(0);
            }

            .act-btn.btn-retry {
                border-color: rgba(150, 150, 150, 0.2);
            }
            .act-btn.btn-edit {
                border-color: rgba(100, 170, 230, 0.25);
                color: rgba(130, 185, 240, 0.85);
            }
            .act-btn.btn-edit:hover {
                background: rgba(30, 60, 100, 0.6);
                color: #a8d0f8;
            }
            .act-btn.btn-continue {
                border-color: rgba(60, 180, 80, 0.3);
                color: rgba(100, 210, 120, 0.9);
            }
            .act-btn.btn-continue:hover {
                background: rgba(20, 65, 30, 0.8);
                color: #90e8a0;
            }
            .act-btn.btn-erase {
                border-color: rgba(180, 60, 60, 0.3);
                color: rgba(220, 100, 100, 0.85);
            }
            .act-btn.btn-erase:hover {
                background: rgba(70, 20, 20, 0.7);
                color: #ff9090;
            }
            .act-btn.locked {
                opacity: 0.5;
                cursor: not-allowed !important;
                pointer-events: none;
            }

            /* ─── Toast ─── */
            #toast {
                position: fixed;
                bottom: 28px;
                left: 50%;
                transform: translateX(-50%) translateY(80px);
                background: rgba(40, 140, 80, 0.95);
                color: #fff;
                padding: 12px 24px;
                border-radius: 9px;
                font-size: 13px;
                font-weight: 600;
                z-index: 2000;
                opacity: 0;
                transition:
                    transform 0.3s ease,
                    opacity 0.3s ease;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
                white-space: nowrap;
                pointer-events: none;
            }
            #toast.show {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }

            /* ─── Welcome screen overlay ─── */
            #welcome-overlay {
                position: fixed;
                inset: 0;
                z-index: 100;
                background: rgba(0, 0, 0, 0.82);
                backdrop-filter: blur(6px);
                display: flex;
                align-items: center;
                justify-content: center;
                opacity: 1;
                transition: opacity 0.5s ease;
            }
            #welcome-overlay.hidden {
                opacity: 0;
                pointer-events: none;
            }
            .welcome-card {
                background: rgba(18, 18, 18, 0.95);
                border: 1.5px solid rgba(255, 255, 255, 0.1);
                border-radius: 16px;
                padding: 36px 40px;
                max-width: 420px;
                width: 90%;
                text-align: center;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            }
            .welcome-icon {
                font-size: 40px;
                margin-bottom: 16px;
            }
            .welcome-title {
                font-size: 22px;
                font-weight: 700;
                color: #fff;
                margin-bottom: 8px;
            }
            .welcome-sub {
                font-size: 13px;
                color: rgba(255, 255, 255, 0.4);
                line-height: 1.6;
                margin-bottom: 24px;
            }
            .welcome-char-row {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 14px 16px;
                background: rgba(30, 30, 40, 0.8);
                border: 1.5px solid rgba(255, 255, 255, 0.1);
                border-radius: 10px;
                margin-bottom: 24px;
                text-align: left;
            }
            .welcome-avatar {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 22px;
                flex-shrink: 0;
            }
            .welcome-avatar.male {
                background: rgba(30, 60, 110, 0.9);
                border: 2px solid rgba(80, 140, 220, 0.4);
            }
            .welcome-avatar.female {
                background: rgba(110, 30, 60, 0.9);
                border: 2px solid rgba(220, 80, 140, 0.4);
            }
            .welcome-char-name {
                font-size: 16px;
                font-weight: 700;
                color: #fff;
                margin-bottom: 3px;
            }
            .welcome-char-meta {
                font-size: 11px;
                color: rgba(200, 160, 60, 0.85);
                font-weight: 600;
            }
            .welcome-btn {
                width: 100%;
                padding: 14px 0;
                border-radius: 10px;
                border: none;
                background: rgba(30, 80, 150, 0.9);
                border: 1.5px solid rgba(70, 130, 220, 0.4);
                color: #fff;
                font-size: 15px;
                font-weight: 700;
                cursor: pointer;
                transition:
                    background 0.2s,
                    transform 0.15s;
                letter-spacing: 0.02em;
            }
            .welcome-btn:hover {
                background: rgba(45, 105, 190, 0.99);
                transform: translateY(-1px);
            }
            .welcome-btn:active {
                transform: translateY(0);
            }

            @media (max-width: 600px) {
                #app { max-width: 100%; }
                #header { padding: 10px 12px; gap: 8px; }
                #messages { padding: 14px 12px; gap: 10px; }
                .msg-bubble { max-width: 90%; font-size: 13px; padding: 10px 14px; }
                #present-npcs-bar { padding: 6px 12px; gap: 8px; }
                .npc-item { padding: 4px 8px; border-radius: 12px; }
                .npc-name-xs { font-size: 11px; }
                #input-area { padding: 10px 12px; gap: 8px; }
                #user-input { font-size: 13px; padding: 10px 14px; max-height: 120px; }
                #send-btn { width: 44px; height: 44px; }
                #action-bar { padding: 0 12px 12px 12px; gap: 6px; }
                .act-btn { padding: 7px 12px; font-size: 12px; }
                .welcome-card { padding: 24px 20px; width: 94%; }
                #char-badge { display: none !important; }
            }

        </style>
    </head>
    <body>
        <div id="bg-layer"></div>

        <!-- ─── Welcome Overlay ─── -->
        <div id="welcome-overlay">
            <div class="welcome-card">
                <div class="welcome-icon">📖</div>
                <div class="welcome-title">Your Story Begins</div>
                <div class="welcome-sub">
                    Your character is ready. The world awaits your decisions.
                </div>
                <div
                    class="welcome-char-row"
                    id="welcome-char-row"
                    style="display: none"
                >
                    <div class="welcome-avatar male" id="welcome-avatar">♂</div>
                    <div>
                        <div class="welcome-char-name" id="welcome-char-name">
                            —
                        </div>
                        <div class="welcome-char-meta" id="welcome-char-meta">
                            —
                        </div>
                    </div>
                </div>
                <button class="welcome-btn" onclick="dismissWelcome()">
                    ▶&nbsp; Begin Adventure
                </button>
            </div>
        </div>

        <!-- ─── Main App ─── -->
        <div id="app">
            <!-- Header -->
            <div id="header">
                <button class="nav-back-btn" onclick="goBack()" title="Back">
                    &#8592;
                </button>

                <div id="header-title">
                    <div class="story-label">StoryKI</div>
                    <div class="story-name" id="story-name">Adventure</div>
                </div>

                <div id="header-info">
                    <div id="header-location">—</div>
                    <div id="header-time">—</div>
                </div>

                <div id="char-badge">
                    <div class="char-avatar-sm male" id="header-avatar">♂</div>
                    <div>
                        <div class="char-name-sm" id="header-char-name">—</div>
                        <div class="char-race-sm" id="header-char-race">—</div>
                    </div>
                </div>

                <div id="status-dot-wrap" style="display:none;">
                    <div class="status-dot" id="status-dot"></div>
                    <span class="status-label" id="status-label">Online</span>
                </div>
            </div>

            <!-- Present NPCs -->
            <div id="present-npcs-bar" style="display:none;"></div>

            <!-- Messages -->
            <div id="messages">
                <div class="chat-divider">
                    <span class="chat-divider-label">Story Start</span>
                </div>
            </div>

            <!-- Input Section -->
            <div id="input-section">
                <div id="input-area">
                    <textarea
                        id="user-input"
                        rows="1"
                        placeholder="Was tust du als nächstes…"
                        autocomplete="off"
                    ></textarea>
                    <button id="send-btn" title="Senden">&#10148;</button>
                </div>
                <div id="action-bar">
                    <button class="act-btn btn-retry" id="retry-btn">
                        ↺ Retry
                    </button>
                    <button class="act-btn btn-edit" id="edit-btn">
                        ✎ Edit
                    </button>
                    <button class="act-btn btn-continue" id="continue-btn">
                        ▶ Continue
                    </button>
                    <button class="act-btn btn-erase" id="erase-btn">
                        ✕ Erase
                    </button>
                </div>
            </div>
        </div>

        <!-- Toast -->
        <div id="toast"></div>

        <div id="back-popup-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,.85); display:none; align-items:center; justify-content:center; z-index:3000; backdrop-filter:blur(10px);">
            <div style="background:rgba(30,30,35,.95); border:1px solid rgba(255,255,255,.12); border-radius:18px; padding:20px; width:100%; max-width:480px; display:flex; flex-direction:column; gap:14px;">
                <div style="color:#fff; font-weight:700; text-align:center; font-size:18px;">Story verwalten</div>
                <div style="display:flex; flex-direction:column; gap:6px;">
                    <label for="back-story-input" style="color:rgba(255,255,255,.75); font-size:13px;">Story-Name</label>
                    <input id="back-story-input" type="text" style="padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,.15); background:rgba(20,20,25,.9); color:#fff; outline:none;">
                </div>
                <div style="display:flex; gap:10px;">
                    <button id="back-popup-cancel" style="flex:1; padding:10px; border-radius:10px; background:rgba(255,255,255,.1); color:#fff; border:none; font-weight:700; cursor:pointer;">Back</button>
                    <button id="back-popup-save" style="flex:1; padding:10px; border-radius:10px; background:#4a90e2; color:#fff; border:none; font-weight:700; cursor:pointer;">Save</button>
                    <button id="back-popup-delete" style="flex:1; padding:10px; border-radius:10px; background:#b04040; color:#fff; border:none; font-weight:700; cursor:pointer;">Delete</button>
                </div>
            </div>
        </div>

        <script>
            /* ═══════════════════════════════════════
               CONSTANTS
            ═══════════════════════════════════════ */
            const SETTINGS_KEY = "storyki_settings";
            const CHARS_KEY = "storyki_characters";
            const CARDS_KEY = "storyki_storycards";
            const LOG_KEY = "storyki_storylog";
            const SCENARIOS_KEY = "storyki_scenarios";
            const SELECTED_WORLD_ID_KEY = "storyki_selected_world_id";
            const CURRENT_STORY_ID_KEY = "storyki_current_story_id";

            // Storage Helper (Non-persistent session storage)
            const Storage = {
                get: (key) => sessionStorage.getItem(key),
                set: (key, val) => sessionStorage.setItem(key, val),
                remove: (key) => sessionStorage.removeItem(key),
                clear: () => sessionStorage.clear()
            };

            /* ═══════════════════════════════════════
               STATE
            ═══════════════════════════════════════ */
            let chatHistory = [];
            let isBusy = false;
            let activeChar = null;
            let currentLocationId = null;
            let isFirstMessageProtected = false;
            let currentNarrationTs = null;

            /* ═══════════════════════════════════════
               TIME & COMMAND SYSTEM
            ═══════════════════════════════════════ */
            function saveActiveCharacter() {
                if (!activeChar) return;
                try {
                    const chars = JSON.parse(
                        Storage.get(CHARS_KEY) || "[]",
                    );
                    const idx = chars.findIndex((c) => c.id === activeChar.id);
                    if (idx !== -1) {
                        chars[idx] = activeChar;
                        Storage.set(CHARS_KEY, JSON.stringify(chars));
                    }
                    autoSaveStory();
                } catch (e) {
                    console.error("Failed to save character", e);
                }
            }

            function saveStoryLog() {
                try {
                    Storage.set(LOG_KEY, JSON.stringify(chatHistory));
                    autoSaveStory();
                } catch (e) {
                    console.error("Failed to save story log", e);
                }
            }

            function rollbackToLastWorldState() {
                if (!activeChar) return;
                // Find last Narrator entry; fallback to any last entry
                let entry = null;
                for (let i = chatHistory.length - 1; i >= 0; i--) {
                    const e = chatHistory[i];
                    if (typeof e !== "string" && e.sender === "Narrator") {
                        entry = e;
                        break;
                    }
                }
                if (!entry) {
                    for (let i = chatHistory.length - 1; i >= 0; i--) {
                        const e = chatHistory[i];
                        if (typeof e !== "string") {
                            entry = e;
                            break;
                        }
                    }
                }
                if (!entry) return;

                if (!activeChar.startingDate) activeChar.startingDate = {};
                const d = activeChar.startingDate;
                if (entry.date) {
                    const parts = entry.date.split(".");
                    if (parts.length === 3) {
                        d.day = parseInt(parts[0]) || d.day || 1;
                        d.month = parseInt(parts[1]) || d.month || 1;
                        d.year = parseInt(parts[2]) || d.year || 1983;
                    }
                }
                if (entry.time) {
                    d.time = entry.time;
                }
                updateHeaderTime();
                if (entry.location) {
                    updateLocation(entry.location);
                }
                saveActiveCharacter();
            }

            function loadStoryLog() {
                try {
                    const raw = Storage.get(LOG_KEY);
                    if (raw) {
                        chatHistory = JSON.parse(raw);
                        // Render log
                        const messagesEl = document.getElementById("messages");
                        messagesEl.innerHTML = "";
                        chatHistory.forEach((entry) => {
                            if (typeof entry === "string") {
                                // Divider
                                addSystemDivider(entry, false);
                            } else {
                                // New object format
                                const role = entry.sender === "Narrator" ? "ai" : "user";
                                appendBubble(role, entry.text, "", false);
                            }
                        });
                        messagesEl.scrollTop = messagesEl.scrollHeight;
                    }
                } catch (e) {
                    console.error("Failed to load story log", e);
                }
            }

            function addToStoryLog(sender, text, tsOverride = null) {
                const d = activeChar?.startingDate || {};
                const day = String(d.day || 1).padStart(2, "0");
                const mon = String(d.month || 1).padStart(2, "0");
                const yr = d.year || 1983;
                const tm = d.time || "00:00";
                const loc = document.getElementById("header-location")?.textContent || "Unknown Location";

                const entry = {
                    sender: sender,
                    text: text,
                    date: `${day}.${mon}.${yr}`,
                    time: tm,
                    location: loc,
                    timestamp: tsOverride || Date.now()
                };

                chatHistory.push(entry);
                saveStoryLog();
                return entry.timestamp;
            }

            function updateHeaderTime() {
                if (!activeChar) return;
                const d = activeChar.startingDate || {};
                try { updateNPCBirthdays(d); updatePlayerBirthday(d); } catch {}
                const day = String(d.day || 1).padStart(2, "0");
                const mon = String(d.month || 1).padStart(2, "0");
                const yr = d.year || 1983;
                const tm = d.time || "00:00";
                const el = document.getElementById("header-time");
                const wdn = _weekdayNameEn(d.day || 1, d.month || 1, d.year || 1983);
                if (el) el.textContent = `${wdn}, ${day}.${mon}.${yr} — ${tm}`;
            }

            function applyTextSizeLimit(text) {
                try {
                    const settings = JSON.parse(Storage.get(SETTINGS_KEY) || "{}");
                    const size = (settings.textSize || "normal").toLowerCase();
                    let maxSentences = 0;
                    let maxChars = 1000;
                    if (size === "short") {
                        maxSentences = 2;
                        maxChars = 300;
                    } else if (size === "tall") {
                        maxSentences = 0;
                        maxChars = 2400;
                    } else {
                        maxSentences = 6;
                        maxChars = 1000;
                    }
                    if (!text) return text;
                    let out = text.trim();
                    if (maxSentences > 0) {
                        const sentences = out.match(/[^.!?…]+[.!?…]+(?:\s+|$)|[^.!?…]+$/g) || [out];
                        if (sentences.length > maxSentences) {
                            out = sentences.slice(0, maxSentences).join(" ").trim();
                        }
                    }
                    if (out.length > maxChars) {
                        const cutoff = maxChars;
                        const substr = out.substring(0, cutoff);
                        const lastPunct = Math.max(substr.lastIndexOf("."), substr.lastIndexOf("!"), substr.lastIndexOf("?"), substr.lastIndexOf("…"), substr.lastIndexOf("\n"));
                        const lastSpace = substr.lastIndexOf(" ");
                        const idx = lastPunct > 120 ? lastPunct : (lastSpace > 120 ? lastSpace : cutoff);
                        out = substr.substring(0, idx).trimEnd();
                        // avoid artificial ellipsis; ensure sentence closure
                        if (!/[.!?…]"?$/.test(out)) out += ".";
                    }
                    // Balance quotes (ASCII and curly)
                    const asciiQuotes = (out.match(/"/g) || []).length;
                    if (asciiQuotes % 2 === 1) out += '"';
                    const leftCurly = (out.match(/“|„/g) || []).length;
                    const rightCurly = (out.match(/”/g) || []).length;
                    if (leftCurly > rightCurly) out += "”";
                    return out;
                } catch {
                    return text;
                }
            }

            function addMinutes(mins) {
                if (!activeChar) return;
                if (!activeChar.startingDate) activeChar.startingDate = {};
                const d = activeChar.startingDate;

                let [h, m] = (d.time || "00:00").split(":").map(Number);
                let totalMins = h * 60 + m + (mins || 0);
                const dayLen = 24 * 60;
                let daysDelta = Math.floor(totalMins / dayLen);
                let rest = totalMins % dayLen;
                if (rest < 0) { rest += dayLen; daysDelta -= 1; }
                const nh = Math.floor(rest / 60);
                const nm = rest % 60;
                d.time = `${String(nh).padStart(2, "0")}:${String(nm).padStart(2, "0")}`;
                d.day = (d.day || 1) + daysDelta;
                // normalize Y/M/D with 30-day months
                (function norm() {
                    while ((d.day || 1) > 30) { d.day -= 30; d.month = (d.month || 1) + 1; }
                    while ((d.day || 1) < 1) { d.month = (d.month || 1) - 1; d.day += 30; }
                    while ((d.month || 1) > 12) { d.month -= 12; d.year = (d.year || 1983) + 1; }
                    while ((d.month || 1) < 1) { d.month += 12; d.year = (d.year || 1983) - 1; }
                })();
                updateNPCBirthdays(d);
                updatePlayerBirthday(d);
                updateHeaderTime();
                saveActiveCharacter();
                console.log(`[Time Update] New Time: ${d.day}.${d.month}.${d.year} ${d.time}`);
            }

            function processAICommands(text) {
                if (!text) return "";
                if (!activeChar) return text.replace(/\[\[.*?\]\]/g, "").trim();
                if (!activeChar.startingDate) activeChar.startingDate = {};
                const d = activeChar.startingDate;
                if (!d.day) d.day = 1;
                if (!d.month) d.month = 1;
                if (!d.year) d.year = 1983;
                if (!d.time) d.time = "00:00";

                const tagPattern = /\[\[(.*?)\]\]/g;
                let match;
                let timeChanged = false;
                let locationChanged = false;

                while ((match = tagPattern.exec(text)) !== null) {
                    const content = match[1].trim();
                    const parts = content.split(/[,;]+/).map(s => s.trim()).filter(Boolean);

                    for (const part of parts) {
                        const addParty = part.match(/^AddToParty\s*:\s*(.+)$/i);
                        if (addParty) {
                            const payload = addParty[1].trim();
                            addSpeciesToPartyByRef(payload);
                            continue;
                        }
                        const locState = part.match(/^LocState\s*:\s*(.+)$/i);
                        if (locState) {
                            const payload = locState[1];
                            const kvs = payload.split(/;\s*/).filter(Boolean);
                            kvs.forEach(seg => {
                                const m = seg.match(/^([^=]+)=([^;]+)$/);
                                if (m) {
                                    const key = m[1].trim();
                                    const val = m[2].trim();
                                    let ttlDays = null;
                                    const ttlMatch = seg.match(/ttl\s*=\s*(\d+)\s*d/i);
                                    if (ttlMatch) ttlDays = parseInt(ttlMatch[1], 10);
                                    setLocationState(key, val, ttlDays, currentNarrationTs);
                                } else {
                                    const ttlOnly = seg.match(/^ttl\s*=\s*(\d+)\s*d/i);
                                    if (ttlOnly) {
                                        const ttlDays = parseInt(ttlOnly[1], 10);
                                        setLocationState("state", "updated", ttlDays, currentNarrationTs);
                                    }
                                }
                            });
                            continue;
                        }
                        const absTime = part.match(/^(\d+)\s*\|\s*(\d+)\s*\|\s*(\d+)\s*\|\s*(\d{2}:\d{2})$/)
                            || part.match(/^(\d+),\s*(\d+),\s*(\d+),\s*(\d{2}:\d{2})$/);
                        if (absTime) {
                            const day = parseInt(absTime[1]);
                            const month = parseInt(absTime[2]);
                            const year = parseInt(absTime[3]);
                            const timeStr = absTime[4];
                            d.day = day;
                            d.month = (month > 0 && month <= 12) ? month : d.month;
                            d.year = year;
                            d.time = timeStr;
                            timeChanged = true;
                            continue;
                        }

                        const relTime = part.match(/^(Year|Month|Week|Day|Time)\s*:\s*([+-]?\d+(?::\d{2})?)$/i);
                        if (relTime) {
                            const key = relTime[1].toLowerCase();
                            const valueStr = relTime[2];

                            const parseHM = (t) => {
                                const ps = (t || "00:00").split(":").map(Number);
                                return { h: ps[0] || 0, m: ps[1] || 0 };
                            };
                            const setHM = (h, m) => {
                                d.time = `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
                            };
                            const applyVal = (cur, valStr) => {
                                if (valStr.startsWith("+")) return cur + parseInt(valStr.substring(1));
                                if (valStr.startsWith("-")) return cur - parseInt(valStr.substring(1));
                                return parseInt(valStr);
                            };

                            if (key === "year") {
                                d.year = applyVal(d.year || 1983, valueStr);
                            } else if (key === "month") {
                                const isRel = valueStr.startsWith("+") || valueStr.startsWith("-");
                                if (isRel) {
                                    let m = (d.month || 1) + parseInt(valueStr);
                                    let y = d.year || 1983;
                                    while (m > 12) { m -= 12; y++; }
                                    while (m < 1) { m += 12; y--; }
                                    d.month = m;
                                    d.year = y;
                                } else {
                                    let m = parseInt(valueStr);
                                    d.month = (m > 0 && m <= 12) ? m : (d.month || 1);
                                }
                            } else if (key === "week") {
                                d.day = (d.day || 1) + (parseInt(valueStr) * 7);
                            } else if (key === "day") {
                                const isRel = valueStr.startsWith("+") || valueStr.startsWith("-");
                                if (isRel) {
                                    d.day = (d.day || 1) + parseInt(valueStr);
                                } else {
                                    d.day = parseInt(valueStr);
                                }
                            } else if (key === "time") {
                                if (valueStr.includes(":")) {
                                    d.time = valueStr;
                                } else {
                                    const mins = parseInt(valueStr);
                                    const cur = parseHM(d.time);
                                    let total = cur.h * 60 + cur.m + mins;
                                    while (total < 0) total += 24 * 60;
                                    total = total % (24 * 60);
                                    const nh = Math.floor(total / 60);
                                    const nm = total % 60;
                                    setHM(nh, nm);
                                }
                            }

                            // Normalize minutes and Y/M/D with 30-day months
                            (function norm() {
                                let [hh, mm] = (d.time || "00:00").split(":").map(Number);
                                let total = hh * 60 + mm;
                                const dayLen = 24 * 60;
                                let dd = Math.floor(total / dayLen);
                                let rest = total % dayLen;
                                if (rest < 0) { rest += dayLen; dd -= 1; }
                                hh = Math.floor(rest / 60);
                                mm = rest % 60;
                                d.time = `${String(hh).padStart(2, "0")}:${String(mm).padStart(2, "0")}`;
                                d.day = (d.day || 1) + dd;
                                while ((d.day || 1) > 30) { d.day -= 30; d.month = (d.month || 1) + 1; }
                                while ((d.day || 1) < 1) { d.month = (d.month || 1) - 1; d.day += 30; }
                                while ((d.month || 1) > 12) { d.month -= 12; d.year = (d.year || 1983) + 1; }
                                while ((d.month || 1) < 1) { d.month += 12; d.year = (d.year || 1983) - 1; }
                            })();

                            timeChanged = true;
                            continue;
                        }

                        const locKV = part.match(/^(Location|Loc)\s*:\s*["']?(.+?)["']?$/i);
                        if (locKV) {
                            const locName = locKV[2].trim();
                            updateLocation(locName);
                            locationChanged = true;
                            continue;
                        }

                        if (!part.includes(":")) {
                            const num = parseInt(part);
                            if (isNaN(num)) {
                                updateLocation(part);
                                locationChanged = true;
                                continue;
                            }
                        }
                    }
                }

                if (!timeChanged) {
                    addMinutes(1);
                } else {
                    updateNPCBirthdays(d);
                    updatePlayerBirthday(d);
                    updateHeaderTime();
                    saveActiveCharacter();
                }

                return text.replace(/\[\[.*?\]\]/g, "").replace(/\s+/g, " ").trim();
            }

            function handleCommand(key, val) {
                if (!activeChar) return;
                if (!activeChar.startingDate) activeChar.startingDate = {};
                const d = activeChar.startingDate;
                key = key.toLowerCase();
                console.log(`[AI Command] ${key} = ${val}`);

                if (key === "time") {
                    if (val.startsWith("+")) {
                        addMinutes(parseInt(val.substring(1)) || 0);
                    } else if (val.startsWith("-")) {
                        addMinutes(-(parseInt(val.substring(1)) || 0));
                    } else {
                        d.time = val;
                    }
                } else if (key === "day") {
                    d.day = parseInt(val) || d.day;
                } else if (key === "month") {
                    d.month = parseInt(val) || d.month;
                } else if (key === "year") {
                    d.year = parseInt(val) || d.year;
                } else if (
                    key === "add_m" ||
                    key === "add_min" ||
                    key === "add_minutes"
                ) {
                    addMinutes(parseInt(val) || 0);
                } else if (
                    key === "add_h" ||
                    key === "add_hour" ||
                    key === "add_hours"
                ) {
                    addMinutes((parseInt(val) || 0) * 60);
                } else if (key === "location" || key === "loc") {
                    updateLocation(val);
                }
                
                updateNPCBirthdays(d);
                updatePlayerBirthday(d);
                updateHeaderTime();
                saveActiveCharacter();
            }

            function _genId() { return Math.random().toString(36).slice(2, 10); }
            function addSpeciesToPartyByRef(ref) {
                try {
                    const cards = getCards();
                    let spec = null;
                    const idMatch = ref.match(/speciesId\s*=\s*([a-z0-9_-]+)/i);
                    if (idMatch) {
                        const id = idMatch[1];
                        spec = cards.find(c => c.genre === "species" && c.id === id) || null;
                    }
                    if (!spec) {
                        const quoted = ref.match(/["'](.+?)["']/);
                        const title = quoted ? quoted[1] : ref;
                        const t = title.trim().toLowerCase();
                        spec = cards.find(c => c.genre === "species" && (c.title || "").toLowerCase() === t) || null;
                    }
                    if (!spec) return;
                    const raw = Storage.get(CHARS_KEY) || "[]";
                    const chars = JSON.parse(raw);
                    const exists = chars.some(ch => (ch._fromSpeciesId && ch._fromSpeciesId === spec.id) && (ch.title || "") === (spec.title || ""));
                    if (exists) return;
                    const ch = {
                        id: _genId(),
                        genre: "character",
                        title: spec.title || "Creature",
                        appearance: spec.appearance || "",
                        personality: spec.personality || "",
                        raceName: spec.title || "",
                        status: "Alive",
                        isPlayable: false,
                        _fromSpeciesId: spec.id || "",
                        createdAt: Date.now(),
                        updatedAt: Date.now()
                    };
                    chars.push(ch);
                    Storage.set(CHARS_KEY, JSON.stringify(chars));
                } catch {}
            }
            function _cmpDate(a, b) {
                if ((a.year || 0) !== (b.year || 0)) return (a.year || 0) - (b.year || 0);
                if ((a.month || 0) !== (b.month || 0)) return (a.month || 0) - (b.month || 0);
                return (a.day || 0) - (b.day || 0);
            }
            function _doy(day, month) { return ((month || 1) - 1) * 30 + (day || 1); }
            function _birthsUpTo(date, bd) {
                if (!date || !bd) return 0;
                const y = date.year || 0;
                const passed = _doy(date.day || 1, date.month || 1) >= _doy(bd.day || 1, bd.month || 1) ? 1 : 0;
                return y + passed;
            }
            function _birthdaysDiff(a, b, bd) {
                if (!bd) return 0;
                return _birthsUpTo(b, bd) - _birthsUpTo(a, bd);
            }
            function updateNPCBirthdays(currentDate) {
                try {
                    const raw = Storage.get(CHARS_KEY) || "[]";
                    const chars = JSON.parse(raw);
                    let changed = false;
                    for (let i = 0; i < chars.length; i++) {
                        const c = chars[i];
                        if (!c || c.status === "Dead") continue;
                        const bd = c.birthdate;
                        if (!bd || (!bd.day && !bd.month)) continue;
                        if (typeof c.age !== "number") continue;
                        if (!c._ageCheck || typeof c._ageCheck !== "object") {
                            c._ageCheck = { day: currentDate.day || 1, month: currentDate.month || 1, year: currentDate.year || 1983 };
                            changed = true;
                            continue;
                        }
                        const diff = _birthdaysDiff(c._ageCheck, currentDate, bd);
                        if (diff !== 0) {
                            c.age = Math.max(0, (c.age || 0) + diff);
                            c._ageCheck = { day: currentDate.day || 1, month: currentDate.month || 1, year: currentDate.year || 1983 };
                            changed = true;
                        }
                    }
                    if (changed) {
                        Storage.set(CHARS_KEY, JSON.stringify(chars));
                    }
                } catch {}
            }
            function updatePlayerBirthday(currentDate) {
                try {
                    if (!activeChar) return;
                    const bd = activeChar.birthdate;
                    if (!bd || (!bd.day && !bd.month)) return;
                    if (typeof activeChar.age !== "number") return;
                    if (!activeChar._ageCheck || typeof activeChar._ageCheck !== "object") {
                        activeChar._ageCheck = { day: currentDate.day || 1, month: currentDate.month || 1, year: currentDate.year || 1983 };
                        return;
                    }
                    const diff = _birthdaysDiff(activeChar._ageCheck, currentDate, bd);
                    if (diff !== 0) {
                        activeChar.age = Math.max(0, (activeChar.age || 0) + diff);
                        activeChar._ageCheck = { day: currentDate.day || 1, month: currentDate.month || 1, year: currentDate.year || 1983 };
                    }
                } catch {}
            }

            /* ═══════════════════════════════════════
               BACKGROUND
            ═══════════════════════════════════════ */
            function loadBackground() {
                const raw = Storage.get(SETTINGS_KEY);
                const url = raw
                    ? JSON.parse(raw).backgroundUrl ||
                      "https://4kwallpapers.com/images/walls/thumbs_3t/25523.jpg"
                    : "https://4kwallpapers.com/images/walls/thumbs_3t/25523.jpg";
                const el = document.getElementById("bg-layer");
                if (el.style.backgroundImage !== `url(${url})`) {
                    el.style.backgroundImage = `url(${url})`;
                }
            }
            function getScenariosLocal() {
                try { return JSON.parse(localStorage.getItem(SCENARIOS_KEY) || "[]"); } catch { return []; }
            }
            function setScenariosLocal(list) {
                localStorage.setItem(SCENARIOS_KEY, JSON.stringify(list));
            }
            function getCurrentStoryId() {
                return Storage.get(CURRENT_STORY_ID_KEY);
            }
            function setCurrentStoryId(id) {
                Storage.set(CURRENT_STORY_ID_KEY, id);
            }
            function computeSig(cards, chars, log, settings, worldId) {
                return JSON.stringify({ w: worldId, c: cards.length, ch: chars.length, l: log.length, s: Object.keys(settings || {}).length });
            }
            function ensureStoryRecord() {
                const worldId = Storage.get(SELECTED_WORLD_ID_KEY);
                if (!worldId) return null;
                const cards = JSON.parse(Storage.get(CARDS_KEY) || "[]");
                const chars = JSON.parse(Storage.get(CHARS_KEY) || "[]");
                const log = JSON.parse(Storage.get(LOG_KEY) || "[]");
                const settings = JSON.parse(Storage.get(SETTINGS_KEY) || "{}");
                let scenarios = getScenariosLocal();
                let storyId = getCurrentStoryId();
                let story = storyId ? scenarios.find(x => x.id === storyId) : null;
                if (!story) {
                    const id = Math.random().toString(36).slice(2, 10);
                    let name = "Story " + new Date().toLocaleString();
                    if (chars.length > 0) {
                        const mainChar = chars[0];
                        const fullName = [mainChar.firstName, mainChar.lastName].filter(Boolean).join(" ").trim() || "Story";
                        name = `${fullName} - ${new Date().toLocaleDateString()}`;
                    }
                    story = {
                        id,
                        worldId,
                        name,
                        createdAt: Date.now(),
                        updatedAt: Date.now(),
                        signature: computeSig(cards, chars, log, settings, worldId),
                        official: false,
                        data: { cards, characters: chars, log, settings }
                    };
                    scenarios.push(story);
                    setScenariosLocal(scenarios);
                    setCurrentStoryId(id);
                }
                return story;
            }
            function autoSaveStory() {
                const worldId = Storage.get(SELECTED_WORLD_ID_KEY);
                if (!worldId) return;
                const cards = JSON.parse(Storage.get(CARDS_KEY) || "[]");
                const chars = JSON.parse(Storage.get(CHARS_KEY) || "[]");
                const log = JSON.parse(Storage.get(LOG_KEY) || "[]");
                const settings = JSON.parse(Storage.get(SETTINGS_KEY) || "{}");
                let scenarios = getScenariosLocal();
                let storyId = getCurrentStoryId();
                let story = storyId ? scenarios.find(x => x.id === storyId) : null;
                if (!story) {
                    story = ensureStoryRecord();
                    scenarios = getScenariosLocal();
                }
                if (!story) return;
                const idx = scenarios.findIndex(x => x.id === story.id);
                if (idx === -1) return;
                scenarios[idx].updatedAt = Date.now();
                scenarios[idx].data = { cards, characters: chars, log, settings };
                scenarios[idx].signature = computeSig(cards, chars, log, settings, worldId);
                if (!scenarios[idx].official) {
                    if (chars.length > 0) {
                        const mainChar = chars[0];
                        const fullName = [mainChar.firstName, mainChar.lastName].filter(Boolean).join(" ").trim();
                        if (fullName) {
                            scenarios[idx].name = `${fullName} - ${new Date().toLocaleDateString()}`;
                        }
                    }
                }
                setScenariosLocal(scenarios);
            }

                const overlay = document.getElementById("back-popup-overlay");
                const input = document.getElementById("back-story-input");
                const storyId = getCurrentStoryId();
                const scenarios = getScenariosLocal();
                const story = scenarios.find(x => x.id === storyId);

                overlay.style.display = "flex";

            function hideBackPopup() {
                const overlay = document.getElementById("back-popup-overlay");

            function handleBackSave() {
                const input = document.getElementById("back-story-input");
                const name = input.value.trim();
                const storyId = getCurrentStoryId();
                if (!storyId) { hideBackPopup(); return; }
                const scenarios = getScenariosLocal();
                const idx = scenarios.findIndex(x => x.id === storyId);
                if (idx >= 0) {
                    if (name) scenarios[idx].name = name;
                    scenarios[idx].official = true;
                    scenarios[idx].updatedAt = Date.now();
                    setScenariosLocal(scenarios);
                }
                hideBackPopup();
            }
            function handleBackDelete() {
                const storyId = getCurrentStoryId();
                let scenarios = getScenariosLocal();
                if (storyId) {
                    scenarios = scenarios.filter(x => x.id !== storyId);
                    setScenariosLocal(scenarios);
                }
                Storage.remove(CURRENT_STORY_ID_KEY);
                Storage.remove(SELECTED_WORLD_ID_KEY);
                Storage.remove(CARDS_KEY);
                Storage.remove(CHARS_KEY);
                Storage.remove(LOG_KEY);
                hideBackPopup();
                document.body.style.opacity = "0";
                setTimeout(() => { window.location.href = "index.html"; }, 300);
            }

            function appendBubble(role, text, cssExtra = "", scroll = true) {
                const messagesEl = document.getElementById("messages");
                
                // Determine sender label
                const senderLabel = role === "user" ? "You" : "Narrator";

                // Check if the previous message was from the same sender

                const bubble = document.createElement("div");

                bubble.textContent = text;

                row.appendChild(bubble);
                messagesEl.appendChild(row);
                if (scroll) messagesEl.scrollTop = messagesEl.scrollHeight;
                return bubble;
            }

            function buildLocationHierarchy() {
                try {
                    const cards = getCards();
                    const locations = cards.filter((c) => c.genre === "location");
                    const characters = cards.filter(
                        (c) => c.genre === "character",
                    );

                    const childrenMap = new Map();
                    const allSubIds = new Set();

                    locations.forEach((loc) => {
                        const subIds = [];
                        if (loc.sublocations) {
                            Object.values(loc.sublocations).forEach((arr) => {
                                if (Array.isArray(arr)) {
                                    arr.forEach((id) => {
                                        subIds.push(id);
                                        allSubIds.add(id);
                                    });
                                }
                            });
                        }
                        childrenMap.set(loc.id, subIds);
                    });

                    const roots = locations.filter(
                        (loc) => !allSubIds.has(loc.id),
                    );

                    function renderNode(id, depth = 0) {
                        const loc = locations.find((l) => l.id === id);
                        if (!loc) return "";

                        let indent = "  ".repeat(depth);
                        let type = (
                            loc.locationDetail ||
                            loc.locationSub ||
                            "Location"
                        ).toUpperCase();
                        let str = `${indent}- ${loc.title} (${type})`;
                        if (loc.description) str += `: ${loc.description}`;
                        str += "\n";
                        if (loc.lore) str += `${indent}  Lore: ${loc.lore}\n`;

                        // Residents
                        if (loc.residents && loc.residents.length > 0) {
                            loc.residents.forEach((resId) => {
                                const char = characters.find(
                                    (c) => c.id === resId,
                                );
                                if (char) {
                                    str += `${indent}  * Resident: ${char.title} (${char.raceName || "Character"})\n`;
                                }
                            });
                        }
                        
                        // School-specific data
                        if (
                            (loc.locationSub === "building" ||
                                loc.locationSub === "BUILDING") &&
                            (loc.locationDetail === "school" ||
                                loc.locationDetail === "SCHOOL")
                        ) {
                            if (loc.schoolSchedule) {
                                const d = loc.schoolSchedule.days || [];
                                const labels = ["Mo","Di","Mi","Do","Fr","Sa","So"];
                                const openDays = labels
                                    .map((lbl, i) => (d[i] ? lbl : null))
                                    .filter(Boolean)
                                    .join(", ");
                                const start = loc.schoolSchedule.start || "08:00";
                                const end = loc.schoolSchedule.end || "16:00";
                                str += `${indent}  School Schedule: ${openDays || "—"} | ${start} - ${end}\n`;
                            }
                            if (Array.isArray(loc.schoolClasses) && loc.schoolClasses.length > 0) {
                                str += `${indent}  Classes:\n`;
                                loc.schoolClasses.forEach((cls, idx) => {
                                    const t = characters.find(c => c.id === cls.teacherId);
                                    const tName = t ? t.title : (cls.teacherId ? "(Unknown)" : "—");
                                    const studs = (cls.studentIds || [])
                                        .map(id => {
                                            const ch = characters.find(c => c.id === id);
                                            return ch ? ch.title : "(Unknown)";
                                        })
                                        .join(", ");
                                    str += `${indent}    - ${cls.name || "Class "+(idx+1)} | Teacher: ${tName} | Students: ${studs || "—"}\n`;
                                });
                            }
                        }

                        const children = childrenMap.get(id) || [];
                        children.forEach((childId) => {
                            str += renderNode(childId, depth + 1);
                        });

                        return str;
                    }

                    let result = "\nWORLD LOCATIONS HIERARCHY:\n";
                    if (roots.length === 0 && locations.length > 0) {
                        locations.forEach((l) => {
                            result += renderNode(l.id);
                        });
                    } else {
                        roots.forEach((root) => {
                            result += renderNode(root.id);
                        });
                    }

                    return result;
                } catch (e) {
                    console.error("Hierarchy error", e);
                    return "\nWorld Hierarchy: (Error loading)";
                }
            }

            function buildCharacterContext() {
                try {
                    const cards = getCards();
                    if (!currentLocationId) return "";

                    const currentLoc = cards.find((c) => c.id === currentLocationId);
                    if (!currentLoc) return "";

                    // Find all ancestors
                    const ancestors = [];
                    let current = currentLoc;
                    while (current) {
                        ancestors.push(current);
                        const parent = cards.find((c) => {
                            if (c.genre !== "location" || !c.sublocations) return false;
                            return Object.values(c.sublocations).some((arr) => (arr || []).includes(current.id));
                        });
                        current = parent;
                    }

                    const ancestorIds = new Set(ancestors.map(a => a.id));

                    const scheduleNow = computeSchoolPresenceNow();
                    const scheduledByNpc = scheduleNow.byNpc || new Map();

                    // Collect all resident IDs from this location and its ancestors
                    const residentIds = new Set();
                    ancestors.forEach((loc) => {
                        if (loc.residents) {
                            loc.residents.forEach((id) => residentIds.add(id));
                        }
                    });

                    if (residentIds.size === 0) return "";

                    const characters = cards.filter((c) => c.genre === "character" && residentIds.has(c.id));
                    if (characters.length === 0) return "";

                    let context = "\nPRESENT CHARACTERS (Residents of this location and its parent regions):\n";
                    context += "NOTE: Presence does NOT mean friendship. Check 'Character Relationships' for status.\n";
                    characters.forEach((c) => {
                        if ((c.status || "Alive") === "Dead") return;
                        // If NPC is scheduled in school now, show only when current location includes that school
                        const sched = scheduledByNpc.get(c.id);
                        if (sched && !ancestorIds.has(sched.schoolId)) {
                            return; // not present here now
                        }
                        context += `- ${c.title} (${c.raceName || "Unknown Race"})\n`;
                        if (c.description) context += `  Description: ${c.description}\n`;
                        if (c.personality) context += `  Personality: ${c.personality}\n`;
                        if (c.appearance) context += `  Appearance: ${c.appearance}\n`;
                        if (c.lore) context += `  Lore/History: ${c.lore}\n`;
                    });
                    return context;
                } catch (e) {
                    console.error("Character context error", e);
                    return "";
                }
            }

            function speciesKeyForLoc(loc) {
                const sub = (loc.locationSub || "").toLowerCase();
                const det = (loc.locationDetail || "").toLowerCase();
                if (sub === "zivil") {
                    if (det === "village" || det === "city") return "village-city";
                    if (det === "country" || det === "kingdom") return "country-kingdom";
                    return null;
                }
                if (sub === "forest") return "forest";
                if (sub === "landmark") return "landmark";
                if (sub === "ocean") return "ocean";
                return null;
            }

            function getPresentSpeciesCards() {
                try {
                    if (!currentLocationId) return [];
                    const cards = getCards();
                    const currentLoc = cards.find((c) => c.id === currentLocationId);
                    if (!currentLoc) return [];
                    const ancestors = [];
                    let cur = currentLoc;
                    while (cur) {
                        ancestors.push(cur);
                        const parent = cards.find((c) => {
                            if (c.genre !== "location" || !c.sublocations) return false;
                            return Object.values(c.sublocations).some((arr) => (arr || []).includes(cur.id));
                        });
                        cur = parent;
                    }
                    const ids = new Set();
                    ancestors.forEach((loc) => {
                        const key = speciesKeyForLoc(loc);
                        if (!key) return;
                        const spec = loc.species || {};
                        (spec[key] || []).forEach((id) => ids.add(id));
                    });
                    return cards.filter((c) => c.genre === "species" && ids.has(c.id));
                } catch (e) {
                    console.error("Species presence error", e);
                    return [];
                }
            }

            function buildEventsContext() {

                            return Object.values(c.sublocations).some((arr) => (arr || []).includes(current.id));
                        });
                        current = parent;
                    }
                    const contextLines = [];
                    contextLines.push("\nZIVIL EVENTS (Current area and parent regions):");
                    ancestors.forEach(loc => {
                        if (loc.genre !== "location" || loc.locationSub !== "zivil") return;
                        const ev = loc.events || null;

                        const lists = [];

                        if (lists.length === 0) return;

                            const desc = e.description || "";
                            contextLines.push(`  * [${type}] ${dateStr} — ${desc}`);
                        });
                    });
                    if (contextLines.length <= 1) return "";
                    contextLines.push(`Current time reference: ${curDate} ${curTime}`);
                    contextLines.push("Secret events are unknown to NPCs; use them only as hidden world triggers.");

                } catch (e) {
                    console.error("Events context error", e);
                    return "";
                }

            function buildLocationStateContext() {

                    clearExpiredLocationStates();

                    const d = activeChar?.startingDate || {};
                    const curDate = `${String(d.day || 1).padStart(2,"0")}.${String(d.month || 1).padStart(2,"0")}.${d.year || 1983}`;

                            if (c.genre !== "location" || !c.sublocations) return false;
                            return Object.values(c.sublocations).some((arr) => (arr || []).includes(current.id));
                        });
                        current = parent;
                    }
                    const contextLines = [];
                    contextLines.push("\nLOCATION STATES (Current area and parent regions):");
                    ancestors.forEach(loc => {
                        const st = loc.states || {};
                        const keys = Object.keys(st);
                        if (keys.length === 0) return;
