<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>StoryKI – Game</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                scrollbar-width: thin;
                scrollbar-color: rgba(255, 255, 255, 0.12) transparent;
            }
            *::-webkit-scrollbar {
                width: 4px;
            }
            *::-webkit-scrollbar-track {
                background: transparent;
            }
            *::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.12);
                border-radius: 2px;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                font-family: "Segoe UI", Arial, sans-serif;
            }

            body {
                background: #0a0a0a;
                color: #fff;
                opacity: 0;
                transition: opacity 0.4s ease-in-out;
            }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.68);
                z-index: 0;
                pointer-events: none;
            }

            /* ─── Background Layer ─── */
            #bg-layer {
                position: fixed;
                inset: 0;
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
                z-index: -1;
                filter: blur(3px) brightness(0.38);
                transition: background-image 0.6s ease;
            }

            /* ─── App Shell ─── */
            #app {
                position: relative;
                z-index: 1;
                display: flex;
                flex-direction: column;
                height: 100vh;
                max-width: 820px;
                margin: 0 auto;
            }

            /* ════════════════════════════════════
               HEADER / TOP NAV
            ════════════════════════════════════ */
            #header {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 14px 20px;
                flex-shrink: 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.07);
                background: rgba(8, 8, 8, 0.55);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
            }

            .nav-back-btn {
                width: 36px;
                height: 36px;
                border-radius: 50%;
                border: 2px solid rgba(255, 255, 255, 0.18);
                background: rgba(28, 28, 28, 0.75);
                color: #fff;
                font-size: 15px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition:
                    background 0.2s,
                    border-color 0.2s;
                flex-shrink: 0;
            }
            .nav-back-btn:hover {
                background: rgba(55, 55, 55, 0.95);
                border-color: rgba(255, 255, 255, 0.4);
            }

            #header-title .story-label {
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: rgba(255, 255, 255, 0.35);
                margin-bottom: 2px;
            }
            #header-title .story-name {
                font-size: 15px;
                font-weight: 700;
                color: #fff;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 260px;
            }

            /* Info Block (Time/Loc) */
            #header-info {
                flex: 1;
                display: none;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                margin: 0 10px;
                text-align: center;
            }
            #header-location {
                font-size: 12px;
                font-weight: 700;
                color: rgba(255, 255, 255, 0.9);
                letter-spacing: 0.05em;
                text-transform: uppercase;
            }
            #header-time {
                font-size: 11px;
                color: rgba(255, 255, 255, 0.5);
                font-family: monospace;
                margin-top: 2px;
            }

            /* Character badge in header */
            #char-badge {
                display: none;
                align-items: center;
                gap: 8px;
                padding: 6px 12px;
                background: rgba(30, 30, 40, 0.8);
                border: 1.5px solid rgba(255, 255, 255, 0.1);
                border-radius: 20px;
                flex-shrink: 0;
            }
            #char-badge.visible {
                display: flex;
            }
            .char-avatar-sm {
                width: 24px;
                height: 24px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 13px;
                flex-shrink: 0;
            }
            .char-avatar-sm.male {
                background: rgba(30, 60, 110, 0.9);
                border: 1.5px solid rgba(80, 140, 220, 0.4);
            }
            .char-avatar-sm.female {
                background: rgba(110, 30, 60, 0.9);
                border: 1.5px solid rgba(220, 80, 140, 0.4);
            }
            .char-name-sm {
                font-size: 12px;
                font-weight: 700;
                color: rgba(255, 255, 255, 0.8);
            }
            .char-race-sm {
                font-size: 10px;
                color: rgba(200, 160, 60, 0.85);
                font-weight: 600;
            }

            /* NPCs Present Bar */
            #present-npcs-bar {
                display: none;
                background: rgba(12, 12, 12, 0.4);
                backdrop-filter: blur(8px);
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                padding: 8px 20px;
                overflow-x: auto;
                white-space: nowrap;
                gap: 12px;
                align-items: center;
                flex-shrink: 0;
            }
            #present-npcs-bar.visible {
                display: flex;
            }
            .npc-item {
                display: flex;
                align-items: center;
                gap: 6px;
                background: rgba(40, 40, 50, 0.6);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 16px;
                padding: 4px 10px;
                cursor: pointer;
                transition: background 0.2s;
            }
            .npc-item:hover {
                background: rgba(60, 60, 80, 0.8);
            }
            .npc-avatar-xs {
                width: 18px;
                height: 18px;
                border-radius: 50%;
                font-size: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #fff;
            }
            .npc-avatar-xs.male { background: #1e3c6e; }
            .npc-avatar-xs.female { background: #6e1e3c; }
            .npc-name-xs {
                font-size: 12px;
                font-weight: 600;
                color: rgba(255, 255, 255, 0.9);
            }

            /* ─── Status indicator ─── */
            #status-dot-wrap {
                display: flex;
                align-items: center;
                gap: 5px;
                flex-shrink: 0;
            }
            .status-dot {
                width: 7px;
                height: 7px;
                border-radius: 50%;
                background: rgba(80, 200, 100, 0.9);
                animation: pulse-dot 2.5s infinite;
            }
            .status-label {
                font-size: 11px;
                color: rgba(80, 200, 100, 0.85);
                font-weight: 600;
            }
            @keyframes pulse-dot {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.35;
                }
            }

            /* ════════════════════════════════════
               MESSAGES
            ════════════════════════════════════ */
            #messages {
                flex: 1;
                overflow-y: auto;
                padding: 24px 20px;
                display: flex;
                flex-direction: column;
                gap: 14px;
            }

            .msg-row {
                display: flex;
                flex-direction: column;
                gap: 3px;
            }
            .msg-row.user {
                align-items: flex-end;
            }
            .msg-row.ai {
                align-items: flex-start;
            }
            .msg-row.follow-up {
                margin-top: -8px;
            }

            .msg-sender {
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.06em;
                text-transform: uppercase;
                padding: 0 6px;
            }
            .msg-row.user .msg-sender {
                color: rgba(100, 150, 220, 0.6);
            }
            .msg-row.ai .msg-sender {
                color: rgba(255, 255, 255, 0.28);
            }

            .msg-bubble {
                padding: 12px 17px;
                border-radius: 16px;
                max-width: 76%;
                word-wrap: break-word;
                line-height: 1.65;
                font-size: 14px;
                white-space: pre-wrap;
            }
            .msg-row.user .msg-bubble {
                background: rgba(35, 80, 155, 0.88);
                border: 1px solid rgba(70, 130, 220, 0.3);
                border-bottom-right-radius: 4px;
                color: #fff;
            }
            .msg-row.ai .msg-bubble {
                background: rgba(26, 26, 26, 0.92);
                border: 1px solid rgba(255, 255, 255, 0.09);
                border-bottom-left-radius: 4px;
                color: rgba(255, 255, 255, 0.88);
            }
            .msg-bubble.thinking {
                color: rgba(255, 255, 255, 0.35);
                font-style: italic;
                animation: blink 1.4s infinite;
            }
            @keyframes blink {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.5;
                }
            }

            /* Typing dots */
            .typing-dots {
                display: inline-flex;
                gap: 4px;
                align-items: center;
                height: 18px;
            }
            .typing-dots span {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.4);
                animation: typing-bounce 1.2s infinite ease-in-out;
            }
            .typing-dots span:nth-child(2) {
                animation-delay: 0.2s;
            }
            .typing-dots span:nth-child(3) {
                animation-delay: 0.4s;
            }
            @keyframes typing-bounce {
                0%,
                80%,
                100% {
                    transform: translateY(0);
                    opacity: 0.4;
                }
                40% {
                    transform: translateY(-5px);
                    opacity: 1;
                }
            }

            /* Divider */
            .chat-divider {
                display: flex;
                align-items: center;
                gap: 12px;
                margin: 6px 0;
            }
            .chat-divider::before,
            .chat-divider::after {
                content: "";
                flex: 1;
                height: 1px;
                background: rgba(255, 255, 255, 0.07);
            }
            .chat-divider-label {
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: rgba(255, 255, 255, 0.2);
            }

            /* ════════════════════════════════════
               INPUT AREA
            ════════════════════════════════════ */
            #input-section {
                flex-shrink: 0;
                background: rgba(8, 8, 8, 0.55);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                border-top: 1px solid rgba(255, 255, 255, 0.07);
            }

            #input-area {
                display: flex;
                gap: 10px;
                align-items: flex-end;
                padding: 12px 16px 10px 16px;
            }

            #user-input {
                flex: 1;
                padding: 11px 16px;
                background: rgba(20, 20, 20, 0.95);
                border: 1.5px solid rgba(255, 255, 255, 0.1);
                border-radius: 22px;
                color: #fff;
                font-size: 14px;
                outline: none;
                font-family: inherit;
                resize: none;
                line-height: 1.5;
                max-height: 140px;
                overflow-y: auto;
                transition: border-color 0.2s;
            }
            #user-input::placeholder {
                color: rgba(255, 255, 255, 0.22);
            }
            #user-input:focus {
                border-color: rgba(255, 255, 255, 0.25);
            }

            #send-btn {
                width: 42px;
                height: 42px;
                border-radius: 50%;
                border: none;
                background: rgba(35, 85, 165, 0.9);
                color: #fff;
                font-size: 17px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition:
                    background 0.2s,
                    transform 0.15s,
                    opacity 0.2s;
                flex-shrink: 0;
                margin-bottom: 1px;
            }
            #send-btn:hover:not(:disabled) {
                background: rgba(50, 110, 200, 0.99);
                transform: scale(1.06);
            }
            #send-btn:disabled {
                opacity: 0.35;
                cursor: not-allowed;
                transform: none;
            }

            /* ─── Action Bar ─── */
            #action-bar {
                display: flex;
                gap: 7px;
                padding: 0 16px 14px 16px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .act-btn {
                padding: 7px 16px;
                border-radius: 18px;
                border: 1.5px solid rgba(255, 255, 255, 0.1);
                background: rgba(24, 24, 24, 0.9);
                color: rgba(255, 255, 255, 0.65);
                font-size: 12px;
                font-weight: 600;
                cursor: pointer;
                letter-spacing: 0.02em;
                white-space: nowrap;
                transition:
                    background 0.2s,
                    border-color 0.2s,
                    color 0.2s,
                    transform 0.15s;
                display: flex;
                align-items: center;
                gap: 5px;
            }
            .act-btn:hover {
                background: rgba(40, 40, 40, 0.98);
                border-color: rgba(255, 255, 255, 0.22);
                color: #fff;
                transform: translateY(-1px);
            }
            .act-btn:active {
                transform: translateY(0);
            }

            .act-btn.btn-retry {
                border-color: rgba(150, 150, 150, 0.2);
            }
            .act-btn.btn-edit {
                border-color: rgba(100, 170, 230, 0.25);
                color: rgba(130, 185, 240, 0.85);
            }
            .act-btn.btn-edit:hover {
                background: rgba(30, 60, 100, 0.6);
                color: #a8d0f8;
            }
            .act-btn.btn-continue {
                border-color: rgba(60, 180, 80, 0.3);
                color: rgba(100, 210, 120, 0.9);
            }
            .act-btn.btn-continue:hover {
                background: rgba(20, 65, 30, 0.8);
                color: #90e8a0;
            }
            .act-btn.btn-erase {
                border-color: rgba(180, 60, 60, 0.3);
                color: rgba(220, 100, 100, 0.85);
            }
            .act-btn.btn-erase:hover {
                background: rgba(70, 20, 20, 0.7);
                color: #ff9090;
            }

            /* ─── Toast ─── */
            #toast {
                position: fixed;
                bottom: 28px;
                left: 50%;
                transform: translateX(-50%) translateY(80px);
                background: rgba(40, 140, 80, 0.95);
                color: #fff;
                padding: 12px 24px;
                border-radius: 9px;
                font-size: 13px;
                font-weight: 600;
                z-index: 2000;
                opacity: 0;
                transition:
                    transform 0.3s ease,
                    opacity 0.3s ease;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
                white-space: nowrap;
                pointer-events: none;
            }
            #toast.show {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }

            /* ─── Welcome screen overlay ─── */
            #welcome-overlay {
                position: fixed;
                inset: 0;
                z-index: 100;
                background: rgba(0, 0, 0, 0.82);
                backdrop-filter: blur(6px);
                display: flex;
                align-items: center;
                justify-content: center;
                opacity: 1;
                transition: opacity 0.5s ease;
            }
            #welcome-overlay.hidden {
                opacity: 0;
                pointer-events: none;
            }
            .welcome-card {
                background: rgba(18, 18, 18, 0.95);
                border: 1.5px solid rgba(255, 255, 255, 0.1);
                border-radius: 16px;
                padding: 36px 40px;
                max-width: 420px;
                width: 90%;
                text-align: center;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            }
            .welcome-icon {
                font-size: 40px;
                margin-bottom: 16px;
            }
            .welcome-title {
                font-size: 22px;
                font-weight: 700;
                color: #fff;
                margin-bottom: 8px;
            }
            .welcome-sub {
                font-size: 13px;
                color: rgba(255, 255, 255, 0.4);
                line-height: 1.6;
                margin-bottom: 24px;
            }
            .welcome-char-row {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 14px 16px;
                background: rgba(30, 30, 40, 0.8);
                border: 1.5px solid rgba(255, 255, 255, 0.1);
                border-radius: 10px;
                margin-bottom: 24px;
                text-align: left;
            }
            .welcome-avatar {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 22px;
                flex-shrink: 0;
            }
            .welcome-avatar.male {
                background: rgba(30, 60, 110, 0.9);
                border: 2px solid rgba(80, 140, 220, 0.4);
            }
            .welcome-avatar.female {
                background: rgba(110, 30, 60, 0.9);
                border: 2px solid rgba(220, 80, 140, 0.4);
            }
            .welcome-char-name {
                font-size: 16px;
                font-weight: 700;
                color: #fff;
                margin-bottom: 3px;
            }
            .welcome-char-meta {
                font-size: 11px;
                color: rgba(200, 160, 60, 0.85);
                font-weight: 600;
            }
            .welcome-btn {
                width: 100%;
                padding: 14px 0;
                border-radius: 10px;
                border: none;
                background: rgba(30, 80, 150, 0.9);
                border: 1.5px solid rgba(70, 130, 220, 0.4);
                color: #fff;
                font-size: 15px;
                font-weight: 700;
                cursor: pointer;
                transition:
                    background 0.2s,
                    transform 0.15s;
                letter-spacing: 0.02em;
            }
            .welcome-btn:hover {
                background: rgba(45, 105, 190, 0.99);
                transform: translateY(-1px);
            }
            .welcome-btn:active {
                transform: translateY(0);
            }

        </style>
    </head>
    <body>
        <div id="bg-layer"></div>

        <!-- ─── Welcome Overlay ─── -->
        <div id="welcome-overlay">
            <div class="welcome-card">
                <div class="welcome-icon">📖</div>
                <div class="welcome-title">Your Story Begins</div>
                <div class="welcome-sub">
                    Your character is ready. The world awaits your decisions.
                </div>
                <div
                    class="welcome-char-row"
                    id="welcome-char-row"
                    style="display: none"
                >
                    <div class="welcome-avatar male" id="welcome-avatar">♂</div>
                    <div>
                        <div class="welcome-char-name" id="welcome-char-name">
                            —
                        </div>
                        <div class="welcome-char-meta" id="welcome-char-meta">
                            —
                        </div>
                    </div>
                </div>
                <button class="welcome-btn" onclick="dismissWelcome()">
                    ▶&nbsp; Begin Adventure
                </button>
            </div>
        </div>

        <!-- ─── Main App ─── -->
        <div id="app">
            <!-- Header -->
            <div id="header">
                <button class="nav-back-btn" onclick="goBack()" title="Back">
                    &#8592;
                </button>

                <div id="header-title">
                    <div class="story-label">StoryKI</div>
                    <div class="story-name" id="story-name">Adventure</div>
                </div>

                <div id="header-info">
                    <div id="header-location">—</div>
                    <div id="header-time">—</div>
                </div>

                <div id="char-badge">
                    <div class="char-avatar-sm male" id="header-avatar">♂</div>
                    <div>
                        <div class="char-name-sm" id="header-char-name">—</div>
                        <div class="char-race-sm" id="header-char-race">—</div>
                    </div>
                </div>

                <div id="status-dot-wrap">
                    <div class="status-dot" id="status-dot"></div>
                    <span class="status-label" id="status-label">Online</span>
                </div>
            </div>

            <!-- Present NPCs -->
            <div id="present-npcs-bar"></div>

            <!-- Messages -->
            <div id="messages">
                <div class="chat-divider">
                    <span class="chat-divider-label">Story Start</span>
                </div>
            </div>

            <!-- Input Section -->
            <div id="input-section">
                <div id="input-area">
                    <textarea
                        id="user-input"
                        rows="1"
                        placeholder="Was tust du als nächstes…"
                        autocomplete="off"
                    ></textarea>
                    <button id="send-btn" title="Senden">&#10148;</button>
                </div>
                <div id="action-bar">
                    <button class="act-btn btn-retry" id="retry-btn">
                        ↺ Retry
                    </button>
                    <button class="act-btn btn-edit" id="edit-btn">
                        ✎ Edit
                    </button>
                    <button class="act-btn btn-continue" id="continue-btn">
                        ▶ Continue
                    </button>
                    <button class="act-btn btn-erase" id="erase-btn">
                        ✕ Erase
                    </button>
                </div>
            </div>
        </div>

        <!-- Toast -->
        <div id="toast"></div>

        <script>
            /* ═══════════════════════════════════════
               CONSTANTS
            ═══════════════════════════════════════ */
            const SETTINGS_KEY = "storyki_settings";
            const CHARS_KEY = "storyki_characters";
            const CARDS_KEY = "storyki_storycards";
            const LOG_KEY = "storyki_storylog";

            // Storage Helper (Non-persistent session storage)
            const Storage = {
                get: (key) => sessionStorage.getItem(key),
                set: (key, val) => sessionStorage.setItem(key, val),
                remove: (key) => sessionStorage.removeItem(key),
                clear: () => sessionStorage.clear()
            };

            /* ═══════════════════════════════════════
               STATE
            ═══════════════════════════════════════ */
            let chatHistory = [];
            let isBusy = false;
            let activeChar = null;
            let currentLocationId = null;

            /* ═══════════════════════════════════════
               TIME & COMMAND SYSTEM
            ═══════════════════════════════════════ */
            function saveActiveCharacter() {
                if (!activeChar) return;
                try {
                    const chars = JSON.parse(
                        Storage.get(CHARS_KEY) || "[]",
                    );
                    const idx = chars.findIndex((c) => c.id === activeChar.id);
                    if (idx !== -1) {
                        chars[idx] = activeChar;
                        Storage.set(CHARS_KEY, JSON.stringify(chars));
                    }
                } catch (e) {
                    console.error("Failed to save character", e);
                }
            }

            function saveStoryLog() {
                try {
                    Storage.set(LOG_KEY, JSON.stringify(chatHistory));
                } catch (e) {
                    console.error("Failed to save story log", e);
                }
            }

            function loadStoryLog() {
                try {
                    const raw = Storage.get(LOG_KEY);
                    if (raw) {
                        chatHistory = JSON.parse(raw);
                        // Render log
                        const messagesEl = document.getElementById("messages");
                        messagesEl.innerHTML = "";
                        chatHistory.forEach((entry) => {
                            if (typeof entry === "string") {
                                // Divider
                                addSystemDivider(entry, false);
                            } else {
                                // New object format
                                const role = entry.sender === "Narrator" ? "ai" : "user";
                                appendBubble(role, entry.text, "", false);
                            }
                        });
                    }
                } catch (e) {
                    console.error("Failed to load story log", e);
                }
            }

            function addToStoryLog(sender, text) {
                const d = activeChar?.startingDate || {};
                const day = String(d.day || 1).padStart(2, "0");
                const mon = String(d.month || 1).padStart(2, "0");
                const yr = d.year || 1983;
                const tm = d.time || "00:00";
                const loc = document.getElementById("header-location")?.textContent || "Unknown Location";

                const entry = {
                    sender: sender,
                    text: text,
                    date: `${day}.${mon}.${yr}`,
                    time: tm,
                    location: loc,
                    timestamp: Date.now()
                };

                chatHistory.push(entry);
                saveStoryLog();
            }

            function updateHeaderTime() {
                if (!activeChar) return;
                const d = activeChar.startingDate || {};
                const day = String(d.day || 1).padStart(2, "0");
                const mon = String(d.month || 1).padStart(2, "0");
                const yr = d.year || 1983;
                const tm = d.time || "00:00";
                const el = document.getElementById("header-time");
                if (el) el.textContent = `${day}.${mon}.${yr} — ${tm}`;
            }

            function addMinutes(mins) {
                if (!activeChar) return;
                if (!activeChar.startingDate) activeChar.startingDate = {};
                const d = activeChar.startingDate;

                let [h, m] = (d.time || "00:00").split(":").map(Number);
                let totalMins = h * 60 + m + mins;

                // Handle negative
                if (totalMins < 0) {
                    // Not fully robust for multi-day backward, but basic support
                    totalMins += 24 * 60;
                }

                let extraDays = Math.floor(totalMins / (24 * 60));
                totalMins = totalMins % (24 * 60);

                h = Math.floor(totalMins / 60);
                m = totalMins % 60;

                d.time = `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;

                if (extraDays > 0) {
                    d.day = (d.day || 1) + extraDays;
                    // Simple month overflow (30 days logic for simplicity)
                    while (d.day > 30) {
                        d.day -= 30;
                        d.month = (d.month || 1) + 1;
                        if (d.month > 12) {
                            d.month = 1;
                            d.year = (d.year || 1983) + 1;
                        }
                    }
                }
                updateHeaderTime();
                saveActiveCharacter();
            }

            function processAICommands(text) {
                if (!text) return "";
                const cmdRegex = /\[\[(.*?)\]\]/gi;
                let newText = text.replace(cmdRegex, (match, content) => {
                    const parts = content.split(",").map((s) => s.trim());
                    parts.forEach((part) => {
                        // try key=val or key:val
                        let [k, v] = part.split("=").map((s) => s.trim());
                        if (!v) {
                            const colonIdx = part.indexOf(":");
                            if (colonIdx !== -1) {
                                k = part.substring(0, colonIdx).trim();
                                v = part.substring(colonIdx + 1).trim();
                            }
                        }
                        if (k && v) handleCommand(k, v);
                    });
                    return "";
                });
                return newText.replace(/\s+/g, " ").trim();
            }

            function handleCommand(key, val) {
                if (!activeChar) return;
                if (!activeChar.startingDate) activeChar.startingDate = {};
                const d = activeChar.startingDate;
                key = key.toLowerCase();
                console.log(`[AI Command] ${key} = ${val}`);

                if (key === "time") {
                    d.time = val;
                } else if (key === "day") {
                    d.day = parseInt(val) || d.day;
                } else if (key === "month") {
                    d.month = parseInt(val) || d.month;
                } else if (key === "year") {
                    d.year = parseInt(val) || d.year;
                } else if (
                    key === "add_m" ||
                    key === "add_min" ||
                    key === "add_minutes"
                ) {
                    addMinutes(parseInt(val) || 0);
                } else if (
                    key === "add_h" ||
                    key === "add_hour" ||
                    key === "add_hours"
                ) {
                    addMinutes((parseInt(val) || 0) * 60);
                } else if (key === "location" || key === "loc") {
                    updateLocation(val);
                }
                updateHeaderTime();
                saveActiveCharacter();
            }

            function buildLocationHierarchy() {
                try {
                    const cards = JSON.parse(Storage.get(CARDS_KEY) || "[]");
                    const locations = cards.filter((c) => c.genre === "location");
                    const characters = cards.filter(
                        (c) => c.genre === "character",
                    );

                    const childrenMap = new Map();
                    const allSubIds = new Set();

                    locations.forEach((loc) => {
                        const subIds = [];
                        if (loc.sublocations) {
                            Object.values(loc.sublocations).forEach((arr) => {
                                if (Array.isArray(arr)) {
                                    arr.forEach((id) => {
                                        subIds.push(id);
                                        allSubIds.add(id);
                                    });
                                }
                            });
                        }
                        childrenMap.set(loc.id, subIds);
                    });

                    const roots = locations.filter(
                        (loc) => !allSubIds.has(loc.id),
                    );

                    function renderNode(id, depth = 0) {
                        const loc = locations.find((l) => l.id === id);
                        if (!loc) return "";

                        let indent = "  ".repeat(depth);
                        let type = (
                            loc.locationDetail ||
                            loc.locationSub ||
                            "Location"
                        ).toUpperCase();
                        let str = `${indent}- ${loc.title} (${type})\n`;

                        // Residents
                        if (loc.residents && loc.residents.length > 0) {
                            loc.residents.forEach((resId) => {
                                const char = characters.find(
                                    (c) => c.id === resId,
                                );
                                if (char) {
                                    str += `${indent}  * Resident: ${char.title} (${char.raceName || "Character"})\n`;
                                }
                            });
                        }

                        const children = childrenMap.get(id) || [];
                        children.forEach((childId) => {
                            str += renderNode(childId, depth + 1);
                        });

                        return str;
                    }

                    let result = "\nWorld Hierarchy:\n";
                    if (roots.length === 0 && locations.length > 0) {
                        locations.forEach((l) => {
                            result += renderNode(l.id);
                        });
                    } else {
                        roots.forEach((root) => {
                            result += renderNode(root.id);
                        });
                    }

                    return result;
                } catch (e) {
                    console.error("Hierarchy error", e);
                    return "\nWorld Hierarchy: (Error loading)";
                }
            }

            function buildRelationshipSummary() {
                try {
                    const cards = getCards();
                    const bar = document.getElementById("present-npcs-bar");
                    if (!bar || !bar.classList.contains("visible")) return "";

                    // Get IDs of NPCs currently present
                    const presentNpcIds = Array.from(
                        bar.querySelectorAll(".npc-item"),
                    )
                        .map((item) => {
                            // Find the original NPC card by name from the bar
                            const name = item
                                .querySelector(".npc-name-xs")
                                .textContent.trim();
                            const card = cards.find(
                                (c) => c.genre === "character" && c.title === name,
                            );
                            return card ? card.id : null;
                        })
                        .filter(Boolean);

                    if (presentNpcIds.length === 0) return "";

                    let summary = "\nCharacter Relationships:\n";
                    const playerFullName = activeChar
                        ? [activeChar.firstName, activeChar.lastName]
                              .filter(Boolean)
                              .join(" ")
                        : "Player";

                    presentNpcIds.forEach((npcId) => {
                        const npc = cards.find((c) => c.id === npcId);
                        if (!npc) return;

                        // 1. Relation NPC to Player
                        let playerRel = "Stranger (Unknown)";
                        if (npc.relations) {
                            const relObj = npc.relations.find(
                                (r) =>
                                    r.targetName.toLowerCase() ===
                                    playerFullName.toLowerCase(),
                            );
                            if (relObj && relObj.relation !== "Unknown") {
                                playerRel =
                                    relObj.relation === "Family"
                                        ? relObj.familySub
                                        : relObj.relation;
                            }
                        }
                        summary += `- ${npc.title} to ${playerFullName}: ${playerRel}\n`;

                        // 2. Relation NPC to other present NPCs
                        presentNpcIds.forEach((otherId) => {
                            if (npcId === otherId) return;
                            const other = cards.find((c) => c.id === otherId);
                            if (!other) return;

                            let npcRel = "Stranger (Unknown)";
                            if (npc.relations) {
                                const relObj = npc.relations.find(
                                    (r) => r.targetId === otherId,
                                );
                                if (relObj && relObj.relation !== "Unknown") {
                                    npcRel =
                                        relObj.relation === "Family"
                                            ? relObj.familySub
                                            : relObj.relation;
                                }
                            }
                            summary += `  * ${npc.title} to ${other.title}: ${npcRel}\n`;
                        });
                    });

                    summary +=
                        "IMPORTANT: If a relationship is 'Stranger (Unknown)', the characters do NOT know each other and should act accordingly.\n";
                    return summary;
                } catch (e) {
                    console.error("Relationship summary error", e);
                    return "";
                }
            }

            function updateLocation(nameOrId) {
                const cards = getCards();
                let card = cards.find(
                    (c) => c.genre === "location" && c.id === nameOrId,
                );
                if (!card) {
                    // Try by title
                    const search = nameOrId.toLowerCase();
                    card = cards.find(
                        (c) =>
                            c.genre === "location" &&
                            (c.title || "").toLowerCase() === search,
                    );
                }

                const el = document.getElementById("header-location");
                if (card) {
                    currentLocationId = card.id;
                    if (el) el.textContent = card.title.toUpperCase();
                } else {
                    currentLocationId = null;
                    if (el) el.textContent = nameOrId.toUpperCase();
                }
                updatePresentNPCs();
            }

            function updatePresentNPCs() {
                const bar = document.getElementById("present-npcs-bar");
                if (!currentLocationId) {
                    bar.classList.remove("visible");
                    bar.innerHTML = "";
                    return;
                }

                const cards = getCards();
                const currentLoc = cards.find((c) => c.id === currentLocationId);
                if (!currentLoc) {
                    bar.classList.remove("visible");
                    return;
                }

                // Find all ancestors
                const ancestors = [];
                let current = currentLoc;

                while (current) {
                    ancestors.push(current);
                    // find parent
                    const parent = cards.find((c) => {
                        if (c.genre !== "location" || !c.sublocations)
                            return false;
                        return Object.values(c.sublocations).some((arr) =>
                            (arr || []).includes(current.id),
                        );
                    });
                    current = parent;
                }

                // Collect residents from current and all ancestors
                const residentIds = new Set();
                ancestors.forEach((loc) => {
                    if (loc.residents) {
                        loc.residents.forEach((id) => residentIds.add(id));
                    }
                });

                const presentNPCs = [];
                residentIds.forEach((id) => {
                    const char = cards.find(
                        (c) => c.genre === "character" && c.id === id,
                    );
                    if (char) presentNPCs.push(char);
                });

                if (presentNPCs.length === 0) {
                    bar.classList.remove("visible");
                    bar.innerHTML = "";
                    return;
                }

                bar.innerHTML = "";
                presentNPCs.forEach((npc) => {
                    const item = document.createElement("div");
                    item.className = "npc-item";
                    const isF = npc.gender === "female";
                    const icon = isF ? "♀" : "♂";
                    const avatarClass = isF ? "female" : "male";

                    item.innerHTML = `
                        <div class="npc-avatar-xs ${avatarClass}">${icon}</div>
                        <div class="npc-name-xs">${npc.title}</div>
                    `;
                    item.onclick = () => showNPCInfo(npc.id);
                    bar.appendChild(item);
                });
                bar.classList.add("visible");
            }

            function showNPCInfo(id) {
                const cards = getCards();
                const npc = cards.find((c) => c.id === id);
                if (!npc) return;

                // Simple alert for now, could be a modal

                if (npc.personality) info += `\nPersonality:\n${npc.personality}\n`;
                if (npc.appearance) info += `\nAppearance:\n${npc.appearance}\n`;
                
                alert(info);

            function askAI(prompt) {
                return new Promise((resolve, reject) => {
                    const requestId = Math.random().toString(36).substring(7);
                    const timeout = setTimeout(() => {
                        window.removeEventListener("message", handler);
                        reject("Die KI hat zu lange gebraucht.");
                    }, 45000);

                    const handler = (event) => {
                        if (event.data.requestId === requestId) {
                            clearTimeout(timeout);
                            window.removeEventListener("message", handler);
                            if (event.data.type === "AI_RESPONSE")
                                resolve(event.data.text);
                            else
                                reject(
                                    event.data.error || "Unbekannter Fehler",
                                );
                        }
                    };

                    window.addEventListener("message", handler);
                    window.parent.postMessage(
                        { type: "AI_REQUEST", instruction: prompt, requestId },
                        "*",
                    );
                });
            }

            async function triggerNarration(systemPrompt) {
                if (isBusy) return;
                isBusy = true;
                setSendDisabled(true);
                setStatus(false);

                const typing = appendTypingIndicator();

                const d = activeChar?.startingDate || {};
                const curDate = `${String(d.day || 1).padStart(2, "0")}.${String(d.month || 1).padStart(2, "0")}.${d.year || 1983}`;
                const curTime = d.time || "00:00";
                const curLoc = document.getElementById("header-location")?.textContent || "Unknown Location";
                const worldHierarchy = buildLocationHierarchy();
                const relationshipSummary = buildRelationshipSummary();
                const presentNPCs = Array.from(document.querySelectorAll('.npc-name-xs')).map(el => el.textContent).join(", ");
                
                const settings = JSON.parse(Storage.get(SETTINGS_KEY) || "{}");
                const aiLangMap = {
                    "de": "German",
                    "en": "English",
                    "ja": "Japanese",
                    "fr": "French",
                    "es": "Spanish",
                    "it": "Italian",
                    "ru": "Russian",
                    "ko": "Korean",
                    "zh": "Chinese"
                };
                const aiLang = aiLangMap[settings.aiLanguage] || "English";

                const systemInst =
                    `SYSTEM: You are the Narrator. Current state: Date=${curDate}, Time=${curTime}, Location=${curLoc}. ` +
                    (presentNPCs ? `Present NPCs: ${presentNPCs}. ` : "") +
                    `${worldHierarchy} ` +
                    `${relationshipSummary} ` +
                    `You MUST write EXCLUSIVELY in ${aiLang}. ` +
                    `You MUST update the in-game time or location by adding commands like [[time: 14:30]], [[add_m: 30]], [[day: 2]], or [[location: The Forest]] (hidden from user) at the VERY END of your response. ` +
                    `Commands: time: HH:MM, day: N, month: N, year: N, add_m: N, add_h: N, location: Text. ` +
                    `IMPORTANT: If time passes in your narration, ALWAYS use a command. If the AI does not send a command, time stands still!`;

                try {
                    const history =
                        chatHistory.length > 0
                            ? systemInst + "\n" + chatHistory.map(e => typeof e === 'string' ? e : `[${e.time}] ${e.sender}: ${e.text}`).join("\n") + "\nNarrator:"
                            : systemInst + "\n" + systemPrompt + "\nNarrator:";
                    const response = await askAI(history);
                    removeTypingIndicator();
                    const cleanResponse = processAICommands(response);
                    appendBubble("ai", cleanResponse);
                    addToStoryLog("Narrator", cleanResponse);
                } catch (err) {
                    removeTypingIndicator();
                    appendBubble("ai", "[ Fehler: " + err + " ]");
                } finally {
                    isBusy = false;
                    setSendDisabled(false);
                    setStatus(true);
                }

                const curLoc = document.getElementById("header-location")?.textContent || "Unknown Location";

                const presentNPCs = Array.from(document.querySelectorAll('.npc-name-xs')).map(el => el.textContent).join(", ");

                };
                const aiLang = aiLangMap[settings.aiLanguage] || "English";

                const systemInst =
                    `SYSTEM: You are the Narrator. Current state: Date=${curDate}, Time=${curTime}, Location=${curLoc}. ` +
                    (presentNPCs ? `Present NPCs: ${presentNPCs}. ` : "") +
                    `${worldHierarchy} ` +
                    `${relationshipSummary} ` +
                    `You MUST write EXCLUSIVELY in ${aiLang}. ` +
                    `You MUST update the in-game time or location by adding commands like [[time: 14:30]], [[add_m: 30]], [[day: 2]], or [[location: The Forest]] (hidden from user) at the VERY END of your response. ` +
                    `Commands: time: HH:MM, day: N, month: N, year: N, add_m: N, add_h: N, location: Text. ` +
                    `IMPORTANT: If time passes in your narration, ALWAYS use a command. If the AI does not send a command, time stands still!`;

                try {
                    const historyText =
                        systemInst + "\n" + chatHistory.map(e => typeof e === 'string' ? e : `[${e.time}] ${e.sender}: ${e.text}`).join("\n") + "\nNarrator:";
                    const response = await askAI(historyText);
                    removeTypingIndicator();
                    const cleanResponse = processAICommands(response);
                    appendBubble("ai", cleanResponse);
                    addToStoryLog("Narrator", cleanResponse);
                } catch (err) {
                    removeTypingIndicator();
                    appendBubble("ai", "[ Fehler: " + err + " ]");
                } finally {
                    isBusy = false;
                    setSendDisabled(false);
                    setStatus(true);
                }
            }

            function setSendDisabled(v) {
                document.getElementById("send-btn").disabled = v;
            }

            /* ═══════════════════════════════════════
               ACTION BUTTONS
            ═══════════════════════════════════════ */
            document.getElementById("send-btn").onclick = sendMessage;

            document
                .getElementById("user-input")
                .addEventListener("keydown", (e) => {
                    if (e.key === "Enter" && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage();
                    }
                });

            // Auto-resize textarea
            document
                .getElementById("user-input")
                .addEventListener("input", function () {
                    this.style.height = "auto";
                    this.style.height = Math.min(this.scrollHeight, 140) + "px";
                });

            document.getElementById("retry-btn").onclick = async () => {
                if (isBusy) return;
                // Remove last AI message from DOM and history
                const messagesEl = document.getElementById("messages");
                const aiRows = messagesEl.querySelectorAll(".msg-row.ai");
                if (!aiRows.length) return;
                aiRows[aiRows.length - 1].remove();
                // Remove last narrator entry from history
                for (let i = chatHistory.length - 1; i >= 0; i--) {
                    const entry = chatHistory[i];
                    const isNarrator = typeof entry === 'string' ? entry.startsWith("Narrator:") : entry.sender === "Narrator";
                    if (isNarrator) {
                        chatHistory.splice(i, 1);
                        break;
                    }
                }
                saveStoryLog();
                isBusy = true;
                setSendDisabled(true);
                setStatus(false);
                appendTypingIndicator();

                const d = activeChar?.startingDate || {};
                const curDate = `${String(d.day || 1).padStart(2, "0")}.${String(d.month || 1).padStart(2, "0")}.${d.year || 1983}`;
                const curTime = d.time || "00:00";
                const curLoc = document.getElementById("header-location")?.textContent || "Unknown Location";

                const systemInst =
                    `SYSTEM: You are the Narrator. Current state: Date=${curDate}, Time=${curTime}, Location=${curLoc}. ` +
                    `You MUST update the in-game time or location by adding commands like [[time: 14:30]], [[add_m: 30]], [[day: 2]], or [[location: The Forest]] (hidden from user) at the VERY END of your response. ` +
                    `Commands: time: HH:MM, day: N, month: N, year: N, add_m: N, add_h: N, location: Text. ` +
                    `IMPORTANT: If time passes in your narration, ALWAYS use a command. If the AI does not send a command, time stands still!`;

                try {
                    const histText =
                        systemInst + "\n" + chatHistory.map(e => typeof e === 'string' ? e : `[${e.time}] ${e.sender}: ${e.text}`).join("\n") + "\nNarrator:";
                    const r = await askAI(histText);
                    removeTypingIndicator();
                    const cleanR = processAICommands(r);
                    appendBubble("ai", cleanR);
                    addToStoryLog("Narrator", cleanR);
                } catch (e) {
                    removeTypingIndicator();
                    appendBubble("ai", "[ Fehler: " + e + " ]");
                } finally {
                    isBusy = false;
                    setSendDisabled(false);
                    setStatus(true);
                }
            };

            document.getElementById("continue-btn").onclick = async () => {
                if (isBusy) return;
                isBusy = true;
                setSendDisabled(true);
                setStatus(false);
                appendTypingIndicator();

                const d = activeChar?.startingDate || {};
                const curDate = `${String(d.day || 1).padStart(2, "0")}.${String(d.month || 1).padStart(2, "0")}.${d.year || 1983}`;
                const curTime = d.time || "00:00";
                const curLoc = document.getElementById("header-location")?.textContent || "Unknown Location";

                const systemInst =
                    `SYSTEM: You are the Narrator. Current state: Date=${curDate}, Time=${curTime}, Location=${curLoc}. ` +
                    `You MUST update the in-game time or location by adding commands like [[time: 14:30]], [[add_m: 30]], [[day: 2]], or [[location: The Forest]] (hidden from user) at the VERY END of your response. ` +
                    `Commands: time: HH:MM, day: N, month: N, year: N, add_m: N, add_h: N, location: Text. ` +
                    `IMPORTANT: If time passes in your narration, ALWAYS use a command. If the AI does not send a command, time stands still!`;

                try {
                    const histText =
                        systemInst + "\n" + chatHistory.map(e => typeof e === 'string' ? e : `[${e.time}] ${e.sender}: ${e.text}`).join("\n") + "\nNarrator:";
                    const r = await askAI(histText);
                    removeTypingIndicator();
                    const cleanR = processAICommands(r);
                    appendBubble("ai", cleanR);
                    addToStoryLog("Narrator", cleanR);
                } catch (e) {
                    removeTypingIndicator();
                    appendBubble("ai", "[ Fehler: " + e + " ]");
                } finally {
                    isBusy = false;
                    setSendDisabled(false);
                    setStatus(true);
                }
            };

            document.getElementById("edit-btn").onclick = () => {
                const messagesEl = document.getElementById("messages");
                const userRows = messagesEl.querySelectorAll(".msg-row.user");
                if (!userRows.length) return;
                const lastRow = userRows[userRows.length - 1];
                const bubble = lastRow.querySelector(".msg-bubble");
                const text = bubble ? bubble.textContent : "";
                document.getElementById("user-input").value = text;
                document.getElementById("user-input").focus();
                // Remove from DOM
                lastRow.remove();
                // Remove from history
                for (let i = chatHistory.length - 1; i >= 0; i--) {
                    const entry = chatHistory[i];
                    const prefix =
                        (activeChar
                            ? [activeChar.firstName, activeChar.lastName]
                                  .filter(Boolean)
                                  .join(" ")
                            : "Player") + ":";
                    
                    const matches = typeof entry === 'string' 
                        ? entry.startsWith(prefix)
                        : entry.sender === (activeChar ? [activeChar.firstName, activeChar.lastName].filter(Boolean).join(" ") : "Player");

                    if (matches) {
                        chatHistory.splice(i, 1);
                        saveStoryLog();
                        break;
                    }
                }
            };

            document.getElementById("erase-btn").onclick = () => {
                const messagesEl = document.getElementById("messages");
                const rows = Array.from(messagesEl.children).filter(c => c.classList.contains("msg-row") || c.classList.contains("chat-divider"));
                if (!rows.length) return;

                const lastRow = rows[rows.length - 1];
                lastRow.remove();

                if (chatHistory.length > 0) {
                    chatHistory.pop();
                    saveStoryLog();
                    showToast("Nachricht gelöscht.", "rgba(180, 60, 60, 0.85)");
                }
            };

            /* ═══════════════════════════════════════
               TOAST
            ═══════════════════════════════════════ */
            function showToast(msg, bg = "rgba(40,140,80,0.95)") {
                const t = document.getElementById("toast");
                t.textContent = msg;
                t.style.background = bg;
                t.classList.add("show");
                clearTimeout(t._timer);
                t._timer = setTimeout(() => t.classList.remove("show"), 2800);
            }

            /* ═══════════════════════════════════════
               NAVIGATION
            ═══════════════════════════════════════ */

            /* ═══════════════════════════════════════
               NAVIGATION
            ═══════════════════════════════════════ */
            function goBack() {
                document.body.style.opacity = "0";
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 400);
            }

            /* ═══════════════════════════════════════
               INIT
            ═══════════════════════════════════════ */
            window.addEventListener("load", () => {
                loadBackground();
                setInterval(loadBackground, 2000);

                const params = new URLSearchParams(window.location.search);
                const isContinue = params.get("mode") === "continue";

                const char = loadLatestCharacter();
                if (char) {
                    applyCharacter(char);
                    loadStoryLog();
                    
                    if (isContinue) {
                        // Directly show the game, no welcome
                        const ov = document.getElementById("welcome-overlay");
                        ov.style.display = "none";
                    }
                }

                setTimeout(() => {
                    document.body.style.opacity = "1";
                }, 100);
            });
        </script>
    </body>
</html>
