            function buildPlayerContext() {
                if (!activeChar) return "";
                const name = [activeChar.firstName, activeChar.lastName].filter(Boolean).join(" ") || "Unknown";
                const race = activeChar.raceName || "Unknown Race";
                const gender = activeChar.gender || "";
                const age = activeChar.age ? `${activeChar.age}` : "";
                const bd = activeChar.birthdate ? `${String(activeChar.birthdate.day || 1).padStart(2,"0")}.${String(activeChar.birthdate.month || 1).padStart(2,"0")}` : "";
                const app = activeChar.appearance || "";
                let lines = [];
                lines.push(`- NAME: ${name}`);
                if (race) lines.push(`- RACE: ${race}`);
                if (gender) lines.push(`- GENDER: ${gender}`);
                if (age) lines.push(`- AGE: ${age}`);
                if (bd) lines.push(`- BIRTHDATE: ${bd}`);
                if (app) lines.push(`- APPEARANCE: ${app}`);
                const rels = Array.isArray(activeChar.relations) ? activeChar.relations : [];
                if (rels.length > 0) {
                    lines.push("- RELATIONS:");
                    rels.forEach(r => {
                        const n = r.targetName || r.targetId || "(Unknown)";
                        const rel = r.relation === "Family" ? (r.familySub || "Family") : (r.relation || "Unknown");
                        lines.push(`  * ${n}: ${rel}`);
                    });
                }
                return lines.join("\n");
            }

            function buildRelationshipSummary() {
                const relationshipRules = 
                    "\nIMPORTANT RELATIONSHIP RULES:\n" +
                    "1. If a relationship is 'Stranger (Unknown)', the characters are COMPLETE STRANGERS. They have never met before.\n" +
                    "2. Strangers should act with caution, politeness, or distance, depending on their personality, but NEVER like friends, family, or lovers.\n" +
                    "3. Do NOT mention any past shared experiences, shared celebrations, or close bonds if the relationship is 'Stranger (Unknown)'.\n" +
                    "4. If an NPC is present but NOT mentioned in the relationship list, assume they are a Stranger (Unknown).\n";

                try {
                    const cards = getCards();
                    const bar = document.getElementById("present-npcs-bar");
                    if (!bar || !bar.classList.contains("visible")) return relationshipRules;

                    // Get IDs of NPCs currently present
                    const presentNpcIds = Array.from(
                        bar.querySelectorAll(".npc-item"),
                    )
                        .map((item) => {
                            // Find the original NPC card by name from the bar
                            const name = item
                                .querySelector(".npc-name-xs")
                                .textContent.trim();
                            const card = cards.find(
                                (c) => c.genre === "character" && c.title === name,
                            );
                            return card ? card.id : null;
                        })
                        .filter(Boolean);

                    if (presentNpcIds.length === 0) return relationshipRules;

                    let summary = "\nCharacter Relationships:\n";
                    const playerFullName = activeChar
                        ? [activeChar.firstName, activeChar.lastName]
                              .filter(Boolean)
                              .join(" ")
                        : "Player";

                    presentNpcIds.forEach((npcId) => {
                        const npc = cards.find((c) => c.id === npcId);
                        if (!npc) return;

                        // 1. Relation NPC to Player (Check NPC side and Player side)
                        let playerRel = "Stranger (Unknown)";
                        
                        // Check NPC's side
                        if (npc.relations) {
                            const relObj = npc.relations.find(
                                (r) =>
                                    r.targetName.toLowerCase() ===
                                    playerFullName.toLowerCase(),
                            );
                            if (relObj && relObj.relation !== "Unknown") {
                                playerRel =
                                    relObj.relation === "Family"
                                        ? relObj.familySub
                                        : relObj.relation;
                            }
                        }
                        
                        // Check Player's side if still unknown
                        if (playerRel === "Stranger (Unknown)" && activeChar && activeChar.relations) {
                            const relObj = activeChar.relations.find(
                                (r) => r.targetId === npcId || r.targetName.toLowerCase() === npc.title.toLowerCase()
                            );
                            if (relObj && relObj.relation !== "Unknown") {
                                playerRel =
                                    relObj.relation === "Family"
                                        ? relObj.familySub
                                        : relObj.relation;
                            }
                        }
                        
                        summary += `- ${npc.title} to ${playerFullName}: ${playerRel}\n`;

                        // 2. Relation NPC to other present NPCs
                        presentNpcIds.forEach((otherId) => {
                            if (npcId === otherId) return;
                            const other = cards.find((c) => c.id === otherId);
                            if (!other) return;

                            let npcRel = "Stranger (Unknown)";
                            if (npc.relations) {
                                const relObj = npc.relations.find(
                                    (r) => r.targetId === otherId,
                                );
                                if (relObj && relObj.relation !== "Unknown") {
                                    npcRel =
                                        relObj.relation === "Family"
                                            ? relObj.familySub
                                            : relObj.relation;
                                }
                            }
                            summary += `  * ${npc.title} to ${other.title}: ${npcRel}\n`;
                        });
                    });

                    summary += relationshipRules;
                    return summary;
                } catch (e) {
                    console.error("Relationship summary error", e);
                    return relationshipRules;
                }
            }

            function updateLocation(nameOrId) {
                if (!nameOrId) return;
                // Strip surrounding quotes if present
                nameOrId = nameOrId.replace(/^["']|["']$/g, "").trim();
                const cards = getCards();
                let card = null;

                // 1. Try exact ID
                card = cards.find((c) => c.genre === "location" && c.id === nameOrId);
                
                // 2. Try exact title
                if (!card) {
                    const search = nameOrId.toLowerCase().trim();
                    card = cards.find((c) => c.genre === "location" && (c.title || "").toLowerCase() === search);
                }

                // 3. Try to handle "Region (Outside)" format
                if (!card && nameOrId.includes("(")) {
                    const regionName = nameOrId.split("(")[0].trim().toLowerCase();
                    card = cards.find((c) => c.genre === "location" && (c.title || "").toLowerCase() === regionName);
                }

                const el = document.getElementById("header-location");
                if (card) {
                    currentLocationId = card.id;
                    if (activeChar) activeChar.currentLocationId = card.id; // Save to activeChar
                    if (el) el.textContent = card.title.toUpperCase(); // Fixed: Show TITLE, not ID
                } else {
                    // Fallback: If no card found, keep the text but try to find a parent if possible
                    // Or just keep the text and null the ID (AI will lose character context)
                    currentLocationId = null;
                    if (activeChar) activeChar.currentLocationId = null; // Save to activeChar
                    if (el) el.textContent = nameOrId.toUpperCase();
                    console.warn(`[Location] No card found for: ${nameOrId}`);
                }
                
                updatePresentNPCs();
                saveActiveCharacter(); // Save the location state
            }

            function updatePresentNPCs() {
                const bar = document.getElementById("present-npcs-bar");
                if (!bar) return;
                if (!currentLocationId) {
                    bar.classList.remove("visible");
                    bar.innerHTML = "";
                    return;
                }

                const cards = getCards();
                const currentLoc = cards.find((c) => c.id === currentLocationId);
                if (!currentLoc) {
                    bar.classList.remove("visible");
                    return;
                }

                // Find all ancestors
                const ancestors = [];
                let current = currentLoc;

                while (current) {
                    ancestors.push(current);
                    // find parent
                    const parent = cards.find((c) => {
                        if (c.genre !== "location" || !c.sublocations)
                            return false;
                        return Object.values(c.sublocations).some((arr) =>
                            (arr || []).includes(current.id),
                        );
                    });
                    current = parent;
                }

                // Collect residents from current and all ancestors
                const residentIds = new Set();
                ancestors.forEach((loc) => {
                    if (loc.residents) {
                        loc.residents.forEach((id) => residentIds.add(id));
                    }
                });

                const presentNPCs = [];
                residentIds.forEach((id) => {
                    const char = cards.find(
                        (c) => c.genre === "character" && c.id === id,
                    );
                    if (char) presentNPCs.push(char);
                });

                if (presentNPCs.length === 0) {
                    bar.classList.remove("visible");
                    bar.innerHTML = "";
                    return;
                }

                bar.innerHTML = "";
                presentNPCs.forEach((npc) => {
                    const item = document.createElement("div");
                    item.className = "npc-item";
                    const isF = npc.gender === "female";
                    const icon = isF ? "♀" : "♂";
                    const avatarClass = isF ? "female" : "male";

                    item.innerHTML = `
                        <div class="npc-avatar-xs ${avatarClass}">${icon}</div>
                        <div class="npc-name-xs">${npc.title}</div>
                    `;
                    item.onclick = () => showNPCInfo(npc.id);
                    bar.appendChild(item);
                });
                bar.classList.add("visible");
            }

            function showNPCInfo(id) {
                const cards = getCards();
                const npc = cards.find((c) => c.id === id);
                if (!npc) return;

                // Simple alert for now, could be a modal
                let info = `${npc.title}\n`;
                if (npc.raceName) info += `Race: ${npc.raceName}\n`;
                if (npc.gender) info += `Gender: ${npc.gender}\n`;
                if (npc.age) info += `Age: ${npc.age}\n`;
                if (npc.personality) info += `\nPersonality:\n${npc.personality}\n`;
                if (npc.appearance) info += `\nAppearance:\n${npc.appearance}\n`;
                
                alert(info);
            }

            function askAI(prompt) {
                return new Promise((resolve, reject) => {
                    const requestId = Math.random().toString(36).substring(7);
                    const timeout = setTimeout(() => {
                        window.removeEventListener("message", handler);
                        reject("Die KI hat zu lange gebraucht.");
                    }, 45000);

                    const handler = (event) => {
                        if (event.data.requestId === requestId) {
                            clearTimeout(timeout);
                            window.removeEventListener("message", handler);
                            if (event.data.type === "AI_RESPONSE")
                                resolve(event.data.text);
                            else
                                reject(
                                    event.data.error || "Unbekannter Fehler",
                                );
                        }
                    };

                    window.addEventListener("message", handler);
                    window.parent.postMessage(
                        { type: "AI_REQUEST", instruction: prompt, requestId },
                        "*",
                    );
                });
            }

            async function askAIWithRetry(prompt) {
                while (true) {
                    try {
                        return await askAI(prompt);
                    } catch (err) {
                        console.warn("AI Request failed, retrying in 2 seconds...", err);
                        await new Promise((resolve) => setTimeout(resolve, 2000));
                    }
                }
            }

            async function triggerNarration(systemPrompt) {
                if (isBusy) return;
                isBusy = true;
                setSendDisabled(true);
                setStatus(false);
                lockAllButtons(); // Lock all buttons during generation

                const typing = appendTypingIndicator();

                const systemInst = buildSystemPrompt();

                try {
                    const recentHistory = chatHistory;
                    const historyLines = recentHistory.map(e => {
                        if (typeof e === 'string') return `--- ${e} ---`;
                        return `[${e.time} @ ${e.location}] ${e.sender}: ${e.text}`;
                    }).join("\n");
                    const finalPrompt = systemInst + "\n\n### STORY LOG ###\n" + historyLines + "\n\nNarrator:";
                    
                    const response = await askAIWithRetry(finalPrompt);
                    removeTypingIndicator();
                    const cleanResponse = processAICommands(response);
                    const finalText = applyTextSizeLimit(cleanResponse);
                    appendBubble("ai", finalText);
                    addToStoryLog("Narrator", finalText);
                } catch (err) {
                    removeTypingIndicator();
                    // No error bubble displayed to user
                    console.error("Narration failed even with retries (unexpected)", err);
                } finally {
                    isBusy = false;
                    setSendDisabled(false);
                    setStatus(true);
                    unlockAllButtons(); // Unlock buttons when generation is complete
                }
            }

            async function sendMessage() {
                const inputEl = document.getElementById("user-input");
                const text = inputEl.value.trim();
                if (!text || isBusy) return;

                // Time set command: standalone H:MM or HH:MM without quotes triggers time change
                const timeCmd = /^([01]?\d|2[0-3]):([0-5]?\d)$/.exec(text);
                if (timeCmd && !text.includes('"') && !text.includes("'")) {
                    try {
                        const hh = parseInt(timeCmd[1], 10);
                        const mm = parseInt(timeCmd[2], 10);
                        if (!activeChar) {
                            showToast("Kein aktiver Charakter zum Zeitstellen.", "rgba(180,60,60,0.85)");
                            return;
                        }
                        const sd = activeChar.startingDate || {};
                        const curParts = (sd.time || "00:00").split(":");
                        const curMin = (parseInt(curParts[0] || "0", 10) * 60) + (parseInt(curParts[1] || "0", 10));
                        const newMin = hh * 60 + mm;
                        const dt = new Date((sd.year || 1983), (sd.month || 1) - 1, (sd.day || 1));
                        if (newMin < curMin) dt.setDate(dt.getDate() + 1); // don't go backwards; jump to next day
                        activeChar.startingDate = {
                            day: dt.getDate(),
                            month: dt.getMonth() + 1,
                            year: dt.getFullYear(),
                            time: `${String(hh).padStart(2, "0")}:${String(mm).padStart(2, "0")}`
                        };
                        saveActiveCharacter();
                        addSystemDivider(`TIME SET: ${activeChar.startingDate.time} (${activeChar.startingDate.day}.${String(activeChar.startingDate.month).padStart(2,"0")}.${activeChar.startingDate.year})`);
                        inputEl.value = "";
                        inputEl.style.height = "auto";
                        return;
                    } catch (e) {
                        console.error("Zeitstellen fehlgeschlagen", e);
                        showToast("Zeit konnte nicht gesetzt werden.", "rgba(180,60,60,0.85)");
                        return;
                    }
                }

                appendBubble("user", text);
                const senderName = activeChar
                    ? [activeChar.firstName, activeChar.lastName]
                          .filter(Boolean)
                          .join(" ")
                    : "Player";
                addToStoryLog(senderName, text);
                inputEl.value = "";
                inputEl.style.height = "auto";

                isBusy = true;
                setSendDisabled(true);
                setStatus(false);

                const typing = appendTypingIndicator();

                const systemInst = buildSystemPrompt();

                try {
                    const recentHistory = chatHistory;
                    const historyLines = recentHistory.map(e => {
                        if (typeof e === 'string') return `--- ${e} ---`;
                        return `[${e.time} @ ${e.location}] ${e.sender}: ${e.text}`;
                    }).join("\n");
                    const finalPrompt = systemInst + "\n\n### STORY LOG ###\n" + historyLines + "\n\nNarrator:";
                    
                    const response = await askAIWithRetry(finalPrompt);
                    removeTypingIndicator();
                    const cleanResponse = processAICommands(response);
                    const finalText = applyTextSizeLimit(cleanResponse);
                    appendBubble("ai", finalText);
                    addToStoryLog("Narrator", finalText);
                } catch (err) {
                    removeTypingIndicator();
                    // No error bubble displayed to user
                    console.error("Message failed even with retries (unexpected)", err);
                } finally {
                    isBusy = false;
                    setSendDisabled(false);
                    setStatus(true);
                }
            }

            function setSendDisabled(v) {
                document.getElementById("send-btn").disabled = v;
            }

            /* ═══════════════════════════════════════
               ACTION BUTTONS
            ═══════════════════════════════════════ */
            document.getElementById("send-btn").onclick = sendMessage;

            document
                .getElementById("user-input")
                .addEventListener("keydown", (e) => {
                    if (e.key === "Enter" && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage();
                    }
                });

            // Auto-resize textarea
            document
                .getElementById("user-input")
                .addEventListener("input", function () {
                    this.style.height = "auto";
                    this.style.height = Math.min(this.scrollHeight, 140) + "px";
                });

            document.getElementById("retry-btn").onclick = async () => {
                if (isBusy) return;
                
                // Check if we're trying to retry the first message
                const messagesEl = document.getElementById("messages");
                const aiRows = messagesEl.querySelectorAll(".msg-row.ai");
                
                if (!aiRows.length) return;
                
                // If this is the first AI message and it's protected, show lock icon
                if (isFirstMessageProtected && aiRows.length === 1) {
                    showToast("🔒 The first message is protected.", "rgba(180, 60, 60, 0.85)");
                    return;
                }
                
                // Remove last AI message from DOM and history
                aiRows[aiRows.length - 1].remove();
                // Remove last narrator entry from history
                for (let i = chatHistory.length - 1; i >= 0; i--) {
                    const entry = chatHistory[i];
                    const isNarrator = typeof entry === 'string' ? entry.startsWith("Narrator:") : entry.sender === "Narrator";
                    if (isNarrator) {
                        chatHistory.splice(i, 1);
                        break;
                    }
                }
                saveStoryLog();
                // Roll back world state to last remaining entry
                rollbackToLastWorldState();
                isBusy = true;
                setSendDisabled(true);
                setStatus(false);
                lockAllButtons(); // Lock buttons during retry
                appendTypingIndicator();

                const systemInst = buildSystemPrompt();

                try {
                    const recentHistory = chatHistory;
                    const historyLines = recentHistory.map(e => {
                        if (typeof e === 'string') return `--- ${e} ---`;
                        return `[${e.time} @ ${e.location}] ${e.sender}: ${e.text}`;
                    }).join("\n");
                    const finalPrompt = systemInst + "\n\n### STORY LOG ###\n" + historyLines + "\n\nNarrator:";
                    
                    const r = await askAIWithRetry(finalPrompt);
                    removeTypingIndicator();
                    const cleanR = processAICommands(r);
                    const finalText = applyTextSizeLimit(cleanR);
                    appendBubble("ai", finalText);
                    addToStoryLog("Narrator", finalText);
                } catch (e) {
                    removeTypingIndicator();
                    // No error bubble displayed to user
                    console.error("Retry failed even with retries (unexpected)", e);
                } finally {
                    isBusy = false;
                    setSendDisabled(false);
                    setStatus(true);
                    unlockAllButtons(); // Unlock buttons when retry is complete
                }
            };

            document.getElementById("continue-btn").onclick = async () => {
                if (isBusy) return;
                isBusy = true;
                setSendDisabled(true);
                setStatus(false);
                lockAllButtons(); // Lock buttons during continue
                appendTypingIndicator();

                const systemInst = buildSystemPrompt();

                try {
                    const recentHistory = chatHistory.slice(-10);
                    const historyLines = recentHistory.map(e => {
                        if (typeof e === 'string') return `--- ${e} ---`;
                        return `[${e.time} @ ${e.location}] ${e.sender}: ${e.text}`;
                    }).join("\n");
                    const finalPrompt = systemInst + "\n\n### RECENT STORY HISTORY ###\n" + (chatHistory.length > 10 ? "...(older history omitted)...\n" : "") + historyLines + "\n\nNarrator:";
                    
                    const r = await askAIWithRetry(finalPrompt);
                    removeTypingIndicator();
                    const cleanR = processAICommands(r);
                    const finalText = applyTextSizeLimit(cleanR);
                    appendBubble("ai", finalText);
                    addToStoryLog("Narrator", finalText);
                } catch (e) {
                    removeTypingIndicator();
                    // No error bubble displayed to user
                    console.error("Continue failed even with retries (unexpected)", e);
                } finally {
                    isBusy = false;
                    setSendDisabled(false);
                    setStatus(true);
                    unlockAllButtons(); // Unlock buttons when continue is complete
                }
            };

            document.getElementById("edit-btn").onclick = () => {
                const messagesEl = document.getElementById("messages");
                const userRows = messagesEl.querySelectorAll(".msg-row.user");
                if (!userRows.length) return;
                const lastRow = userRows[userRows.length - 1];
                const bubble = lastRow.querySelector(".msg-bubble");
                const text = bubble ? bubble.textContent : "";
                document.getElementById("user-input").value = text;
                document.getElementById("user-input").focus();
                // Remove from DOM
                lastRow.remove();
                // Remove from history
                for (let i = chatHistory.length - 1; i >= 0; i--) {
                    const entry = chatHistory[i];
                    const prefix =
                        (activeChar
                            ? [activeChar.firstName, activeChar.lastName]
                                  .filter(Boolean)
                                  .join(" ")
                            : "Player") + ":";
                    
                    const matches = typeof entry === 'string' 
                        ? entry.startsWith(prefix)
                        : entry.sender === (activeChar ? [activeChar.firstName, activeChar.lastName].filter(Boolean).join(" ") : "Player");

                    if (matches) {
                        chatHistory.splice(i, 1);
                        saveStoryLog();
                        break;
                    }
                }
            };

            document.getElementById("erase-btn").onclick = () => {
                const messagesEl = document.getElementById("messages");
                const rows = Array.from(messagesEl.children).filter(c => c.classList.contains("msg-row") || c.classList.contains("chat-divider"));
                if (!rows.length) return;

                const lastRow = rows[rows.length - 1];
                
                // Check if this is the first AI message and it's protected
                const aiRows = messagesEl.querySelectorAll(".msg-row.ai");
                if (isFirstMessageProtected && aiRows.length === 1 && lastRow.classList.contains("ai")) {
                    showToast("🔒 The first message is protected.", "rgba(180, 60, 60, 0.85)");
                    return;
                }
                
                lastRow.remove();

                if (chatHistory.length > 0) {
                    chatHistory.pop();
                    saveStoryLog();
                    // Roll back world state to last remaining entry after deletion
                    rollbackToLastWorldState();
                    showToast("Message deleted.", "rgba(180, 60, 60, 0.85)");
                }
            };

            /* ═══════════════════════════════════════
               BUTTON LOCKING DURING GENERATION
            ═══════════════════════════════════════ */
            function lockAllButtons() {
                const buttons = ['retry-btn', 'edit-btn', 'continue-btn', 'erase-btn'];
                buttons.forEach(btnId => {
                    const btn = document.getElementById(btnId);
                    if (btn) {
                        btn.disabled = true;
                        btn.classList.add('locked');
                        // Store original text
                        btn.dataset.originalText = btn.textContent.trim();
                        btn.textContent = '🔒 ' + btn.dataset.originalText;
                    }
                });
            }

            function unlockAllButtons() {
                const buttons = ['retry-btn', 'edit-btn', 'continue-btn', 'erase-btn'];
                buttons.forEach(btnId => {
                    const btn = document.getElementById(btnId);
                    if (btn) {
                        btn.disabled = false;
                        btn.classList.remove('locked');
                        // Restore original text
                        if (btn.dataset.originalText) {
                            btn.textContent = btn.dataset.originalText;
                            delete btn.dataset.originalText;
                        }
                    }
                });
            }
            function showToast(msg, bg = "rgba(40,140,80,0.95)") {
                const t = document.getElementById("toast");
                t.textContent = msg;
                t.style.background = bg;
                t.classList.add("show");
                clearTimeout(t._timer);
                t._timer = setTimeout(() => t.classList.remove("show"), 2800);
            }

            /* ═══════════════════════════════════════
               NAVIGATION
            ═══════════════════════════════════════ */

            /* ═══════════════════════════════════════
               NAVIGATION
            ═══════════════════════════════════════ */
            function goBack() {
                const storyId = Storage.get(CURRENT_STORY_ID_KEY);
                if (storyId) {
                    const scenarios = getScenariosLocal();
                    const story = scenarios.find(x => x.id === storyId);
                    if (story && story.official === true) {
                        document.body.style.opacity = "0";
                        setTimeout(() => { window.location.href = "index.html"; }, 400);
                        return;
                    }
                }
                ensureStoryRecord();
                autoSaveStory();
                showBackPopup();
            }

            /* ═══════════════════════════════════════
               INIT
            ═══════════════════════════════════════ */
            window.addEventListener("load", () => {
                loadBackground();
                setInterval(loadBackground, 2000);

                const params = new URLSearchParams(window.location.search);
                const isContinue = params.get("mode") === "continue";

                const char = loadLatestCharacter();
                if (char) {
                    applyCharacter(char);
                    loadStoryLog();
                    // Overlay ausblenden, wenn bereits Nachrichten existieren
                    if (Array.isArray(chatHistory) && chatHistory.length > 0) {
                        const ov = document.getElementById("welcome-overlay");
                        if (ov) ov.style.display = "none";
                    }
                    if (isContinue) {
                        const ov = document.getElementById("welcome-overlay");
                        ov.style.display = "none";
                    }
                }

                ensureStoryRecord();
                autoSaveStory();
                setTimeout(() => {
                    document.body.style.opacity = "1";
                }, 100);
            });
            window.addEventListener("beforeunload", () => {
                autoSaveStory();
            });
        </script>
    </body>
