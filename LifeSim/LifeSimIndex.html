<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LifeSim • Main Menu</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            color: #fff;
            background: #0e0f13 url("https://images.alphacoders.com/113/thumb-1920-1130469.png") center/cover fixed no-repeat;
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }
        .page {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 24px 16px 40px;
            backdrop-filter: blur(2px);
            background: linear-gradient(180deg, rgba(10,10,15,.78), rgba(10,10,15,.82));
        }
        h1 {
            margin: 8px 0 0 0;
            font-size: 36px;
            letter-spacing: .02em;
            text-shadow: 0 2px 8px rgba(0,0,0,.6);
        }
        .subtitle {
            text-transform: uppercase;
            letter-spacing: .08em;
            opacity: .85;
            margin-bottom: 12px;
            font-weight: 700;
            text-shadow: 0 1px 3px rgba(0,0,0,.6);
        }
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
        }
        .menu-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .menu-button {
            padding: 12px 18px;
            background: rgba(255,255,255,.12);
            border: 1px solid rgba(255,255,255,.15);
            color: #fff;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            min-width: 160px;
            transition: background .2s, border-color .2s, transform .05s;
        }
        .menu-button:hover{
            background: rgba(255,255,255,.18);
            border-color: rgba(255,255,255,.25);
        }
        .menu-button:active{
            transform: translateY(1px);
        }
        #file-input {
            display: none;
        }
    </style>
</head>
<body>
    <div class="page">
        <h1>LifeSim</h1>
        <div class="menu-buttons">
            <div class="menu-row">
                <button class="menu-button" onclick="newLife()">New Life</button>
                <button class="menu-button" onclick="continueLife()">Continue</button>
            </div>
            <div class="menu-row">
                <button class="menu-button" onclick="document.getElementById('file-input').click()">Load</button>
                <input type="file" id="file-input" accept=".json" />
                <button class="menu-button" onclick="saveLife()">Save</button>
            </div>
            <div class="menu-row">
                <button class="menu-button" onclick="navigateWithDissolve('../index.html')">Play StoryKI!</button>
            </div>
        </div>
    </div>
    <script>
        (function(){
            window.navigateWithDissolve = function(url){
                try{
                    const overlay = document.createElement("div");
                    overlay.id = "page-fade";
                    overlay.style.cssText = "position:fixed;inset:0;background:#000;opacity:0;transition:opacity .35s ease;pointer-events:none;z-index:5000;";
                    document.body.appendChild(overlay);
                    requestAnimationFrame(function(){
                        overlay.style.opacity = "1";
                        setTimeout(function(){ window.location.href = url; }, 380);
                    });
                }catch(_){
                    window.location.href = url;
                }
            };
            window.newLife = function(){
                alert("New Life: coming soon");
            };
            window.continueLife = function(){
                alert("Continue: coming soon");
            };
            window.saveLife = function(){
                alert("Save: coming soon");
            };
            const fileInput = document.getElementById("file-input");
            if (fileInput) {
                fileInput.addEventListener("change", function(){
                    alert("Load: coming soon");
                    this.value = "";
                });
            }
        })();
    </script>
</body>
</html>
