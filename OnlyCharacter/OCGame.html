<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>StoryKI – Character Chat</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                scrollbar-width: thin;
                scrollbar-color: rgba(255, 255, 255, 0.12) transparent;
            }
            *::-webkit-scrollbar {
                width: 4px;
            }
            *::-webkit-scrollbar-track {
                background: transparent;
            }
            *::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.12);
                border-radius: 2px;
            }

            html, body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                font-family: "Segoe UI", Arial, sans-serif;
            }

            body {
                background: #0a0a0a;
                color: #fff;
                opacity: 0;
                transition: opacity 0.4s ease-in-out;
            }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.52);
                z-index: 0;
                pointer-events: none;
            }

            /* Background Layer */
            #bg-layer {
                position: fixed;
                inset: 0;
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
                z-index: -1;
                filter: blur(3px) brightness(0.5);
                transition: background-image 0.6s ease;
            }

            /* App Shell */
            #app {
                position: relative;
                z-index: 1;
                display: flex;
                flex-direction: column;
                height: 100vh;
                max-width: 820px;
                margin: 0 auto;
            }

            /* Header */
            #header {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 14px 20px;
                flex-shrink: 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.07);
                background: rgba(8, 8, 8, 0.55);
                backdrop-filter: blur(16px);
            }

            .nav-back-btn {
                width: 36px;
                height: 36px;
                border-radius: 50%;
                border: 2px solid rgba(255, 255, 255, 0.18);
                background: rgba(28, 28, 28, 0.75);
                color: #fff;
                font-size: 15px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.2s ease;
            }
            .nav-back-btn:hover {
                transform: scale(1.05);
                background: rgba(48, 48, 48, 0.9);
            }

            #header-info {
                display: flex;
                flex-direction: column;
                gap: 2px;
                flex: 1;
            }
            .header-title {
                font-size: 15px;
                font-weight: 600;
                color: #fff;
            }
            .header-time {
                font-size: 12px;
                color: rgba(255, 255, 255, 0.6);
            }

            /* Chat Area */
            #chat-scroll {
                flex: 1;
                overflow-y: auto;
                padding: 20px;
                display: flex;
                flex-direction: column;
                gap: 16px;
            }

            .msg-row {
                display: flex;
                align-items: flex-end;
                gap: 10px;
                max-width: 85%;
            }
            .msg-row.user {
                align-self: flex-end;
                flex-direction: row-reverse;
            }
            .msg-row.ai {
                align-self: flex-start;
            }

            .msg-avatar {
                width: 36px;
                height: 36px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.1);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
                flex-shrink: 0;
                overflow: hidden;
            }
            .msg-avatar img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                border-radius: 50%;
            }
            .msg-avatar.player {
                background: rgba(100, 150, 255, 0.3);
            }
            .msg-avatar.bot {
                background: rgba(255, 100, 150, 0.3);
            }

            .msg-bubble {
                padding: 12px 16px;
                border-radius: 18px;
                font-size: 14px;
                line-height: 1.5;
                max-width: 100%;
                word-wrap: break-word;
            }
            .msg-row.user .msg-bubble {
                background: rgba(100, 150, 255, 0.25);
                border: 1px solid rgba(100, 150, 255, 0.3);
                border-bottom-right-radius: 4px;
            }
            .msg-row.ai .msg-bubble {
                background: rgba(255, 255, 255, 0.08);
                border: 1px solid rgba(255, 255, 255, 0.12);
                border-bottom-left-radius: 4px;
            }

            /* Input Area */
            #input-area {
                padding: 16px 20px 24px;
                background: rgba(8, 8, 8, 0.7);
                backdrop-filter: blur(16px);
                border-top: 1px solid rgba(255, 255, 255, 0.07);
            }

            .input-row {
                display: flex;
                gap: 10px;
                max-width: 1000px;
                margin: 0 auto;
            }

            #chat-input {
                flex: 1;
                padding: 12px 15px;
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 8px;
                background: rgba(30, 30, 40, 0.8);
                color: #fff;
                font-size: 14px;
                outline: none;
            }

            #send-btn {
                padding: 12px 25px;
                background: rgba(76, 175, 80, 0.85);
                border: none;
                border-radius: 8px;
                color: #fff;
                cursor: pointer;
                font-size: 14px;
                font-weight: 500;
                transition: all 0.2s;
            }

            #send-btn:hover {
                background: rgba(76, 175, 80, 1);
            }

            .action-bar {
                display: flex;
                gap: 6px;
                max-width: 1000px;
                margin: 8px auto 0 auto;
            }

            .action-bar button {
                flex: 1;
                padding: 6px 12px;
                font-size: 12px;
                background: rgba(255,255,255,0.1);
                border: 1px solid rgba(255,255,255,0.15);
                color: #fff;
                border-radius: 6px;
                cursor: pointer;
                transition: all 0.2s;
            }

            .action-bar button:hover {
                background: rgba(255,255,255,0.2);
                transform: none;
            }

            /* Welcome Overlay */
            #welcome-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.85);
                z-index: 100;
                display: flex;
                align-items: center;
                justify-content: center;
                backdrop-filter: blur(10px);
                opacity: 1;
                transition: opacity 0.5s ease;
            }
            #welcome-overlay.hidden {
                opacity: 0;
                pointer-events: none;
            }

            .welcome-card {
                background: rgba(30, 30, 30, 0.9);
                border: 1px solid rgba(255, 255, 255, 0.15);
                border-radius: 20px;
                padding: 40px;
                text-align: center;
                max-width: 400px;
            }
            .welcome-avatar {
                width: 80px;
                height: 80px;
                border-radius: 50%;
                background: rgba(255, 100, 150, 0.3);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 40px;
                margin: 0 auto 20px;
            }
            .welcome-title {
                font-size: 22px;
                font-weight: 600;
                margin-bottom: 8px;
            }
            .welcome-meta {
                font-size: 13px;
                color: rgba(255, 255, 255, 0.6);
                margin-bottom: 24px;
            }
            .welcome-btn {
                padding: 12px 32px;
                border-radius: 24px;
                border: none;
                background: rgba(100, 150, 255, 0.8);
                color: #fff;
                font-size: 15px;
                font-weight: 500;
                cursor: pointer;
                transition: all 0.2s ease;
            }
            .welcome-btn:hover {
                transform: scale(1.02);
                background: rgba(120, 170, 255, 0.9);
            }

            /* Loading indicator */
            .typing-indicator {
                display: flex;
                gap: 4px;
                padding: 16px;
            }
            .typing-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.5);
                animation: typing 1.4s infinite ease-in-out;
            }
            .typing-dot:nth-child(1) { animation-delay: 0s; }
            .typing-dot:nth-child(2) { animation-delay: 0.2s; }
            .typing-dot:nth-child(3) { animation-delay: 0.4s; }
            @keyframes typing {
                0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
                40% { transform: scale(1); opacity: 1; }
            }
        </style>
    </head>
    <body>
        <div id="bg-layer"></div>
        <div id="app">
            <div id="header">
                <button class="nav-back-btn" onclick="goBack()">&#8592;</button>
                <div id="header-info">
                    <div class="header-title" id="char-name">Character</div>
                    <div class="header-time" id="header-time">Loading...</div>
                </div>
            </div>

            <div id="chat-scroll"></div>

            <div id="input-area">
                <div class="input-row">
                    <textarea id="chat-input" placeholder="Type your message..." rows="1"></textarea>
                    <button id="send-btn" onclick="sendMessage()">&#10148;</button>
                </div>
                <div class="action-bar">
                    <button onclick="retryLast()">Retry</button>
                    <button onclick="editLast()">Edit</button>
                    <button onclick="continueLast()">Continue</button>
                    <button onclick="eraseLast()">Erase</button>
                </div>
            </div>
        </div>

        <div id="welcome-overlay" style="display: none;">
            <div class="welcome-card">
                <div class="welcome-avatar" id="welcome-avatar">&#129302;</div>
                <div class="welcome-title" id="welcome-char-name">Character</div>
                <div class="welcome-meta" id="welcome-meta"></div>
                <button class="welcome-btn" onclick="dismissWelcome()">Start Chat</button>
            </div>
        </div>

        <script>
            // Storage Keys
            const SETTINGS_KEY = "storyki_settings";
            const STORY_LOG_KEY = "storyki_storylog";
            const CARDS_KEY = "storyki_storycards";

            // State
            let activeChar = null;
            let activePlayer = null;
            let storyLog = [];
            let isProcessing = false;
            let currentDate = { day: 1, month: 1, year: 1983, time: "09:00" };

            // Init
            document.addEventListener("DOMContentLoaded", () => {
                loadBackground();
                initGame();
                document.body.style.opacity = "1";

                // Input handling
                const input = document.getElementById("chat-input");
                input.addEventListener("keydown", (e) => {
                    if (e.key === "Enter" && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage();
                    }
                });
                input.addEventListener("input", () => {
                    input.style.height = "auto";
                    input.style.height = Math.min(input.scrollHeight, 120) + "px";
                });
            });

            function initGame() {
                // Load active character (the bot)
                const charId = sessionStorage.getItem("storyki_active_character");
                if (!charId) {
                    alert("No character selected");
                    goBack();
                    return;
                }

                // First try to load from story cards (where story data is stored)
                const storyCards = JSON.parse(sessionStorage.getItem("storyki_storycards") || "[]");
                activeChar = storyCards.find(c => c.id === charId);

                // If not found, try global characters
                if (!activeChar) {
                    const chars = JSON.parse(localStorage.getItem("storyki_characters") || "[]");
                    activeChar = chars.find(c => c.id === charId);
                }

                if (!activeChar) {
                    alert("Character not found");
                    goBack();
                    return;
                }

                // Load active player - first from story cards, then from global players
                const playerData = sessionStorage.getItem("storyki_active_player");
                if (playerData) {
                    // Try to parse as JSON (new format with full object)
                    let playerId = null;
                    try {
                        const parsed = JSON.parse(playerData);
                        if (parsed && typeof parsed === 'object' && parsed.id) {
                            // New format: full player object stored
                            activePlayer = parsed;
                            playerId = parsed.id;
                        } else {
                            // Old format: just the ID string
                            playerId = playerData;
                        }
                    } catch (e) {
                        // Old format: just the ID string (not valid JSON)
                        playerId = playerData;
                    }

                    // If we only have ID (old format), look up the full object
                    if (playerId && !activePlayer) {
                        // Try story cards first
                        activePlayer = storyCards.find(c => c.id === playerId);
                        // Then try global players
                        if (!activePlayer) {
                            const players = JSON.parse(localStorage.getItem("storyki_player_characters") || "[]");
                            activePlayer = players.find(p => p.id === playerId);
                        }
                    }
                }

                // Load story log
                storyLog = JSON.parse(sessionStorage.getItem(STORY_LOG_KEY) || "[]");

                // Load date/time
                const savedDate = sessionStorage.getItem("storyki_starting_date");
                if (savedDate) {
                    currentDate = JSON.parse(savedDate);
                }

                // Update UI
                document.getElementById("char-name").textContent = activeChar.title || "Character";
                document.getElementById("welcome-char-name").textContent = activeChar.title || "Character";
                document.getElementById("welcome-meta").textContent = activeChar.generally || "";

                // Set avatar
                const avatar = getAvatarForChar(activeChar);
                document.getElementById("welcome-avatar").innerHTML = avatar;

                updateTimeDisplay();
                renderChat();

                // Check if continuing story or new story
                if (storyLog.length > 0) {
                    // Continuing existing story - keep overlay hidden
                    dismissWelcome();
                } else {
                    // New story - show welcome overlay
                    const overlay = document.getElementById("welcome-overlay");
                    overlay.style.display = "flex";
                    // Small delay to allow display to apply before fading in
                    setTimeout(() => {
                        overlay.style.opacity = "1";
                    }, 50);
                }
            }

            function getAvatarForChar(char) {
                // Check for cover image first
                const coverUrl = char?.coverUrl || char?.image;
                if (coverUrl) {
                    return `<img src="${coverUrl}" alt="" onerror="this.style.display='none';">`;
                }
                // Fallback to emoji based on appearance
                if (!char?.appearance) return "&#129302;";
                const app = char.appearance.toLowerCase();
                if (app.includes("female") || app.includes("woman") || app.includes("girl")) return "&#128105;";
                if (app.includes("male") || app.includes("man") || app.includes("boy")) return "&#128104;";
                if (app.includes("cat") || app.includes("feline")) return "&#128049;";
                if (app.includes("dog") || app.includes("wolf")) return "&#128054;";
                if (app.includes("dragon")) return "&#128009;";
                if (app.includes("fox")) return "&#129418;";
                return "&#129302;";
            }

            function getPlayerAvatar(player) {
                // Check for cover image first
                const coverUrl = player?.coverUrl || player?.image;
                if (coverUrl) {
                    return `<img src="${coverUrl}" alt="" onerror="this.style.display='none'; this.parentElement.textContent='${(player?.name || 'U')[0].toUpperCase()}';">`;
                }
                // Fallback to first letter of name
                return player?.name ? player.name[0].toUpperCase() : "&#128100;";
            }

            function dismissWelcome() {
                const overlay = document.getElementById("welcome-overlay");
                overlay.classList.add("hidden");
                setTimeout(() => overlay.style.display = "none", 500);

                // Send intro if new story
                if (storyLog.length === 0 && activeChar.introduction) {
                    setTimeout(() => {
                        appendMessage("ai", activeChar.introduction);
                        addToLog("bot", activeChar.introduction);
                    }, 500);
                }
            }

            function renderChat() {
                const container = document.getElementById("chat-scroll");
                container.innerHTML = "";

                storyLog.forEach(entry => {
                    const isUser = entry.role === "user";
                    appendMessage(isUser ? "user" : "ai", entry.content, false);
                });

                scrollToBottom();
            }

            function appendMessage(role, text, animate = true) {
                const container = document.getElementById("chat-scroll");
                const row = document.createElement("div");
                row.className = `msg-row ${role}`;

                const avatar = document.createElement("div");
                avatar.className = `msg-avatar ${role}`;
                avatar.innerHTML = role === "user"
                    ? getPlayerAvatar(activePlayer)
                    : getAvatarForChar(activeChar);

                const bubble = document.createElement("div");
                bubble.className = "msg-bubble";
                bubble.innerHTML = formatText(text);

                row.appendChild(avatar);
                row.appendChild(bubble);
                container.appendChild(row);

                if (animate) scrollToBottom();
            }

            function formatText(text) {
                return text
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/\n/g, "<br>")
                    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
                    .replace(/\*(.+?)\*/g, "<em>$1</em>");
            }

            function scrollToBottom() {
                const container = document.getElementById("chat-scroll");
                container.scrollTop = container.scrollHeight;
            }

            function addToLog(role, content) {
                storyLog.push({ role, content, timestamp: Date.now() });
                sessionStorage.setItem(STORY_LOG_KEY, JSON.stringify(storyLog));
            }

            function showTyping() {
                const container = document.getElementById("chat-scroll");
                const indicator = document.createElement("div");
                indicator.id = "typing-indicator";
                indicator.className = "msg-row ai";
                indicator.innerHTML = `
                    <div class="msg-avatar bot">${getAvatarForChar(activeChar)}</div>
                    <div class="msg-bubble typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                `;
                container.appendChild(indicator);
                scrollToBottom();
            }

            function hideTyping() {
                const indicator = document.getElementById("typing-indicator");
                if (indicator) indicator.remove();
            }

            async function sendMessage() {
                const input = document.getElementById("chat-input");
                const text = input.value.trim();
                if (!text || isProcessing) return;

                // Add user message
                appendMessage("user", text);
                addToLog("user", text);
                input.value = "";
                input.style.height = "auto";

                // Show typing indicator
                isProcessing = true;
                document.getElementById("send-btn").disabled = true;
                showTyping();

                // Advance time slightly
                addMinutes(5);

                try {
                    const response = await callAI(text);
                    hideTyping();
                    appendMessage("ai", response);
                    addToLog("bot", response);
                } catch (err) {
                    hideTyping();
                    appendMessage("ai", "Sorry, I couldn't process that. Please try again.");
                    console.error("AI error:", err);
                } finally {
                    isProcessing = false;
                    document.getElementById("send-btn").disabled = false;
                }
            }

            // Retry the last AI message (regenerate)
            async function retryLast() {
                const messages = document.querySelectorAll(".message");
                if (messages.length === 0) return;
                
                // Find the last bot message
                let lastBotMsg = null;
                let lastUserMsg = null;
                for (let i = messages.length - 1; i >= 0; i--) {
                    if (messages[i].classList.contains("bot") && !lastBotMsg) {
                        lastBotMsg = messages[i];
                    }
                    if (messages[i].classList.contains("user") && !lastUserMsg) {
                        lastUserMsg = messages[i];
                        break;
                    }
                }
                
                if (!lastBotMsg || !lastUserMsg) return;
                
                // Remove the last bot message
                lastBotMsg.remove();
                
                // Remove from storyLog
                for (let i = storyLog.length - 1; i >= 0; i--) {
                    if (storyLog[i].role === "bot") {
                        storyLog.splice(i, 1);
                        break;
                    }
                }
                
                // Re-send the last user message
                const userText = lastUserMsg.querySelector(".message-content").textContent;
                
                isProcessing = true;
                document.getElementById("send-btn").disabled = true;
                showTyping();
                
                try {
                    const response = await callAI(userText);
                    hideTyping();
                    appendMessage("ai", response);
                    addToLog("bot", response);
                } catch (err) {
                    hideTyping();
                    appendMessage("ai", "Sorry, I couldn't process that. Please try again.");
                    console.error("AI error:", err);
                } finally {
                    isProcessing = false;
                    document.getElementById("send-btn").disabled = false;
                }
            }

            // Edit the last user message
            function editLast() {
                const messages = document.querySelectorAll(".message");
                if (messages.length === 0) return;
                
                // Find the last user message
                let lastUserMsg = null;
                for (let i = messages.length - 1; i >= 0; i--) {
                    if (messages[i].classList.contains("user")) {
                        lastUserMsg = messages[i];
                        break;
                    }
                }
                
                if (!lastUserMsg) return;
                
                const content = lastUserMsg.querySelector(".message-content").textContent;
                const input = document.getElementById("chat-input");
                input.value = content;
                input.focus();
                
                // Remove the last user and bot messages
                const lastBotMsg = lastUserMsg.nextElementSibling;
                if (lastBotMsg && lastBotMsg.classList.contains("bot")) {
                    lastBotMsg.remove();
                    // Remove from storyLog
                    for (let i = storyLog.length - 1; i >= 0; i--) {
                        if (storyLog[i].role === "bot") {
                            storyLog.splice(i, 1);
                            break;
                        }
                    }
                }
                lastUserMsg.remove();
                
                // Remove from storyLog
                for (let i = storyLog.length - 1; i >= 0; i--) {
                    if (storyLog[i].role === "user") {
                        storyLog.splice(i, 1);
                        break;
                    }
                }
            }

            // Continue the conversation (send empty message to get more content)
            async function continueLast() {
                const lastMsg = document.querySelector(".message:last-child");
                if (!lastMsg || !lastMsg.classList.contains("bot")) return;
                
                isProcessing = true;
                document.getElementById("send-btn").disabled = true;
                showTyping();
                
                try {
                    const response = await callAI("(continue)");
                    hideTyping();
                    appendMessage("ai", response);
                    addToLog("bot", response);
                } catch (err) {
                    hideTyping();
                    appendMessage("ai", "Sorry, I couldn't process that. Please try again.");
                    console.error("AI error:", err);
                } finally {
                    isProcessing = false;
                    document.getElementById("send-btn").disabled = false;
                }
            }

            // Erase the last bot message
            function eraseLast() {
                const messages = document.querySelectorAll(".message");
                if (messages.length === 0) return;
                
                // Find and remove the last bot message
                for (let i = messages.length - 1; i >= 0; i--) {
                    if (messages[i].classList.contains("bot")) {
                        messages[i].remove();
                        // Remove from storyLog
                        for (let j = storyLog.length - 1; j >= 0; j--) {
                            if (storyLog[j].role === "bot") {
                                storyLog.splice(j, 1);
                                break;
                            }
                        }
                        break;
                    }
                }
            }

            async function callAI(userMessage) {
                const settings = JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}");
                const apiKey = settings.apiKey;
                const model = settings.model || "gpt-4o-mini";

                if (!apiKey) {
                    throw new Error("No API key configured");
                }

                const systemPrompt = buildSystemPrompt();
                const messages = [
                    { role: "system", content: systemPrompt },
                    ...storyLog.slice(-20).map(e => ({
                        role: e.role === "user" ? "user" : "assistant",
                        content: e.content
                    })),
                    { role: "user", content: userMessage }
                ];

                const response = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: messages,
                        temperature: 0.8,
                        max_tokens: 800
                    })
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();
                let content = data.choices?.[0]?.message?.content || "...";

                // Parse time tags
                content = parseNarration(content);

                return content;
            }

            function buildSystemPrompt() {
                const settings = JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}");
                const aiLang = settings.aiLanguage === "de" ? "German" :
                              settings.aiLanguage === "ja" ? "Japanese" :
                              settings.aiLanguage === "fr" ? "French" :
                              settings.aiLanguage === "es" ? "Spanish" : "English";

                const playerName = activePlayer?.name || "Player";
                const playerDesc = [
                    activePlayer?.generally,
                    activePlayer?.appearance,
                    activePlayer?.personality
                ].filter(Boolean).join("; ");

                const botDesc = [
                    activeChar?.generally,
                    activeChar?.appearance,
                    activeChar?.personality
                ].filter(Boolean).join("; ");

                // Build relationship description
                let relationText = "";
                if (settings.relation) {
                    const relType = settings.relation.type || "unknown";
                    const relSubtype = settings.relation.subtype;
                    
                    if (relType === "family" && relSubtype) {
                        // For family relationships, describe from character's perspective
                        const relationMap = {
                            "sibling": "The player is your sibling (brother/sister).",
                            "child": "The player is your parent (you are their child).",
                            "parent": "The player is your child (you are their parent).",
                            "grandchild": "The player is your grandparent (you are their grandchild).",
                            "grandparent": "The player is your grandchild (you are their grandparent).",
                            "cousin": "The player is your cousin.",
                            "aunt_uncle": "The player is your niece/nephew (you are their aunt/uncle).",
                            "niece_nephew": "The player is your aunt/uncle (you are their niece/nephew)."
                        };
                        relationText = relationMap[relSubtype] || `The player is your family (${relSubtype}).`;
                    } else if (relType === "friend") {
                        relationText = "The player is your friend.";
                    } else if (relType === "enemy") {
                        relationText = "The player is your enemy.";
                    } else if (relType === "known") {
                        relationText = "You know the player, but you are not close.";
                    } else {
                        relationText = "You do not know the player yet.";
                    }
                }

                return `[SYSTEM INSTRUCTIONS]
You are ${activeChar?.title || "the AI character"}, having a conversation with ${playerName} (the user).

Current time: ${currentDate.day}.${currentDate.month}.${currentDate.year} ${currentDate.time}

PLAYER (User):
- Name: ${playerName}
- Description: ${playerDesc}
${relationText ? "- Relationship: " + relationText : ""}

YOU (The Character):
- Name: ${activeChar?.title || "Character"}
- Description: ${botDesc}

RULES:
1. Write ONLY in ${aiLang}.
2. Stay completely in character as described above.
3. Respond naturally as if having a real conversation.
4. Use time tags to control time: [[Time:+30]] adds 30 minutes, [[Day:+1]] adds 1 day, [[Month:+1]] adds 1 month, [[Year:+1]] adds 1 year.
5. To set specific time/date in narration, write {15}.{3}.{2024} for date or 14:30 for time.
6. Close all quotation marks properly.
7. Be descriptive and engaging.
8. ACT ACCORDING TO THE RELATIONSHIP described above (talk to family members as family, enemies as enemies, etc.).

OUTPUT FORMAT:
Provide ONLY your response as the character. No narrator prefixes or meta commentary.
[END SYSTEM INSTRUCTIONS]`;
            }

            // Calendar helpers
            function isLeapYear(y) {
                y = parseInt(y, 10) || 0;
                return (y % 4 === 0 && y % 100 !== 0) || (y % 400 === 0);
            }
            function daysInMonth(m, y) {
                m = parseInt(m, 10) || 1;
                y = parseInt(y, 10) || 1983;
                if (m === 2) return isLeapYear(y) ? 29 : 28;
                if (m === 4 || m === 6 || m === 9 || m === 11) return 30;
                return 31;
            }
            function normalizeYMD(d) {
                d.day = parseInt(d.day || 1, 10);
                d.month = parseInt(d.month || 1, 10);
                d.year = parseInt(d.year || 1983, 10);
                // normalize month to 1..12
                while (d.month > 12) { d.month -= 12; d.year += 1; }
                while (d.month < 1) { d.month += 12; d.year -= 1; }
                // carry overflow days forward
                let dim = daysInMonth(d.month, d.year);
                while (d.day > dim) {
                    d.day -= dim;
                    d.month += 1;
                    if (d.month > 12) { d.month = 1; d.year += 1; }
                    dim = daysInMonth(d.month, d.year);
                }
                // carry negative/underflow days backward
                while (d.day < 1) {
                    d.month -= 1;
                    if (d.month < 1) { d.month = 12; d.year -= 1; }
                    d.day += daysInMonth(d.month, d.year);
                }
                return d;
            }

            function parseNarration(text) {
                if (!text) return "";
                let timeChanged = false;
                let dateChanged = false;

                // Parse [[Time:+XX]], [[Day:+X]], [[Month:+X]], [[Year:+X]], [[Location:XXX]] tags
                const tagPattern = /\[\[(.*?)\]\]/g;
                let match;

                while ((match = tagPattern.exec(text)) !== null) {
                    const content = match[1].trim();
                    const parts = content.split(/[,;]+/).map(s => s.trim()).filter(Boolean);

                    for (const part of parts) {
                        // Parse relative time: [[Time:+XX]] or [[Time:-XX]]
                        const timeMatch = part.match(/^Time\s*:\s*([+-]?\d+(?::\d{2})?)$/i);
                        if (timeMatch) {
                            const valueStr = timeMatch[1];
                            if (valueStr.includes(":")) {
                                currentDate.time = valueStr;
                            } else {
                                const mins = parseInt(valueStr);
                                const [h, m] = currentDate.time.split(":").map(Number);
                                let total = h * 60 + m + mins;
                                while (total < 0) total += 24 * 60;
                                total = total % (24 * 60);
                                const nh = Math.floor(total / 60);
                                const nm = total % 60;
                                currentDate.time = `${String(nh).padStart(2, "0")}:${String(nm).padStart(2, "0")}`;
                            }
                            timeChanged = true;
                            continue;
                        }

                        // Parse relative day: [[Day:+X]] or [[Day:-X]]
                        const dayMatch = part.match(/^Day\s*:\s*([+-]?\d+)$/i);
                        if (dayMatch) {
                            const val = parseInt(dayMatch[1]);
                            if (dayMatch[1].startsWith("+") || dayMatch[1].startsWith("-")) {
                                currentDate.day = (currentDate.day || 1) + val;
                            } else {
                                currentDate.day = val;
                            }
                            dateChanged = true;
                            continue;
                        }

                        // Parse relative month: [[Month:+X]] or [[Month:-X]]
                        const monthMatch = part.match(/^Month\s*:\s*([+-]?\d+)$/i);
                        if (monthMatch) {
                            const val = parseInt(monthMatch[1]);
                            if (monthMatch[1].startsWith("+") || monthMatch[1].startsWith("-")) {
                                let m = (currentDate.month || 1) + val;
                                let y = currentDate.year || 1983;
                                while (m > 12) { m -= 12; y++; }
                                while (m < 1) { m += 12; y--; }
                                currentDate.month = m;
                                currentDate.year = y;
                            } else {
                                currentDate.month = (val > 0 && val <= 12) ? val : (currentDate.month || 1);
                            }
                            dateChanged = true;
                            continue;
                        }

                        // Parse year: [[Year:+X]] or [[Year:XXXX]]
                        const yearMatch = part.match(/^Year\s*:\s*([+-]?\d+)$/i);
                        if (yearMatch) {
                            const val = parseInt(yearMatch[1]);
                            if (yearMatch[1].startsWith("+") || yearMatch[1].startsWith("-")) {
                                currentDate.year = (currentDate.year || 1983) + val;
                            } else {
                                currentDate.year = val;
                            }
                            dateChanged = true;
                            continue;
                        }

                        // Parse location: [[Location:XXX]]
                        const locMatch = part.match(/^Location\s*:\s*["']?(.+?)["']?$/i);
                        if (locMatch) {
                            // Location tag - could be used in future
                            continue;
                        }
                    }
                }

                // Normalize date if changed
                if (dateChanged) {
                    normalizeYMD(currentDate);
                }

                // Parse date in text: {Day}.{Month} or {Day}.{Month}.{Year} (but not in parentheses)
                // Only match if not preceded by '(' or '（'
                const dateMatch = text.match(/(?<![\(\（])\{(\d{1,2})\}\s*\.\s*\{(\d{1,2})\}(?:\s*\.\s*\{(\d{4})\})?/);
                if (dateMatch) {
                    const day = parseInt(dateMatch[1]);
                    const month = parseInt(dateMatch[2]);
                    const year = dateMatch[3] ? parseInt(dateMatch[3]) : (currentDate.year || 1983);
                    if (month > 0 && month <= 12) {
                        currentDate.day = day;
                        currentDate.month = month;
                        currentDate.year = year;
                        normalizeYMD(currentDate);
                        dateChanged = true;
                    }
                }

                // Parse time in text: 00:00 or 0;00 (but not in parentheses)
                // Only match if not preceded by '(' or '（'
                const timeMatch2 = text.match(/(?<![\(\（])(\d{1,2})[:;](\d{2})/);
                if (timeMatch2) {
                    const h = parseInt(timeMatch2[1]);
                    const m = parseInt(timeMatch2[2]);
                    if (h >= 0 && h < 24 && m >= 0 && m < 60) {
                        currentDate.time = `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
                        timeChanged = true;
                    }
                }

                // Update display and save if changed
                if (timeChanged || dateChanged) {
                    updateTimeDisplay();
                    saveDate();
                }

                // Remove all [[...]] tags from output
                text = text.replace(/\[\[.*?\]\]/g, "").trim();
                return text;
            }

            function addMinutes(minutes) {
                const [hh, mm] = (currentDate.time || "00:00").split(":").map(Number);
                let total = hh * 60 + mm + (minutes || 0);
                const dayLen = 24 * 60;
                let daysDelta = Math.floor(total / dayLen);
                let rest = total % dayLen;
                if (rest < 0) { rest += dayLen; daysDelta -= 1; }
                const nh = Math.floor(rest / 60);
                const nm = rest % 60;
                currentDate.time = `${String(nh).padStart(2, "0")}:${String(nm).padStart(2, "0")}`;
                currentDate.day = (currentDate.day || 1) + daysDelta;
                normalizeYMD(currentDate);
                updateTimeDisplay();
                saveDate();
            }

            function updateTimeDisplay() {
                const timeStr = `${currentDate.day}.${currentDate.month}.${currentDate.year} ${currentDate.time}`;
                document.getElementById("header-time").textContent = timeStr;
            }

            function saveDate() {
                sessionStorage.setItem("storyki_starting_date", JSON.stringify(currentDate));
            }

            function loadBackground() {
                // First try to get background from active character
                const charId = sessionStorage.getItem("storyki_active_character");
                let charBackgroundUrl = null;

                if (charId) {
                    // Try to find character in story cards
                    const storyCards = JSON.parse(sessionStorage.getItem("storyki_storycards") || "[]");
                    const charFromStory = storyCards.find(c => c.id === charId);
                    if (charFromStory && charFromStory.backgroundUrl) {
                        charBackgroundUrl = charFromStory.backgroundUrl;
                    }

                    // If not found, try global characters
                    if (!charBackgroundUrl) {
                        const chars = JSON.parse(localStorage.getItem("storyki_characters") || "[]");
                        const charFromGlobal = chars.find(c => c.id === charId);
                        if (charFromGlobal && charFromGlobal.backgroundUrl) {
                            charBackgroundUrl = charFromGlobal.backgroundUrl;
                        }
                    }
                }

                // Fall back to settings or default
                const settings = JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}");
                const url = charBackgroundUrl || settings.backgroundUrl || "https://wallpapers.com/images/hd/lake-in-the-forest-nature-xavnq3nwry0es5if.webp";
                document.getElementById("bg-layer").style.backgroundImage = `url(${url})`;
            }

            function goBack() {
                // Save current story data before leaving
                saveStoryToScenarios();

                // Clear session storage to prevent double-saving in index.html
                sessionStorage.removeItem("storyki_storycards");
                sessionStorage.removeItem("storyki_storylog");
                sessionStorage.removeItem("storyki_active_character");
                sessionStorage.removeItem("storyki_active_player");
                sessionStorage.removeItem("storyki_starting_date");

                window.location.href = "../index.html";
            }

            function saveStoryToScenarios() {
                // Save the current story to scenarios before leaving
                const storyId = sessionStorage.getItem("storyki_current_story_id");
                const cards = JSON.parse(sessionStorage.getItem("storyki_storycards") || "[]");
                const log = JSON.parse(sessionStorage.getItem("storyki_storylog") || "[]");

                if (!cards.length) return;

                const scenarios = JSON.parse(localStorage.getItem("storyki_scenarios") || "[]");

                if (storyId) {
                    // Update existing story
                    const idx = scenarios.findIndex(s => s.id === storyId);
                    if (idx !== -1) {
                        scenarios[idx].data = { ...scenarios[idx].data, cards, log };
                        scenarios[idx].updatedAt = Date.now();
                        localStorage.setItem("storyki_scenarios", JSON.stringify(scenarios));
                    }
                }
            }
        </script>
    </body>
