<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>StoryKI – Create Player</title>
        <style>
            :root {
                --bg: #08080c;
                --glass: rgba(12, 12, 18, 0.72);
                --glass-border: rgba(255, 255, 255, 0.09);
                --text: #f4f4f8;
                --muted: rgba(255, 255, 255, 0.55);
                --accent: #5eb8ff;
                --accent-soft: rgba(94, 184, 255, 0.22);
                --accent-glow: rgba(94, 184, 255, 0.38);
                --success: #4caf82;
                --danger: #e86a6a;
                --radius: 14px;
                --radius-sm: 10px;
                --shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
                --header-h: 64px;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                scrollbar-width: none;
                -ms-overflow-style: none;
            }

            *::-webkit-scrollbar {
                display: none;
                width: 0;
                height: 0;
                background: transparent;
            }

            html {
                scroll-behavior: smooth;
            }

            body {
                font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
                background: var(--bg);
                color: var(--text);
                min-height: 100vh;
                opacity: 0;
                transition: opacity 0.35s ease;
                line-height: 1.5;
            }

            #bg-layer {
                position: fixed;
                inset: 0;
                z-index: -2;
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
                filter: blur(4px) brightness(0.42) saturate(1.1);
                transition: background-image 0.6s ease;
            }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                z-index: -1;
                background:
                    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(94, 184, 255, 0.14), transparent),
                    linear-gradient(180deg, rgba(0, 0, 0, 0.35) 0%, rgba(0, 0, 0, 0.65) 100%);
                pointer-events: none;
            }

            .top-bar {
                position: sticky;
                top: 0;
                z-index: 50;
                height: var(--header-h);
                display: flex;
                align-items: center;
                gap: 14px;
                padding: 0 20px;
                background: rgba(8, 8, 12, 0.82);
                border-bottom: 1px solid var(--glass-border);
                backdrop-filter: blur(18px);
            }

            .back-btn {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                border: 1px solid var(--glass-border);
                background: rgba(255, 255, 255, 0.06);
                color: var(--text);
                font-size: 18px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: transform 0.2s, background 0.2s, border-color 0.2s;
                flex-shrink: 0;
            }

            .back-btn:hover {
                transform: scale(1.05);
                background: rgba(255, 255, 255, 0.12);
                border-color: rgba(255, 255, 255, 0.2);
            }

            .top-bar__titles {
                flex: 1;
                min-width: 0;
            }

            .top-bar__title {
                font-size: 17px;
                font-weight: 600;
                letter-spacing: -0.02em;
            }

            .top-bar__sub {
                font-size: 12px;
                color: var(--muted);
                margin-top: 2px;
            }

            .mode-badge {
                font-size: 11px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                padding: 6px 12px;
                border-radius: 999px;
                background: var(--accent-soft);
                color: var(--accent);
                border: 1px solid rgba(94, 184, 255, 0.4);
                flex-shrink: 0;
            }

            .page {
                max-width: 1100px;
                margin: 0 auto;
                padding: 24px 20px 120px;
            }

            .layout {
                display: grid;
                grid-template-columns: minmax(280px, 340px) 1fr;
                gap: 28px;
                align-items: start;
            }

            @media (max-width: 900px) {
                .layout {
                    grid-template-columns: 1fr;
                }
            }

            .preview-panel {
                position: sticky;
                top: calc(var(--header-h) + 20px);
            }

            @media (max-width: 900px) {
                .preview-panel {
                    position: relative;
                    top: 0;
                }
            }

            .preview-card {
                position: relative;
                border-radius: var(--radius);
                overflow: hidden;
                border: 1px solid var(--glass-border);
                background: var(--glass);
                backdrop-filter: blur(20px);
                box-shadow: var(--shadow);
            }

            .preview-card__header {
                position: relative;
                isolation: isolate;
            }

            .preview-card__hero {
                position: relative;
                height: 148px;
                background: linear-gradient(145deg, rgba(94, 184, 255, 0.32), rgba(20, 36, 56, 0.95));
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
            }

            .preview-card__hero::after {
                content: "";
                position: absolute;
                inset: 0;
                background: linear-gradient(
                    180deg,
                    rgba(8, 8, 12, 0.05) 0%,
                    rgba(8, 8, 12, 0.55) 55%,
                    rgba(8, 8, 12, 0.92) 100%
                );
                pointer-events: none;
            }

            .preview-card__profile {
                display: flex;
                align-items: center;
                gap: 14px;
                padding: 0 18px;
                margin-top: -34px;
                position: relative;
                z-index: 3;
            }

            .preview-card__avatar-wrap {
                flex-shrink: 0;
            }

            .preview-card__avatar {
                width: 88px;
                height: 88px;
                border-radius: 50%;
                border: 3px solid rgba(18, 18, 26, 0.98);
                background: linear-gradient(145deg, rgba(94, 184, 255, 0.4), rgba(30, 50, 72, 0.95));
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 38px;
                line-height: 1;
                overflow: hidden;
                box-shadow:
                    0 10px 28px rgba(0, 0, 0, 0.45),
                    0 0 0 1px rgba(94, 184, 255, 0.25);
                flex-shrink: 0;
            }

            .preview-card__avatar.has-image {
                background: #12121a;
            }

            .preview-card__avatar img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                object-position: center center;
                display: block;
            }

            .preview-card__meta {
                flex: 1;
                min-width: 0;
                padding-top: 4px;
            }

            .preview-card__name {
                font-size: 20px;
                font-weight: 700;
                letter-spacing: -0.03em;
                margin-bottom: 8px;
                word-break: break-word;
                line-height: 1.25;
            }

            .preview-card__name.is-placeholder {
                color: var(--muted);
                font-weight: 500;
            }

            .preview-card__role {
                display: inline-flex;
                font-size: 11px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                padding: 4px 10px;
                border-radius: 999px;
                background: rgba(94, 184, 255, 0.2);
                color: #b8e0ff;
                border: 1px solid rgba(94, 184, 255, 0.35);
            }

            .preview-card__snippet {
                font-size: 13px;
                color: var(--muted);
                line-height: 1.55;
                display: -webkit-box;
                -webkit-line-clamp: 5;
                -webkit-box-orient: vertical;
                overflow: hidden;
                padding: 14px 18px 18px;
                border-top: 1px solid var(--glass-border);
                margin-top: 14px;
            }

            .preview-hint {
                margin-top: 14px;
                font-size: 12px;
                color: var(--muted);
                text-align: center;
                padding: 0 8px;
            }

            .form-stack {
                display: flex;
                flex-direction: column;
                gap: 20px;
            }

            .section {
                border-radius: var(--radius);
                border: 1px solid var(--glass-border);
                background: var(--glass);
                backdrop-filter: blur(16px);
                overflow: hidden;
            }

            .section__head {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 16px 20px;
                border-bottom: 1px solid var(--glass-border);
                background: rgba(255, 255, 255, 0.02);
            }

            .section__icon {
                width: 36px;
                height: 36px;
                border-radius: var(--radius-sm);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
                background: var(--accent-soft);
                flex-shrink: 0;
            }

            .section__title {
                font-size: 15px;
                font-weight: 600;
            }

            .section__desc {
                font-size: 12px;
                color: var(--muted);
                margin-top: 2px;
            }

            .section__body {
                padding: 20px;
                display: flex;
                flex-direction: column;
                gap: 18px;
            }

            .field label {
                display: flex;
                align-items: baseline;
                justify-content: space-between;
                gap: 8px;
                font-size: 13px;
                font-weight: 500;
                color: rgba(255, 255, 255, 0.85);
                margin-bottom: 8px;
            }

            .field label .hint {
                font-weight: 400;
                font-size: 11px;
                color: var(--muted);
            }

            .field input[type="text"],
            .field textarea {
                width: 100%;
                padding: 12px 14px;
                background: rgba(0, 0, 0, 0.28);
                border: 1px solid var(--glass-border);
                border-radius: var(--radius-sm);
                color: var(--text);
                font-size: 14px;
                font-family: inherit;
                transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            }

            .field input::placeholder,
            .field textarea::placeholder {
                color: rgba(255, 255, 255, 0.28);
            }

            .field input:focus,
            .field textarea:focus {
                outline: none;
                border-color: rgba(94, 184, 255, 0.55);
                box-shadow: 0 0 0 3px var(--accent-glow);
                background: rgba(0, 0, 0, 0.38);
            }

            .field textarea {
                min-height: 96px;
                resize: vertical;
                line-height: 1.55;
                scrollbar-width: none;
                -ms-overflow-style: none;
            }

            .field textarea::-webkit-scrollbar {
                display: none;
                width: 0;
                height: 0;
            }

            .field--tall textarea {
                min-height: 120px;
            }

            .char-count {
                font-size: 11px;
                color: var(--muted);
                text-align: right;
                margin-top: 4px;
            }

            .media-preview {
                aspect-ratio: 1;
                max-width: 140px;
                border-radius: var(--radius-sm);
                border: 1px dashed var(--glass-border);
                background: rgba(0, 0, 0, 0.25);
                overflow: hidden;
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
                margin-top: 8px;
            }

            .media-preview img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                position: absolute;
                inset: 0;
            }

            .media-preview__placeholder {
                font-size: 12px;
                color: var(--muted);
                text-align: center;
                padding: 12px;
                z-index: 0;
            }

            .media-preview.has-image .media-preview__placeholder {
                display: none;
            }

            .footer-bar {
                position: fixed;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 50;
                padding: 14px 20px;
                padding-bottom: max(14px, env(safe-area-inset-bottom));
                background: rgba(8, 8, 12, 0.9);
                border-top: 1px solid var(--glass-border);
                backdrop-filter: blur(20px);
            }

            .footer-bar__inner {
                max-width: 1100px;
                margin: 0 auto;
                display: flex;
                gap: 12px;
            }

            .footer-bar button {
                flex: 1;
                padding: 14px 20px;
                border-radius: var(--radius-sm);
                font-size: 15px;
                font-weight: 600;
                cursor: pointer;
                transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
                border: none;
                font-family: inherit;
            }

            .btn-secondary {
                background: rgba(255, 255, 255, 0.08);
                color: var(--text);
                border: 1px solid var(--glass-border);
            }

            .btn-secondary:hover {
                background: rgba(255, 255, 255, 0.14);
            }

            .btn-primary {
                background: linear-gradient(135deg, #5eb8ff, #3d8fd9);
                color: #fff;
                box-shadow: 0 8px 28px var(--accent-glow);
            }

            .btn-primary:hover {
                transform: translateY(-2px);
                box-shadow: 0 12px 36px var(--accent-glow);
            }

            .btn-primary:active {
                transform: translateY(0);
            }

            #toast {
                position: fixed;
                left: 50%;
                bottom: 90px;
                transform: translateX(-50%) translateY(12px);
                padding: 12px 20px;
                border-radius: var(--radius-sm);
                background: rgba(20, 20, 28, 0.95);
                border: 1px solid var(--glass-border);
                color: var(--text);
                font-size: 13px;
                z-index: 100;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.25s, transform 0.25s;
                max-width: calc(100vw - 40px);
                text-align: center;
            }

            #toast.show {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }

            #toast.error {
                border-color: rgba(232, 106, 106, 0.5);
                background: rgba(60, 24, 24, 0.95);
            }

            #toast.success {
                border-color: rgba(76, 175, 130, 0.5);
            }
        </style>
    </head>
    <body>
        <div id="bg-layer"></div>

        <header class="top-bar">
            <button type="button" class="back-btn" onclick="backToMenu()" title="Back" aria-label="Back">&#8592;</button>
            <div class="top-bar__titles">
                <div class="top-bar__title" id="pageTitle">Create Player</div>
                <div class="top-bar__sub" id="pageSubtitle">Your avatar for character stories</div>
            </div>
            <span class="mode-badge" id="modeBadge">New</span>
        </header>

        <main class="page">
            <div class="layout">
                <aside class="preview-panel">
                    <article class="preview-card">
                        <div class="preview-card__header">
                            <div class="preview-card__hero" id="previewHero"></div>
                        </div>
                        <div class="preview-card__profile">
                            <div class="preview-card__avatar-wrap">
                                <div class="preview-card__avatar" id="previewAvatar" title="Portrait">&#128100;</div>
                            </div>
                            <div class="preview-card__meta">
                                <h2 class="preview-card__name is-placeholder" id="previewName">Player name</h2>
                                <span class="preview-card__role">Player</span>
                            </div>
                        </div>
                        <p class="preview-card__snippet" id="previewSnippet">Your description will appear here as you type…</p>
                    </article>
                    <p class="preview-hint">Live preview updates as you edit</p>
                </aside>

                <form class="form-stack" id="playerForm" onsubmit="return false;">
                    <section class="section">
                        <div class="section__head">
                            <div class="section__icon">&#128100;</div>
                            <div>
                                <div class="section__title">Identity</div>
                                <div class="section__desc">Who you play as in stories</div>
                            </div>
                        </div>
                        <div class="section__body">
                            <div class="field">
                                <label for="charName">Name <span class="hint">Required</span></label>
                                <input type="text" id="charName" placeholder="e.g. Alex Morgan" autocomplete="off" />
                            </div>
                            <div class="field field--tall">
                                <label for="charGenerally">Generally</label>
                                <textarea id="charGenerally" placeholder="Background, occupation, goals, how you see the world…" rows="4"></textarea>
                                <div class="char-count"><span id="countGenerally">0</span> characters</div>
                            </div>
                            <div class="field field--tall">
                                <label for="charAppearance">Appearance</label>
                                <textarea id="charAppearance" placeholder="Age, build, hair, clothing, distinctive details…" rows="3"></textarea>
                                <div class="char-count"><span id="countAppearance">0</span> characters</div>
                            </div>
                        </div>
                    </section>

                    <section class="section">
                        <div class="section__head">
                            <div class="section__icon">&#128247;</div>
                            <div>
                                <div class="section__title">Portrait</div>
                                <div class="section__desc">Shown in chat and the preview card</div>
                            </div>
                        </div>
                        <div class="section__body">
                            <div class="field">
                                <label for="charCoverUrl">Cover URL <span class="hint">Optional</span></label>
                                <input type="text" id="charCoverUrl" placeholder="https://… portrait image" />
                                <div class="media-preview" id="coverPreview">
                                    <span class="media-preview__placeholder">Portrait preview</span>
                                </div>
                            </div>
                        </div>
                    </section>
                </form>
            </div>
        </main>

        <footer class="footer-bar">
            <div class="footer-bar__inner">
                <button type="button" class="btn-secondary" onclick="backToMenu()">Cancel</button>
                <button type="button" class="btn-primary" id="saveBtn" onclick="savePlayer()">Create Player</button>
            </div>
        </footer>

        <div id="toast"></div>

        <script>
            const SETTINGS_KEY = "storyki_settings";
            const PLAYER_CHARS_KEY = "storyki_player_characters";

            let _editPlayerId = null;
            let _toastTimer = null;

            function escapeHtml(str) {
                return String(str || "")
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;");
            }

            function showToast(message, type = "") {
                const el = document.getElementById("toast");
                el.textContent = message;
                el.className = type ? `show ${type}` : "show";
                if (_toastTimer) clearTimeout(_toastTimer);
                _toastTimer = setTimeout(() => {
                    el.className = "";
                }, 2800);
            }

            function generateId() {
                return Date.now().toString(36) + Math.random().toString(36).substr(2);
            }

            function applyBg(url) {
                if (!url) return;
                const layer = document.getElementById("bg-layer");
                if (layer) layer.style.backgroundImage = `url("${url}")`;
            }

            function loadBackground() {
                const settings = localStorage.getItem(SETTINGS_KEY);
                if (settings) {
                    try {
                        const data = JSON.parse(settings);
                        if (data.backgroundUrl) {
                            applyBg(data.backgroundUrl);
                            syncPreviewHero();
                            return;
                        }
                    } catch (e) {}
                }
                applyBg("https://wallpapers.com/images/hd/lake-in-the-forest-nature-xavnq3nwry0es5if.webp");
                syncPreviewHero();
            }

            function syncPreviewHero() {
                const layer = document.getElementById("bg-layer");
                const hero = document.getElementById("previewHero");
                if (!layer || !hero) return;
                const bg = layer.style.backgroundImage;
                if (bg && bg !== "none") {
                    hero.style.backgroundImage = bg;
                } else {
                    hero.style.backgroundImage = "";
                }
            }

            window.addEventListener("backgroundChanged", function (event) {
                applyBg(event.detail.backgroundUrl);
                syncPreviewHero();
            });

            function backToMenu() {
                document.body.style.opacity = "0";
                setTimeout(() => {
                    window.location.href = "../index.html";
                }, 300);
            }

            function getPlayerCharacters() {
                try {
                    return JSON.parse(localStorage.getItem(PLAYER_CHARS_KEY) || "[]");
                } catch {
                    return [];
                }
            }

            function setPlayerCharacters(players) {
                localStorage.setItem(PLAYER_CHARS_KEY, JSON.stringify(players));
            }

            function updateCharCount(id, counterId) {
                const el = document.getElementById(id);
                const counter = document.getElementById(counterId);
                if (el && counter) counter.textContent = String(el.value.length);
            }

            function setImagePreview(containerId, url) {
                const box = document.getElementById(containerId);
                if (!box) return;
                const trimmed = String(url || "").trim();
                const existing = box.querySelector("img");
                if (existing) existing.remove();

                if (!trimmed) {
                    box.classList.remove("has-image");
                    return;
                }

                const img = document.createElement("img");
                img.alt = "";
                img.onload = () => box.classList.add("has-image");
                img.onerror = () => box.classList.remove("has-image");
                img.src = trimmed;
                box.appendChild(img);
            }

            function updatePreviewAvatar(url) {
                const wrap = document.getElementById("previewAvatar");
                if (!wrap) return;
                const trimmed = String(url || "").trim();
                wrap.innerHTML = "";
                wrap.classList.remove("has-image");

                if (!trimmed) {
                    wrap.textContent = "\u{1F464}";
                    return;
                }

                const img = document.createElement("img");
                img.alt = "";
                img.decoding = "async";
                img.onload = () => wrap.classList.add("has-image");
                img.onerror = () => {
                    wrap.classList.remove("has-image");
                    wrap.textContent = "\u{1F464}";
                };
                img.src = trimmed;
                wrap.appendChild(img);
            }

            function updatePreview() {
                const name = document.getElementById("charName").value.trim();
                const generally = document.getElementById("charGenerally").value.trim();
                const appearance = document.getElementById("charAppearance").value.trim();
                const coverUrl = document.getElementById("charCoverUrl").value.trim();

                const nameEl = document.getElementById("previewName");
                if (name) {
                    nameEl.textContent = name;
                    nameEl.classList.remove("is-placeholder");
                } else {
                    nameEl.textContent = "Player name";
                    nameEl.classList.add("is-placeholder");
                }

                const parts = [generally, appearance].filter(Boolean);
                const snippet = document.getElementById("previewSnippet");
                snippet.textContent = parts.length
                    ? parts.join(" \u2014 ")
                    : "Your description will appear here as you type\u2026";

                syncPreviewHero();
                updatePreviewAvatar(coverUrl);
                setImagePreview("coverPreview", coverUrl);
            }

            function bindLiveUpdates() {
                ["charName", "charGenerally", "charAppearance", "charCoverUrl"].forEach((id) => {
                    const el = document.getElementById(id);
                    if (!el) return;
                    el.addEventListener("input", () => {
                        updatePreview();
                        if (id === "charGenerally") updateCharCount(id, "countGenerally");
                        if (id === "charAppearance") updateCharCount(id, "countAppearance");
                    });
                });
            }

            function savePlayer() {
                const name = document.getElementById("charName").value.trim();
                const generally = document.getElementById("charGenerally").value.trim();
                const appearance = document.getElementById("charAppearance").value.trim();
                const coverUrl = document.getElementById("charCoverUrl").value.trim();

                if (!name) {
                    showToast("Please enter a player name.", "error");
                    document.getElementById("charName").focus();
                    return;
                }

                const players = getPlayerCharacters();
                const description = `${generally}\n\nAppearance: ${appearance}`.trim();

                if (_editPlayerId) {
                    const idx = players.findIndex((p) => p.id === _editPlayerId);
                    if (idx === -1) {
                        showToast("Player not found.", "error");
                        return;
                    }
                    players[idx].title = name;
                    players[idx].name = name;
                    players[idx].generally = generally;
                    players[idx].appearance = appearance;
                    players[idx].coverUrl = coverUrl || null;
                    players[idx].description = description;
                    players[idx].updatedAt = Date.now();
                    setPlayerCharacters(players);
                    showToast(`"${name}" updated successfully.`, "success");
                } else {
                    const player = {
                        id: generateId(),
                        genre: "player",
                        title: name,
                        name: name,
                        generally: generally,
                        appearance: appearance,
                        coverUrl: coverUrl || null,
                        description: description,
                        createdAt: Date.now(),
                        isPlayer: true,
                    };
                    players.push(player);
                    setPlayerCharacters(players);
                    showToast(`"${name}" created successfully.`, "success");
                }

                setTimeout(backToMenu, 600);
            }

            window.addEventListener("load", () => {
                loadBackground();
                bindLiveUpdates();

                const editId = sessionStorage.getItem("storyki_edit_player_id");
                if (editId) {
                    _editPlayerId = editId;
                    const players = getPlayerCharacters();
                    const player = players.find((p) => p.id === editId);
                    if (player) {
                        document.getElementById("charName").value = String(player.title || player.name || "");
                        document.getElementById("charGenerally").value = String(player.generally || "");
                        document.getElementById("charAppearance").value = String(player.appearance || "");
                        document.getElementById("charCoverUrl").value = String(player.coverUrl || "");

                        document.getElementById("pageTitle").textContent = "Edit Player";
                        document.getElementById("pageSubtitle").textContent = "Update your player profile";
                        document.getElementById("modeBadge").textContent = "Edit";
                        document.getElementById("saveBtn").textContent = "Save Changes";
                        document.title = "StoryKI – Edit Player";
                    } else {
                        showToast("Player not found. It may have been deleted.", "error");
                        sessionStorage.removeItem("storyki_edit_player_id");
                        _editPlayerId = null;
                    }
                    sessionStorage.removeItem("storyki_edit_player_id");
                }

                updateCharCount("charGenerally", "countGenerally");
                updateCharCount("charAppearance", "countAppearance");
                updatePreview();
                document.body.style.opacity = "1";
            });

            setInterval(loadBackground, 4000);
            document.body.style.transition = "opacity 0.3s ease";
        </script>
    </body>
</html>
