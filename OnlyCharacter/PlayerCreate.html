<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Create Character</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 20px;
            }

            body::before {
                content: "";
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.3);
                z-index: -1;
            }

            .container {
                background: rgba(20, 20, 30, 0.9);
                border-radius: 16px;
                padding: 40px;
                width: 100%;
                max-width: 600px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            }

            h1 {
                color: #fff;
                text-align: center;
                margin-bottom: 30px;
                font-size: 28px;
                font-weight: 300;
            }

            .form-group {
                margin-bottom: 24px;
            }

            label {
                display: block;
                color: rgba(255, 255, 255, 0.8);
                margin-bottom: 8px;
                font-size: 14px;
                font-weight: 500;
            }

            input[type="text"],
            textarea {
                width: 100%;
                padding: 14px 16px;
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 8px;
                color: #fff;
                font-size: 15px;
                font-family: inherit;
                transition: all 0.3s ease;
            }

            input[type="text"]:focus,
            textarea:focus {
                outline: none;
                border-color: #667eea;
                background: rgba(255, 255, 255, 0.15);
            }

            textarea {
                min-height: 100px;
                resize: vertical;
                scrollbar-width: none; /* Firefox */
                -ms-overflow-style: none; /* IE 10+ */
            }
            textarea::-webkit-scrollbar {
                display: none; /* Chrome, Safari, Opera */
            }

            .button-group {
                display: flex;
                gap: 12px;
                margin-top: 30px;
            }

            button {
                flex: 1;
                padding: 14px 24px;
                border: none;
                border-radius: 8px;
                font-size: 15px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s ease;
            }

            .btn-primary {
                background: rgba(100, 100, 100, 0.8);
                color: #fff;
            }

            .btn-primary:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
                background: rgba(120, 120, 120, 0.9);
            }

            .btn-secondary {
                background: rgba(255, 255, 255, 0.1);
                color: rgba(255, 255, 255, 0.8);
                border: 1px solid rgba(255, 255, 255, 0.2);
            }

            .btn-secondary:hover {
                background: rgba(255, 255, 255, 0.2);
            }

            .world-select {
                margin-bottom: 24px;
            }

            select {
                width: 100%;
                padding: 14px 16px;
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 8px;
                color: #fff;
                font-size: 15px;
                cursor: pointer;
            }

            select option {
                background: #2a2a3a;
                color: #fff;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Create Player</h1>
            
            <div class="form-group">
                <label for="charName">Name</label>
                <input type="text" id="charName" placeholder="Enter character name..." />
            </div>

            <div class="form-group">
                <label for="charGenerally">Generally</label>
                <textarea id="charGenerally" placeholder="General information about the character..."></textarea>
            </div>

            <div class="form-group">
                <label for="charAppearance">Appearance</label>
                <textarea id="charAppearance" placeholder="How does the character look..."></textarea>
            </div>

            <div class="form-group">
                <label for="charCoverUrl">Cover URL (Optional)</label>
                <input type="text" id="charCoverUrl" placeholder="https://example.com/image.jpg" />
            </div>

            <div class="button-group">
                <button class="btn-secondary" onclick="backToMenu()">Back</button>
                <button class="btn-primary" onclick="saveCharacter()">Create Player</button>
            </div>
        </div>

        <script>
            const SCENARIOS_KEY = "storyki_scenarios";
            const SETTINGS_KEY = "storyki_settings";

            function getScenarios() {
                try {
                    return JSON.parse(localStorage.getItem(SCENARIOS_KEY) || "[]");
                } catch {
                    return [];
                }
            }

            function setScenarios(scenarios) {
                localStorage.setItem(SCENARIOS_KEY, JSON.stringify(scenarios));
            }

            function generateId() {
                return Date.now().toString(36) + Math.random().toString(36).substr(2);
            }

            // Background loading from settings (same as index.html)
            function applyBg(url) {
                if (!url) return;
                document.body.style.backgroundImage = `url("${url}")`;
                document.body.style.backgroundSize = "cover";
                document.body.style.backgroundPosition = "center";
                document.body.style.backgroundAttachment = "fixed";
            }

            function loadBackground() {
                // Read settings from localStorage (where settings.html saves them)
                const settings = localStorage.getItem(SETTINGS_KEY);
                if (settings) {
                    try {
                        const data = JSON.parse(settings);
                        if (data.backgroundUrl) {
                            applyBg(data.backgroundUrl);
                            return;
                        }
                    } catch(e) {}
                }
                // Default fallback
                applyBg("https://wallpapers.com/images/hd/lake-in-the-forest-nature-xavnq3nwry0es5if.webp");
            }

            // Listen for background changes from other pages
            window.addEventListener("backgroundChanged", function (event) {
                const backgroundUrl = event.detail.backgroundUrl;
                applyBg(backgroundUrl);
            });

            function backToMenu() {
                document.body.style.opacity = "0";
                setTimeout(() => {
                    window.location.href = "../index.html";
                }, 300);
            }

            const PLAYER_CHARS_KEY = "storyki_player_characters";

            function getPlayerCharacters() {
                try {
                    return JSON.parse(localStorage.getItem(PLAYER_CHARS_KEY) || "[]");
                } catch {
                    return [];
                }
            }

            function setPlayerCharacters(players) {
                localStorage.setItem(PLAYER_CHARS_KEY, JSON.stringify(players));
            }

            let _editPlayerId = null;

            function saveCharacter() {
                const name = document.getElementById("charName").value.trim();
                const generally = document.getElementById("charGenerally").value.trim();
                const appearance = document.getElementById("charAppearance").value.trim();
                const coverUrl = document.getElementById("charCoverUrl").value.trim();

                if (!name) {
                    alert("Please enter a player name!");
                    return;
                }

                const players = getPlayerCharacters();

                if (_editPlayerId) {
                    // Update existing player
                    const idx = players.findIndex(p => p.id === _editPlayerId);
                    if (idx === -1) {
                        alert("Player not found!");
                        return;
                    }
                    players[idx].title = name;
                    players[idx].name = name;
                    players[idx].generally = generally;
                    players[idx].appearance = appearance;
                    players[idx].coverUrl = coverUrl || null;
                    players[idx].description = `${generally}\n\nAppearance: ${appearance}`.trim();
                    players[idx].updatedAt = Date.now();
                    setPlayerCharacters(players);
                    alert(`Player "${name}" updated successfully!`);
                } else {
                    // Create new player
                    const player = {
                        id: generateId(),
                        genre: "player",
                        title: name,
                        name: name,
                        generally: generally,
                        appearance: appearance,
                        coverUrl: coverUrl || null,
                        description: `${generally}\n\nAppearance: ${appearance}`.trim(),
                        createdAt: Date.now(),
                        isPlayer: true
                    };
                    players.push(player);
                    setPlayerCharacters(players);
                    alert(`Player "${name}" created successfully!`);
                }
                backToMenu();
            }

            // Initialize
            window.addEventListener("load", () => {
                loadBackground();
                
                // Check if we're editing an existing player
                const editId = sessionStorage.getItem("storyki_edit_player_id");
                if (editId) {
                    _editPlayerId = editId;
                    const players = getPlayerCharacters();
                    const player = players.find(p => p.id === editId);
                    if (player) {
                        // Fill form with existing data - ensure values are strings
                        document.getElementById("charName").value = String(player.title || "");
                        document.getElementById("charGenerally").value = String(player.generally || "");
                        document.getElementById("charAppearance").value = String(player.appearance || "");
                        document.getElementById("charCoverUrl").value = String(player.coverUrl || "");
                        // Update button text
                        document.querySelector(".btn-primary").textContent = "Update Player";
                        // Update title
                        document.querySelector("h1").textContent = "Edit Player";
                    } else {
                        alert("Player not found! The player may have been deleted.");
                        sessionStorage.removeItem("storyki_edit_player_id");
                        _editPlayerId = null;
                    }
                }
                
                document.body.style.opacity = "1";
            });

            // Regularly check for background changes
            setInterval(loadBackground, 4000);

            document.body.style.opacity = "0";
            document.body.style.transition = "opacity 0.3s ease";
        </script>
    </body>
</html>
