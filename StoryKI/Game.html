                    btn.style.setProperty("display", "none", "important");
                    btn.disabled = true;
                    btn.classList.add('locked');
                });
            }

            function isOpeningNarrationProtected() {
                try {
                    const messagesEl = document.getElementById("messages");
                    if (!messagesEl) return !!isFirstMessageProtected;
                    const aiRows = messagesEl.querySelectorAll(".msg-row.ai");
                    if (aiRows.length !== 1) return false;
                    const narratorEntries = chatHistory.filter(
                        (e) => e && typeof e === "object" && e.sender === "Narrator",
                    );
                    return !!isFirstMessageProtected || narratorEntries.length <= 1;
                } catch {
                    return !!isFirstMessageProtected;
                }
            }

            function normalizeActiveNpcTagInAiText(text) {
                try {
                    const t = String(text || "");
                    if (!t.trim()) return t;
                    if (/\[\[\s*ActiveNPCs?\s*:/i.test(t)) return t;

                    const nearbySet = new Set(getNearbyNpcIdsFromWorld());
                    const cards = getCards();
                    const allNpcIdSet = new Set(
                        cards.filter(c => c && c.genre === "character" && c.id).map(c => c.id)
                    );
                    const nearbyNpcs = cards
                        .filter(c => c && c.genre === "character" && nearbySet.has(c.id))
                        .map(c => ({ id: c.id, name: String(c.title || "").trim() }))
                        .filter(x => x.id);

                    const activeSet = new Set();
                    const memTagRegex = /\[\[\s*Memory\s*:\s*([^\]]+?)\s*\]\]/ig;
                    let m;
                    while ((m = memTagRegex.exec(t)) !== null) {
                        const payload = String(m[1] || "").trim();
                        const pairRegex = /([A-Za-z0-9\-]+)\s*\|\s*([\s\S]*?)(?=(?:\s*;\s*[A-Za-z0-9\-]+\s*\|)|$)/g;
                        let anyPairs = false;
                        let pm;
                        while ((pm = pairRegex.exec(payload)) !== null) {
                            anyPairs = true;
                            const id = String(pm[1] || "").trim();
                            if (allNpcIdSet.has(id)) activeSet.add(id);
                        }
                        if (!anyPairs) {
                            const legacyListRx = /^([A-Za-z0-9\-_]+(?:\s*:\s*(?:Common|Important))?)(?:\s*,\s*[A-Za-z0-9\-_]+(?:\s*:\s*(?:Common|Important))?)*$/i;
                            const firstComma = payload.indexOf(",");
                            if (firstComma !== -1 && !legacyListRx.test(payload)) {
                                const id = payload.slice(0, firstComma).trim();
                                if (allNpcIdSet.has(id)) activeSet.add(id);
                            } else {
                                payload.split(/,\s*/).forEach(s => {
                                    const id = String(s || "").trim().split(":")[0];
                                    if (allNpcIdSet.has(id)) activeSet.add(id);
                                });
                            }
                        }
                    }

                    if (activeSet.size === 0) {
                        const presentSet = new Set(getPresentNpcIds());
                        const nameCandidates = cards
                            .filter(c => c && c.genre === "character" && c.id && (presentSet.has(c.id) || nearbySet.has(c.id)))
                            .map(c => ({ id: c.id, name: String(c.title || "").trim() }))
                            .filter(x => x.id && x.name);
                        nearbyNpcs.forEach(n => {
                            if (!n.name) return;
                            const rx = new RegExp(`\\b${n.name.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")}\\b`, "i");
                            if (rx.test(t)) activeSet.add(n.id);
                        });
                        if (activeSet.size === 0) {
                            nameCandidates.forEach(n => {
                                const rx = new RegExp(`\\b${n.name.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")}\\b`, "i");
                                if (rx.test(t)) activeSet.add(n.id);
                            });
                        }
                    }

                    const activeIds = [...activeSet].slice(0, 6);
                    const normalizedTag = activeIds.length ? `[[ActiveNPCs:${activeIds.join(",")}]]` : `[[ActiveNPCs:none]]`;

                    const metaEnd = t.match(/\[\[\s*TIME\s*:\s*[0-2]?\d:\d{2}(?:\s*,\s*LOCATION\s*:\s*["']?(.+?)["']?)?\s*\]\]\s*$/i);
                    if (metaEnd) {
                        return t.replace(/\s*$/g, "").replace(/\[\[\s*TIME\s*:[\s\S]*?\]\]\s*$/i, (timeBlock) => {
                            return `${normalizedTag}\n\n${String(timeBlock || "").trim()}`;
                        }).trim();
                    }
                    return `${t.trim()}\n\n${normalizedTag}`.trim();
                } catch {
                    return String(text || "");
                }
            }

            function processAICommands(text) {
                if (!text) return "";
                if (!activeChar) return text.replace(/\[\[.*?\]\]/g, "").trim();
                if (isNsfwBlockEnabled()) {
                    const raw = String(text || "");
                    const withoutTags = raw.replace(/\[\[[\s\S]*?\]\]/g, "").trim();
                    if (/\[\[\s*NSFW\s*\]\]/i.test(raw) || /^NSFW$/i.test(withoutTags)) return NSFW_BLOCKED_TOKEN;
                }
                if (!activeChar.startingDate) activeChar.startingDate = {};
                const d = activeChar.startingDate;
                if (!d.day) d.day = 1;
                if (!d.month) d.month = 1;
                if (!d.year) d.year = 1983;
                if (!d.time) d.time = "00:00";

                const tagPattern = /\[\[([\s\S]*?)\]\]/g;
                let match;
                let timeChanged = false;
                let locationChanged = false;
                let npcDeathsChanged = false;
                // Reset pending memory targets for this response
                window._pendingMemoryTargets = [];
                const sanitizeTagValue = (v) => {
                    if (v == null) return "";
                    let out = String(v);
                    out = out.replace(/\]\]\s*\[\[[\s\S]*$/g, "");
                    out = out.replace(/\]\][\s\S]*$/g, "");
                    out = out.trim();
                    out = out.replace(/^["']+/, "").replace(/["']+$/, "");
                    return out.trim();
                };
                const resolveNpcIdFromRef = (ref, restrictSet = null) => {
                    try {
                        const raw = String(ref || "").trim();
                        if (!raw) return "";
                        const cards = getCards();
                        const chars = cards.filter(c => c && c.genre === "character" && c.id);
                        const idMatch = chars.find(c => c.id === raw);
                        if (idMatch && (!restrictSet || restrictSet.has(idMatch.id))) return idMatch.id;
                        const norm = (s) => String(s || "")
                            .toLowerCase()
                            .replace(/[“”„"]/g, "")
                            .replace(/\s+/g, " ")
                            .trim();
                        const r = norm(raw);
                        if (!r) return "";
                        const exactTitle = chars.find(c => norm(c.title) === r);
                        if (exactTitle && (!restrictSet || restrictSet.has(exactTitle.id))) return exactTitle.id;
                        const exactFirst = chars.find(c => norm(c.firstName) === r);
                        if (exactFirst && (!restrictSet || restrictSet.has(exactFirst.id))) return exactFirst.id;
                        const twoPart = chars.find(c => norm([c.firstName, c.lastName].filter(Boolean).join(" ")) === r);
                        if (twoPart && (!restrictSet || restrictSet.has(twoPart.id))) return twoPart.id;
                        return "";
                    } catch {
                        return "";
                    }
                };
                const resolveMemoryTagTarget = (ref) => {
                    try {
                        const nid = resolveNpcIdFromRef(ref);
                        if (nid) return { kind: "character", id: nid };
                        const lid = resolveLocationMemoryTargetFromRef(ref, getCards());
                        if (lid) return { kind: "location", id: lid };
                        return null;
                    } catch {
                        return null;
                    }
                };
                const memoryNpcIdsForAutoActive = [];

                while ((match = tagPattern.exec(text)) !== null) {
                    const content = match[1].trim();
                    const eventTag = content.match(/^Event\s*:\s*(.+)$/i);
                    if (eventTag) {
                        try { _applyScheduledEventTagPayload(eventTag[1], currentNarrationTs); } catch (e) { console.warn("Event tag parse failed", e); }
                        continue;
                    }
                    // Handle Memory tags: [[Memory:NPC_ID|...]] or [[Memory:LOCATION_ID|...]] (Custom/Building only)
                    const memIdList = content.match(/^Memory\s*:\s*(.+)$/i);
                    if (memIdList) {
                        try {
                            const payload = memIdList[1].trim();
                            const targets = [];
                            const pairRegex = /([A-Za-z0-9\-]+)\s*\|\s*([\s\S]*?)(?=(?:\s*;\s*[A-Za-z0-9\-]+\s*\|)|$)/g;
                            let pairMatch;
                            while ((pairMatch = pairRegex.exec(payload)) !== null) {
                                const idRaw = pairMatch[1].trim();
                                const resolved = resolveMemoryTagTarget(idRaw);
                                const memText = sanitizeTagValue(pairMatch[2]);
                                if (resolved && memText) {
                                    targets.push({ id: resolved.id, text: memText, type: "", kind: resolved.kind });
                                    if (resolved.kind === "character") memoryNpcIdsForAutoActive.push(resolved.id);
                                }
                            }
                            if (targets.length === 0) {
                                const legacyListRx = /^([A-Za-z0-9\-_]+(?:\s*:\s*(?:Common|Important))?)(?:\s*,\s*[A-Za-z0-9\-_]+(?:\s*:\s*(?:Common|Important))?)*$/i;
                                const firstComma = payload.indexOf(",");
                                if (firstComma !== -1 && !legacyListRx.test(payload)) {
                                    const idRaw = payload.slice(0, firstComma).trim();
                                    const rest = payload.slice(firstComma + 1).trim();
                                    const lastComma = rest.lastIndexOf(",");
                                    let type = "";
                                    let textPart = rest;
                                    if (lastComma !== -1) {
                                        const tail = rest.slice(lastComma + 1).trim();
                                        if (/^insight$/i.test(tail)) {
                                            type = "Insight";
                                            textPart = rest.slice(0, lastComma).trim();
                                        }
                                    }
                                    const resolved = resolveMemoryTagTarget(idRaw);
                                    const memText = sanitizeTagValue(textPart);
                                    if (resolved && memText) {
                                        targets.push({ id: resolved.id, text: memText, type, kind: resolved.kind });
                                        if (resolved.kind === "character") memoryNpcIdsForAutoActive.push(resolved.id);
                                    }
                                }
                            }
                            // Legacy fallback: [[Memory:ID1,ID2,ID3]]
                            if (targets.length === 0) {
                                const items = payload.split(/,\s*/).map(s => s.trim()).filter(Boolean);
                                items.forEach(it => {
                                    const m = it.match(/^([A-Za-z0-9\-]+)(?::\s*(Common|Important))?$/i);
                                    if (m) {
                                        const idRaw = m[1].trim();
                                        const resolved = resolveMemoryTagTarget(idRaw);
                                        if (resolved) {
                                            targets.push({ id: resolved.id, text: "", type: "", kind: resolved.kind });
                                            if (resolved.kind === "character") memoryNpcIdsForAutoActive.push(resolved.id);
                                        }
                                    }
                                });
                            }
                            window._pendingMemoryTargets = targets;
                        } catch (e) {
                            console.warn("Memory tag parse failed", e);
                        }
                        continue;
                    }
                    const activeNpcTag = content.match(/^ActiveNPCs?\s*:\s*(.+)$/i);
                    if (activeNpcTag) {
                        try {
                            if (currentNarrationTs) {
                                const prev = getActiveSceneNpcState();
                                rememberAnchoredWorldChange(currentNarrationTs, {
                                    type: "activeSceneNpcs",
                                    previousState: { ids: Array.isArray(prev.ids) ? [...prev.ids] : [], turns: { ...(prev.turns || {}) } }
                                });
                            }
                            const payloadRaw = sanitizeTagValue(activeNpcTag[1]);
                            const payload = String(payloadRaw || "").trim();
                            if (!payload || /^none$/i.test(payload)) {
                                setActiveSceneNpcIds([]);
                            } else {
                                const nearby = getNearbyNpcIdsFromWorld();
                                const nearbySet = new Set(Array.isArray(nearby) ? nearby : []);
                                const restrictSet = nearbySet.size > 0 ? nearbySet : null;
                                const ids = payload
                                    .split(/[,;]+/)
                                    .map(s => String(s || "").trim())
                                    .filter(Boolean)
                                    .map(x => resolveNpcIdFromRef(x, restrictSet) || (restrictSet ? "" : resolveNpcIdFromRef(x)))
                                    .filter(Boolean);
                                setActiveSceneNpcIds(ids, ACTIVE_SCENE_NPC_DETAIL_TURNS, { mergeFromTag: true });
                            }
                        } catch (e) {
                            console.warn("ActiveNPCs tag parse failed", e);
                        }
                        continue;
                    }
                    const deathTag = content.match(/^(?:Death|Dead)\s*:\s*([A-Za-z0-9\-_]+)\s*\|\s*(.+)$/i);
                    if (deathTag) {
                        const npcId = deathTag[1].trim();
                        const deathCause = deathTag[2].trim();
                        if (applyNpcDeath(npcId, deathCause, currentNarrationTs)) {
                            npcDeathsChanged = true;
                        }
                        continue;
                    }
                    // Handle Killed tags: [[Killed:Species_ID:Player,NPC_ID,...]]
                    const killedTag = content.match(/^Killed\s*:\s*([A-Za-z0-9\-_]+)\s*:\s*(.+)$/i);
                    if (killedTag) {
                        const speciesId = killedTag[1].trim();
                        const recipientsStr = killedTag[2].trim();
                        processKillCommand(speciesId, recipientsStr);
                        continue;
                    }
                    const npcLocationSetTag = content.match(/^NPCLocationSet\s*:\s*([A-Za-z0-9\-_]+)\s*,\s*([\s\S]+)\s*,\s*([0-9]+)$/i);
                    if (npcLocationSetTag) {
                        const npcRef = npcLocationSetTag[1].trim();
                        const textValue = sanitizeTagValue(npcLocationSetTag[2]);
                        const lockNumber = sanitizeTagValue(npcLocationSetTag[3]);
                        const npcId = resolveNpcIdFromRef(npcRef);
                        if (npcId && currentLocationId && textValue && lockNumber) {
                            setNpcLocationLock(npcId, currentLocationId, textValue, lockNumber, currentNarrationTs);
                        }
                        continue;
                    }
                    const npcLocationDeleteTag = content.match(/^NPCLocationDelete\s*:\s*([0-9]+)$/i);
                    if (npcLocationDeleteTag) {
                        const lockNumber = npcLocationDeleteTag[1].trim();
                        deleteNpcLocationLockByNumber(lockNumber, currentNarrationTs);
                        continue;
                    }
                    // Handle SecretRevelation tags: [[SecretRevelation:NPC_ID|Secret text]]
                    const secretRevTag = content.match(/^SecretRevelation\s*:\s*([A-Za-z0-9\-_]+)\s*\|\s*(.+)$/i);
                    if (secretRevTag) {
                        const npcId = secretRevTag[1].trim();
                        const secretText = secretRevTag[2].trim();
                        addKnownSecret(npcId, secretText, currentNarrationTs);
                        continue;
                    }
                    const relationTag = content.match(/^([A-Za-z0-9\-_]+)\s*:\s*(Friend|Spouse|Lover|Enemy)$/i);
                    if (relationTag) {
                        const npcId = relationTag[1].trim();
                        const relation = relationTag[2].trim();
                        setPlayerNpcRelationship(npcId, relation);
                        continue;
                    }
                    const parts = content.split(/[,;]+/).map(s => s.trim()).filter(Boolean);

                    for (const part of parts) {
                        const addParty = part.match(/^AddToParty\s*:\s*(.+)$/i);
                        if (addParty) {
                            const payload = addParty[1].trim();
                            addSpeciesToPartyByRef(payload);
                            continue;
                        }
                        const locState = part.match(/^LocState\s*:\s*(.+)$/i);
                        if (locState) {
                            const payload = locState[1];
                            const kvs = payload.split(/;\s*/).filter(Boolean);
                            kvs.forEach(seg => {
                                const m = seg.match(/^([^=]+)=([^;]+)$/);
                                if (m) {
                                    const key = m[1].trim();
                                    const val = m[2].trim();
                                    let ttlDays = null;
                                    const ttlMatch = seg.match(/ttl\s*=\s*(\d+)\s*d/i);
                                    if (ttlMatch) ttlDays = parseInt(ttlMatch[1], 10);
                                    setLocationState(key, val, ttlDays, currentNarrationTs);
                                } else {
                                    const ttlOnly = seg.match(/^ttl\s*=\s*(\d+)\s*d/i);
                                    if (ttlOnly) {
                                        const ttlDays = parseInt(ttlOnly[1], 10);
                                        setLocationState("state", "updated", ttlDays, currentNarrationTs);
                                    }
                                }
                            });
                            continue;
                        }
                        const absTime = part.match(/^(\d+)\s*\|\s*(\d+)\s*\|\s*(\d+)\s*\|\s*(\d{2}:\d{2})$/)
                            || part.match(/^(\d+),\s*(\d+),\s*(\d+),\s*(\d{2}:\d{2})$/);
                        if (absTime) {
                            const day = parseInt(absTime[1]);
                            const month = parseInt(absTime[2]);
                            const year = parseInt(absTime[3]);
                            const timeStr = absTime[4];
                            d.day = day;
                            d.month = (month > 0 && month <= 12) ? month : d.month;
                            d.year = year;
                            d.time = timeStr;
                            timeChanged = true;
                            continue;
                        }

                        const relTime = part.match(/^(Year|Month|Week|Day|Time)\s*:\s*([+-]?\d+(?::\d{2})?)$/i);
                        if (relTime) {
                            const key = relTime[1].toLowerCase();
                            const valueStr = relTime[2];

                            const parseHM = (t) => {
                                const ps = (t || "00:00").split(":").map(Number);
                                return { h: ps[0] || 0, m: ps[1] || 0 };
                            };
                            const setHM = (h, m) => {
                                d.time = `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
                            };
                            const applyVal = (cur, valStr) => {
                                if (valStr.startsWith("+")) return cur + parseInt(valStr.substring(1));
                                if (valStr.startsWith("-")) return cur - parseInt(valStr.substring(1));
                                return parseInt(valStr);
                            };

                            if (key === "year") {
                                d.year = applyVal(d.year || 1983, valueStr);
                            } else if (key === "month") {
                                const isRel = valueStr.startsWith("+") || valueStr.startsWith("-");
                                if (isRel) {
                                    let m = (d.month || 1) + parseInt(valueStr);
                                    let y = d.year || 1983;
                                    while (m > 12) { m -= 12; y++; }
                                    while (m < 1) { m += 12; y--; }
                                    d.month = m;
                                    d.year = y;
                                } else {
                                    let m = parseInt(valueStr);
                                    d.month = (m > 0 && m <= 12) ? m : (d.month || 1);
                                }
                            } else if (key === "week") {
                                d.day = (d.day || 1) + (parseInt(valueStr) * 7);
                            } else if (key === "day") {
                                const isRel = valueStr.startsWith("+") || valueStr.startsWith("-");
                                if (isRel) {
                                    d.day = (d.day || 1) + parseInt(valueStr);
                                } else {
                                    d.day = parseInt(valueStr);
                                }
                            } else if (key === "time") {
                                if (valueStr.includes(":")) {
                                    d.time = valueStr;
                                } else {
                                    const mins = parseInt(valueStr);
                                    const cur = parseHM(d.time);
                                    let total = cur.h * 60 + cur.m + mins;
                                    while (total < 0) total += 24 * 60;
                                    total = total % (24 * 60);
                                    const nh = Math.floor(total / 60);
                                    const nm = total % 60;
                                    setHM(nh, nm);
                                }
                            }

                    // Normalize minutes and Y/M/D with real month lengths
                    (function norm() {
                        let [hh, mm] = (d.time || "00:00").split(":").map(Number);
                        let total = hh * 60 + mm;
                        const dayLen = 24 * 60;
                        let dd = Math.floor(total / dayLen);
                        let rest = total % dayLen;
                        if (rest < 0) { rest += dayLen; dd -= 1; }
                        hh = Math.floor(rest / 60);
                        mm = rest % 60;
                        d.time = `${String(hh).padStart(2, "0")}:${String(mm).padStart(2, "0")}`;
                        d.day = (d.day || 1) + dd;
                        normalizeYMD(d);
                    })();

                            timeChanged = true;
                            continue;
                        }

                        const locKV = part.match(/^(Location|Loc)\s*:\s*["']?(.+?)["']?$/i);
                        if (locKV) {
                            const locName = sanitizeTagValue(locKV[2]);
                            updateLocation(locName);
                            locationChanged = true;
                            continue;
                        }

                        if (!part.includes(":")) {
                            const num = parseInt(part);
                            if (isNaN(num)) {
                                updateLocation(part);
                                locationChanged = true;
                                continue;
                            }
                        }
                    }
                }

                try {
                    const current = getPresentNpcIds();
                    if ((!Array.isArray(current) || current.length === 0) && memoryNpcIdsForAutoActive.length > 0) {
                        const uniq = [...new Set(memoryNpcIdsForAutoActive.filter(Boolean))];
                        if (uniq.length > 0) {
                            if (currentNarrationTs) {
                                const prev = getActiveSceneNpcState();
                                rememberAnchoredWorldChange(currentNarrationTs, {
                                    type: "activeSceneNpcs",
                                    previousState: { ids: Array.isArray(prev.ids) ? [...prev.ids] : [], turns: { ...(prev.turns || {}) } }
                                });
                            }
                            setActiveSceneNpcIds(uniq);
                            try { updatePresentNPCs(); } catch {}
                        }
                    }
                } catch {}

                const metaMatch = text.match(/\[\[\s*TIME\s*:\s*([0-2]?\d:\d{2})(?:\s*,\s*LOCATION\s*:\s*["']?(.+?)["']?)?\s*\]\]\s*$/i);
                if (metaMatch) {
                    const tStr = metaMatch[1];
                    const locStr = sanitizeTagValue(metaMatch[2]);
                    if (/^\d{1,2}:\d{2}$/.test(tStr)) {
                        d.time = tStr;
                        timeChanged = true;
                    }
                    if (locStr && locStr.trim()) {
                        updateLocation(locStr.trim());
                        locationChanged = true;
                    }
                }

                if (!timeChanged) {
                    addMinutes(1);
                    clearExpiredLocationEvents(currentNarrationTs);
                    try { recalcEventOverrides(); updatePresentNPCs(); } catch(e) { console.warn("recalcEventOverrides failed", e); }
                    clearExpiredNpcMemories();
                } else {
                    syncNpcInactivityCounters();
                    updateNPCBirthdays(d);
                    updatePlayerBirthday(d);
                    updateHeaderTime();
                    clearExpiredLocationEvents(currentNarrationTs);
                    try { recalcEventOverrides(); updatePresentNPCs(); } catch(e) { console.warn("recalcEventOverrides failed", e); }
                    saveActiveCharacter();
                    clearExpiredNpcMemories();
                }
                if (npcDeathsChanged) {
                    updatePresentNPCs();
                }

                return text.replace(/\[\[[\s\S]*?\]\]/g, "").replace(/\s+/g, " ").trim();
            }

            function handleCommand(key, val) {
                if (!activeChar) return;
                if (!activeChar.startingDate) activeChar.startingDate = {};
                const d = activeChar.startingDate;
                key = key.toLowerCase();
                console.log(`[AI Command] ${key} = ${val}`);

                if (key === "time") {
                    if (val.startsWith("+")) {
                        addMinutes(parseInt(val.substring(1)) || 0);
                    } else if (val.startsWith("-")) {
                        addMinutes(-(parseInt(val.substring(1)) || 0));
                    } else {
                        d.time = val;
                    }
                } else if (key === "day") {
                    d.day = parseInt(val) || d.day;
                } else if (key === "month") {
                    d.month = parseInt(val) || d.month;
                } else if (key === "year") {
                    d.year = parseInt(val) || d.year;
                } else if (
                    key === "add_m" ||
                    key === "add_min" ||
                    key === "add_minutes"
                ) {
                    addMinutes(parseInt(val) || 0);
                } else if (
                    key === "add_h" ||
                    key === "add_hour" ||
                    key === "add_hours"
                ) {
                    addMinutes((parseInt(val) || 0) * 60);
                } else if (key === "location" || key === "loc") {
                    updateLocation(val);
                }
                
                syncNpcInactivityCounters();
                updateNPCBirthdays(d);
                updatePlayerBirthday(d);
                updateHeaderTime();
                saveActiveCharacter();
            }

            function _genId() { return Math.random().toString(36).slice(2, 10); }
            function addSpeciesToPartyByRef(ref) {
                try {
                    const cards = getCards();
                    let spec = null;
                    const idMatch = ref.match(/speciesId\s*=\s*([a-z0-9_-]+)/i);
                    if (idMatch) {
                        const id = idMatch[1];
                        spec = cards.find(c => c.genre === "species" && c.id === id) || null;
                    }
                    if (!spec) {
                        const quoted = ref.match(/["'](.+?)["']/);
                        const title = quoted ? quoted[1] : ref;
                        const t = title.trim().toLowerCase();
                        spec = cards.find(c => c.genre === "species" && (c.title || "").toLowerCase() === t) || null;
                    }
                    if (!spec) return;
                    const raw = Storage.get(CHARS_KEY) || "[]";
                    const chars = JSON.parse(raw);
                    const exists = chars.some(ch => (ch._fromSpeciesId && ch._fromSpeciesId === spec.id) && (ch.title || "") === (spec.title || ""));
                    if (exists) return;
                    const ch = {
                        id: _genId(),
                        genre: "character",
                        title: spec.title || "Creature",
                        appearance: spec.appearance || "",
                        personality: spec.personality || "",
                        raceName: spec.title || "",
                        status: "Alive",
                        isPlayable: false,
                        _fromSpeciesId: spec.id || "",
                        createdAt: Date.now(),
                        updatedAt: Date.now()
                    };
                    chars.push(ch);
                    Storage.set(CHARS_KEY, JSON.stringify(chars));
                } catch {}
            }
            function _cmpDate(a, b) {
                if ((a.year || 0) !== (b.year || 0)) return (a.year || 0) - (b.year || 0);
                if ((a.month || 0) !== (b.month || 0)) return (a.month || 0) - (b.month || 0);
                return (a.day || 0) - (b.day || 0);
            }
            function _doy(day, month) { return ((month || 1) - 1) * 30 + (day || 1); }
            function _birthsUpTo(date, bd) {
                if (!date || !bd) return 0;
                const y = date.year || 0;
                const passed = _doy(date.day || 1, date.month || 1) >= _doy(bd.day || 1, bd.month || 1) ? 1 : 0;
                return y + passed;
            }
            function _birthdaysDiff(a, b, bd) {
                if (!bd) return 0;
                return _birthsUpTo(b, bd) - _birthsUpTo(a, bd);
            }
            function updateNPCBirthdays(currentDate) {
                try {
                    const raw = Storage.get(CHARS_KEY) || "[]";
                    const chars = JSON.parse(raw);
                    let changed = false;
                    for (let i = 0; i < chars.length; i++) {
                        const c = chars[i];
                        if (!c || c.status === "Dead") continue;
                        const bd = readBirthdate(c);
                        if (!bd || (!bd.day && !bd.month)) continue;
                        if (!c.birthdate || c.birthdate.day !== bd.day || c.birthdate.month !== bd.month || ((bd.year || null) !== (parseInt(c.birthdate.year, 10) || null))) {
                            c.birthdate = bd.year ? { day: bd.day, month: bd.month, year: bd.year } : { day: bd.day, month: bd.month };
                            changed = true;
                        }
                        if (typeof c.age !== "number") continue;
                        if (!c._ageCheck || typeof c._ageCheck !== "object") {
                            c._ageCheck = { day: currentDate.day || 1, month: currentDate.month || 1, year: currentDate.year || 1983 };
                            changed = true;
                            continue;
                        }
                        const diff = _birthdaysDiff(c._ageCheck, currentDate, bd);
                        if (diff !== 0) {
                            c.age = Math.max(0, (c.age || 0) + diff);
                            c._ageCheck = { day: currentDate.day || 1, month: currentDate.month || 1, year: currentDate.year || 1983 };
                            changed = true;
                        }
                    }
                    if (changed) {
                        Storage.set(CHARS_KEY, JSON.stringify(chars));
                    }
                } catch {}
            }
            function updatePlayerBirthday(currentDate) {
                try {
                    if (!activeChar) return;
                    const bd = readBirthdate(activeChar);
                    if (!bd || (!bd.day && !bd.month)) return;
                    if (!activeChar.birthdate || activeChar.birthdate.day !== bd.day || activeChar.birthdate.month !== bd.month || ((bd.year || null) !== (parseInt(activeChar.birthdate.year, 10) || null))) {
                        activeChar.birthdate = bd.year ? { day: bd.day, month: bd.month, year: bd.year } : { day: bd.day, month: bd.month };
                    }
                    if (typeof activeChar.age !== "number") return;
                    if (!activeChar._ageCheck || typeof activeChar._ageCheck !== "object") {
                        activeChar._ageCheck = { day: currentDate.day || 1, month: currentDate.month || 1, year: currentDate.year || 1983 };
                        return;
                    }
                    const diff = _birthdaysDiff(activeChar._ageCheck, currentDate, bd);
                    if (diff !== 0) {
                        activeChar.age = Math.max(0, (activeChar.age || 0) + diff);
                        activeChar._ageCheck = { day: currentDate.day || 1, month: currentDate.month || 1, year: currentDate.year || 1983 };
                    }
                } catch {}
            }

            function loadBackground() {
                const fallback = "https://wallpapers.com/images/hd/lake-in-the-forest-nature-xavnq3nwry0es5if.webp";
                let url = fallback;
                // Priority 1: global settings background
                try {
                    const raw = Storage.get(SETTINGS_KEY);
                    const settingsBg = raw ? (JSON.parse(raw).backgroundUrl || "") : "";
                    if (typeof settingsBg === "string" && settingsBg.trim()) {
                        url = settingsBg.trim();
                    }
                } catch {}
                // Priority 2: world configured background URL (index -> Configure World)
                try {
                    const selectedWorldId = Storage.get(SELECTED_WORLD_ID_KEY);
                    const scenarios = getScenariosLocal();
                    const world = scenarios.find((s) => !s.worldId && s.id === selectedWorldId);
                    const worldBg = world?.data?.settings?.backgroundUrl || "";
                    if (typeof worldBg === "string" && worldBg.trim()) {
                        url = worldBg.trim();
                    }
                } catch {}
                // Priority 3: current location background
                try {
                    if (currentLocationId) {
                        const cards = getCards();
                        const loc = cards.find(c => c.id === currentLocationId);
                        if (loc && typeof loc.backgroundUrl === "string" && loc.backgroundUrl.trim()) {
                            url = loc.backgroundUrl.trim();
                        }
                    }
                } catch {}
                const el = document.getElementById("bg-layer");
                if (el.style.backgroundImage !== `url(${url})`) {
                    el.style.backgroundImage = `url(${url})`;
                }
            }
            function getScenariosLocal() {
                try { return JSON.parse(localStorage.getItem(SCENARIOS_KEY) || "[]"); } catch { return []; }
            }
            function setScenariosLocal(list) {
                localStorage.setItem(SCENARIOS_KEY, JSON.stringify(list));
            }
            function getCurrentStoryId() {
                return Storage.get(CURRENT_STORY_ID_KEY);
            }
            function setCurrentStoryId(id) {
                Storage.set(CURRENT_STORY_ID_KEY, id);
            }
            function computeSig(cards, chars, log, settings, worldId) {
                return JSON.stringify({ w: worldId, c: cards.length, ch: chars.length, l: log.length, s: Object.keys(settings || {}).length });
            }
            function mergeStorySettingsForSave(baseSettings, existingStorySettings) {
                const merged = { ...(baseSettings || {}) };
                const existing = existingStorySettings || {};
                if (existing.coverUrl != null) merged.coverUrl = existing.coverUrl;
                if (existing.hardcoreMode != null) merged.hardcoreMode = existing.hardcoreMode;
                return merged;
            }
            function ensureStoryRecord() {
                const worldId = Storage.get(SELECTED_WORLD_ID_KEY);
                if (!worldId) return null;
                const cards = JSON.parse(Storage.get(CARDS_KEY) || "[]");
                const chars = JSON.parse(Storage.get(CHARS_KEY) || "[]");
                const log = JSON.parse(Storage.get(LOG_KEY) || "[]");
                const settings = JSON.parse(Storage.get(SETTINGS_KEY) || "{}");
                const anchoredWorldChanges = getAnchoredWorldChanges();
                let scenarios = getScenariosLocal();
                let storyId = getCurrentStoryId();
                let story = storyId ? scenarios.find(x => x.id === storyId) : null;
                if (!story) {
                    const world = scenarios.find((x) => !x.worldId && x.id === worldId);
                    const mergedStorySettings = mergeStorySettingsForSave(settings, world?.data?.settings);
                    const id = Math.random().toString(36).slice(2, 10);
                    let name = "Story " + new Date().toLocaleString();
                    if (chars.length > 0) {
                        const mainChar = chars[0];
                        const fullName = [mainChar.firstName, mainChar.lastName].filter(Boolean).join(" ").trim() || "Story";
                        name = `${fullName} - ${new Date().toLocaleDateString()}`;
                    }
                    story = {
                        id,
                        worldId,
                        name,
                        createdAt: Date.now(),
                        updatedAt: Date.now(),
                        signature: computeSig(cards, chars, log, mergedStorySettings, worldId),
                        official: false,
                        data: { cards, characters: chars, log, settings: mergedStorySettings, anchoredWorldChanges }
                    };
                    scenarios.push(story);
                    setScenariosLocal(scenarios);
                    setCurrentStoryId(id);
                }
                return story;
            }
            function autoSaveStory() {
                const worldId = Storage.get(SELECTED_WORLD_ID_KEY);
                if (!worldId) return;
                const cards = JSON.parse(Storage.get(CARDS_KEY) || "[]");
                const chars = JSON.parse(Storage.get(CHARS_KEY) || "[]");
                const log = JSON.parse(Storage.get(LOG_KEY) || "[]");
                const settings = JSON.parse(Storage.get(SETTINGS_KEY) || "{}");
                const anchoredWorldChanges = getAnchoredWorldChanges();
                let scenarios = getScenariosLocal();
                let storyId = getCurrentStoryId();
                let story = storyId ? scenarios.find(x => x.id === storyId) : null;
                if (!story) {
                    story = ensureStoryRecord();
                    scenarios = getScenariosLocal();
                }
                if (!story) return;
                const idx = scenarios.findIndex(x => x.id === story.id);
                if (idx === -1) return;
                const mergedStorySettings = mergeStorySettingsForSave(settings, scenarios[idx].data?.settings);
                scenarios[idx].updatedAt = Date.now();
                scenarios[idx].data = { cards, characters: chars, log, settings: mergedStorySettings, anchoredWorldChanges };
                scenarios[idx].signature = computeSig(cards, chars, log, mergedStorySettings, worldId);
                if (!scenarios[idx].official) {
                    if (chars.length > 0) {
                        const mainChar = chars[0];
                        const fullName = [mainChar.firstName, mainChar.lastName].filter(Boolean).join(" ").trim();
                        if (fullName) {
                            scenarios[idx].name = `${fullName} - ${new Date().toLocaleDateString()}`;
                        }
                    }
                }
                setScenariosLocal(scenarios);
            }

            function buildRuntimeCharacterFromCard(card) {
                if (!card) return null;
                const title = String(card.title || card.name || "").trim();
                const parts = title ? title.split(/\s+/) : [];
                const firstName = (card.firstName || parts[0] || "Unknown").trim();
                const lastName = (card.lastName || parts.slice(1).join(" ") || "").trim();
                const spawnId = card.currentLocationId || card.spawnId || card.spawnLocationId || "";
                let raceName = card.raceName || "";
                if (!raceName && card.raceId) {
                    const raceCard = getCards().find(c => c.genre === "race" && c.id === card.raceId);
                    if (raceCard) raceName = raceCard.title || "";
                }
                if (!raceName) raceName = "Unknown Race";
                const startingDate = (card.startingDate && typeof card.startingDate === "object")
                    ? { ...card.startingDate }
                    : { day: 1, month: 1, year: 1983, time: "08:00" };

                return {
                    id: card.id,
                    genre: "character",
                    firstName,
                    lastName,
                    name: card.name || [firstName, lastName].filter(Boolean).join(" ").trim(),
                    title: card.title || [firstName, lastName].filter(Boolean).join(" ").trim() || "Unknown",
                    raceId: card.raceId || null,
                    raceName,
                    gender: card.gender || "",
                    age: typeof card.age === "number" ? card.age : (parseInt(card.age, 10) || 0),
                    birthdate: readBirthdate(card),
                    appearance: card.appearance || card.description || "",
                    relations: JSON.parse(JSON.stringify(card.relations || [])),
                    skills: JSON.parse(JSON.stringify(card.skills || [])),
                    status: card.status || "Alive",
                    isPlayable: true,
                    spawnId,
                    spawnLocationId: card.spawnLocationId || spawnId,
                    currentLocationId: card.currentLocationId || spawnId,
                    startingDate,
                    introduction: card.introduction || "",
                    familyId: card.familyId || null,
                    createdAt: card.createdAt || Date.now(),
                    updatedAt: Date.now()
                };
            }

            function loadLatestCharacter() {
                try {
                    const selectedData = JSON.parse(sessionStorage.getItem("storyki_selected_char") || "null");
                    if (selectedData && selectedData.charId) {
                        const cards = getCards();
                        const selectedCard = cards.find(c => c && c.genre === "character" && c.id === selectedData.charId);
                        if (selectedCard) {
                            return buildRuntimeCharacterFromCard(selectedCard);
                        }
                    }
                    const chars = JSON.parse(Storage.get(CHARS_KEY) || "[]");
                    if (!Array.isArray(chars) || chars.length === 0) return null;
                    // Prefer playable characters
                    const playable = chars.filter(c => c && c.isPlayable === true);
                    if (playable.length > 0) return playable[playable.length - 1];
                    // Otherwise take the last character
                    return chars[chars.length - 1] || null;
                } catch {
                    return null;
                }
            }

            function getCards() {
                const cards = JSON.parse(Storage.get(CARDS_KEY) || "[]");
                try {
                    let changed = false;
                    cards.forEach((c) => {
                        if (!c || !Array.isArray(c.memories)) return;
                        c.memories.forEach((m) => {
                            if (m && typeof m === "object" && Object.prototype.hasOwnProperty.call(m, "level")) {
                                delete m.level;
                                changed = true;
                            }
                        });
                    });
                    if (changed) {
                        Storage.set(CARDS_KEY, JSON.stringify(cards));
                    }
                } catch {}
                return cards;
            }

            function escHtml(text) {
                if (typeof text !== 'string') return '';
                return text
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            function loadFamilyBornData(char) {
                try {
                    const selectedData = JSON.parse(sessionStorage.getItem("storyki_selected_char") || "null");
                    if (!selectedData || !selectedData.isFamilyBorn) return;
                    
                    // Check if this is a fresh start or a reload with existing progress
                    const existingLog = Storage.get(LOG_KEY);
                    const hasExistingProgress = existingLog && JSON.parse(existingLog).length > 0;
                    
                    console.log("[FamilyBorn] Loading family data...", selectedData, "hasExistingProgress:", hasExistingProgress);
                    
                    // Only clear chat history for fresh starts (no existing progress)
                    if (!hasExistingProgress) {
                        // Family-born should always start with a fresh log so family intro becomes first message.
                        try {
                            chatHistory = [];
                            Storage.remove(LOG_KEY);
                        } catch {}
                    }
                    
                    // Apply family data to character only on first load
                    if (!hasExistingProgress && selectedData.familyData) {
                        const family = selectedData.familyData;
                        
                        // Force family introduction as opening message for born-in-family flow.
                        if (typeof family.introduction === "string") {
                            char.introduction = family.introduction;
                        }
                        
                        // Set start date/time from family
                        if (family.startDate) {
                            char.startingDate = family.startDate;
                            if (family.startDate.time) {
                                char.startTime = family.startDate.time;
                            }
                        }
                        ensurePlayerBirthYearFromAge(char);
                        
                        // Set relations from family
                        const inheritedRelations = Array.isArray(family.memberRelations)
                            ? family.memberRelations
                            : (Array.isArray(family.relations) ? family.relations : []);
                        if (inheritedRelations.length > 0) {
                            char.relations = [...inheritedRelations];
                        }
                        
                        // Set spawn location from family
                        if (family.spawnLocationId) {
                            char.spawnId = family.spawnLocationId;
                            char.spawnLocationId = family.spawnLocationId;
                            char.currentLocationId = family.spawnLocationId;
                        }
                        // Set race from family if available
                        if (family.familyRaceId) {
                            char.raceId = family.familyRaceId;
                        }
                        if (family.familyRaceName) {
                            char.raceName = family.familyRaceName;
                        } else if (family.familyRaceId) {
                            const raceCard = getCards().find(c => c.genre === "race" && c.id === family.familyRaceId);
                            if (raceCard) char.raceName = raceCard.title || char.raceName;
                        }
                        
                        console.log("[FamilyBorn] Applied family data:", {
                            introduction: char.introduction,
                            startingDate: char.startingDate,
                            relations: char.relations?.length,
                            spawnLocationId: char.spawnLocationId,
                            raceId: char.raceId,
                            raceName: char.raceName
                        });
                    }
                    
                    // Clear the sessionStorage to prevent re-applying on refresh
                    sessionStorage.removeItem("storyki_selected_char");
                    
                } catch (e) {
                    console.error("[FamilyBorn] Error loading family data:", e);
                }

            function applyCharacter(ch) {
                if (!ch) return;
                activeChar = ch;

                // Derive missing fields from title if necessary
                try {
                    if ((!ch.firstName || !ch.lastName) && (ch.title || "").trim()) {
                        const parts = (ch.title || "").trim().split(/\s+/);
                        if (!ch.firstName) ch.firstName = parts[0] || "Unknown";
                        if (!ch.lastName) ch.lastName = parts.slice(1).join(" ");
                    }
                    if (!ch.raceName) {
                        if (ch.raceId) {
                            const raceCard = getCards().find(c => c.genre === "race" && c.id === ch.raceId);
                            if (raceCard) ch.raceName = raceCard.title || "Unknown Race";
                        }
                        if (!ch.raceName) ch.raceName = "Unknown Race";
                    }
                    const bd = readBirthdate(ch);
                    if (bd) {
                        ch.birthdate = bd.year ? { day: bd.day, month: bd.month, year: bd.year } : { day: bd.day, month: bd.month };
                    } else {
                        const sourceCard = getCards().find(c => c.genre === "character" && c.id === ch.id);
                        const sourceBd = readBirthdate(sourceCard);
                        if (sourceBd) ch.birthdate = sourceBd.year ? { day: sourceBd.day, month: sourceBd.month, year: sourceBd.year } : { day: sourceBd.day, month: sourceBd.month };
                    }
                    ensurePlayerBirthYearFromAge(ch);
                    if (ch.isPlayable !== true) ch.isPlayable = true;
                    // Initialize discoveredLocations for backwards compatibility
                    if (!Array.isArray(ch.discoveredLocations)) {
                        ch.discoveredLocations = [];
                    }
                    // Mark current location as discovered if set
                    if (ch.currentLocationId && !ch.discoveredLocations.includes(ch.currentLocationId)) {
                        ch.discoveredLocations.push(ch.currentLocationId);
                    }
                } catch {}

                const fullName = [ch.firstName, ch.lastName].filter(Boolean).join(" ") || (ch.title || "Unknown");
                const isF = ch.gender === "female";
                const icon = isF ? "♀" : "♂";
                const avatarClass = isF ? "female" : "male";


                // Header badge
                const badge = document.getElementById("char-badge");
                badge.classList.add("visible");
                const av = document.getElementById("header-avatar");
                av.textContent = icon;
                av.className = `char-avatar-sm ${avatarClass}`;
                document.getElementById("header-char-name").textContent =
                    fullName;
                document.getElementById("header-char-race").textContent =
                    ch.raceName || "Unknown Race";

                // Ensure starting date/time defaults if missing (derive from earliest event if available)
                try {
                    if (!activeChar.startingDate || typeof activeChar.startingDate !== "object") {
                        activeChar.startingDate = {};
                    }
                    const d = activeChar.startingDate;
                    if (!d.day || !d.month || !d.year || !d.time) {
                        const cards = getCards();
                        // Find earliest public event date in world
                        let earliest = null;
                        cards.filter(c => c.genre === "location").forEach(loc => {
                            const ev = loc.events || {};
                            ["custom"].forEach(k => {
                                (Array.isArray(ev[k]) ? ev[k] : []).forEach(e => {
                                    if (!e || e.type === "secret") return;
                                    const key = `${String(e.year||0).padStart(4,"0")}-${String(e.month||0).padStart(2,"0")}-${String(e.day||0).padStart(2,"0")} ${e.time||"00:00"}`;
                                    if (!earliest || key < earliest.key) earliest = { key, day: e.day||1, month: e.month||1, year: e.year||1983, time: e.time||"00:00" };
                                });
                            });
                        });
                        if (earliest) {
                            d.day = earliest.day;
                            d.month = earliest.month;
                            d.year = earliest.year;
                            d.time = earliest.time;
                        } else {
                            d.day = d.day || 1;
                            d.month = d.month || 1;
                            d.year = d.year || 1983;
                            d.time = d.time || "00:00";
                        }
                    }
                } catch {}
                try { ensurePlayerBirthYearFromAge(activeChar); } catch {}

                // Time & Location
                updateHeaderTime();

                // Ensure a valid location (currentLocationId or spawnId or resident-derived)
                try {
                    if (activeChar.currentLocationId) {
                        updateLocation(activeChar.currentLocationId);
                    } else if (activeChar.spawnId) {
                        updateLocation(activeChar.spawnId);
                        activeChar.currentLocationId = activeChar.spawnId;
                    } else {
                        const cards = getCards();
                        // Find location where this character is a resident
                        let loc = cards.find(c => c.genre === "location" && Array.isArray(c.residents) && c.residents.includes(activeChar.id));
                        // Else: choose any spawnable location
                        if (!loc) loc = cards.find(c => c.genre === "location" && c.canBeSpawn);
                        // Else: choose the first location
                        if (!loc) loc = cards.find(c => c.genre === "location");
                        if (loc) {
                            updateLocation(loc.id);
                            activeChar.currentLocationId = loc.id;
                        } else {
                            document.getElementById("header-location").textContent = "UNKNOWN LOCATION";
                            updatePresentNPCs();
                        }
                    }
                } catch {
                    document.getElementById("header-location").textContent = "UNKNOWN LOCATION";
                    updatePresentNPCs();
                }
                document.getElementById("header-info").style.display = "flex";

                // Welcome overlay
                const wRow = document.getElementById("welcome-char-row");
                wRow.style.display = "flex";
                const wAv = document.getElementById("welcome-avatar");
                wAv.textContent = icon;
                wAv.className = `welcome-avatar ${avatarClass}`;
                document.getElementById("welcome-char-name").textContent =
                    fullName;

                // Spawn name
                let spawnName = "";
                if (ch.spawnId) {
                    try {
                        const cards = JSON.parse(
                            Storage.get(CARDS_KEY) || "[]",
                        );
                        const spawn = cards.find((c) => c.id === ch.spawnId);

                document.getElementById("welcome-char-meta").textContent = [

                    .filter(Boolean)

                try { syncNpcInactivityCounters(); } catch {}
                try { saveActiveCharacter(); } catch {}
            }

            /* ═══════════════════════════════════════

            function formatMessageText(text) {
                let s = String(text || "");
                const escapeHtml = (v) =>
                    v.replace(/&/g, "&amp;")
                     .replace(/</g, "&lt;")
                     .replace(/>/g, "&gt;")
                     .replace(/"/g, "&quot;")
                     .replace(/'/g, "&#39;");
                s = escapeHtml(s);
                const blocks = [];
                s = s.replace(/```([\s\S]*?)```/g, (_, code) => {
                    const key = `%%BLOCK_${blocks.length}%%`;
                    blocks.push(`<pre><code>${code.replace(/^\n+|\n+$/g, "")}</code></pre>`);
                    return key;
                });
                const inlines = [];
                s = s.replace(/`([^`\n]+)`/g, (_, code) => {
                    const key = `%%INLINE_${inlines.length}%%`;
                    inlines.push(`<code>${code}</code>`);
                    return key;
                });
                s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
                s = s.replace(/\*\*\*([^\n*][\s\S]*?[^\n*])\*\*\*/g, "<strong><em>$1</em></strong>");
                s = s.replace(/\*\*([^\n*][\s\S]*?[^\n*])\*\*/g, "<strong>$1</strong>");
                s = s.replace(/__([^\n_][\s\S]*?[^\n_])__/g, "<strong>$1</strong>");
                s = s.replace(/(^|[^*])\*([^*\n][\s\S]*?[^*\n])\*(?!\*)/g, "$1<em>$2</em>");
                s = s.replace(/(^|[^_])_([^_\n][\s\S]*?[^_\n])_(?!_)/g, "$1<em>$2</em>");
                s = s.replace(/~~([^\n~][\s\S]*?[^\n~])~~/g, "<del>$1</del>");
                inlines.forEach((html, i) => {
                    s = s.replace(`%%INLINE_${i}%%`, html);
                });
                blocks.forEach((html, i) => {
                    s = s.replace(`%%BLOCK_${i}%%`, html);
                });
                return s;
            }
            function appendBubble(role, text, cssExtra = "", scroll = true) {
                const messagesEl = document.getElementById("messages");
                
                // Determine sender label
                const senderLabel = role === "user" ? "You" : "Narrator";

                // Check if the previous message was from the same sender
                const lastRow = messagesEl.lastElementChild;
                const isSameSender = lastRow && lastRow.classList.contains("msg-row") && lastRow.classList.contains(role);

                const row = document.createElement("div");
                row.className = `msg-row ${role}`;

                if (!isSameSender) {
                    const senderEl = document.createElement("div");
                    senderEl.className = "msg-sender";
                    senderEl.textContent = senderLabel;
                    row.appendChild(senderEl);
                } else {
                    // Optional: add a class to indicate it's a follow-up message for tighter spacing if needed
                    row.classList.add("follow-up");
                }

                const bubble = document.createElement("div");
                bubble.className = `msg-bubble ${cssExtra}`;
                bubble.innerHTML = formatMessageText(text);

                row.appendChild(bubble);
                messagesEl.appendChild(row);
                if (scroll) messagesEl.scrollTop = messagesEl.scrollHeight;
                return bubble;
            }
