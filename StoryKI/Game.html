            function renderStatsRelations() {
                const container = document.getElementById("stats-relations-list");
                container.innerHTML = "";

                if (!activeChar || !activeChar.relations || activeChar.relations.length === 0) {
                    container.innerHTML = '<div class="stats-no-relations">No family relations</div>';
                    return;
                }

                const cards = getCards();

                // Filter only family relations
                const familyRelations = activeChar.relations.filter(rel => rel.relation === "Family");

                if (familyRelations.length === 0) {
                    container.innerHTML = '<div class="stats-no-relations">No family relations</div>';
                    return;
                }

                familyRelations.forEach(rel => {
                    const npc = cards.find(c => c.id === rel.targetId && c.genre === "character");
                    if (!npc) return;

                    const item = document.createElement("div");
                    item.className = "stats-relation-item family";

                    const npcName = npc.title || "Unknown";
                    
                    // Avatar: either profile picture or nothing
                    let avatarHtml = "";
                    if (npc.pfpUrl) {
                        avatarHtml = `<div class="stats-relation-avatar"><img src="${escHtml(npc.pfpUrl)}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" /></div>`;
                    } else {
                        avatarHtml = `<div class="stats-relation-avatar" style="background:transparent;border:none;"></div>`;
                    }

                    item.innerHTML = `
                        ${avatarHtml}
                        <div class="stats-relation-info">
                            <div class="stats-relation-name">${escHtml(npcName)}</div>
                            <div class="stats-relation-type">${escHtml(rel.familySub || "Family")}</div>
                        </div>
                    `;
                    container.appendChild(item);
                });
            }

            function toggleRelationsLayout() {
                const select = document.getElementById("relations-layout-select");
                const list = document.getElementById("stats-relations-list");
                if (select && list) {
                    if (select.value === "horizontal") {
                        list.classList.add("horizontal");
                    } else {
                        list.classList.remove("horizontal");
                    }
                    // Save the layout preference
                    Storage.set(RELATIONS_LAYOUT_KEY, select.value);
                }
            }

            function restoreRelationsLayout() {
                const saved = Storage.get(RELATIONS_LAYOUT_KEY);
                const select = document.getElementById("relations-layout-select");
                const list = document.getElementById("stats-relations-list");
                if (saved && select && list) {
                    select.value = saved;
                    if (saved === "horizontal") {
                        list.classList.add("horizontal");
                    } else {
                        list.classList.remove("horizontal");
                    }
                }
            }

            function renderStatsSkills() {
                const section = document.getElementById("stats-skills-section");
                const container = document.getElementById("stats-skills-list");

                // Check if character has a skill
                if (!activeChar || !activeChar.skillId) {
                    section.style.display = "none";
                    return;
                }

                // Show section
                section.style.display = "flex";
                container.innerHTML = "";

                // Find the skill card
                const cards = getCards();
                const skill = cards.find(c => c.id === activeChar.skillId && c.genre === "skill");

                if (!skill) {
                    container.innerHTML = '<div class="stats-no-skills">No skills found</div>';
                    return;
                }

                // Create skill tag
                const tag = document.createElement("div");
                tag.className = "stats-skill-tag";
                tag.textContent = skill.title || "Unknown Skill";
                container.appendChild(tag);
            }

            /* ═══════════════════════════════════════
               LEVEL SYSTEM & XP
            ═══════════════════════════════════════ */
            function getSystemConfig() {
                const cards = getCards();
                const systemCard = cards.find(c => c.genre === "system");
                return systemCard?.systemConfig || null;
            }

            function isLevelSystemActive() {
                const config = getSystemConfig();
                return config && config.levelSystemEnabled;
            }

            function renderStatsLevel() {
                const section = document.getElementById("stats-level-section");
                if (!section) return;

                // Check if Level System is active
                if (!isLevelSystemActive()) {
                    section.style.display = "none";
                    return;
                }

                // Show section
                section.style.display = "flex";

                // Get player level data
                const levelData = activeChar?.levelData || { level: 1, xp: 0 };
                const config = getSystemConfig();

                // Calculate XP needed for current level
                const baseXP = config.expBase || 100;
                const increment = config.expIncrement || 100;
                const xpForCurrentLevel = baseXP + (increment * (levelData.level - 1));

                // Update display
                document.getElementById("stats-level").textContent = levelData.level;
                document.getElementById("stats-xp-current").textContent = levelData.xp;
                document.getElementById("stats-xp-needed").textContent = xpForCurrentLevel;

                // Update XP bar
                const percentage = Math.min(100, (levelData.xp / xpForCurrentLevel) * 100);
                document.getElementById("stats-xp-bar").style.width = percentage + "%";
            }

            function calculateXPForLevel(level, config) {
                const baseXP = config.expBase || 100;
                const increment = config.expIncrement || 100;
                return baseXP + (increment * (level - 1));
            }

            function addXP(targetId, amount) {
                const config = getSystemConfig();
                if (!config || !config.levelSystemEnabled) return;

                const cards = getCards();
                const target = cards.find(c => c.id === targetId && c.genre === "character");
                if (!target) return;

                // Initialize level data if not exists
                if (!target.levelData) {
                    target.levelData = { level: config.levelMin || 1, xp: 0 };
                }

                // Add XP
                target.levelData.xp += amount;

                // Check for level up
                const maxLevel = config.levelMax || 100;
                let leveledUp = false;

                while (target.levelData.level < maxLevel) {
                    const xpNeeded = calculateXPForLevel(target.levelData.level, config);
                    if (target.levelData.xp >= xpNeeded) {
                        target.levelData.xp -= xpNeeded;
                        target.levelData.level++;
                        leveledUp = true;
                    } else {
                        break;
                    }
                }

                // Save changes
                const idx = cards.findIndex(c => c.id === targetId);
                if (idx !== -1) {
                    cards[idx] = target;
                    Storage.set("storyki_world_cards", JSON.stringify(cards));
                }

                // Update display if it's the active character
                if (activeChar && activeChar.id === targetId) {
                    renderStatsLevel();
                }

                return { leveledUp, newLevel: target.levelData.level };
            }

            /* ═══════════════════════════════════════
               KILL COMMAND PROCESSING
            ═══════════════════════════════════════ */
            function processKillCommand(speciesId, recipientsStr) {
                const config = getSystemConfig();
                if (!config || !config.levelSystemEnabled) {
                    console.log("Level System not active, skipping XP distribution");
                    return;
                }

                const cards = getCards();

                // Find species and get XP reward
                const species = cards.find(c => c.id === speciesId && c.genre === "species");
                if (!species) {
                    console.warn("Species not found for XP distribution:", speciesId);
                    return;
                }

                const totalXP = species.xpReward || 0;
                if (totalXP <= 0) {
                    console.log("No XP reward for species:", speciesId);
                    return;
                }

                // Parse recipients
                const recipients = recipientsStr.split(/,\s*/).map(s => s.trim()).filter(Boolean);
                if (recipients.length === 0) {
                    console.log("No recipients for XP distribution");
                    return;
                }

                // Calculate XP per recipient
                const xpPerRecipient = Math.floor(totalXP / recipients.length);

                // Distribute XP
                recipients.forEach(recipient => {
                    if (recipient.toLowerCase() === "player") {
                        // Add XP to active character (player)
                        if (activeChar) {
                            const result = addXP(activeChar.id, xpPerRecipient);
                            if (result && result.leveledUp) {
                                showToast(`Level Up! You are now level ${result.newLevel}!`, "#ffd700");
                            }
                        }
                    } else {
                        // Add XP to NPC
                        const npc = cards.find(c => c.id === recipient && c.genre === "character");
                        if (npc) {
                            const result = addXP(npc.id, xpPerRecipient);
                            if (result && result.leveledUp) {
                                console.log(`NPC ${npc.firstName || npc.id} leveled up to ${result.newLevel}`);
                            }
                        } else {
                            console.warn("NPC not found for XP distribution:", recipient);
                        }
                    }
                });

                // Show toast with XP distribution info
                if (recipients.length === 1 && recipients[0].toLowerCase() === "player" && activeChar) {
                    showToast(`+${xpPerRecipient} XP gained!`, "#4a90e2");
                } else if (recipients.length > 1) {
                    showToast(`+${xpPerRecipient} XP distributed to ${recipients.length} targets!`, "#4a90e2");
                }
            }

            /* ═══════════════════════════════════════
               BUTTON LOCKING DURING GENERATION
            ═══════════════════════════════════════ */
            function lockAllButtons() {
                const buttons = ['retry-btn', 'edit-btn', 'continue-btn', 'erase-btn', 'move-btn', 'travel-btn'];
                buttons.forEach(btnId => {
                    const btn = document.getElementById(btnId);
                    if (btn) {
                        btn.disabled = true;
                        btn.classList.add('locked');
                        // Store original text
                        btn.dataset.originalText = btn.textContent.trim();
                        btn.textContent = '🔒';
                    }
                });
            }

            function unlockAllButtons() {
                const buttons = ['retry-btn', 'edit-btn', 'continue-btn', 'erase-btn', 'move-btn', 'travel-btn'];
                buttons.forEach(btnId => {
                    const btn = document.getElementById(btnId);
                    if (btn) {
                        btn.disabled = false;
                        btn.classList.remove('locked');
                        // Restore original text
                        if (btn.dataset.originalText) {
                            btn.textContent = btn.dataset.originalText;
                            delete btn.dataset.originalText;
                        }
                    }
                });
            }
            function showToast(msg, bg = "rgba(40,140,80,0.95)") {
                const t = document.getElementById("toast");
                t.textContent = msg;
                t.style.background = bg;
                t.classList.add("show");
                clearTimeout(t._timer);
                t._timer = setTimeout(() => t.classList.remove("show"), 2800);
            }

            /* ═══════════════════════════════════════
               NAVIGATION
            ═══════════════════════════════════════ */
            function goBack() {
                // Block navigation if a message is being generated
                if (isBusy) {
                    showToast("Please wait until the message is generated...", "rgba(180, 60, 60, 0.85)");
                    return;
                }
                const storyId = Storage.get(CURRENT_STORY_ID_KEY);
                if (storyId) {
                    const scenarios = getScenariosLocal();
                    const story = scenarios.find(x => x.id === storyId);
                    if (story && story.official !== false) {
                        // Save any pending input text before leaving
                        savePendingInput();
                        document.body.style.opacity = "0";
                        setTimeout(() => { window.location.href = "../index.html"; }, 400);
                        return;
                    }
                }
                ensureStoryRecord();
                autoSaveStory();
                showBackPopup();
            }

            function savePendingInput() {
                const inputEl = document.getElementById("user-input");
                if (inputEl && inputEl.value.trim()) {
                    Storage.set(PENDING_MESSAGE_KEY, inputEl.value);
                } else {
                    Storage.remove(PENDING_MESSAGE_KEY);
                }
            }

            function restorePendingInput() {
                const saved = Storage.get(PENDING_MESSAGE_KEY);
                if (saved) {
                    const inputEl = document.getElementById("user-input");
                    if (inputEl) {
                        inputEl.value = saved;
                        // Trigger auto-resize
                        inputEl.style.height = "auto";
                        inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
                    }
                    Storage.remove(PENDING_MESSAGE_KEY);
                }
            }

            /* ═══════════════════════════════════════
               INIT
            ═══════════════════════════════════════ */
            window.addEventListener("load", () => {
                loadBackground();
                let _bgIntervalId = setInterval(loadBackground, 5000);
                document.addEventListener("visibilitychange", () => {
                    if (document.hidden) {
                        if (_bgIntervalId) {
                            clearInterval(_bgIntervalId);
                            _bgIntervalId = null;
                        }
                    } else {
                        loadBackground();
                        if (!_bgIntervalId) {
                            _bgIntervalId = setInterval(loadBackground, 5000);
                        }
                    }
                });

                const params = new URLSearchParams(window.location.search);
                const isContinue = params.get("mode") === "continue";

                const char = loadLatestCharacter();
                if (char) {
                    applyCharacter(char);
                    clearExpiredLocationEvents();
                    try { recalcEventOverrides(); updatePresentNPCs(); } catch(e) { console.warn("recalcEventOverrides failed", e); }
                    loadStoryLog();
                    // Restore any pending message from previous session
                    restorePendingInput();
                    // Restore relations layout preference
                    restoreRelationsLayout();
                    // Ensure initial age baselines are set
                    try {
                        const d0 = (char && char.startingDate) ? char.startingDate : null;
                        if (d0) updateNPCBirthdays(d0);
                    } catch {}
                    // Overlay ausblenden, wenn bereits Nachrichten existieren
                    if (Array.isArray(chatHistory) && chatHistory.length > 0) {
                        const ov = document.getElementById("welcome-overlay");
                        if (ov) ov.style.display = "none";
                    }
                    if (isContinue) {
                        const ov = document.getElementById("welcome-overlay");
                        ov.style.display = "none";
                    }
                } else {
                    // Fallback: create a default playable character from world cards
                    try {
                        const cards = getCards();
                        const playable = cards.find(c => c.genre === "character" && c.isPlayable === true) || cards.find(c => c.genre === "character");
                        if (playable) {
                            const title = (playable.title || "Unknown").trim();
                            const parts = title.split(/\s+/);
                            const firstName = parts[0] || "Unknown";
                            const lastName = parts.slice(1).join(" ");
                            // Determine initial location
                            let spawnLoc = cards.find(c => c.genre === "location" && Array.isArray(c.residents) && c.residents.includes(playable.id) && c.canBeSpawn);
                            if (!spawnLoc) spawnLoc = cards.find(c => c.genre === "location" && Array.isArray(c.residents) && c.residents.includes(playable.id));
                            if (!spawnLoc) spawnLoc = cards.find(c => c.genre === "location" && c.canBeSpawn);
                            if (!spawnLoc) spawnLoc = cards.find(c => c.genre === "location");
                            const earliest = (() => {
                                let e = null;
                                cards.filter(c => c.genre === "location").forEach(loc => {
                                    const ev = loc.events || {};
                                    ["custom"].forEach(k => {
                                        (Array.isArray(ev[k]) ? ev[k] : []).forEach(v => {
                                            if (!v || v.type === "secret") return;
                                            const key = `${String(v.year||0).padStart(4,"0")}-${String(v.month||0).padStart(2,"0")}-${String(v.day||0).padStart(2,"0")} ${v.time||"00:00"}`;
                                            if (!e || key < e.key) e = { key, day: v.day||1, month: v.month||1, year: v.year||1983, time: v.time||"00:00" };
                                        });
                                    });
                                });
                                return e;
                            })();
                            const d = earliest ? { day: earliest.day, month: earliest.month, year: earliest.year, time: earliest.time } : { day: 1, month: 1, year: 1983, time: "00:00" };
                            const chObj = {
                                id: playable.id,
                                genre: "character",
                                firstName: playable.firstName || firstName,
                                lastName: playable.lastName || lastName,
                                title: playable.title || title,
                                raceId: playable.raceId || null,
                                raceName: playable.raceName || "Unknown Race",
                                gender: playable.gender || "",
                                age: playable.age || 0,
                                birthdate: readBirthdate(playable),
                                appearance: playable.appearance || "",
                                relations: JSON.parse(JSON.stringify(playable.relations || [])),
                                skills: JSON.parse(JSON.stringify(playable.skills || [])),
                                status: playable.status || "Alive",
                                isPlayable: true,
                                spawnId: spawnLoc ? spawnLoc.id : "",
                                currentLocationId: spawnLoc ? spawnLoc.id : "",
                                startingDate: d,
                                createdAt: Date.now(),
                                updatedAt: Date.now()
                            };
                            const arr = JSON.parse(Storage.get(CHARS_KEY) || "[]");
                            arr.push(chObj);
                            Storage.set(CHARS_KEY, JSON.stringify(arr));
                            applyCharacter(chObj);
                            loadStoryLog();
                        }
                    } catch (e) {
                        console.error("Failed to create default character from world", e);
                    }
                }

                ensureStoryRecord();
                autoSaveStory();

                // Stats panel close on outside click
                const statsOverlay = document.getElementById("stats-panel-overlay");
                if (statsOverlay) {
                    statsOverlay.addEventListener("click", (e) => {
                        if (e.target.id === "stats-panel-overlay") {
                            closeStatsPanel();
                        }
                    });
                }

                setTimeout(() => {
                    document.body.style.opacity = "1";
                }, 100);
            });
            window.addEventListener("beforeunload", () => {
                autoSaveStory();
            });
        </script>
    </body>
