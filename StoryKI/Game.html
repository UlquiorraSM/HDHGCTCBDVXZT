                    const isInsight = /^insight$/i.test(String(type || "").trim());
                    if (isInsight) {
                        if (!Array.isArray(npc.insights)) npc.insights = [];
                        const norm = (s) => String(s || "").toLowerCase().replace(/\s+/g, " ").trim();
                        const sig = norm(memoryText);
                        const idx = npc.insights.findIndex(m => m && norm(m.text) === sig);
                        const entry = {
                            date: dateStr,
                            time: timeStr,
                            location: locName,
                            dayCount: _worldDayCount(d),
                            text: memoryText,
                            logTs: anchorTs || null,
                            type: "Insight"
                        };
                        if (idx >= 0) {
                            npc.insights[idx] = { ...(npc.insights[idx] || {}), ...entry };
                        } else {
                            npc.insights.push(entry);
                        }
                        if (npc.insights.length > 120) npc.insights = npc.insights.slice(-120);
                        changed = true;
                        return;
                    }
                    if (!Array.isArray(npc.memories)) npc.memories = [];
                    npc.memories.push({
                        date: dateStr,
                        time: timeStr,
                        location: locName,
                        dayCount: _worldDayCount(d),
                        text: memoryText,
                        logTs: anchorTs || null
                    });
                    if (npc.memories.length > 500) npc.memories = npc.memories.slice(-500);
                    changed = true;
                });
                if (changed) {
                    sessionStorage.setItem(CARDS_KEY, JSON.stringify(cards));
                }
                syncNpcInactivityCounters(targets.filter((t) => (t.kind || "character") === "character").map((t) => t.id));
                window._pendingMemoryTargets = [];
            }

            function addLocationMemoryFromNarration(text, anchorTs = null) {
                if (!currentLocationId || !text) return;
                
                // Only save to location if there's an actual location state change
                // Check for LocState tags [[LocState:key=value]]
                const hasLocState = /\[\[LocState:[^\]]+\]\]/i.test(text);
                
                // Check for explicit location change markers in text
                // (e.g., "The room is now dirty", "A gum spot appears on the floor")
                const locationChangeKeywords = [
                    /(?:room|floor|wall|door|window|ceiling|ground|table|chair|bed|desk|shelf|\bbench\b|\bcouch\b|\bsofa\b) (?:is|are|becomes?|got|gets?|turns?|now|appears?|materializes?|forms?|creates?|makes?)/i,
                    /(?:dirty|clean|messy|tidy|broken|fixed|open|closed|locked|unlocked|wet|dry|cold|warm|hot|dark|bright|light)/i,
                    /(?:kaugummi|gum|spot|fleck|dreck|schmutz|staub|dirt|dust|trash|müll)/i,
                    /(?:empty|full|filled|cleared|organized|cluttered|decorated|painted)/i
                ];
                const hasLocationDescription = locationChangeKeywords.some(pattern => pattern.test(text));
                
                // Only proceed if there's evidence of location state change
                if (!hasLocState && !hasLocationDescription) {
                    return; // Skip - this is likely just character action, not location change
                }
                
                const cards = getCards();
                const locCard = cards.find((c) => c.id === currentLocationId);
                if (!locCard) return;
                const d = activeChar?.startingDate || {};
                const dateStr = `${String(d.day || 1).padStart(2, "0")}.${String(d.month || 1).padStart(2, "0")}.${d.year || 1983}`;
                const timeStr = d.time || "00:00";
                const locName = document.getElementById("header-location")?.textContent || "Unknown Location";
                
                // Extract only the location-relevant part (first 2 sentences or LocState context)
                let relevantText = text;
                if (!hasLocState) {
                    // If no explicit state tag, extract just the location description part
                    const sentences = text.split(/(?<=[.!?])\s+/);
                    const locationSentences = sentences.filter(s => 
                        locationChangeKeywords.some(pattern => pattern.test(s))
                    );
                    if (locationSentences.length > 0) {
                        relevantText = locationSentences.slice(0, 2).join(" ");
                    }
                }
                
                const entry = {
                    date: dateStr,
                    time: timeStr,
                    location: locName,
                    dayCount: _worldDayCount(d),
                    text: String(relevantText || "").slice(0, 300), // Shorter for location
                    logTs: anchorTs || null
                };
                if (!Array.isArray(locCard.memories)) locCard.memories = [];
                locCard.memories.push(entry);
                if (locCard.memories.length > 50) locCard.memories = locCard.memories.slice(-50); // Reduced from 200
                sessionStorage.setItem(CARDS_KEY, JSON.stringify(cards));
            }

            function _worldDayCount(d) {
                const day = parseInt(d.day || 1, 10);
                const month = parseInt(d.month || 1, 10);
                const year = parseInt(d.year || 1983, 10);
                // Days until start of current year
                const y = year - 1;
                let days = y * 365 + Math.floor(y / 4) - Math.floor(y / 100) + Math.floor(y / 400);
                // Days in months before current month
                for (let m = 1; m < month; m++) days += daysInMonth(m, year);
                // Current day
                days += day;
                return days;
            }
            function syncNpcInactivityCounters(resetNpcIds = []) {
                try {
                    if (!activeChar || !activeChar.startingDate) return;
                    const cards = getCards();
                    const nowDayCount = _worldDayCount(activeChar.startingDate);
                    const resetSet = new Set((Array.isArray(resetNpcIds) ? resetNpcIds : []).filter(Boolean));
                    let changed = false;
                    const readMemoryDayCount = (m) => {
                        const direct = parseInt(m?.dayCount, 10);
                        if (Number.isFinite(direct)) return direct;
                        const parts = String(m?.date || "").split(".");
                        if (parts.length === 3) {
                            const dd = parseInt(parts[0], 10) || 1;
                            const mm = parseInt(parts[1], 10) || 1;
                            const yy = parseInt(parts[2], 10) || 1983;
                            return _worldDayCount({ day: dd, month: mm, year: yy });
                        }
                        return null;
                    };
                    cards.forEach((c) => {
                        if (!c || c.genre !== "character") return;
                        if (activeChar && c.id === activeChar.id) return;
                        let startDay = parseInt(c.unusedDaysCounterStartDayCount, 10);
                        if (!Number.isFinite(startDay)) {
                            startDay = nowDayCount;
                            changed = true;
                        }
                        let latestUsageDay = null;
                        if (Array.isArray(c.memories) && c.memories.length > 0) {
                            c.memories.forEach((m) => {
                                const mc = readMemoryDayCount(m);
                                if (!Number.isFinite(mc)) return;
                                if (latestUsageDay == null || mc > latestUsageDay) latestUsageDay = mc;
                            });
                        }
                        if (resetSet.has(c.id)) {
                            latestUsageDay = nowDayCount;
                        }
                        let refDay = latestUsageDay == null ? startDay : latestUsageDay;
                        if (refDay > nowDayCount) refDay = nowDayCount;
                        const counter = Math.max(0, nowDayCount - refDay);
                        const lastSync = nowDayCount;
                        if (c.unusedDaysCounter !== counter) {
                            c.unusedDaysCounter = counter;
                            changed = true;
                        }
                        if (c.unusedDaysCounterLastSyncDayCount !== lastSync) {
                            c.unusedDaysCounterLastSyncDayCount = lastSync;
                            changed = true;
                        }
                        if (c.unusedDaysCounterStartDayCount !== startDay) {
                            c.unusedDaysCounterStartDayCount = startDay;
                            changed = true;
                        }
                    });
                    if (changed) {
                        sessionStorage.setItem(CARDS_KEY, JSON.stringify(cards));
                    }
                } catch (e) {
                    console.warn("syncNpcInactivityCounters failed", e);
                }
            }
            function setLocationState(key, value, ttlDays = null, byTs = null) {
                if (!currentLocationId) return;
                const cards = getCards();
                const locCard = cards.find((c) => c.id === currentLocationId);
                if (!locCard) return;
                const d = activeChar?.startingDate || {};
                if (!locCard.states || typeof locCard.states !== "object") locCard.states = {};
                const state = { value, updatedAt: Date.now(), untilDayCount: null, updatedByTs: byTs || null };
                if (ttlDays != null && !isNaN(ttlDays)) {
                    state.untilDayCount = _worldDayCount(d) + parseInt(ttlDays, 10);
                }
                locCard.states[key] = state;
                sessionStorage.setItem(CARDS_KEY, JSON.stringify(cards));
            }
            function clearExpiredLocationStates() {
                if (!currentLocationId) return;
                const cards = getCards();
                const locCard = cards.find((c) => c.id === currentLocationId);
                if (!locCard || !locCard.states) return;
                const d = activeChar?.startingDate || {};
                const nowCount = _worldDayCount(d);
                let changed = false;
                Object.keys(locCard.states).forEach((k) => {
                    const st = locCard.states[k];
                    if (st && st.untilDayCount != null && nowCount > st.untilDayCount) {
                        delete locCard.states[k];
                        changed = true;
                    }
                });
                if (changed) {
                    sessionStorage.setItem(CARDS_KEY, JSON.stringify(cards));
                }
            }
            function clearExpiredNpcMemories() {
                const cards = getCards();
                const d = activeChar?.startingDate || {};
                const nowCount = _worldDayCount(d);
                let changed = false;
                const parseCount = (m) => {
                    if (m.dayCount != null) return m.dayCount;
                    const parts = (m.date || "").split(".");
                    if (parts.length === 3) {
                        const dd = parseInt(parts[0]) || 1;
                        const mm = parseInt(parts[1]) || 1;
                        const yy = parseInt(parts[2]) || 1983;
                        return _worldDayCount({ day: dd, month: mm, year: yy });
                    }
                    return null;
                };
                cards.forEach((c) => {
                    if (c.genre !== "character" || !Array.isArray(c.memories)) return;
                    const before = c.memories.length;
                    // Keep memories from last 30 days, max 100 per NPC
                    c.memories = c.memories.filter((m) => {
                        const mc = parseCount(m);
                        if (mc == null) return true;
                        return mc > (nowCount - 30);
                    });
                    if (c.memories.length > 100) {
                        c.memories = c.memories.slice(-100);
                    }
                    if (c.memories.length !== before) changed = true;
                });
                if (changed) {
                    sessionStorage.setItem(CARDS_KEY, JSON.stringify(cards));
                }
            }
            function clearExpiredLocationEvents(byTs = null) {
                try {
                    if (!activeChar || !activeChar.startingDate) return false;
                    const cards = getCards();
                    if (!Array.isArray(cards) || cards.length === 0) return false;
                    const nowDay = _nowDayKey();
                    let changed = false;
                    cards.forEach((c) => {
                        if (!c || c.genre !== "location") return;
                        if (!c.events || typeof c.events !== "object") return;
                        Object.keys(c.events).forEach((bucket) => {
                            const list = c.events[bucket];
                            if (!Array.isArray(list) || list.length === 0) return;
                            const kept = [];
                            list.forEach((evt, idx) => {
                                if (!evt || evt.day == null || evt.month == null || evt.year == null) {
                                    kept.push(evt);
                                    return;
                                }
                                const isExpired = nowDay > _eventDayKey(evt);
                                if (!isExpired) {
                                    kept.push(evt);
                                    return;
                                }
                                changed = true;
                                if (byTs) {
                                    rememberAnchoredWorldChange(byTs, {
                                        type: "eventExpired",
                                        locId: c.id,
                                        bucket,
                                        index: idx,
                                        event: JSON.parse(JSON.stringify(evt))
                                    });
                                }
                            });
                            if (kept.length !== list.length) {
                                c.events[bucket] = kept;
                            }
                        });
                    });
                    if (changed) {
                        sessionStorage.setItem(CARDS_KEY, JSON.stringify(cards));
                    }
                    return changed;
                } catch (e) {
                    console.warn("clearExpiredLocationEvents failed", e);
                    return false;
                }
            }
            function rollbackAnchoredChangesByTs(ts) {
                try {
                    if (!ts) return;
                    const cards = getCards();
                    const anchoredChanges = getAnchoredWorldChanges();
                    const pendingChanges = Array.isArray(anchoredChanges[String(ts)]) ? anchoredChanges[String(ts)] : [];
                    let changed = false;
                    pendingChanges.forEach((change) => {
                        if (!change || change.type !== "activeSceneNpcs") return;
                        try {
                            setActiveSceneNpcState(change.previousState || { ids: [], turns: {} });
                            try { updatePresentNPCs(); } catch {}
                        } catch {}
                    });
                    cards.forEach(c => {
                        if (c.genre === "character") {
                            if (Array.isArray(c.memories)) {
                                const lenBefore = c.memories.length;
                                c.memories = c.memories.filter(m => m.logTs !== ts);
                                if (c.memories.length !== lenBefore) changed = true;
                            }
                            if (Array.isArray(c.insights)) {
                                const lenBefore = c.insights.length;
                                c.insights = c.insights.filter(m => m.logTs !== ts);
                                if (c.insights.length !== lenBefore) changed = true;
                            }
                        } else if (c.genre === "location") {
                            if (Array.isArray(c.memories)) {
                                const lenBefore = c.memories.length;
                                c.memories = c.memories.filter(m => m.logTs !== ts);
                                if (c.memories.length !== lenBefore) changed = true;
                            }
                            if (c.states && typeof c.states === "object") {
                                const keys = Object.keys(c.states);
                                keys.forEach(k => {
                                    const st = c.states[k];
                                    if (st && st.updatedByTs === ts) {
                                        delete c.states[k];
                                        changed = true;
                                    }
                                });
                            }
                        }
                    });
                    pendingChanges.forEach((change) => {
                        if (!change || change.type !== "npcDeath" || !change.npcId) return;
                        const npc = cards.find((c) => c.genre === "character" && c.id === change.npcId);
                        if (!npc) return;
                        npc.status = change.previousStatus || "Alive";
                        npc.deathCause = change.previousDeathCause || "";
                        if (change.previousDeathInfo) {
                            npc.deathInfo = { ...change.previousDeathInfo };
                        } else {
                            delete npc.deathInfo;
                        }
                        changed = true;
                    });
                    pendingChanges.forEach((change) => {
                        if (!change || change.type !== "npcLocationLock" || !change.npcId) return;
                        const npc = cards.find((c) => c.genre === "character" && c.id === change.npcId);
                        if (!npc) return;
                        // Restore the previous lock state
                        if (change.previousLock) {
                            npc.locationLock = { ...change.previousLock };
                        } else {
                            delete npc.locationLock;
                        }
                        changed = true;
                    });
                    pendingChanges.forEach((change) => {
                        if (!change || change.type !== "eventExpired" || !change.locId || !change.bucket) return;
                        const loc = cards.find((c) => c.genre === "location" && c.id === change.locId);
                        if (!loc) return;
                        if (!loc.events || typeof loc.events !== "object") loc.events = {};
                        if (!Array.isArray(loc.events[change.bucket])) loc.events[change.bucket] = [];
                        const list = loc.events[change.bucket];
                        const restoredEvent = change.event ? JSON.parse(JSON.stringify(change.event)) : null;
                        if (!restoredEvent) return;
                        const restoreSig = JSON.stringify(restoredEvent);
                        const exists = list.some((evt) => JSON.stringify(evt || {}) === restoreSig);
                        if (exists) return;
                        const idx = Number.isFinite(parseInt(change.index, 10)) ? parseInt(change.index, 10) : list.length;
                        const boundedIdx = Math.max(0, Math.min(idx, list.length));
                        list.splice(boundedIdx, 0, restoredEvent);
                        changed = true;
                    });
                    try {
                        const scheduledChanges = pendingChanges.filter(c => c && c.type === "scheduledEventUpsert" && c.eventId);
                        if (scheduledChanges.length) {
                            let list = _getScheduledEvents();
                            let did = false;
                            scheduledChanges.forEach(ch => {
                                const id = String(ch.eventId || "").trim();
                                if (!id) return;
                                if (ch.existed && ch.previousEvent) {
                                    const idx = list.findIndex(e => e && e.id === id);
                                    if (idx >= 0) {
                                        list[idx] = JSON.parse(JSON.stringify(ch.previousEvent));
                                        did = true;
                                    }
                                } else {
                                    const before = list.length;
                                    list = list.filter(e => !(e && e.id === id));
                                    if (list.length !== before) did = true;
                                }
                            });
                            if (did) {
                                _setScheduledEvents(list);
                                try { updateHeaderEvent(); } catch {}
                            }
                        }
                    } catch {}
                    if (pendingChanges.length > 0) {
                        delete anchoredChanges[String(ts)];
                        saveAnchoredWorldChanges(anchoredChanges);
                    }
                    if (changed) {
                        sessionStorage.setItem(CARDS_KEY, JSON.stringify(cards));
                        try { syncNpcInactivityCounters(); } catch {}
                    }
                } catch (e) {
                    console.error("Rollback anchored changes failed", e);
                }
            }
            function updateMemoriesTextByTs(ts, newText) {

                    const maxLen = 800;
                    const newT = String(newText || "").slice(0, maxLen);

                                    m.text = newT;
                                    changed = true;

                        if (Array.isArray(c.insights)) {
                            c.insights.forEach(m => {

                                }

                } catch (e) {
                    console.warn("updateMemoriesTextByTs failed", e);
                }
            }
            function showNPCInfo(id) {
                const cards = getCards();
                const npc = cards.find((c) => c.id === id);
                if (!npc) return;

                // Simple alert for now, could be a modal
                let info = `${npc.title}\n`;
                if (npc.raceName) info += `Race: ${npc.raceName}\n`;
                if (npc.gender) info += `Gender: ${npc.gender}\n`;
                if (npc.age) info += `Age: ${npc.age}\n`;
                if (npc.status) info += `Status: ${npc.status}\n`;
                info += `Unused Days Counter: ${Math.max(0, parseInt(npc.unusedDaysCounter, 10) || 0)}\n`;
                if (npc.status === "Dead" && npc.deathCause) info += `Death: ${npc.deathCause}\n`;
                if (npc.personality) info += `\nPersonality:\n${npc.personality}\n`;

            const DEFAULT_AI_TIMEOUT_MS = 120000;
            function _isAiTimeoutError(err) {
                const s = String(err || "").toLowerCase();
                return s.includes("zu lange") || s.includes("timeout") || s.includes("stale");
            }
            function _compactPromptForTimeout(prompt) {
                try {
                    let p = String(prompt || "");
                    const worldIdx = p.indexOf("\n# WORLD KNOWLEDGE\n");
                    const rulesIdx = p.indexOf("\n# ROLEPLAY RULES\n");
                    if (worldIdx !== -1 && rulesIdx !== -1 && rulesIdx > worldIdx) {
                        p = p.slice(0, worldIdx) + "\n# WORLD KNOWLEDGE\n" + p.slice(rulesIdx);
                    }
                    const logMarker = "\n### STORY LOG ###\n";
                    const logIdx = p.indexOf(logMarker);
                    const narrIdx = p.lastIndexOf("\n\nNarrator:");
                    if (logIdx !== -1 && narrIdx !== -1 && narrIdx > logIdx) {
                        const head = p.slice(0, logIdx + logMarker.length);
                        const log = p.slice(logIdx + logMarker.length, narrIdx);
                        const tail = p.slice(narrIdx);
                        const maxLogChars = 1800;
                        const kept = log.length > maxLogChars ? log.slice(log.length - maxLogChars) : log;
                        p = head + kept + tail;
                    }
                    const maxTotalChars = 14000;
                    if (p.length > maxTotalChars) {
                        const tailKeep = 6000;
                        p = p.slice(0, maxTotalChars - tailKeep) + p.slice(p.length - tailKeep);
                    }
                    return p;
                } catch {
                    return String(prompt || "");
                }
            }

            function askAI(prompt, timeoutMs = DEFAULT_AI_TIMEOUT_MS) {
                return new Promise((resolve, reject) => {
                    const requestId = Math.random().toString(36).substring(7);
                    const timeout = setTimeout(() => {
                        window.removeEventListener("message", handler);
                        reject("Die KI hat zu lange gebraucht.");
                    }, Math.max(15000, parseInt(timeoutMs, 10) || DEFAULT_AI_TIMEOUT_MS));

                    const handler = (event) => {
                        if (event.data.requestId === requestId) {
                            clearTimeout(timeout);
                            window.removeEventListener("message", handler);
                            if (event.data.type === "AI_RESPONSE")
                                resolve(event.data.text);
                            else
                                reject(
                                    event.data.error || "Unbekannter Fehler",
                                );
                        }
                    };

                    window.addEventListener("message", handler);
                    window.parent.postMessage(
                        { type: "AI_REQUEST", instruction: prompt, requestId },
                        "*",
                    );
                });
            }

            async function askAIWithRetry(prompt, maxAttempts = 4) {
                if (typeof prompt !== "string" || !prompt.trim()) {
                    throw new Error("Invalid AI prompt: empty or non-string instruction.");
                }
                let lastErr = null;
                let effectivePrompt = prompt;
                for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                    try {
                        return await askAI(effectivePrompt, DEFAULT_AI_TIMEOUT_MS);
                    } catch (err) {
                        lastErr = err;
                        if (attempt >= maxAttempts) break;
                        if (_isAiTimeoutError(err)) {
                            effectivePrompt = _compactPromptForTimeout(effectivePrompt);
                        }
                        console.warn(`AI Request failed (attempt ${attempt}/${maxAttempts}), retrying in 2 seconds...`, err);
                        await new Promise((resolve) => setTimeout(resolve, 2000));
                    }
                }
                throw new Error(`AI request failed after ${maxAttempts} attempts: ${String(lastErr || "unknown error")}`);
            }

            function buildHistoryLines(limitFirst = 15) {
                const recentHistory = chatHistory.slice(0, Math.max(0, limitFirst));
                return recentHistory
                    .map((e) => {

                        return `[${e.time} @ ${e.location}] ${e.sender}: ${e.text}`;

                    .join("\n");
            }

            function _normalizeText(s) {
                return String(s || "").replace(/\s+/g, " ").trim().toLowerCase();
            }

            function _isAnySublocationId(locId, cards) {
                if (!locId) return false;
                const arr = Array.isArray(cards) ? cards : getCards();
                return arr.some((c) => {

            // Build context for cards whose tags match words in the player's message.
            // Supports Race, Location (Building/Custom) and Character cards.
            function getTagMatchedContextData(playerText) {
                const data = {
                    context: "",
                    matched: []
                };
                if (!playerText) return data;
                const text = _normalizeText(playerText);
                const words = text.split(/\s+/).filter(w => w.length >= 2);
                if (words.length === 0) return data;

                const cards = getCards();
                const matched = [];
                const activeSet = new Set(getPresentNpcIds());

                const getRelationToPlayer = (npc) => {
                    if (!npc || !activeChar || !Array.isArray(activeChar.relations)) return "Stranger (Unknown)";
                    const npcName = _normalizeText(npc.title || "");
                    const rel = activeChar.relations.find((r) => {
                        if (!r) return false;
                        if (r.targetId && r.targetId === npc.id) return true;
                        const targetName = _normalizeText(r.targetName || "");
                        return npcName && targetName && targetName === npcName;
                    });
                    if (!rel) return "Stranger (Unknown)";
                    if (rel.relation === "Family") return rel.familySub || "Family";
                    return rel.relation || "Stranger (Unknown)";
                };

                // Filter for Race, Character, Location, Skill and Lore cards with tags.
                const taggableCards = cards.filter(c => {
                    if (c.genre === "race" && Array.isArray(c.tags) && c.tags.length > 0) return true;
                    if (c.genre === "character" && Array.isArray(c.tags) && c.tags.length > 0) return true;
                    if (c.genre === "skill" && Array.isArray(c.tags) && c.tags.length > 0) return true;
                    if (c.genre === "lore" && Array.isArray(c.tags) && c.tags.length > 0) {
                        return String(c.loreMode || "").toLowerCase() === "tags";
                    }
                    if (c.genre === "location" && Array.isArray(c.tags) && c.tags.length > 0) {
                        const sub = String(c.locationSub || c.locationSubType || "").toLowerCase();
                        return sub === "building" || sub === "custom";
                    }
                    return false;
                });

                // Find matches
                for (const card of taggableCards) {
                    const cardTags = (card.tags || []).map(t => _normalizeText(t));
                    const matchedTags = [];
                    for (const tag of cardTags) {
                        if (tag.length < 2) continue;
                        // Check if any word in the message contains this tag or vice versa
                        for (const word of words) {
                            if (word.includes(tag) || tag.includes(word)) {
                                matchedTags.push(tag);
                                break;
                            }
                        }
                    }
                    if (matchedTags.length > 0) {
                        matched.push({
                            card,
                            tags: [...new Set(matchedTags)],
                        });
                    }
                }

                if (matched.length === 0) return data;

                // Build context string
                let result = "\n### MENTIONED TOPICS ###\n";
                matched.forEach(({ card, tags }) => {
                    const displayTags = tags.map((t) => `"${t}"`).join(", ");
                    if (card.genre === "character") {
                        const isActive = activeSet.has(card.id);
                        const relation = getRelationToPlayer(card);
                        result += `- NPC: ${card.title || card.id} [ID: ${card.id}] (matched tags: ${displayTags})\n`;
                        if (card.raceName) result += `  Race: ${card.raceName}\n`;
                        if (card.gender) result += `  Gender: ${card.gender}\n`;
                        if (card.age) result += `  Age: ${card.age}\n`;
                        if (card.appearance) result += `  Appearance: ${card.appearance}\n`;
                        if (card.personality) result += `  Personality: ${card.personality}\n`;
                        if (card.description) result += `  Description: ${String(card.description).substring(0, 240)}\n`;
                        if (card.lore) result += `  Lore: ${String(card.lore).substring(0, 240)}\n`;
                        result += `  Relation to Player: ${relation}\n`;
                        if (isActive) {
                            const secrets = readSecrets(card);
                            const knownSecrets = readKnownSecrets(card);
                            result += `  Secrets: ${secrets.length ? secrets.join(" | ") : "None"}\n`;
                            if (knownSecrets.length) {
                                result += `  Known Secrets (learned from others): ${knownSecrets.join(" | ")}\n`;
                            }
                        }
                    } else if (card.genre === "location") {
                        const desc = (card.description || "").substring(0, 200);
                        result += `- Location: ${card.title || card.id} [ID: ${card.id}] (matched tags: ${displayTags})\n`;
                        if (desc) result += `  Description: ${desc}\n`;
                    } else if (card.genre === "race" || card.genre === "skill" || card.genre === "lore") {
                        const desc = (card.description || card.loreText || "").substring(0, 200);
                        const kind = card.genre.charAt(0).toUpperCase() + card.genre.slice(1);
                        result += `- ${kind}: ${card.title || card.id} [ID: ${card.id}] (matched tags: ${displayTags})\n`;
                        if (desc) result += `  Description: ${desc}\n`;
                    } else {
                        const desc = (card.description || "").substring(0, 200);
                        result += `- ${card.title}${desc ? ": " + desc : ""} (matched tags: ${displayTags})\n`;
                    }
                });
                data.context = result;
                data.matched = matched;
                return data;
            }

            function buildTagMatchedContext(playerText) {
                return getTagMatchedContextData(playerText).context;
            }

            function _stripQuotedSegments(text) {
                try {
                    let s = String(text || "");
                    s = s.replace(/"[^"]*"/g, " ");
                    s = s.replace(/“[^”]*”/g, " ");
                    s = s.replace(/„[^“]*“/g, " ");
                    s = s.replace(/'[^']*'/g, " ");
                    return s;
                } catch {
                    return String(text || "");
                }
            }

            function autoSetPresentNpcsFromPlayerText(playerText, anchorTs) {
                try {
                    const raw = String(playerText || "");
                    if (!raw.trim()) return;
                    const text = _normalizeText(_stripQuotedSegments(raw));
                    if (!text) return;
                    const words = text.split(/\s+/).filter(w => w.length >= 2);
                    if (words.length === 0) return;

                    const cards = getCards();
                    const candidates = cards.filter(c => c && c.genre === "character" && c.id && Array.isArray(c.tags) && c.tags.length > 0);
                    if (candidates.length === 0) return;

                    const matchedIds = [];
                    for (const npc of candidates) {
                        const tags = (npc.tags || []).map(t => _normalizeText(t)).filter(Boolean);
                        if (tags.length === 0) continue;
                        let hit = false;
                        for (const tag of tags) {
                            if (tag.length < 2) continue;
                            for (const word of words) {
                                if (word === tag || word.includes(tag) || tag.includes(word)) { hit = true; break; }
                            }
                            if (hit) break;
                        }
                        if (hit) matchedIds.push(npc.id);
                    }

                    if (matchedIds.length === 0) return;
                    const prev = getActiveSceneNpcState();
                    const prevIds = Array.isArray(prev.ids) ? prev.ids : [];
                    const nextIds = [...new Set([...prevIds, ...matchedIds])];
                    if (nextIds.length === prevIds.length && prevIds.every(id => nextIds.includes(id))) return;
                    if (anchorTs) {
                        rememberAnchoredWorldChange(anchorTs, {
                            type: "activeSceneNpcs",
                            previousState: { ids: [...prevIds], turns: { ...(prev.turns || {}) } }
                        });
                    }
                    setActiveSceneNpcIds(nextIds);
                    try { updatePresentNPCs(); } catch {}
                } catch {}
            }

            function getLastNarratorText() {
                for (let i = chatHistory.length - 1; i >= 0; i--) {
                    const e = chatHistory[i];
                    if (typeof e !== "string" && e.sender === "Narrator") {
                        return e.text || "";
                    }
                }
                return "";
            }
            function buildHistoryLinesCombined(firstCount = 10, lastCount = 5) {
                const first = chatHistory.slice(0, Math.max(0, firstCount));
                const last = chatHistory.slice(-Math.max(0, lastCount));
                const merged = first.concat(last);
                return merged
                    .map((e) => {
                        if (typeof e === "string") return `--- ${e} ---`;
                        return `[${e.time} @ ${e.location}] ${e.sender}: ${e.text}`;
                    })
                    .join("\n");
            }
            function buildNarratorPrompt(systemInst, tagContext = "", extraNote = "", firstCount = 10, lastCount = 5) {
                const MAX_PROMPT_CHARS = 6900;
                const marker = "\n\n### STORY LOG ###\n";
                const _compactSystemInstForBudget = (s, maxChars) => {
                    const txt = String(s || "");
                    const n = Math.max(0, parseInt(maxChars, 10) || 0);
                    if (txt.length <= n) return txt;
                    if (n <= 0) return "";
                    const headKeep = Math.min(1000, n);
                    const tailKeep = Math.max(0, n - headKeep);
                    if (tailKeep <= 0) return txt.slice(0, n);
                    return txt.slice(0, headKeep) + "\n\n" + txt.slice(txt.length - tailKeep);
                };
                const suffix =
                    (extraNote ? "\n\n" + String(extraNote || "") : "") +
                    "\n\n" + buildLanguageLockLine() +
                    "\n" + buildTextSizeLockLine() +
                    "\n\nNarrator:";
                const RESERVED_HISTORY_CHARS = 1800;
                let systemBlock = String(systemInst || "") + String(tagContext || "");
                let prefix = systemBlock + marker;

                let f = Math.max(0, parseInt(firstCount, 10) || 0);
                let l = Math.max(0, parseInt(lastCount, 10) || 0);
                let history = buildHistoryLinesCombined(f, l);

                let maxHistoryLen = MAX_PROMPT_CHARS - prefix.length - suffix.length;
                if (maxHistoryLen < RESERVED_HISTORY_CHARS) {
                    const systemBudget = MAX_PROMPT_CHARS - suffix.length - marker.length - RESERVED_HISTORY_CHARS;
                    systemBlock = _compactSystemInstForBudget(systemBlock, systemBudget);
                    prefix = systemBlock + marker;
                    maxHistoryLen = MAX_PROMPT_CHARS - prefix.length - suffix.length;
                }
                const MIN_LAST = 8;
                while (history.length > Math.max(0, maxHistoryLen) && (f > 0 || l > MIN_LAST)) {
                    if (f > 0) f -= 1;
                    else if (l > MIN_LAST) l -= 1;
                    history = buildHistoryLinesCombined(f, l);
                    maxHistoryLen = MAX_PROMPT_CHARS - prefix.length - suffix.length;
                }

                if (maxHistoryLen < 0) {
                    const hardKeep = Math.max(0, MAX_PROMPT_CHARS - suffix.length);
                    const trimmedPrefix = prefix.length > hardKeep ? prefix.slice(0, hardKeep) : prefix;
                    return trimmedPrefix + suffix;
                }

                if (history.length > maxHistoryLen) {
                    history = history.slice(history.length - Math.max(0, maxHistoryLen));
                }

                return prefix + history + suffix;
            }
            function getLastNarratorTexts(count = 10) {
                const texts = [];
                for (let i = chatHistory.length - 1; i >= 0 && texts.length < count; i--) {
                    const e = chatHistory[i];
                    if (typeof e !== "string" && e.sender === "Narrator") {
                        texts.push(e.text || "");
                    }
                }
                return texts;
            }
            function isDuplicateText(t) {
                const norm = _normalizeText(t);
                const prev = getLastNarratorTexts(10).map(_normalizeText);
                return prev.includes(norm);
            }
            function isEchoOfPlayerText(aiText, playerText) {
                const a = _normalizeText(aiText);
                const p = _normalizeText(playerText);
                if (!p || p.length < 8) return false;
                if (a === p) return true;
                if (p.length >= 14 && a.includes(p)) return true;
                return false;
            }
            function uniqueSentences(t) {
                const txt = String(t || "");
                const parts = txt.split(/(?<=[\.!\?])\s+/).filter(Boolean);
                const seen = new Set();
                const out = [];
                for (const p of parts) {
                    const n = _normalizeText(p);
                    if (!seen.has(n)) {
                        seen.add(n);
                        out.push(p);
                    }
                }
                return out.join(" ").trim();
            }

            async function triggerNarration(systemPrompt) {
                if (isBusy) return;
                isBusy = true;
                setSendDisabled(true);
                setStatus(false);
                lockAllButtons(); // Lock all buttons during generation

                const typing = appendTypingIndicator();
                try { updatePresentNPCs(); } catch {}

                const systemInst = buildSystemPrompt();
                consumeActiveSceneNpcDetailTurns();

                try {
                    currentNarrationTs = Date.now();
                    const recentHistory = chatHistory;
                    const finalPrompt = buildNarratorPrompt(systemInst, "", "", 2, 16);
                    
                    const response = await askAIWithRetry(finalPrompt);
                    const useAiCheck = isAiCheckEnabled();
                    try {
                        const dbgSettings = JSON.parse(Storage.get(SETTINGS_KEY) || "{}");
                        console.log("[DEBUG] AI Check mode:", String(dbgSettings.aiCheck || "1"), "| useAiCheck:", useAiCheck ? "2" : "1");
                    } catch {}
                    let validatedResponse = response;
                    const hasNsfwTag = response && (/\[\[\s*NSFW\s*\]\]/i.test(response) || /^\s*NSFW\s*$/i.test(response));
                    if (useAiCheck && response && !hasNsfwTag) {
                        try {
                            const validated = await validateAndFixNarration(response, "");

                                console.log("[Validation] Trigger narration text was corrected by validation AI");
                                validatedResponse = validated;
                            }
                        } catch (validationErr) {

                        }
                    }
                    removeTypingIndicator();
                    validatedResponse = normalizeActiveNpcTagInAiText(validatedResponse);
                    let rawAiUsed = validatedResponse;
                    const cleanResponse = processAICommands(validatedResponse);
                    let finalText = "";
                    if (cleanResponse === NSFW_BLOCKED_TOKEN) {
                        finalText = NSFW_BLOCKED_TEXT;
                    } else {
                        finalText = uniqueSentences(cleanResponse);
                        const lastNarr = getLastNarratorText();
                        if (_normalizeText(finalText) === _normalizeText(lastNarr) || isDuplicateText(finalText)) {
                            const finalPrompt2 = buildNarratorPrompt(systemInst, "", "Note: Do not repeat previous narration. Continue the story with new actions and consequences. Do NOT copy or quote the player's last message. Do NOT speak or act as the player.", 2, 16);
                            const response2 = await askAIWithRetry(finalPrompt2);
                            let validatedResponse2 = response2;
                            const hasNsfwTag2 = response2 && (/\[\[\s*NSFW\s*\]\]/i.test(response2) || /^\s*NSFW\s*$/i.test(response2));
                            if (useAiCheck && response2 && !hasNsfwTag2) {
                                try {
                                    const validated2 = await validateAndFixNarration(response2, "");
                                    if (validated2 && validated2 !== response2) {
                                        console.log("[Validation] Trigger narration duplicate-avoidance text was corrected by validation AI");
                                        validatedResponse2 = validated2;
                                    }
                                } catch (validationErr) {
                                    console.warn("[Validation] Trigger narration duplicate-avoidance validation failed, using original text", validationErr);
                                }
                            }
                            validatedResponse2 = normalizeActiveNpcTagInAiText(validatedResponse2);
                            const clean2 = processAICommands(validatedResponse2);
                            rawAiUsed = validatedResponse2;
                            finalText = clean2 === NSFW_BLOCKED_TOKEN ? NSFW_BLOCKED_TEXT : uniqueSentences(clean2);
                        }
                    }
                    appendBubble("ai", finalText);
                    const ts = addToStoryLog("Narrator", finalText, currentNarrationTs, { rawAi: String(rawAiUsed || "") });
                    if (finalText !== NSFW_BLOCKED_TEXT) {
                        addNpcMemoriesFromPending(finalText, ts);
                        addLocationMemoryFromNarration(finalText, ts);
                    }
                } catch (err) {
                    removeTypingIndicator();
                    // No error bubble displayed to user
                    console.error("Narration failed even with retries (unexpected)", err);
                } finally {
                    isBusy = false;
                    setSendDisabled(false);
                    setStatus(true);
                    unlockAllButtons(); // Unlock buttons when generation is complete
                    currentNarrationTs = null;
                }
            }

            // ═════════════════════════════════════════════════════════════════
            // SECOND PASS AI - Repairs narration and commands before sending to user
            // ═════════════════════════════════════════════════════════════════
            async function validateAndFixNarration(narrationText, playerInput) {
                if (!narrationText || narrationText.length < 12) return narrationText;
                
                const presentNpcIds = getPresentNpcIds();
                const cards = getCards();
                const d = activeChar?.startingDate || {};
                const curTime = d.time || "00:00";
                const curDate = `${String(d.day || 1).padStart(2, "0")}.${String(d.month || 1).padStart(2, "0")}.${d.year || 1983}`;
                const curLocName = (document.getElementById("header-location")?.textContent || "Unknown Location").trim();
                const curLocId = activeChar?.currentLocationId || currentLocationId || "";
                const settings = JSON.parse(Storage.get(SETTINGS_KEY) || "{}");
                const aiLangSpec = getAiLanguageSpec(settings.aiLanguage);
                const targetLanguage = `${aiLangSpec.name} (${aiLangSpec.native})`;
                const levelSystemActive = isLevelSystemActive();
                const formatHistoryEntry = (e) => {
                    if (!e) return "";
                    if (typeof e === "string") return String(e || "").trim();
                    const sender = e.sender || "Unknown";
                    const t = String(e.text || "").trim();
                    if (!t) return "";
                    return `${sender}: ${t}`;
                };
                const findPlayerEntryIndex = () => {
                    const target = String(playerInput || "").trim();
                    if (!target) return -1;
                    for (let i = chatHistory.length - 1; i >= 0; i--) {
                        const e = chatHistory[i];
                        if (!e || typeof e === "string") continue;
                        const sender = String(e.sender || "");
                        if (sender === "Narrator" || sender === "System") continue;
                        if (String(e.text || "").trim() === target) return i;
                    }
                    return -1;
                };
                const playerIdx = findPlayerEntryIndex();
                const baseIdx = playerIdx >= 0 ? playerIdx : chatHistory.length;
                const prevTwoLines = [];
                for (let k = 2; k >= 1; k--) {
                    const line = formatHistoryEntry(chatHistory[baseIdx - k]);
                    if (line) prevTwoLines.push(line);
                }
                const prevTwoMessages = prevTwoLines.join("\n") || "(none)";
                
                // Build second-pass repair prompt
                const presentNpcInfo = presentNpcIds.map(id => {
                    const npc = cards.find(c => c.genre === "character" && c.id === id);
                    if (!npc) return null;
                    return `${npc.title} [ID: ${npc.id}]`;
                }).filter(Boolean).join(", ") || "None";
                
                const availableNpcInfo = (() => {
                    try {
                        const nearbyIds = Array.isArray(getNearbyNpcIdsFromWorld()) ? getNearbyNpcIdsFromWorld() : [];
                        const idSet = new Set([...(nearbyIds || []), ...(presentNpcIds || [])].filter(Boolean));
                        const items = [...idSet]
                            .map(id => {
                                const npc = cards.find(c => c.genre === "character" && c.id === id);
                                if (!npc) return null;
                                return `${npc.title} [ID: ${npc.id}]`;
                            })
                            .filter(Boolean);
                        return items.length ? items.join(", ") : "None";
                    } catch {
                        return "None";

            function findParentLocationOfCurrent() {
                if (!currentLocationId) return null;
                return findParentLocationById(currentLocationId, getCards());
            }

            function getSiblingLocations() {
                const parent = findParentLocationOfCurrent();
                if (!parent) return [];
                const cards = getCards();
                const siblings = [];
                // Get all sublocations from parent (all types)
                for (const key of Object.keys(parent.sublocations || {})) {
                    const arr = parent.sublocations[key];
                    if (Array.isArray(arr)) {
                        arr.forEach(id => {
                            if (id === currentLocationId) return; // Skip current
                            const loc = cards.find(c => c.id === id && c.genre === "location");
                            if (loc) siblings.push(loc);
                        });
                    }
                }
                return siblings.sort((a, b) => (a.title || "").localeCompare(b.title || ""));
            }

            function updateMoveButtonVisibility() {
                const btn = document.getElementById("move-btn");
                if (!btn) return;
                const siblings = getSiblingLocations();
                if (!siblings.length) {
                    btn.style.display = "none";
                    pendingMoveLocationId = null;
                    closeMoveDropdown();
                } else {
                    btn.style.display = "inline-flex";
                }

            function renderMoveDropdown() {

                if (!dropdown) return;
                dropdown.innerHTML = "";

                if (siblings.length === 0) {
                    const empty = document.createElement("div");
                    empty.className = "move-option empty";
                    empty.textContent = "No adjacent locations";
                    dropdown.appendChild(empty);
                } else {

                const dropdown = document.getElementById("travel-dropdown");
                const btn = document.getElementById("travel-btn");

                const isOpen = dropdown.classList.contains("show");
                if (isOpen) {

            function parseTravelTime(timeStr) {
                if (!timeStr) return { hours: 0, minutes: 0 };
                const hoursMatch = timeStr.match(/(\d+)\s*h/);
                const minsMatch = timeStr.match(/(\d+)\s*min/);
                const hours = hoursMatch ? parseInt(hoursMatch[1]) : 0;
                const minutes = minsMatch ? parseInt(minsMatch[1]) : 0;
                return { hours, minutes };
            }

            function addTravelTimeToGameTime(hours, minutes) {
                const totalMinutesToAdd = hours * 60 + minutes;
                if (totalMinutesToAdd <= 0) return;
                const newMinutes = gameMinutes + totalMinutesToAdd;
                gameMinutes = newMinutes;
                // Update time of day display
                updateTimeOfDayDisplay();
            }

            function selectTravelDestination(destinationId, transportBuildingId, travelTime, destinationName) {
                // Toggle selection
                if (pendingTravel && pendingTravel.destinationId === destinationId) {
                    pendingTravel = null;
                    showToast("Travel cancelled", "rgba(180, 60, 60, 0.85)");
                } else {
                    pendingTravel = { destinationId, transportBuildingId, travelTime };
                    pendingMoveLocationId = null; // Clear any pending move
                    const timeStr = travelTime ? ` (${travelTime})` : '';
                    showToast(`Will travel to ${destinationName || 'selected destination'}${timeStr} when you send a message`, "rgba(60, 140, 180, 0.85)");
                }
                renderTravelDropdown();
                closeTravelDropdown();
            }

            function executePendingTravel() {
                if (!pendingTravel) return false;
                const { destinationId, transportBuildingId, travelTime } = pendingTravel;
                const traveled = travelToDestinationNow(destinationId, transportBuildingId, travelTime);
                pendingTravel = null;
                return traveled;
            }

            function travelToDestination(destinationId, transportBuildingId, travelTime) {
                // This is now just for immediate travel if needed elsewhere
                return travelToDestinationNow(destinationId, transportBuildingId, travelTime);
            }

            function travelToDestinationNow(destinationId, transportBuildingId, travelTime) {
                closeTravelDropdown();
                if (!destinationId || destinationId === currentLocationId) return false;
                const cards = getCards();
                const loc = cards.find(c => c.id === destinationId && c.genre === "location");
                if (!loc) {
                    showToast("Destination not found.", "rgba(180, 60, 60, 0.85)");
                    return false;
                }
                // Parse and add travel time
                const { hours, minutes } = parseTravelTime(travelTime);
                if (hours > 0 || minutes > 0) {
                    addTravelTimeToGameTime(hours, minutes);
                }
                // If transport building is specified, navigate to that building first, then to parent location
                if (transportBuildingId) {
                    const building = cards.find(c => c.id === transportBuildingId);
                    if (building) {
                        // Navigate to the transport building (child location)
                        updateLocation(transportBuildingId);
                        if (activeChar) {
                            activeChar.currentLocationId = transportBuildingId;
                            if (!activeChar.discoveredLocations) activeChar.discoveredLocations = [];
                            if (!activeChar.discoveredLocations.includes(transportBuildingId)) {
                                activeChar.discoveredLocations.push(transportBuildingId);
                            }
                            // Also discover the parent location
                            if (!activeChar.discoveredLocations.includes(destinationId)) {
                                activeChar.discoveredLocations.push(destinationId);
                            }
                            saveStoryLog();
                        }
                        // Add system message
                        const buildingName = building.title || "Station";
                        const locationName = loc.title || "Unknown Location";
                        const timeInfo = hours > 0 || minutes > 0 ? ` (${hours > 0 ? hours + "h " : ""}${minutes > 0 ? minutes + "min" : ""})` : "";
                        addSystemDivider(`Traveled to: ${buildingName} (${locationName})${timeInfo}`);
                        showToast(`Arrived at ${buildingName}${timeInfo}`, "rgba(60, 140, 180, 0.85)");
                        return true;
                    }
                }
                // Fallback: Update to destination location (old behavior)
                updateLocation(destinationId);
                if (activeChar) {
                    activeChar.currentLocationId = destinationId;
                    if (!activeChar.discoveredLocations) activeChar.discoveredLocations = [];
                    if (!activeChar.discoveredLocations.includes(destinationId)) {
                        activeChar.discoveredLocations.push(destinationId);
                    }
                    saveStoryLog();
                }
                // Add system message
                const locationName = loc.title || "Unknown Location";
                const timeInfo = hours > 0 || minutes > 0 ? ` (${hours > 0 ? hours + "h " : ""}${minutes > 0 ? minutes + "min" : ""})` : "";
                addSystemDivider(`Traveled to: ${locationName}${timeInfo}`);
                showToast(`Traveled to ${locationName}${timeInfo}`, "rgba(60, 140, 180, 0.85)");
                return true;
            }

            /* ═══════════════════════════════════════
               LEVEL SYSTEM & XP
            ═══════════════════════════════════════ */
            function getSystemConfig() {
                const cards = getCards();
                const systemCard = cards.find(c => c.genre === "system");
                return systemCard?.systemConfig || null;
            }

            function isLevelSystemActive() {
                const config = getSystemConfig();
                return config && config.levelSystemEnabled;
            }

            function renderStatsLevel() {
                const section = document.getElementById("stats-level-section");
                if (!section) return;

                // Check if Level System is active
                if (!isLevelSystemActive()) {
                    section.style.display = "none";
                    return;
                }

                // Show section
                section.style.display = "flex";

                // Get player level data
                const levelData = activeChar?.levelData || { level: 1, xp: 0 };
                const config = getSystemConfig();

                // Calculate XP needed for current level
                const baseXP = config.expBase || 100;
                const increment = config.expIncrement || 100;
                const xpForCurrentLevel = baseXP + (increment * (levelData.level - 1));

                // Update display
                document.getElementById("stats-level").textContent = levelData.level;
                document.getElementById("stats-xp-current").textContent = levelData.xp;
                document.getElementById("stats-xp-needed").textContent = xpForCurrentLevel;

                // Update XP bar
                const percentage = Math.min(100, (levelData.xp / xpForCurrentLevel) * 100);
                document.getElementById("stats-xp-bar").style.width = percentage + "%";
            }

            function calculateXPForLevel(level, config) {
                const baseXP = config.expBase || 100;
                const increment = config.expIncrement || 100;
                return baseXP + (increment * (level - 1));
            }

            function addXP(targetId, amount) {
                const config = getSystemConfig();
                if (!config || !config.levelSystemEnabled) return;

                const cards = getCards();
                const target = cards.find(c => c.id === targetId && c.genre === "character");
                if (!target) return;

                // Initialize level data if not exists
                if (!target.levelData) {
                    target.levelData = { level: config.levelMin || 1, xp: 0 };
                }

                // Add XP
                target.levelData.xp += amount;

                // Check for level up
                const maxLevel = config.levelMax || 100;
                let leveledUp = false;

                while (target.levelData.level < maxLevel) {
                    const xpNeeded = calculateXPForLevel(target.levelData.level, config);
                    if (target.levelData.xp >= xpNeeded) {
                        target.levelData.xp -= xpNeeded;
                        target.levelData.level++;
                        leveledUp = true;
                    } else {
                        break;
                    }
                }

                // Save changes
                const idx = cards.findIndex(c => c.id === targetId);
                if (idx !== -1) {
                    cards[idx] = target;
                    Storage.set("storyki_world_cards", JSON.stringify(cards));
                }

                // Update display if it's the active character
                if (activeChar && activeChar.id === targetId) {
                    renderStatsLevel();
                }

                return { leveledUp, newLevel: target.levelData.level };
            }

            /* ═══════════════════════════════════════
               KILL COMMAND PROCESSING
            ═══════════════════════════════════════ */
            function processKillCommand(speciesId, recipientsStr) {
                const config = getSystemConfig();
                if (!config || !config.levelSystemEnabled) {
                    console.log("Level System not active, skipping XP distribution");
                    return;
                }

                const cards = getCards();

                // Find species and get XP reward
                const species = cards.find(c => c.id === speciesId && c.genre === "species");
                if (!species) {
                    console.warn("Species not found for XP distribution:", speciesId);
                    return;
                }

                const totalXP = species.xpReward || 0;
                if (totalXP <= 0) {
                    console.log("No XP reward for species:", speciesId);
                    return;
                }

                // Parse recipients
                const recipients = recipientsStr.split(/,\s*/).map(s => s.trim()).filter(Boolean);
                if (recipients.length === 0) {
                    console.log("No recipients for XP distribution");
                    return;
                }

                // Calculate XP per recipient
                const xpPerRecipient = Math.floor(totalXP / recipients.length);

                // Distribute XP
                recipients.forEach(recipient => {
                    if (recipient.toLowerCase() === "player") {
                        // Add XP to active character (player)
                        if (activeChar) {
                            const result = addXP(activeChar.id, xpPerRecipient);
                            if (result && result.leveledUp) {
                                showToast(`Level Up! You are now level ${result.newLevel}!`, "#ffd700");
                            }
                        }
                    } else {
                        // Add XP to NPC
                        const npc = cards.find(c => c.id === recipient && c.genre === "character");
                        if (npc) {
                            const result = addXP(npc.id, xpPerRecipient);
                            if (result && result.leveledUp) {
                                console.log(`NPC ${npc.firstName || npc.id} leveled up to ${result.newLevel}`);
                            }
                        } else {
                            console.warn("NPC not found for XP distribution:", recipient);
                        }
                    }
                });

                // Show toast with XP distribution info
                if (recipients.length === 1 && recipients[0].toLowerCase() === "player" && activeChar) {
                    showToast(`+${xpPerRecipient} XP gained!`, "#4a90e2");
                } else if (recipients.length > 1) {
                    showToast(`+${xpPerRecipient} XP distributed to ${recipients.length} targets!`, "#4a90e2");
                }
            }

            /* ═══════════════════════════════════════
               INIT
            ═══════════════════════════════════════ */
            window.addEventListener("load", () => {
                applyHardcoreModeUI();
                loadBackground();
                let _bgIntervalId = setInterval(loadBackground, 5000);
                document.addEventListener("visibilitychange", () => {
                    if (document.hidden) {
                        if (_bgIntervalId) {
                            clearInterval(_bgIntervalId);
                            _bgIntervalId = null;
                        }
                    } else {
                        loadBackground();
                        if (!_bgIntervalId) {
                            _bgIntervalId = setInterval(loadBackground, 5000);
                        }
                    }
                });

                const params = new URLSearchParams(window.location.search);
                const isContinue = params.get("mode") === "continue";

                const char = loadLatestCharacter();
                if (char) {
                    // Load story log FIRST so loadFamilyBornData can check for existing progress
                    loadStoryLog();
                    // Load Family Born data if available
                    loadFamilyBornData(char);
                    applyCharacter(char);
                    
                    clearExpiredLocationEvents();
                    try { recalcEventOverrides(); updatePresentNPCs(); } catch(e) { console.warn("recalcEventOverrides failed", e); }
                    // Restore any pending message from previous session
                    restorePendingInput();
                    // Restore relations UI preferences
                    restoreRelationsFilter();
                    restoreRelationsLayout();
                    // Ensure initial age baselines are set
                    try {
                        const d0 = (char && char.startingDate) ? char.startingDate : null;
                        if (d0) updateNPCBirthdays(d0);
                    } catch {}
                    // Overlay ausblenden, wenn bereits Nachrichten existieren
                    if (Array.isArray(chatHistory) && chatHistory.length > 0) {
                        const ov = document.getElementById("welcome-overlay");
                        if (ov) ov.style.display = "none";
                    }
                    if (isContinue) {
                        const ov = document.getElementById("welcome-overlay");
                        ov.style.display = "none";
                    }
                } else {
                    // Fallback: create a default playable character from world cards
                    try {
                        const cards = getCards();
                        const playable = cards.find(c => c.genre === "character" && c.isPlayable === true) || cards.find(c => c.genre === "character");
                        if (playable) {
                            const title = (playable.title || "Unknown").trim();
                            const parts = title.split(/\s+/);
                            const firstName = parts[0] || "Unknown";
                            const lastName = parts.slice(1).join(" ");
                            // Determine initial location
                            let spawnLoc = cards.find(c => c.genre === "location" && Array.isArray(c.residents) && c.residents.includes(playable.id) && c.canBeSpawn);
                            if (!spawnLoc) spawnLoc = cards.find(c => c.genre === "location" && Array.isArray(c.residents) && c.residents.includes(playable.id));
                            if (!spawnLoc) spawnLoc = cards.find(c => c.genre === "location" && c.canBeSpawn);
                            if (!spawnLoc) spawnLoc = cards.find(c => c.genre === "location");
                            const earliest = (() => {
                                let e = null;
                                cards.filter(c => c.genre === "location").forEach(loc => {
                                    const ev = loc.events || {};
                                    ["custom"].forEach(k => {
                                        (Array.isArray(ev[k]) ? ev[k] : []).forEach(v => {
                                            if (!v || v.type === "secret") return;
                                            const key = `${String(v.year||0).padStart(4,"0")}-${String(v.month||0).padStart(2,"0")}-${String(v.day||0).padStart(2,"0")} ${v.time||"00:00"}`;
                                            if (!e || key < e.key) e = { key, day: v.day||1, month: v.month||1, year: v.year||1983, time: v.time||"00:00" };
                                        });
                                    });
                                });
                                return e;
                            })();
                            const d = earliest ? { day: earliest.day, month: earliest.month, year: earliest.year, time: earliest.time } : { day: 1, month: 1, year: 1983, time: "00:00" };
                            const chObj = {
                                id: playable.id,
                                genre: "character",
                                firstName: playable.firstName || firstName,
                                lastName: playable.lastName || lastName,
                                title: playable.title || title,
                                raceId: playable.raceId || null,
                                raceName: playable.raceName || "Unknown Race",
                                gender: playable.gender || "",
                                age: playable.age || 0,
                                birthdate: readBirthdate(playable),
                                appearance: playable.appearance || "",
                                relations: JSON.parse(JSON.stringify(playable.relations || [])),
                                skills: JSON.parse(JSON.stringify(playable.skills || [])),
                                status: playable.status || "Alive",
                                isPlayable: true,
                                spawnId: spawnLoc ? spawnLoc.id : "",
                                currentLocationId: spawnLoc ? spawnLoc.id : "",
                                startingDate: d,
                                createdAt: Date.now(),
                                updatedAt: Date.now()
                            };
                            const arr = JSON.parse(Storage.get(CHARS_KEY) || "[]");
                            arr.push(chObj);
                            Storage.set(CHARS_KEY, JSON.stringify(arr));
                            applyCharacter(chObj);
                            loadStoryLog();
                        }
                    } catch (e) {
                        console.error("Failed to create default character from world", e);
                    }
                }

                ensureStoryRecord();
                autoSaveStory();

                // Stats panel close on outside click
                const statsOverlay = document.getElementById("stats-panel-overlay");
                if (statsOverlay) {
                    statsOverlay.addEventListener("click", (e) => {
                        if (e.target.id === "stats-panel-overlay") {
                            closeStatsPanel();
                        }
                    });
                }

                setTimeout(() => {
                    document.body.style.opacity = "1";
                }, 100);
            });
            window.addEventListener("beforeunload", () => {
                autoSaveStory();
            });
        </script>
    </body>
</html>
