            // Visited Locations Tracking
            function getVisitedLocations() {
                try {
                    return JSON.parse(localStorage.getItem("visitedLocations") || "[]");
                } catch {
                    return [];
                }
            }

            function trackVisitedLocation(locId) {
                if (!locId) return;
                const visited = new Set(getVisitedLocations());
                visited.add(locId);
                localStorage.setItem("visitedLocations", JSON.stringify([...visited]));
            }

            function isLocationVisited(locId) {
                return getVisitedLocations().includes(locId);
            }

            function findParentLocationById(locId, cards) {
                if (!locId) return null;
                const arr = Array.isArray(cards) ? cards : getCards();
                for (const card of arr) {
                    if (!card || card.genre !== "location" || !card.sublocations) continue;
                    for (const key of Object.keys(card.sublocations)) {
                        const ids = card.sublocations[key];
                        if (Array.isArray(ids) && ids.includes(locId)) return card;
                    }
                }
                return null;
            }

            function getSublocationIdsFromLoc(loc) {
                const ids = [];
                if (!loc || !loc.sublocations) return ids;
                Object.values(loc.sublocations).forEach((arr) => {
                    if (Array.isArray(arr)) arr.forEach((id) => ids.push(id));
                });
                return ids;
            }

            function formatLocationPromptEntry(loc) {
                if (!loc) return "";
                const name = loc.title || "Unnamed";
                const id = loc.id || "";
                const desc = String(loc.description || "").trim();
                let line = `- Name: ${name}\n  ID: ${id}`;
                if (desc) line += `\n  Description: ${desc}`;
                return line;
            }

            function getLocationsMatchedByPlayerTags(playerText, cards) {
                if (!playerText) return [];
                const text = _normalizeText(playerText);
                const words = text.split(/\s+/).filter((w) => w.length >= 2);
                if (!words.length) return [];

                const arr = Array.isArray(cards) ? cards : getCards();
                const matched = [];
                const seen = new Set();

                const taggableLocs = arr.filter((c) => {
                    if (!c || c.genre !== "location") return false;
                    const sub = String(c.locationSub || c.locationSubType || "").toLowerCase();
                    if (sub !== "building" && sub !== "custom") return false;
                    return Array.isArray(c.tags) && c.tags.length > 0;
                });

                for (const loc of taggableLocs) {
                    const cardTags = (loc.tags || []).map((t) => _normalizeText(t)).filter(Boolean);
                    let hit = false;
                    for (const tag of cardTags) {
                        if (tag.length < 2) continue;
                        for (const w of words) {
                            if (w.includes(tag) || tag.includes(w)) {
                                hit = true;
                                break;
                            }
                        }
                        if (hit) break;
                    }
                    if (hit && loc.id && !seen.has(loc.id)) {
                        seen.add(loc.id);
                        matched.push(loc);
                    }
                }
                return matched;
            }

            function buildSmartLocationContext(playerInput = null) {
                try {
                    const cards = getCards();
                    const locations = cards.filter((c) => c.genre === "location");
                    if (!currentLocationId || locations.length === 0) return "";

                    const current = locations.find((l) => l.id === currentLocationId);
                    if (!current) return "";

                    const included = new Set();
                    const sections = [];

                    const pushSection = (title, locs) => {
                        const items = (locs || []).filter((l) => l && l.id && !included.has(l.id));
                        if (!items.length) return;
                        sections.push(`## ${title}`);
                        items.forEach((loc) => {
                            included.add(loc.id);
                            sections.push(formatLocationPromptEntry(loc));
                        });
                        sections.push("");
                    };

                    const parent = findParentLocationById(currentLocationId, cards);
                    const grandparent = parent ? findParentLocationById(parent.id, cards) : null;

                    pushSection("CURRENT LOCATION", [current]);
                    if (parent) pushSection("PARENT LOCATION", [parent]);
                    if (grandparent) pushSection("PARENT REGION", [grandparent]);

                    if (parent) {
                        const siblingIds = getSublocationIdsFromLoc(parent).filter((id) => id !== currentLocationId);
                        const siblings = siblingIds
                            .map((id) => locations.find((l) => l.id === id))
                            .filter(Boolean);
                        pushSection("SIBLING LOCATIONS", siblings);
                    }

                    const childIds = getSublocationIdsFromLoc(current);
                    const children = childIds
                        .map((id) => locations.find((l) => l.id === id))
                        .filter(Boolean);
                    pushSection("SUBLOCATIONS", children);

                    const tagMatched = getLocationsMatchedByPlayerTags(playerInput, cards);
                    pushSection("MENTIONED LOCATIONS (Tag match)", tagMatched);

                    if (!sections.length) return "";
                    return "\n# WORLD LOCATIONS\n" + sections.join("\n");
                } catch (e) {
                    console.error("Smart location context error", e);
                    return "";
                }
            }

            function buildLocationHierarchy() {
                try {
                    const cards = getCards();
                    const locations = cards.filter((c) => c.genre === "location");
                    const characters = cards.filter(
                        (c) => c.genre === "character",
                    );

                    const childrenMap = new Map();
                    const allSubIds = new Set();

                    locations.forEach((loc) => {
                        const subIds = [];
                        if (loc.sublocations) {
                            Object.values(loc.sublocations).forEach((arr) => {
                                if (Array.isArray(arr)) {
                                    arr.forEach((id) => {
                                        subIds.push(id);
                                        allSubIds.add(id);
                                    });
                                }
                            });
                        }
                        childrenMap.set(loc.id, subIds);
                    });

                    const roots = locations.filter(
                        (loc) => !allSubIds.has(loc.id),
                    );

                    function renderNode(id, depth = 0) {
                        const loc = locations.find((l) => l.id === id);
                        if (!loc) return "";

                        let indent = "  ".repeat(depth);
                        const isVisible = isLocationVisible(id);

                        if (!isVisible) {
                            // Not visible: only name and ID
                            return `${indent}- ${loc.title} [ID: ${loc.id}]\n`;
                        }

                        // Visible: full details
                        let type = (
                            loc.locationDetail ||
                            loc.locationSub ||
                            "Location"
                        ).toUpperCase();
                        let str = `${indent}- ${loc.title} (${type})`;
                        if (loc.description) str += `: ${loc.description}`;
                        str += "\n";
                        if (loc.lore) str += `${indent}  Lore: ${loc.lore}\n`;

                        // Residents
                        if (loc.residents && loc.residents.length > 0) {
                            loc.residents.forEach((resId) => {
                                const char = characters.find(
                                    (c) => c.id === resId,
                                );
                                if (char) {
                                    const isDead = (char.status || "Alive") === "Dead";
                                    const label = isDead ? "Dead Resident" : "Resident";
                                    str += `${indent}  * ${label}: ${char.title} (${char.raceName || "Character"})\n`;
                                }
                            });
                        }
                        
                        // School-specific data
                        if (
                            (loc.locationSub === "building" ||
                                loc.locationSub === "BUILDING") &&
                            (loc.locationDetail === "school" ||
                                loc.locationDetail === "SCHOOL")
                        ) {
                            if (loc.schoolSchedule) {
                                const d = loc.schoolSchedule.days || [];
                                const labels = ["Mo","Di","Mi","Do","Fr","Sa","So"];
                                const openDays = labels
                                    .map((lbl, i) => (d[i] ? lbl : null))
                                    .filter(Boolean)
                                    .join(", ");
                                const start = loc.schoolSchedule.start || "08:00";
                                const end = loc.schoolSchedule.end || "16:00";
                                str += `${indent}  School Schedule: ${openDays || "—"} | ${start} - ${end}\n`;
                            }
                            if (Array.isArray(loc.schoolClasses) && loc.schoolClasses.length > 0) {
                                str += `${indent}  Classes:\n`;
                                loc.schoolClasses.forEach((cls, idx) => {
                                    const t = characters.find(c => c.id === cls.teacherId);
                                    const tName = t ? t.title : (cls.teacherId ? "(Unknown)" : "—");
                                    const studs = (cls.studentIds || [])
                                        .map(id => {
                                            const ch = characters.find(c => c.id === id);
                                            return ch ? ch.title : "(Unknown)";
                                        })
                                        .join(", ");
                                    str += `${indent}    - ${cls.name || "Class "+(idx+1)} | Teacher: ${tName} | Students: ${studs || "—"}\n`;
                                });
                            }
                        }

                        const children = childrenMap.get(id) || [];
                        children.forEach((childId) => {
                            str += renderNode(childId, depth + 1);
                        });

                        return str;
                    }

                    let result = "\nWORLD LOCATIONS HIERARCHY:\n";
                    if (roots.length === 0 && locations.length > 0) {
                        locations.forEach((l) => {
                            result += renderNode(l.id);
                        });
                    } else {
                        roots.forEach((root) => {
                            result += renderNode(root.id);
                        });
                    }

                    return result;
                } catch (e) {
                    console.error("Hierarchy error", e);
                    return "\nWorld Hierarchy: (Error loading)";
                }
            }

            // NPC Mention Tracking for continuity
            let _mentionedNpcIds = new Set();
            function trackMentionedNpc(npcId) {
                if (!npcId) return;
                _mentionedNpcIds.add(npcId);
                // Keep only last 5 mentioned NPCs to avoid bloat
                if (_mentionedNpcIds.size > 5) {
                    const arr = [..._mentionedNpcIds];
                    _mentionedNpcIds = new Set(arr.slice(-5));
                }
            }

            function extractAndTrackMentionedNpcs(text) {
                if (!text) return;
                const cards = getCards();
                const characters = cards.filter(c => c.genre === "character");
                
                characters.forEach(char => {
                    const name = char.title;
                    if (!name) return;
                    
                    // Simple name matching (case insensitive, word boundaries)
                    const regex = new RegExp(`\\b${name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\b`, 'i');
                    if (regex.test(text)) {
                        trackMentionedNpc(char.id);
                    }
                });
            }

            let _lastActiveNpcMemorySelection = null;

            function _normalizeMemoryKey(text) {
                return String(text || "").trim().toLowerCase().replace(/\s+/g, " ");
            }

            function getActiveNpcMemorySelectionKey(playerText, activeNpcIds) {
                const normText = _normalizeMemoryKey(playerText);
                const sortedIds = Array.isArray(activeNpcIds) ? [...activeNpcIds].sort().join(",") : "";
                return `${normText}||${sortedIds}`;
            }

            function buildSmartCharacterContext(playerInput = null, relevantMemoriesMap = new Map()) {
                try {
                    const cards = getCards();
                    if (!currentLocationId) return "";

                    const presentIds = getPresentNpcIds();
                    const presentSet = new Set(presentIds);
                    const nearbyIds = getNearbyNpcIdsFromWorld();
                    const nearbySet = new Set(nearbyIds);

                    const presentNPCs = presentIds
                        .map((id) => cards.find((c) => c && c.genre === "character" && c.id === id))
                        .filter((c) => c && (c.status || "Alive") !== "Dead");

                    const nearbyNPCs = nearbyIds
                        .filter((id) => !presentSet.has(id))
                        .map((id) => cards.find((c) => c && c.genre === "character" && c.id === id))
                        .filter((c) => c && (c.status || "Alive") !== "Dead");

                    const contextLines = [];
                    contextLines.push("\n# CHARACTERS\n");

                    if (presentNPCs.length > 0) {
                        contextLines.push("## PRESENT NPCs (Active in the scene)\n");
                        presentNPCs.forEach((c) => {
                            const age = parseInt(c.age, 10);
                            const bd = readBirthdate(c);
                            const secrets = readSecrets(c);
                            const knownSecrets = readKnownSecrets(c);

                            const short = (s, max) => {
                                const t = String(s || "").replace(/\s+/g, " ").trim();
                                return t.length > max ? t.slice(0, max - 1) + "…" : t;
                            };

                if (sub === "forest") return "forest";

            function buildEventsContext() {
                try {
                    const cards = getCards();
                    if (!currentLocationId) return "";
                    const d = activeChar?.startingDate || {};
                    const curDate = `${String(d.day || 1).padStart(2,"0")}.${String(d.month || 1).padStart(2,"0")}.${d.year || 1983}`;
                    const curTime = d.time || "00:00";
                    const scheduled = (() => {
                        try {
                            const list = _getActiveScheduledEventsForCurrent();
                            if (!list.length) return [];
                            const nowCount = _worldDayCount(activeChar.startingDate);
                            return list.map(e => {
                                const dateStr = String(e.displayDate || _fmtDMY(e.day, e.month, e.year)).trim();
                                const daysLeft = (parseInt(e.dayCount, 10) || 0) - nowCount;
                                const rel = daysLeft === 0 ? "TODAY" : (daysLeft === 1 ? "TOMORROW" : (daysLeft > 1 ? `IN ${daysLeft} DAYS` : "PAST"));
                                return `  * [SCHEDULED | ${rel}] ${dateStr} — ${String(e.text || "").trim()}`;
                            });
                        } catch {
                            return [];
                        }
                    })();
                    // Find ancestors of current location
                    const ancestors = [];
                    let current = cards.find(c => c.id === currentLocationId);
                    if (!current) return "";
                    while (current) {
                        ancestors.push(current);
                        const parent = cards.find((c) => {
                            if (c.genre !== "location" || !c.sublocations) return false;
                            return Object.values(c.sublocations).some((arr) => (arr || []).includes(current.id));
                        });
                        current = parent;
                    }
                    const contextLines = [];
                    if (scheduled.length) {
                        contextLines.push("\nSCHEDULED EVENTS (Persistent; hidden after the date passes, returns if time is set back):");
                        contextLines.push(...scheduled);
                    }
                    contextLines.push("\nLOCATION EVENTS (Current area and parent regions):");
                    const nowDay = _nowDayKey();
                    ancestors.forEach(loc => {
                        if (loc.genre !== "location" || loc.locationSub !== "custom") return;
                        const ev = loc.events || null;
                        if (!ev) return;
                        const lists = [];
                        if (Array.isArray(ev["custom"])) lists.push(...ev["custom"].map(e => ({...e, _loc: loc.title})));
                        const normalized = lists
                            .filter(e => e && e.day != null && e.month != null && e.year != null)
                            .sort((a, b) => _eventTimeKey(a) - _eventTimeKey(b));
                        if (normalized.length === 0) return;
                        contextLines.push(`- ${loc.title}:`);
                        normalized.forEach(e => {
                            const type = (e.type === "secret") ? "SECRET EVENT" : "PUBLIC EVENT";
                            const eventDay = _eventDayKey(e);
                            const deltaDays = eventDay - nowDay;
                            let phase = "PAST";
                            if (deltaDays > 0) phase = "UPCOMING";
                            else if (deltaDays === 0) phase = "TODAY";
                            const dateStr = `${String(e.day||0).toString().padStart(2,"0")}.${String(e.month||0).toString().padStart(2,"0")}.${e.year||0}`;
                            const timeStr = e.time || "00:00";
                            let relativeBadge = "";
                            if (deltaDays === 0) relativeBadge = " (TODAY)";
                            else if (deltaDays === 1) relativeBadge = " (TOMORROW)";
                            else if (deltaDays > 1) relativeBadge = ` (IN ${deltaDays} DAYS)`;
                            else if (deltaDays === -1) relativeBadge = " (YESTERDAY)";
                            else relativeBadge = ` (${Math.abs(deltaDays)} DAYS AGO)`;
                            const desc = e.description || "";
                            contextLines.push(`  * [${type} | ${phase}] ${dateStr} ${timeStr}${relativeBadge} — ${desc}`);
                        });
                    });
                    if (contextLines.length <= (scheduled.length ? 2 : 1)) return "";
                    contextLines.push(`Current date reference: ${curDate} ${curTime}`);
                    contextLines.push("Future PUBLIC events are fixed calendar facts. Do not move them earlier or later.");
                    contextLines.push("Secret events are unknown to NPCs; use them only as hidden world triggers.");
                    return contextLines.join("\n") + "\n";
                } catch (e) {
                    console.error("Events context error", e);
                    return "";
                }
            }

            // Helpers for school schedules
            function _timeToMinutes(t) {
                if (!t || typeof t !== "string") return 0;
                const parts = t.split(":").map((x) => parseInt(x, 10));
                return (parts[0] || 0) * 60 + (parts[1] || 0);
            }
            function _eventTimeKey(e) {
                const dd = _worldDayCount({ day: e.day || 1, month: e.month || 1, year: e.year || 1983 });
                const mm = _timeToMinutes(e.time || "00:00");
                return dd * 1440 + mm;
            }
            function _eventDayKey(e) {
                return _worldDayCount({ day: e.day || 1, month: e.month || 1, year: e.year || 1983 });
            }
            function _nowTimeKey() {
                const d = activeChar?.startingDate || {};
                const dd = _worldDayCount(d);
                const mm = _timeToMinutes(d.time || "00:00");
                return dd * 1440 + mm;
            }
            function _nowDayKey() {
                const d = activeChar?.startingDate || {};
                return _worldDayCount(d);
            }
            function _getAncestorsForCurrent() {
                const cards = getCards();
                const ancestors = [];
                if (!currentLocationId) return ancestors;
                let current = cards.find(c => c.id === currentLocationId);
                while (current) {
                    ancestors.push(current);
                    const parent = cards.find((c) => {
                        if (c.genre !== "location" || !c.sublocations) return false;
                        return Object.values(c.sublocations).some((arr) => (arr || []).includes(current.id));
                    });
                    current = parent;
                }
                return ancestors;
            }

            function isLocationMemoryTargetCard(loc) {
                if (!loc || loc.genre !== "location") return false;
                const sub = String(loc.locationSub || "").toLowerCase();
                return sub === "custom" || sub === "building";
            }

            function resolveLocationMemoryTargetFromRef(ref, cards) {
                try {
                    const raw = String(ref || "").trim();
                    if (!raw) return "";
                    const arr = Array.isArray(cards) ? cards : getCards();
                    const locs = arr.filter((c) => c && c.genre === "location" && c.id && isLocationMemoryTargetCard(c));
                    if (locs.some((c) => c.id === raw)) return raw;
                    const norm = (s) => String(s || "")
                        .toLowerCase()
                        .replace(/[“”„"]/g, "")
                        .replace(/\s+/g, " ")
                        .trim();
                    const r = norm(raw);
                    if (!r) return "";
                    const exact = locs.find((c) => norm(c.title) === r);
                    return exact ? exact.id : "";
                } catch {
                    return "";
                }
            }

            function getCustomBuildingLocationLinesForPrompt() {
                try {
                    const cards = getCards();
                    if (!currentLocationId) return [];
                    const byId = new Map();
                    _getAncestorsForCurrent().forEach((loc) => {
                        if (isLocationMemoryTargetCard(loc)) byId.set(loc.id, loc);
                    });
                    const cur = cards.find((c) => c.id === currentLocationId && c.genre === "location");
                    if (cur && isLocationMemoryTargetCard(cur)) byId.set(cur.id, cur);
                    if (cur && cur.sublocations) {
                        Object.values(cur.sublocations).forEach((arr) => {
                            (Array.isArray(arr) ? arr : []).forEach((cid) => {
                                const ch = cards.find((c) => c.id === cid && c.genre === "location");
                                if (ch && isLocationMemoryTargetCard(ch)) byId.set(ch.id, ch);

            function getRecentWorldMemoriesSnapshotLines(limit = 15) {
                try {
                    const cards = getCards();
                    const lim = Math.max(1, Math.min(50, parseInt(limit, 10) || 15));
                    const rows = [];
                    cards.forEach((c) => {
                        if (!c || !c.id) return;
                        if (c.genre === "character") {
                            const name = String(c.title || c.firstName || c.id || "").trim() || c.id;
                            (Array.isArray(c.memories) ? c.memories : []).forEach((m) => {
                                if (!m || typeof m !== "object") return;
                                const text = String(m.text || "").trim();
                                if (!text) return;
                                const date = String(m.date || "").trim() || "?";
                                const time = String(m.time || "00:00").trim() || "00:00";
                                const logTs = Number(m.logTs) || 0;
                                const dc = parseInt(m.dayCount, 10);
                                rows.push({
                                    logTs,
                                    dayCount: Number.isFinite(dc) ? dc : null,
                                    date,
                                    time,
                                    text,
                                    id: c.id,
                                    name,
                                    entity: "NPC",
                                });
                            });
                        } else if (c.genre === "location" && isLocationMemoryTargetCard(c)) {
                            const name = String(c.title || c.id || "").trim() || c.id;
                            (Array.isArray(c.memories) ? c.memories : []).forEach((m) => {
                                if (!m || typeof m !== "object") return;
                                const text = String(m.text || "").trim();
                                if (!text) return;
                                const date = String(m.date || "").trim() || "?";
                                const time = String(m.time || "00:00").trim() || "00:00";
                                const logTs = Number(m.logTs) || 0;
                                const dc = parseInt(m.dayCount, 10);
                                rows.push({
                                    logTs,
                                    dayCount: Number.isFinite(dc) ? dc : null,
                                    date,
                                    time,
                                    text,
                                    id: c.id,
                                    name,
                                    entity: "Location",
                                });
                            });
                        }
                    });
                    const sortKey = (r) => {
                        if (r.logTs > 0) return r.logTs;
                        let dc = r.dayCount;
                        if (!Number.isFinite(dc)) {
                            const parts = String(r.date || "").split(".");
                            if (parts.length >= 3) {
                                dc = _worldDayCount({
                                    day: parseInt(parts[0], 10) || 1,
                                    month: parseInt(parts[1], 10) || 1,
                                    year: parseInt(parts[2], 10) || 1983,
                                });
                            } else {
                                dc = 0;
                            }
                        }
                        return dc * 1440 + _timeToMinutes(r.time);
                    };
                    rows.sort((a, b) => sortKey(b) - sortKey(a));
                    const top = rows.slice(0, lim);
                    if (!top.length) return { block: "(no saved memories yet in world cards)", lines: [] };
                    const lines = top.map((r, i) => {
                        const txt = String(r.text || "").replace(/\s+/g, " ").trim();
                        return `${i + 1}) Name: ${r.name} | Entity: ${r.entity} | ID: ${r.id} | Date: ${r.date} | Time: ${r.time} | Text: ${txt}`;
                    });
                    return { block: lines.join("\n"), lines: top };
                } catch (e) {
                    console.warn("getRecentWorldMemoriesSnapshotLines failed", e);
                    return { block: "(error loading memory snapshot)", lines: [] };
                }
            }

            function _applyEventOverrideToCard(card, changes, snapshot) {
                if (!card || !changes) return;
                if (!snapshot[card.id]) snapshot[card.id] = {};
                const snap = snapshot[card.id];
                const setOnce = (key, val) => {
                    if (!(key in snap)) snap[key] = (card[key] !== undefined ? JSON.parse(JSON.stringify(card[key])) : undefined);
                    card[key] = val;
                };
                if (typeof changes.cardDescription === "string" && changes.cardDescription.trim()) {
                    setOnce("description", changes.cardDescription.trim());
                }
                if (Array.isArray(changes.residents)) {
                    setOnce("residents", changes.residents.slice());
                }
                // population removed
                if (changes.sublocations && typeof changes.sublocations === "object") {
                    const cur = Object.assign({}, card.sublocations || {});
                    Object.keys(changes.sublocations).forEach(k => { cur[k] = changes.sublocations[k].slice(); });
                    setOnce("sublocations", cur);
                }
                if (changes.species && typeof changes.species === "object") {
                    const cur = Object.assign({}, card.species || {});
                    Object.keys(changes.species).forEach(k => { cur[k] = changes.species[k].slice(); });
                    setOnce("species", cur);
                }
                // racial civilization removed
                if (Array.isArray(changes.curseTags)) {
                    setOnce("curseTags", changes.curseTags.map(c => ({ ...c })));
                }
            }
            function recalcEventOverrides() {
                try {
                    const cards = getCards();
                    if (!Array.isArray(cards) || !activeChar) return;
                    const nowDay = _nowDayKey();
                    if (!window._eventOverrideSnapshot) window._eventOverrideSnapshot = {};
                    if (!window._eventAppliedIds) window._eventAppliedIds = new Set();
                    if (window._eventAppliedIds.size > 0) {
                        let changed = false;
                        window._eventAppliedIds.forEach(id => {
                            const card = cards.find(c => c.id === id);
                            const snapAll = window._eventOverrideSnapshot[id] || null;
                            if (card && snapAll) {
                                Object.keys(snapAll).forEach(k => { card[k] = snapAll[k]; });
                                changed = true;
                            }
                        });
                        if (changed) sessionStorage.setItem(CARDS_KEY, JSON.stringify(cards));
                        window._eventAppliedIds.clear();
                        window._eventOverrideSnapshot = {};
                    }
                    const ancestors = _getAncestorsForCurrent().filter(c => c.genre === "location" && c.locationSub === "custom");
                    if (ancestors.length === 0) return;
                    const applicable = [];
                    ancestors.forEach(loc => {
                        const ev = loc.events || {};
                        const all = []
                            .concat(Array.isArray(ev["custom"]) ? ev["custom"] : []);
                        const eligible = all.filter(e => e && e.day != null && e.month != null && e.year != null && e.changes);
                        if (eligible.length === 0) return;
                        const latest = eligible
                            .filter(e => _eventDayKey(e) <= nowDay)
                            .sort((a,b) => _eventDayKey(a) - _eventDayKey(b))
                            .slice(-1)[0];
                        if (latest && latest.changes) {
                            applicable.push({ locId: loc.id, changes: latest.changes });
                        }
                    });
                    if (applicable.length === 0) return;
                    const snapshot = {};
                    applicable.reverse().forEach(({ locId, changes }) => {
                        const card = cards.find(c => c.id === locId);
                        if (!card) return;
                        _applyEventOverrideToCard(card, changes, snapshot);
                        window._eventAppliedIds.add(locId);
                    });
                    Object.keys(snapshot).forEach(id => { window._eventOverrideSnapshot[id] = snapshot[id]; });
                    sessionStorage.setItem(CARDS_KEY, JSON.stringify(cards));
                } catch (e) {
                    console.error("recalcEventOverrides error", e);
                }
            }
            function _weekdayMon0(day, month, year) {
                // JS: 0=Sun..6=Sat -> convert to Mon=0..Sun=6
                const js = new Date((year || 1983), (month || 1) - 1, (day || 1));
                const dow = js.getDay(); // 0..6
                return (dow + 6) % 7;
            }
            function _weekdayNameEn(day, month, year) {
                const names = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
                const idx = _weekdayMon0(day, month, year);
                return names[idx] || "Monday";
            }
            function computeSchoolPresenceAtMinute(nowMin) {
                try {
                    const cards = getCards();
                    const d = activeChar?.startingDate || {};
                    const wday = _weekdayMon0(d.day, d.month, d.year);
                    const schools = cards.filter(
                        (c) =>
                            c.genre === "location" &&
                            c.locationSub === "building" &&
                            (c.locationDetail || "").toLowerCase() === "school",
                    );
                    const characters = cards.filter((c) => c.genre === "character");
                    const byNpc = new Map(); // npcId -> { schoolId, schoolTitle, className, schoolStartMin, schoolEndMin }
                    let context = "\nSCHEDULED NPC PRESENCE (Current time):\n";
                    schools.forEach((school) => {
                        const sched = school.schoolSchedule || null;
                        let isOpen = false;
                        let startMin = 0;
                        let endMin = 0;
                        if (sched && Array.isArray(sched.days)) {
                            startMin = _timeToMinutes(sched.start || "08:00");
                            endMin = _timeToMinutes(sched.end || "16:00");
                            isOpen = !!sched.days[wday] && nowMin >= startMin && nowMin < endMin;
                        }
                        if (!isOpen) return;
                        const classes = Array.isArray(school.schoolClasses)
                            ? school.schoolClasses
                            : [];
                        if (classes.length === 0) return;
                        context += `- ${school.title}: OPEN. Classes running now.\n`;
                        classes.forEach((cls, idx) => {
                            const t = characters.find((c) => c.id === cls.teacherId && (c.status || "Alive") !== "Dead");
                            const tName = t ? t.title : (cls.teacherId ? "(Unknown)" : "—");
                            const studs = (cls.studentIds || [])
                                .map((id) => {
                                    const ch = characters.find((c) => c.id === id && (c.status || "Alive") !== "Dead");
                                    return ch ? ch.title : null;
                                })
                                .filter(Boolean)
                                .join(", ");
                            context += `  * ${cls.name || "Class " + (idx + 1)} | Teacher: ${tName} | Students: ${studs || "—"}\n`;
                            if (t && cls.teacherId) {
                                byNpc.set(cls.teacherId, {
                                    schoolId: school.id,
                                    schoolTitle: school.title,
                                    className: cls.name || "",
                                    schoolStartMin: startMin,
                                    schoolEndMin: endMin,
                                });
                            }
                            (cls.studentIds || []).forEach((sid) => {
                                const ch = characters.find((c) => c.id === sid && (c.status || "Alive") !== "Dead");
                                if (ch) {
                                    byNpc.set(sid, {
                                        schoolId: school.id,
                                        schoolTitle: school.title,
                                        className: cls.name || "",
                                        schoolStartMin: startMin,
                                        schoolEndMin: endMin,
                                    });
                                }
                            });
                        });
                    });
                    if (byNpc.size === 0) context += "  (No classes in session)\n";
                    return { byNpc, context };
                } catch (e) {
                    console.error("schedule compute error", e);
                    return { byNpc: new Map(), context: "" };
                }
            }

            function computeSchoolPresenceNow() {
                const d = activeChar?.startingDate || {};
                const nowMin = _timeToMinutes(d.time || "00:00");

                        workers.forEach(w => {

            function getCurrentLocationPath() {
                if (!currentLocationId) return "Unknown Location";
                try {
                    const cards = getCards();
                    const currentLoc = cards.find((c) => c.id === currentLocationId);
                    if (!currentLoc) return "Unknown Location";

                    const path = [];
                    let current = currentLoc;

                    while (current) {
                        path.unshift(current.title);
                        // find parent
                        const parent = cards.find((c) => {
                            if (c.genre !== "location" || !c.sublocations)
                                return false;
                            return Object.values(c.sublocations).some((arr) =>
                                (arr || []).includes(current.id),
                            );
                        });
                        current = parent;
                    }

                    return path.join(" > ");
                } catch (e) {
                    console.error("Path error", e);
                    return "Unknown Location";
                }
            }

            function updateLocation(nameOrId) {
                if (!nameOrId) return;
                // Strip surrounding quotes if present
                nameOrId = nameOrId.replace(/^["']|["']$/g, "").trim();
                const prevLocationId = currentLocationId;
                const cards = getCards();
                let card = null;

                // 1. Try exact ID
                card = cards.find((c) => c.genre === "location" && c.id === nameOrId);
                
                // 2. Try exact title
                if (!card) {
                    const search = nameOrId.toLowerCase().trim();
                    card = cards.find((c) => c.genre === "location" && (c.title || "").toLowerCase() === search);
                }

                // 3. Try to handle "Region (Outside)" format
                if (!card && nameOrId.includes("(")) {
                    const regionName = nameOrId.split("(")[0].trim().toLowerCase();
                    card = cards.find((c) => c.genre === "location" && (c.title || "").toLowerCase() === regionName);
                }

                // 4. Fuzzy fallback for common translation/typo issues (e.g. "Haus" vs "House")
                if (!card) {
                    const norm = (s) => String(s || "")
                        .toLowerCase()
                        .replace(/[“”„"]/g, "")
                        .replace(/\s+/g, " ")
                        .trim();
                    const a = norm(nameOrId);
                    const variants = new Set([
                        a,
                        a.replace(/\bhaus\b/g, "house"),
                        a.replace(/\bhouse\b/g, "haus")
                    ]);
                    for (const v of variants) {
                        const exact = cards.find((c) => c.genre === "location" && norm(c.title) === v);
                        if (exact) { card = exact; break; }
                    }
                    if (!card) {
                        for (const v of variants) {
                            const contains = cards.find((c) => c.genre === "location" && norm(c.title).includes(v) && v.length >= 4);
                            if (contains) { card = contains; break; }
                        }
                    }
                }

                const el = document.getElementById("header-location");
                if (card) {
                    currentLocationId = card.id;
                    if (activeChar) activeChar.currentLocationId = card.id; // Save to activeChar
                    if (el) el.textContent = card.title.toUpperCase(); // Fixed: Show TITLE, not ID
                    // Track discovered location and its chain
                    addDiscoveredLocation(card.id);
                    // Track visited for smart location context
                    trackVisitedLocation(card.id);
                    try { recalcEventOverrides(); } catch(e) { console.warn("recalcEventOverrides failed", e); }
                } else {
                    // Fallback: If no card found, keep the text but try to find a parent if possible
                    // Or just keep the text and null the ID (AI will lose character context)
                    currentLocationId = null;
                    if (activeChar) activeChar.currentLocationId = null; // Save to activeChar
                    if (el) el.textContent = nameOrId.toUpperCase();
                    console.warn(`[Location] No card found for: ${nameOrId}`);
                }

                if (prevLocationId && prevLocationId !== currentLocationId) {
                    clearActiveSceneNpcState();
                }
                
                updatePresentNPCs();
                saveActiveCharacter(); // Save the location state
                try { updateHeaderEvent(); } catch {}
                try { loadBackground(); } catch {}
                updateTravelButtonVisibility(); // Show/hide travel button based on transport building
                updateMoveButtonVisibility();
            }

            function addDiscoveredLocation(locId) {
                if (!activeChar || !locId) return;
                if (!Array.isArray(activeChar.discoveredLocations)) {
                    activeChar.discoveredLocations = [];
                }
                // Add current location
                if (!activeChar.discoveredLocations.includes(locId)) {
                    activeChar.discoveredLocations.push(locId);
                }
                // Also discover all parent locations (ancestors)
                const cards = getCards();
                let current = cards.find(c => c.id === locId);
                while (current) {
                    const parent = cards.find((c) => {
                        if (c.genre !== "location" || !c.sublocations) return false;
                        return Object.values(c.sublocations).some((arr) => (arr || []).includes(current.id));
                    });
                    if (parent && !activeChar.discoveredLocations.includes(parent.id)) {
                        activeChar.discoveredLocations.push(parent.id);
                    }
                    current = parent;
                }
                // Discover all sibling locations (same parent) - you know they exist
                const directParent = cards.find((c) => {
                    if (c.genre !== "location" || !c.sublocations) return false;
                    return Object.values(c.sublocations).some((arr) => (arr || []).includes(locId));
                });
                if (directParent && directParent.sublocations) {
                    Object.values(directParent.sublocations).forEach((siblingIds) => {
                        (siblingIds || []).forEach((sid) => {
                            if (sid !== locId && !activeChar.discoveredLocations.includes(sid)) {
                                activeChar.discoveredLocations.push(sid);
                            }
                        });
                    });
                }
            }

            function isLocationVisible(locId) {
                if (!locId || !currentLocationId) return false;
                if (locId === currentLocationId) return true;

                const cards = getCards();
                const parent = findParentLocationById(currentLocationId, cards);
                const grandparent = parent ? findParentLocationById(parent.id, cards) : null;

                if (parent && parent.id === locId) return true;
                if (grandparent && grandparent.id === locId) return true;

                if (parent) {
                    const siblings = getSublocationIdsFromLoc(parent);
                    if (siblings.includes(locId) && locId !== currentLocationId) return true;
                }

                const currentLoc = cards.find((c) => c.id === currentLocationId);
                if (currentLoc && getSublocationIdsFromLoc(currentLoc).includes(locId)) return true;

                return false;
            }

            function getDiscoveredLocationContext(locId) {
                const cards = getCards();

                }
            }

            function derivePresentNpcIdsFromWorld() {
                try {
                    if (!currentLocationId) return [];
                    const cards = getCards();
                    const currentLoc = cards.find((c) => c.id === currentLocationId);
                    if (!currentLoc) return [];

                    const ancestors = [];
                    let current = currentLoc;
                    while (current) {
                        ancestors.push(current);
                        const parent = cards.find((c) => {
                            if (c.genre !== "location" || !c.sublocations) return false;
                            return Object.values(c.sublocations).some((arr) => (arr || []).includes(current.id));
                        });
                        current = parent;
                    }
                    const ancestorIds = new Set(ancestors.map((a) => a.id));
                    const scheduleNow = computeSchoolPresenceNow();
                    const scheduledByNpc = scheduleNow.byNpc || new Map();

                    const residentIds = new Set();
                    ancestors.forEach((loc) => {
                        if (Array.isArray(loc.residents)) {
                            loc.residents.forEach((id) => residentIds.add(id));
                        }
                    });

                    const result = [];
                    residentIds.forEach((id) => {
                        const c = cards.find((card) => card.genre === "character" && card.id === id);
                        if (!c) return;
                        if ((c.status || "Alive") === "Dead") return;
                        const sched = scheduledByNpc.get(c.id);
                        const atSchoolElsewhere = sched && !ancestorIds.has(sched.schoolId);
                        if (!atSchoolElsewhere) result.push(c.id);
                    });
                    return result;
                } catch (e) {
                    console.warn("derivePresentNpcIdsFromWorld failed", e);
                    return [];
                }
            }

                    result.push(c.id);
                });

                // Include characters whose currentLocationId places them nearby even if they are not listed as a resident.
                cards.forEach((c) => {
                    if (!c || c.genre !== "character" || !c.id) return;
                    if (residentIds.has(c.id)) return;
                    const isDead = (c.status || "Alive") === "Dead";
                    if (wantDead ? !isDead : isDead) return;
                    const locId = getCharacterEffectiveLocationId(c, cards);
                    if (!locId || !nearbyLocIds.has(locId)) return;
                    const sched = scheduledByNpc.get(c.id);
                    if (sched && sched.schoolId && !nearbyLocIds.has(sched.schoolId)) return;
                    result.push(c.id);
                });

                return result;
            }

            function getCharacterEffectiveLocationId(character, cards) {
                if (!character || character.genre !== "character") return "";
                const lockLocationId = String(character.locationLock?.locationId || "").trim();
                if (lockLocationId) return lockLocationId;
                const primary = String(character.currentLocationId || character.spawnLocationId || character.spawnId || "").trim();
                if (primary) return primary;
                const fallback = cards.find((c) => c && c.genre === "location" && Array.isArray(c.residents) && c.residents.includes(character.id));
                return fallback ? fallback.id : "";
            }

            function getCharacterEffectiveLocationCard(character, cards) {
                const locId = getCharacterEffectiveLocationId(character, cards);
                if (!locId) return null;
                return cards.find((c) => c && c.genre === "location" && c.id === locId) || null;
            }

            function getNpcLocationLockContext() {
                try {
                    if (!currentLocationId) return "";
                    const cards = getCards();
                    const ancestors = [];
                    let current = cards.find((c) => c.id === currentLocationId);
                    if (!current) return "";
                    while (current) {
                        ancestors.push(current);
                        const parent = cards.find((c) => {
                            if (c.genre !== "location" || !c.sublocations) return false;
                            return Object.values(c.sublocations).some((arr) => (arr || []).includes(current.id));
                        });
                        current = parent;
                    }
                    const ancestorIds = new Set(ancestors.map((loc) => loc.id));
                    const locks = cards
                        .filter((c) => c && c.genre === "character" && c.locationLock && ancestorIds.has(String(c.locationLock.locationId || "")))
                        .map((npc) => {
                            const lock = npc.locationLock;
                            const loc = cards.find((c) => c.genre === "location" && c.id === lock.locationId);
                            return {
                                npcId: npc.id,
                                npcName: npc.title || npc.id,
                                locationName: loc ? loc.title : lock.locationId,
                                locationId: lock.locationId,
                                text: String(lock.text || "").trim(),
                                number: String(lock.number || "").trim(),
                            };
                        })
                        .filter((entry) => entry.npcId && entry.locationId && entry.number);
                    if (locks.length === 0) return "";
                    const lines = ["\nNPC LOCATION LOCKS (current area and parent regions):"];
                    locks.forEach((entry) => {
                        lines.push(`- ${entry.npcName} [ID: ${entry.npcId}] locked at ${entry.locationName} [ID: ${entry.locationId}] — ${entry.text} (Lock# ${entry.number})`);

            function processNearbyNpcHourlyUpdate(prevMinutes, minsAdded) {
                const cards = getCards();
                if (!cards || cards.length === 0 || !activeChar) return;

                const dayLen = 24 * 60;
                const normalizedPrev = ((prevMinutes % dayLen) + dayLen) % dayLen;
                const tickCount = Math.max(0, Math.floor((normalizedPrev + minsAdded) / 60) - Math.floor(normalizedPrev / 60));
                if (tickCount <= 0) return;

                let changed = false;
                for (let tick = 1; tick <= tickCount; tick++) {
                    const tickMinute = normalizedPrev + tick * 60;
                    const nowMin = ((tickMinute % dayLen) + dayLen) % dayLen;
                    const scheduleNow = computeSchoolPresenceAtMinute(nowMin);
                    const scheduledByNpc = scheduleNow.byNpc || new Map();
                    const hour = Math.floor(nowMin / 60);
                    const isDay = hour >= 6 && hour < 22;

                    cards.forEach((card) => {
                        if (!card || card.genre !== "character" || (card.status || "Alive") === "Dead") return;
                        // Skip automatic positioning if NPC is location-locked
                        if (card.locationLock && card.locationLock.locationId) {
                            return;
                        }
                        const traits = Array.isArray(card.traits) ? card.traits : [];
                        const isOutsideTrait = traits.includes("outside");
                        const isOwlTrait = traits.includes("owl");
                        const slot = scheduledByNpc.get(card.id);
                        const attendance = card.schoolAttendance || null;
                        let state = String(card.awakeState || "Awake");

                        const isAttendingSchool = attendance && attendance.status === "attending" && nowMin < attendance.releaseMin;
                        const shouldKeepSchoolState = attendance && attendance.status === "attending" && nowMin < attendance.releaseMin;
                        const shouldClearSchoolState = attendance && nowMin >= (attendance.releaseMin || 0);

                        if (shouldClearSchoolState) {
                            if (attendance.previousLocationId && attendance.previousLocationId !== card.currentLocationId) {
                                card.currentLocationId = attendance.previousLocationId;
                            }
                            delete card.schoolAttendance;
                            changed = true;
                        }

                        if (isAttendingSchool) {
                            state = "Awake";
                            if (card.currentLocationId !== attendance.schoolId) {
                                card.currentLocationId = attendance.schoolId;
                                changed = true;
                            }
                        } else if (slot) {
                            const releaseMin = slot.schoolEndMin + 60;
                            if (!attendance || attendance.schoolId !== slot.schoolId || nowMin >= (attendance.releaseMin || 0)) {
                                const roll = Math.random();
                                const attend = roll < 0.85;
                                card.schoolAttendance = {
                                    schoolId: slot.schoolId,
                                    status: attend ? "attending" : "skipped",
                                    schoolStartMin: slot.schoolStartMin,
                                    schoolEndMin: slot.schoolEndMin,
                                    releaseMin,
                                    previousLocationId: card.currentLocationId,
                                };
                                changed = true;
                            }
                            if (card.schoolAttendance.status === "attending") {
                                state = "Awake";
                                if (card.currentLocationId !== slot.schoolId) {
                                    card.currentLocationId = slot.schoolId;
                                    changed = true;
                                }
                            }
                        } else {
                            const locationCard = getCharacterEffectiveLocationCard(card, cards);
                            const atHouseOrResident = isCharacterAtHouseOrResidentLocation(card, cards);
                            const isAwake = state === "Awake";

                            if (isOwlTrait && atHouseOrResident) {
                                const sleepChance = isDay ? 0.5 : 0.15;
                                const wakeChance = isDay ? 0.35 : 0.15;
                                if (isAwake) {
                                    if (Math.random() < sleepChance) state = "Sleeping";
                                } else {
                                    if (Math.random() < wakeChance) state = "Awake";
                                }
                            } else {
                                if (isAwake) {
                                    const sleepChance = atHouseOrResident && !isDay ? 0.2 : 0.08;
                                    if (Math.random() < sleepChance) state = "Sleeping";
                                } else {
                                    const wakeChance = isDay ? 0.25 : 0.08;
                                    if (Math.random() < wakeChance) state = "Awake";
                                }
                            }

                            if (state === "Awake" && locationCard) {
                                const parentLoc = findParentLocationById(locationCard.id, cards);
                                if (parentLoc) {
                                    const outsideChance = isOutsideTrait ? 0.5 : 0.1;
                                    if (Math.random() < outsideChance) {
                                        card.currentLocationId = parentLoc.id;
                                        changed = true;
                                    }
                                }
                            }
                        }

                        if (card.awakeState !== state) {
                            card.awakeState = state;
                            changed = true;
                        }
                    });
                }

                if (changed) {
                    saveCards(cards);
                }
            }

            // Extract a short summary from narrative text (first 1-2 sentences, max 200 chars)
            function extractMemorySummary(text) {
                if (!text) return "";
                // Split by sentence endings
                const sentences = text.split(/(?<=[.!?])\s+/);
                let summary = "";
                for (let i = 0; i < Math.min(2, sentences.length); i++) {
                    const trimmed = sentences[i].trim();
                    if (trimmed) {
                        summary += trimmed + " ";
                    }
                }
                summary = summary.trim();
                // Fallback: if no clear sentences, take first 200 chars

                }
                return summary;

            // ═════════════════════════════════════════════════════════════════
            // NEW MEMORY SYSTEM - Keyword & Date Based Search
            // ═════════════════════════════════════════════════════════════════
            
            // German to English day names mapping
            const DAY_NAME_MAP = {
                'montag': 'monday', 'monday': 'monday',
                'dienstag': 'tuesday', 'tuesday': 'tuesday',
                'mittwoch': 'wednesday', 'wednesday': 'wednesday',
                'donnerstag': 'thursday', 'thursday': 'thursday',
                'freitag': 'friday', 'friday': 'friday',
                'samstag': 'saturday', 'saturday': 'saturday',
                'sonntag': 'sunday', 'sunday': 'sunday',
                'mo': 'monday', 'di': 'tuesday', 'mi': 'wednesday',
                'do': 'thursday', 'fr': 'friday', 'sa': 'saturday', 'so': 'sunday'
            };
            
            // German month names
            const MONTH_NAME_MAP = {
                'januar': 1, 'january': 1, 'jan': 1,
                'februar': 2, 'february': 2, 'feb': 2,
                'märz': 3, 'march': 3, 'mär': 3, 'mar': 3,
                'april': 4, 'apr': 4,
                'mai': 5, 'may': 5,
                'juni': 6, 'june': 6, 'jun': 6,
                'juli': 7, 'july': 7, 'jul': 7,
                'august': 8, 'aug': 8,
                'september': 9, 'sep': 9, 'sept': 9,
                'oktober': 10, 'october': 10, 'okt': 10, 'oct': 10,
                'november': 11, 'nov': 11,
                'dezember': 12, 'december': 12, 'dez': 12, 'dec': 12
            };
            
            // Extract keywords from player speech (text in quotes)
            function extractPlayerSpeechKeywords(input) {
                const s = String(input || "");
                const parts = [];
                const rx = /["“„]([\s\S]*?)["”]/g;
                let m;
                while ((m = rx.exec(s)) !== null) {
                    const inner = String(m[1] || "").trim();
                    if (inner) parts.push(inner);
                }
                if (parts.length === 0) return { keywords: [], dateFilters: [], dayFilters: [] };

                const speechText = parts.join(" ").toLowerCase();
                const rawWords = speechText.split(/\s+/).filter(Boolean);
                const out = [];
                for (const w0 of rawWords) {
                    let w = String(w0 || "").toLowerCase();
                    w = w.replace(/[^a-z0-9äöüß\-]+/gi, "");
                    w = w.replace(/^-+/, "").replace(/-+$/, "");
                    if (w.length < 2) continue;
                    if (/^\d+$/.test(w)) continue;
                    out.push(w);
                }
                const unique = [...new Set(out)];
                return {
                    keywords: unique.slice(0, 12),
                    dateFilters: [],
                    dayFilters: []
                };
            }
            
            // Parse date references from player input (e.g., "14.2", "14.02.2008", "Samstag", "Saturday")
            function parseDateReferences(input) {
                const dateFilters = []; // { day, month, year } or null for any
                const dayFilters = [];  // day names like 'monday', 'saturday'
                
                const lowerInput = input.toLowerCase();
                
                // Check for day names (Samstag, Saturday, etc.)
                Object.entries(DAY_NAME_MAP).forEach(([german, english]) => {
                    if (lowerInput.includes(german)) {
                        dayFilters.push(english);
                    }
                });
                
                // Check for date patterns: 14.2, 14.02, 14.2.2008, 14.02.2008
                const datePattern1 = /\b(\d{1,2})\.(\d{1,2})(?:\.(\d{2,4}))?\b/g;
                let match;
                while ((match = datePattern1.exec(input)) !== null) {
                    const day = parseInt(match[1]);
                    const month = parseInt(match[2]);
                    const year = match[3] ? parseInt(match[3]) : null;
                    if (day >= 1 && day <= 31 && month >= 1 && month <= 12) {
                        dateFilters.push({ day, month, year: year ? (year < 100 ? 2000 + year : year) : null });
                    }
                }
                
                // Check for month names (Januar, January, etc.)
                Object.entries(MONTH_NAME_MAP).forEach(([name, monthNum]) => {
                    if (lowerInput.includes(name)) {
                        // Extract day number before month name if present
                        const dayMatch = lowerInput.match(new RegExp(`(\\d{1,2})\\.?\\s*${name}`));
                        if (dayMatch) {
                            dateFilters.push({ day: parseInt(dayMatch[1]), month: monthNum, year: null });
                        }
                    }
                });
                
                return { dateFilters, dayFilters };
            }
            
            // Get weekday name from date
            function getWeekdayFromDate(dateStr) {
                try {
                    const parts = dateStr.split('.');
                    if (parts.length < 3) return null;
                    const day = parseInt(parts[0]);
                    const month = parseInt(parts[1]) - 1;
                    const year = parseInt(parts[2]);
                    const date = new Date(year, month, day);
                    const weekdays = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
                    return weekdays[date.getDay()];
                } catch {
                    return null;
                }
            }

            function _weekdayTitleFromDateStr(dateStr) {
                const w = getWeekdayFromDate(String(dateStr || ""));
                if (!w) return "";
                return w.charAt(0).toUpperCase() + w.slice(1);
            }

            function _formatMemoryMeta(m) {
                const date = m && m.date ? String(m.date) : "";
                const time = m && m.time ? String(m.time) : "";
                const wd = _weekdayTitleFromDateStr(date);
                const parts = [];
                if (wd) parts.push(wd);
                if (date) parts.push(date);
                if (time) parts.push(time);
                return parts.join(" ");
            }

            function _memoryKey(m) {
                try {
                    if (!m || typeof m !== "object") return String(m || "");
                    if (m.logTs != null) return `ts:${String(m.logTs)}`;
                    return `${String(m.date || "")}|${String(m.time || "")}|${String(m.location || "")}|${String(m.text || "")}`;
                } catch {
                    return String(m || "");
                }
            }
            
            // Search memories by keywords and date filters
            function searchMemoriesForNpc(npc, keywords, dateFilters, dayFilters) {
                if (!Array.isArray(npc.memories) || npc.memories.length === 0) return [];
                if (keywords.length === 0 && dateFilters.length === 0 && dayFilters.length === 0) return [];
                
                const relevantMemories = [];
                
                npc.memories.forEach(mem => {
                    const memText = (mem.text || '').toLowerCase();
                    const memDate = mem.date || '';
                    const memDayName = getWeekdayFromDate(memDate);
                    
                    let score = 0;
                    
                    // Check keyword matches (at least one keyword must match)
                    let keywordMatches = 0;
                    keywords.forEach(kw => {
                        if (memText.includes(kw)) {
                            keywordMatches++;
                            score += 2;
                        }
                    });
                    
                    // Check date filters
                    dateFilters.forEach(df => {
                        const memParts = memDate.split('.');
                        if (memParts.length >= 2) {
                            const memDay = parseInt(memParts[0]);
                            const memMonth = parseInt(memParts[1]);
                            const memYear = memParts[2] ? parseInt(memParts[2]) : null;
                            
                            if (df.day === memDay && df.month === memMonth) {
                                score += 5;
                                if (df.year && df.year === memYear) {
                                    score += 3;
                                }
                            }
                        }
                    });
                    
                    // Check day name filters
                    dayFilters.forEach(dayName => {
                        if (memDayName === dayName) {
                            score += 4;
                        }
                    });
                    
                    if (keywords.length > 0 && keywordMatches === 0 && dateFilters.length === 0 && dayFilters.length === 0) {
                        return;
                    }
                    if (keywords.length === 0 && dateFilters.length === 0 && dayFilters.length === 0) {
                        return;
                    }
                    
                    if (score > 0) {
                        relevantMemories.push({ ...mem, _score: score });
                    }
                });
                
                // Sort by score descending, then by date (most recent first)
                relevantMemories.sort((a, b) => {
                    if (b._score !== a._score) return b._score - a._score;
                    return (b.dayCount || 0) - (a.dayCount || 0);
                });
                
                return relevantMemories.slice(0, 10); // Return top 10 most relevant
            }
            
            // Get relevant memories for active NPCs based on player input
            function getRelevantMemoriesForInput(playerInput, presentNpcIds) {
                const { keywords } = extractPlayerSpeechKeywords(playerInput);
                const { dateFilters, dayFilters } = parseDateReferences(playerInput);
                
                if (keywords.length === 0 && dateFilters.length === 0 && dayFilters.length === 0) {
                    return new Map(); // No relevant filters
                }
                
                const cards = getCards();
                const result = new Map();
                
                presentNpcIds.forEach(npcId => {
                    const npc = cards.find(c => c.genre === "character" && c.id === npcId);
                    if (!npc) return;
                    
                    const relevantMems = searchMemoriesForNpc(npc, keywords, dateFilters, dayFilters);
                    if (relevantMems.length > 0) {
                        result.set(npcId, relevantMems);
                    }
                });
                
                return result;
            }

            function getOrCreateActiveNpcMemorySelection(playerInput, presentNpcIds, relevantMemoriesMap = new Map()) {
                const key = getActiveNpcMemorySelectionKey(playerInput, presentNpcIds);
                if (_lastActiveNpcMemorySelection && _lastActiveNpcMemorySelection.key === key) {
                    return _lastActiveNpcMemorySelection.selection;
                }

                const cards = getCards();
                const selected = [];

                (presentNpcIds || []).forEach((npcId) => {
                    const npc = cards.find((c) => c && c.genre === "character" && c.id === npcId);
                    if (!npc || !Array.isArray(npc.memories) || npc.memories.length === 0) return;

                    const existingKeys = new Set();
                    const latest = npc.memories.slice(-5);
                    latest.forEach(m => existingKeys.add(_memoryKey(m)));
                    const matched = Array.isArray(relevantMemoriesMap.get(npcId)) ? relevantMemoriesMap.get(npcId) : [];
                    matched.forEach(m => existingKeys.add(_memoryKey(m)));

                    const pool = npc.memories
                        .map((mem) => ({
                            npcId,
                            npcName: npc.title || npc.id,
                            text: String(mem.text || "").trim(),
                            date: mem.date || "",
                            key: _memoryKey(mem),
                        }))
                        .filter((item) => item.text && !existingKeys.has(item.key));

                    const chosen = [];
                    while (chosen.length < 3 && pool.length > 0) {
                        const idx = Math.floor(Math.random() * pool.length);
                        const item = pool.splice(idx, 1)[0];
                        if (!chosen.some((c) => c.key === item.key)) {
                            chosen.push(item);
                        }
                    }
                    selected.push(...chosen);
                });

                _lastActiveNpcMemorySelection = { key, selection: selected };
                return selected;
            }

            function buildActiveNpcRandomMemoryContext(playerInput, presentNpcIds) {
                const selection = getOrCreateActiveNpcMemorySelection(playerInput, presentNpcIds);
                if (!selection || selection.length === 0) return "";
                let text = "\n### ACTIVE NPC RANDOM MEMORIES ###\n";
                selection.forEach((mem) => {
                    const dateStr = mem.date ? ` [${mem.date}]` : "";
                    const npcLabel = mem.npcName ? `${mem.npcName} (${mem.npcId})` : mem.npcId;
                    const memo = String(mem.text || "").replace(/\s+/g, " ").trim();
                    text += `- ${npcLabel}${dateStr}: ${memo}\n`;
                });
                return text;
            }

            function addNpcMemoriesFromPending(narrativeText, anchorTs = null) {
                const targets = Array.isArray(window._pendingMemoryTargets) ? window._pendingMemoryTargets : [];
                if (targets.length === 0) return;
                const cards = getCards();
                const d = activeChar?.startingDate || {};
                const dateStr = `${String(d.day || 1).padStart(2, "0")}.${String(d.month || 1).padStart(2, "0")}.${d.year || 1983}`;
                const timeStr = d.time || "00:00";
                const locName = document.getElementById("header-location")?.textContent || "Unknown Location";
                
                // Fallback summary if a legacy memory tag contains IDs only
                const memorySummary = extractMemorySummary(narrativeText);
                
                let changed = false;
                targets.forEach(({ id, text, type, kind }) => {
                    const k = kind || "character";
                    if (k === "location") {
                        const loc = cards.find((c) => c.genre === "location" && c.id === id && isLocationMemoryTargetCard(c));
                        if (!loc) return;
                        const memoryText = String(text || "").trim() || memorySummary;
                        if (!memoryText) return;

                        });

                    if (!npc) return;
                    const memoryText = String(text || "").trim() || memorySummary;
