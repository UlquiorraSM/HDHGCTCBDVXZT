<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>StoryKI – Game</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                scrollbar-width: thin;
                scrollbar-color: rgba(255, 255, 255, 0.12) transparent;
            }
            *::-webkit-scrollbar {
                width: 4px;
            }
            *::-webkit-scrollbar-track {
                background: transparent;
            }
            *::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.12);
                border-radius: 2px;
            }

            

            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                font-family: "Segoe UI", Arial, sans-serif;
            }

            body {
                background: #0a0a0a;
                color: #fff;
                opacity: 0;
                transition: opacity 0.4s ease-in-out;
            }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.52);
                z-index: 0;
                pointer-events: none;
            }

            /* ─── Background Layer ─── */
            #bg-layer {
                position: fixed;
                inset: 0;
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
                z-index: -1;
                filter: blur(3px) brightness(0.5);
                transition: background-image 0.6s ease;
            }

            /* ─── App Shell ─── */
            #app {
                position: relative;
                z-index: 1;
                display: flex;
                flex-direction: column;
                height: 100vh;
                max-width: 820px;
                margin: 0 auto;
            }

            /* ════════════════════════════════════
               HEADER / TOP NAV
            ════════════════════════════════════ */
            #header {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 14px 20px;
                flex-shrink: 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.07);
                background: rgba(8, 8, 8, 0.55);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
            }

            .nav-back-btn {
                width: 36px;
                height: 36px;
                border-radius: 50%;
                border: 2px solid rgba(255, 255, 255, 0.18);
                background: rgba(28, 28, 28, 0.75);
                color: #fff;
                font-size: 15px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition:
                    background 0.2s,
                    border-color 0.2s;
                flex-shrink: 0;
            }
            .nav-back-btn:hover {
                background: rgba(55, 55, 55, 0.95);
                border-color: rgba(255, 255, 255, 0.4);
            }

            .nav-stats-btn {
                padding: 8px 14px;
                border-radius: 10px;
                border: 1px solid rgba(255, 255, 255, 0.15);
                background: rgba(40, 100, 140, 0.4);
                color: #7ec9ff;
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 6px;
                transition: all 0.2s;
                flex-shrink: 0;
            }
            .nav-stats-btn:hover {
                background: rgba(50, 120, 170, 0.6);
                border-color: rgba(255, 255, 255, 0.3);
            }

            /* Stats Panel */
            #stats-panel-overlay {
                opacity: 0;
                transition: opacity 0.2s;
            }
            #stats-panel-overlay.show {
                opacity: 1;
            }
            #stats-panel-overlay.show #stats-panel {
                transform: translateY(0);
            }
            #stats-panel {
                transform: translateY(20px);
                transition: transform 0.3s ease-out;
            }

            .stats-relation-item {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 10px 12px;
                background: rgba(255, 255, 255, 0.08);
                border-radius: 10px;
            }
            #stats-relations-list.horizontal {
                display: flex !important;
                flex-direction: row !important;
                flex-wrap: wrap !important;
                gap: 8px;
            }
            #stats-relations-list.horizontal .stats-relation-item {
                flex: 1 1 calc(50% - 4px);
                min-width: 140px;
                max-width: calc(50% - 4px);
            }

            .stats-relation-avatar {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.1);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
                flex-shrink: 0;
            }
            .stats-relation-info {
                flex: 1;
                display: flex;
                flex-direction: column;
                gap: 2px;
            }
            .stats-relation-name {
                color: #fff;
                font-size: 14px;
                font-weight: 600;
            }
            .stats-relation-type {
                color: rgba(255, 255, 255, 0.5);
                font-size: 12px;
                text-transform: capitalize;
            }
            .stats-no-relations {
                color: rgba(255, 255, 255, 0.4);
                font-size: 13px;
                font-style: italic;
                text-align: center;
                padding: 20px;
            }

            /* Stats Skills */
            .stats-skill-tag {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 8px 14px;
                background: rgba(100, 140, 100, 0.25);
                border: 1px solid rgba(100, 200, 100, 0.3);
                border-radius: 20px;
                color: #7ecf7e;
                font-size: 13px;
                font-weight: 500;
            }
            .stats-skill-tag::before {
                content: "🛠️";
                font-size: 12px;
            }
            .stats-no-skills {
                color: rgba(255, 255, 255, 0.4);
                font-size: 13px;
                font-style: italic;
                text-align: center;
                padding: 20px;
            }


            /* Info Block (Time/Loc) */
            #header-info {
                flex: 1;
                display: none;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                margin: 0 10px;
                text-align: center;
            }
            #header-location {
                font-size: 12px;
                font-weight: 700;
                color: rgba(255, 255, 255, 0.9);
                letter-spacing: 0.05em;
                text-transform: uppercase;
            }
            #header-time {
                font-size: 11px;
                color: rgba(255, 255, 255, 0.5);
                font-family: monospace;
                margin-top: 2px;
            }

            /* Character badge in header */
            #char-badge {
                display: none;
                align-items: center;
                gap: 8px;
                padding: 6px 12px;
                background: rgba(30, 30, 40, 0.8);
                border: 1.5px solid rgba(255, 255, 255, 0.1);
                border-radius: 20px;
                flex-shrink: 0;
            }
            #char-badge.visible {
                display: flex;
            }
            .char-avatar-sm {
                width: 24px;
                height: 24px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 13px;
                flex-shrink: 0;
            }
            .char-avatar-sm.male {
                background: rgba(30, 60, 110, 0.9);
                border: 1.5px solid rgba(80, 140, 220, 0.4);
            }
            .char-avatar-sm.female {
                background: rgba(110, 30, 60, 0.9);
                border: 1.5px solid rgba(220, 80, 140, 0.4);
            }
            .char-name-sm {
                font-size: 12px;
                font-weight: 700;
                color: rgba(255, 255, 255, 0.8);
            }
            .char-race-sm {
                font-size: 10px;
                color: rgba(200, 160, 60, 0.85);
                font-weight: 600;
            }

            /* NPCs Present Bar */
            #present-npcs-bar {
                display: none;
                background: rgba(12, 12, 12, 0.4);
                backdrop-filter: blur(8px);
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                padding: 8px 20px;
                overflow-x: auto;
                white-space: nowrap;
                gap: 12px;
                align-items: center;
                flex-shrink: 0;
            }
            #present-npcs-bar.visible {
                display: flex;
            }
            .npc-item {
                display: flex;
                align-items: center;
                gap: 6px;
                background: rgba(40, 40, 50, 0.6);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 16px;
                padding: 4px 10px;
                cursor: pointer;
                transition: background 0.2s;
            }
            .npc-item:hover {
                background: rgba(60, 60, 80, 0.8);
            }
            .npc-avatar-xs {
                width: 18px;
                height: 18px;
                border-radius: 50%;
                font-size: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #fff;
            }
            .npc-avatar-xs.male { background: #1e3c6e; }
            .npc-avatar-xs.female { background: #6e1e3c; }
            .npc-name-xs {
                font-size: 12px;
                font-weight: 600;
                color: rgba(255, 255, 255, 0.9);
            }

            /* ─── Status indicator ─── */
            #status-dot-wrap {
                display: flex;
                align-items: center;
                gap: 5px;
                flex-shrink: 0;
            }
            .status-dot {
                width: 7px;
                height: 7px;
                border-radius: 50%;
                background: rgba(80, 200, 100, 0.9);
                animation: pulse-dot 2.5s infinite;
            }
            .status-label {
                font-size: 11px;
                color: rgba(80, 200, 100, 0.85);
                font-weight: 600;
            }
            @keyframes pulse-dot {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.35;
                }
            }

            /* ════════════════════════════════════
               MESSAGES
            ════════════════════════════════════ */
            #messages {
                flex: 1;
                overflow-y: auto;
                padding: 24px 20px;
                display: flex;
                flex-direction: column;
                gap: 14px;
            }

            .msg-row {
                display: flex;
                flex-direction: column;
                gap: 3px;
            }
            .msg-row.user {
                align-items: flex-end;
            }
            .msg-row.ai {
                align-items: flex-start;
            }
            .msg-row.follow-up {
                margin-top: -8px;
            }

            .msg-sender {
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.06em;
                text-transform: uppercase;
                padding: 0 6px;
            }
            .msg-row.user .msg-sender {
                color: rgba(255, 255, 255, 0.28);
            }
            .msg-row.ai .msg-sender {
                color: rgba(255, 255, 255, 0.28);
            }

            .msg-bubble {
                padding: 12px 17px;
                border-radius: 16px;
                max-width: 76%;
                word-wrap: break-word;
                line-height: 1.65;
                font-size: 14px;
                white-space: pre-wrap;
            }
            .msg-row.user .msg-bubble {
                background: rgba(26, 26, 26, 0.92);
                border: 1px solid rgba(255, 255, 255, 0.09);
                border-bottom-right-radius: 4px;
                color: rgba(255, 255, 255, 0.88);
            }
            .msg-row.ai .msg-bubble {
                background: rgba(26, 26, 26, 0.92);
                border: 1px solid rgba(255, 255, 255, 0.09);
                border-bottom-left-radius: 4px;
                color: rgba(255, 255, 255, 0.88);
            }
            .msg-bubble strong {
                font-weight: 800;
            }
            .msg-bubble em {
                font-style: italic;
            }
            .msg-bubble del {
                text-decoration: line-through;
                opacity: 0.9;
            }
            .msg-bubble code {
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.14);
                border-radius: 6px;
                padding: 1px 6px;
                font-family: Consolas, "Courier New", monospace;
                font-size: 0.92em;
            }
            .msg-bubble pre {
                margin: 8px 0;
                padding: 10px 12px;
                border-radius: 10px;
                background: rgba(0, 0, 0, 0.35);
                border: 1px solid rgba(255, 255, 255, 0.14);
                overflow-x: auto;
            }
            .msg-bubble pre code {
                background: transparent;
                border: none;
                padding: 0;
                font-size: 0.9em;
            }
            .msg-bubble a {
                color: rgba(150, 200, 255, 0.95);
                text-decoration: underline;
                word-break: break-word;
            }
            .msg-bubble.thinking {
                color: rgba(255, 255, 255, 0.35);
                font-style: italic;
                animation: blink 1.4s infinite;
            }
            @keyframes blink {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.5;
                }
            }

            /* Typing dots */
            .typing-dots {
                display: inline-flex;
                gap: 4px;
                align-items: center;
                height: 18px;
            }
            .typing-dots span {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.4);
                animation: typing-bounce 1.2s infinite ease-in-out;
            }
            .typing-dots span:nth-child(2) {
                animation-delay: 0.2s;
            }
            .typing-dots span:nth-child(3) {
                animation-delay: 0.4s;
            }
            @keyframes typing-bounce {
                0%,
                80%,
                100% {
                    transform: translateY(0);
                    opacity: 0.4;
                }
                40% {
                    transform: translateY(-5px);
                    opacity: 1;
                }
            }

            /* Divider */
            .chat-divider {
                display: flex;
                align-items: center;
                gap: 12px;
                margin: 6px 0;
            }
            .chat-divider::before,
            .chat-divider::after {
                content: "";
                flex: 1;
                height: 1px;
                background: rgba(255, 255, 255, 0.07);
            }
            .chat-divider-label {
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: rgba(255, 255, 255, 0.2);
            }

            /* ════════════════════════════════════
               INPUT AREA
            ════════════════════════════════════ */
            #input-section {
                flex-shrink: 0;
                background: rgba(8, 8, 8, 0.55);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                border-top: 1px solid rgba(255, 255, 255, 0.07);
            }

            #input-area {
                display: flex;
                gap: 10px;
                align-items: flex-end;
                padding: 12px 16px 10px 16px;
            }

            #user-input {
                flex: 1;
                padding: 11px 16px;
                background: rgba(20, 20, 20, 0.95);
                border: 1.5px solid rgba(255, 255, 255, 0.1);
                border-radius: 22px;
                color: #fff;
                font-size: 14px;
                outline: none;
                font-family: inherit;
                resize: none;
                line-height: 1.5;
                max-height: 140px;
                overflow-y: auto;
                transition: border-color 0.2s;
            }
            #user-input::placeholder {
                color: rgba(255, 255, 255, 0.22);
            }
            #user-input:focus {
                border-color: rgba(255, 255, 255, 0.25);
            }

            #send-btn {
                width: 42px;
                height: 42px;
                border-radius: 50%;
                border: none;
                background: rgba(35, 85, 165, 0.9);
                color: #fff;
                font-size: 17px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition:
                    background 0.2s,
                    transform 0.15s,
                    opacity 0.2s;
                flex-shrink: 0;
                margin-bottom: 1px;
            }
            #send-btn:hover:not(:disabled) {
                background: rgba(50, 110, 200, 0.99);
                transform: scale(1.06);
            }
            #send-btn:disabled {
                opacity: 0.35;
                cursor: not-allowed;
                transform: none;
            }

            /* ─── Action Bar ─── */
            #action-bar {
                display: flex;
                gap: 7px;
                padding: 0 16px 14px 16px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .act-btn {
                padding: 7px 16px;
                border-radius: 18px;
                border: 1.5px solid rgba(255, 255, 255, 0.1);
                background: rgba(24, 24, 24, 0.9);
                color: rgba(255, 255, 255, 0.65);
                font-size: 12px;
                font-weight: 600;
                cursor: pointer;
                letter-spacing: 0.02em;
                white-space: nowrap;
                transition:
                    background 0.2s,
                    border-color 0.2s,
                    color 0.2s,
                    transform 0.15s;
                display: flex;
                align-items: center;
                gap: 5px;
            }
            .act-btn:hover {
                background: rgba(40, 40, 40, 0.98);
                border-color: rgba(255, 255, 255, 0.22);
                color: #fff;
                transform: translateY(-1px);
            }
            .act-btn:active {
                transform: translateY(0);
            }

            .act-btn.btn-retry {
                border-color: rgba(150, 150, 150, 0.2);
            }
            .act-btn.btn-edit {
                border-color: rgba(100, 170, 230, 0.25);
                color: rgba(130, 185, 240, 0.85);
            }
            .act-btn.btn-edit:hover {
                background: rgba(30, 60, 100, 0.6);
                color: #a8d0f8;
            }
            .act-btn.btn-continue {
                border-color: rgba(60, 180, 80, 0.3);
                color: rgba(100, 210, 120, 0.9);
            }
            .act-btn.btn-continue:hover {
                background: rgba(20, 65, 30, 0.8);
                color: #90e8a0;
            }
            .act-btn.btn-erase {
                border-color: rgba(180, 60, 60, 0.3);
                color: rgba(220, 100, 100, 0.85);
            }
            .act-btn.btn-erase:hover {
                background: rgba(70, 20, 20, 0.7);
                color: #ff9090;
            }
            .act-btn.btn-move {
                border-color: rgba(100, 100, 180, 0.3);
                color: rgba(140, 140, 220, 0.85);
                position: relative;
            }
            .act-btn.btn-move:hover {
                background: rgba(30, 30, 60, 0.7);
                color: #a0a0ff;
            }
            .act-btn.btn-travel {
                border-color: rgba(180, 100, 100, 0.3);
                color: rgba(220, 140, 140, 0.85);
                position: relative;
            }
            .act-btn.btn-travel:hover {
                background: rgba(60, 30, 30, 0.7);
                color: #ffa0a0;
            }
            #move-dropdown {
                position: fixed;
                background: rgba(30, 30, 35, 0.98);
                border: 1px solid rgba(255, 255, 255, 0.15);
                border-radius: 12px;
                padding: 8px 0;
                min-width: 200px;
                max-width: 280px;
                max-height: 300px;
                overflow-y: auto;
                display: none;
                flex-direction: column;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
                z-index: 1000;
            }
            #move-dropdown.show {
                display: flex;
            }
            #travel-dropdown {
                position: fixed;
                background: rgba(30, 30, 35, 0.98);
                border: 1px solid rgba(255, 255, 255, 0.15);
                border-radius: 12px;
                padding: 8px 0;
                min-width: 220px;
                max-width: 320px;
                max-height: 350px;
                overflow-y: auto;
                display: none;
                flex-direction: column;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
                z-index: 1000;
            }
            #travel-dropdown.show {
                display: flex;
            }
            .travel-header {
                padding: 10px 16px;
                color: rgba(220, 140, 140, 0.9);
                font-size: 12px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                margin-bottom: 4px;
            }
            .travel-option {
                padding: 10px 16px;
                color: rgba(255, 255, 255, 0.85);
                font-size: 13px;
                cursor: pointer;
                transition: background 0.15s;
                border: none;
                background: none;
                text-align: left;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
            }
            .travel-option:hover {
                background: rgba(180, 100, 100, 0.2);
                color: #fff;
            }
            .travel-option.selected {
                background: rgba(180, 100, 100, 0.35);
                color: #ff9f9f;
                border-left: 3px solid #ff9f9f;
            }
            .travel-option .travel-time {
                color: rgba(255, 255, 255, 0.5);
                font-size: 11px;
            }
            .travel-empty {
                padding: 16px;
                color: rgba(255, 255, 255, 0.5);
                font-size: 13px;
                text-align: center;
            }
            .move-option {
                padding: 10px 16px;
                color: rgba(255, 255, 255, 0.85);
                font-size: 13px;
                cursor: pointer;
                transition: background 0.15s;
                border: none;
                background: none;
                text-align: left;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .move-option:hover {
                background: rgba(100, 100, 180, 0.2);
                color: #fff;
            }
            .move-option.selected {
                background: rgba(100, 100, 180, 0.35);
                color: #7ec9ff;
                border-left: 3px solid #7ec9ff;
            }
            .move-option.current {
                color: rgba(140, 140, 220, 0.9);
                font-weight: 500;
            }
            .move-option.empty {
                color: rgba(255, 255, 255, 0.4);
                font-style: italic;
                cursor: default;
            }
            .move-option.empty:hover {
                background: none;
            }
            .act-btn.locked {
                opacity: 0.5;
                cursor: not-allowed !important;
                pointer-events: none;
            }

            /* ─── Toast ─── */
            #toast {
                position: fixed;
                bottom: 28px;
                left: 50%;
                transform: translateX(-50%) translateY(80px);
                background: rgba(40, 140, 80, 0.95);
                color: #fff;
                padding: 12px 24px;
                border-radius: 9px;
                font-size: 13px;
                font-weight: 600;
                z-index: 2000;
                opacity: 0;
                transition:
                    transform 0.3s ease,
                    opacity 0.3s ease;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
                white-space: nowrap;
                pointer-events: none;
            }
            #toast.show {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }

            /* ─── Welcome screen overlay ─── */
            #welcome-overlay {
                position: fixed;
                inset: 0;
                z-index: 100;
                background: rgba(0, 0, 0, 0.82);
                backdrop-filter: blur(6px);
                display: flex;
                align-items: center;
                justify-content: center;
                opacity: 1;
                transition: opacity 0.5s ease;
            }
            #welcome-overlay.hidden {
                opacity: 0;
                pointer-events: none;
            }
            .welcome-card {
                background: rgba(18, 18, 18, 0.95);
                border: 1.5px solid rgba(255, 255, 255, 0.1);
                border-radius: 16px;
                padding: 36px 40px;
                max-width: 420px;

        </style>
    </head>
    <body>
        <div id="bg-layer"></div>

        <!-- ─── Welcome Overlay ─── -->
        <div id="welcome-overlay">
            <div class="welcome-card">
                <div class="welcome-icon">📖</div>

                <div
                    class="welcome-char-row"
                    id="welcome-char-row"
                    style="display: none"
                >
                    <div class="welcome-avatar male" id="welcome-avatar">♂</div>
                    <div>
                        <div class="welcome-char-name" id="welcome-char-name">

        <!-- ─── Main App ─── -->

        <!-- Toast -->

        <!-- Move to Dropdown -->

        <!-- Travel Dropdown -->

        <!-- Stats Panel Overlay -->
        <div id="stats-panel-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,.85); display:none; align-items:center; justify-content:center; z-index:2500; backdrop-filter:blur(10px);">
            <div id="stats-panel" style="background:rgba(25,25,30,.95); border:1px solid rgba(255,255,255,.12); border-radius:18px; padding:28px; width:100%; max-width:520px; max-height:85vh; overflow-y:auto; display:flex; flex-direction:column; gap:20px; box-shadow:0 20px 60px rgba(0,0,0,.6);">
                <div style="display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,.1); padding-bottom:16px;">
                    <div style="color:#fff; font-weight:700; font-size:20px;">📊 Character Stats</div>
                    <button onclick="closeStatsPanel()" style="width:32px; height:32px; border-radius:50%; border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.1); color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;">&times;</button>

                <!-- Age -->
                <div id="stats-age-section" style="display:flex; align-items:center; justify-content:center; gap:12px; padding:12px 20px; background:rgba(255,255,255,.05); border-radius:12px;">

                <!-- Level & XP (Only when Level System is active) -->

                <!-- Appearance -->

                    <div id="stats-appearance" style="color:rgba(255,255,255,.85); font-size:14px; line-height:1.6; padding:14px 16px; background:rgba(255,255,255,.05); border-radius:10px; min-height:60px;">—</div>

                <!-- Relations -->
                <div id="stats-relations-section" style="display:flex; flex-direction:column; gap:12px;">
                    <div style="display:flex; align-items:center; justify-content:space-between; gap:8px;">
                        <span style="color:rgba(255,255,255,.5); font-size:12px; text-transform:uppercase; letter-spacing:1px;">Relations</span>
                        <select id="relations-layout-select" onchange="toggleRelationsLayout()" style="background:rgba(40,40,40,0.9); border:1px solid rgba(255,255,255,0.2); border-radius:6px; color:#fff; font-size:11px; padding:4px 8px; cursor:pointer;">
                            <option value="vertical">1x...</option>
                            <option value="horizontal">2x...</option>

                    <div id="stats-relations-list" style="display:flex; flex-direction:column; gap:8px;">

                <!-- Skills -->
                <div id="stats-skills-section" style="display:flex; flex-direction:column; gap:12px; display:none;">
                    <div style="color:rgba(255,255,255,.5); font-size:12px; text-transform:uppercase; letter-spacing:1px;">Skills</div>
                    <div id="stats-skills-list" style="display:flex; flex-wrap:wrap; gap:8px;">
                        <!-- Skills will be rendered here -->

        </div>

        <div id="back-popup-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,.85); display:none; align-items:center; justify-content:center; z-index:3000; backdrop-filter:blur(10px);">
            <div style="background:rgba(30,30,35,.95); border:1px solid rgba(255,255,255,.12); border-radius:18px; padding:20px; width:100%; max-width:480px; display:flex; flex-direction:column; gap:14px;">
                <div style="color:#fff; font-weight:700; text-align:center; font-size:18px;">Manage story</div>
                <div style="display:flex; flex-direction:column; gap:6px;">
                    <label for="back-story-input" style="color:rgba(255,255,255,.75); font-size:13px;">Story Name</label>
                    <input id="back-story-input" type="text" style="padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,.15); background:rgba(20,20,25,.9); color:#fff; outline:none;">
                </div>
                <div style="display:flex; gap:10px;">
                    <button id="back-popup-cancel" style="flex:1; padding:10px; border-radius:10px; background:rgba(255,255,255,.1); color:#fff; border:none; font-weight:700; cursor:pointer;">Back</button>
                    <button id="back-popup-save" style="flex:1; padding:10px; border-radius:10px; background:#4a90e2; color:#fff; border:none; font-weight:700; cursor:pointer;">Save</button>
                    <button id="back-popup-delete" style="flex:1; padding:10px; border-radius:10px; background:#b04040; color:#fff; border:none; font-weight:700; cursor:pointer;">Delete</button>
                </div>
            </div>
        </div>

        <script>
            /* ═══════════════════════════════════════
               CONSTANTS
            ═══════════════════════════════════════ */
            const SETTINGS_KEY = "storyki_settings";
            const CHARS_KEY = "storyki_characters";
            const CARDS_KEY = "storyki_storycards";
            const LOG_KEY = "storyki_storylog";
            const SCENARIOS_KEY = "storyki_scenarios";
            const SELECTED_WORLD_ID_KEY = "storyki_selected_world_id";
            const CURRENT_STORY_ID_KEY = "storyki_current_story_id";
            const ANCHORED_WORLD_CHANGES_KEY = "storyki_anchored_world_changes";
            const PENDING_MESSAGE_KEY = "storyki_pending_message";
            const RELATIONS_LAYOUT_KEY = "storyki_relations_layout";
            const NSFW_BLOCKED_TOKEN = "__NSFW_BLOCKED__";
            const NSFW_BLOCKED_TEXT = "The generated message contained offensive content which has been blocked due to your NSWF block.";

            // Storage Helper (Persistent localStorage for settings, sessionStorage for everything else)
            const Storage = {
                get: (key) => {
                    if (key === SETTINGS_KEY) {
                        const val = localStorage.getItem(key);
                        console.log("[DEBUG Storage.get] SETTINGS_KEY:", key, "Value:", val);
                        return val;
                    }
                    return sessionStorage.getItem(key);
                },
                set: (key, val) => {
                    if (key === SETTINGS_KEY) {
                        localStorage.setItem(key, val);
                    } else {
                        sessionStorage.setItem(key, val);
                    }
                },
                remove: (key) => {
                    if (key === SETTINGS_KEY) {
                        localStorage.removeItem(key);
                    } else {
                        sessionStorage.removeItem(key);
                    }
                },
                clear: () => sessionStorage.clear()
            };

            /* ═══════════════════════════════════════
               STATE
            ═══════════════════════════════════════ */
            let chatHistory = [];
            let isBusy = false;
            let activeChar = null;
            let currentLocationId = null;
            let isFirstMessageProtected = false;
            let isEditing = false;
            let _editRow = null;
            let _editIndex = -1;
            let currentNarrationTs = null;

            // Pending travel state (delayed until user sends a message)
            let pendingMoveLocationId = null; // For "Move to..."
            let pendingTravel = null; // { destinationId, transportBuildingId, travelTime } for "Travel"

            function normalizeBirthdate(raw) {
                if (!raw || typeof raw !== "object") return null;
                const day = parseInt(raw.day, 10) || null;
                const month = parseInt(raw.month, 10) || null;
                if (!day || !month) return null;
                return { day, month };
            }

            function readBirthdate(entity) {
                if (!entity || typeof entity !== "object") return null;
                return normalizeBirthdate(entity.birthdate || entity.birthDate || entity.birthday || null);
            }

            function formatBirthdate(bd) {
                if (!bd || !bd.day || !bd.month) return "";
                return `${String(bd.day).padStart(2, "0")}.${String(bd.month).padStart(2, "0")}`;
            }

            function readSecrets(entity) {
                if (!entity || typeof entity !== "object" || !Array.isArray(entity.secrets)) return [];
                return entity.secrets
                    .map((s) => {
                        if (typeof s === "string") return s.trim();
                        if (s && typeof s === "object") return String(s.text || "").trim();
                        return "";
                    })
                    .filter(Boolean);
            }

            function readKnownSecrets(entity) {
                if (!entity || typeof entity !== "object" || !Array.isArray(entity.knownSecrets)) return [];
                return entity.knownSecrets
                    .map((s) => {
                        if (typeof s === "string") return s.trim();
                        if (s && typeof s === "object") return String(s.text || "").trim();
                        return "";
                    })
                    .filter(Boolean);
            }

            /* ═══════════════════════════════════════
               TIME & COMMAND SYSTEM
            ═══════════════════════════════════════ */
            function saveActiveCharacter() {
                if (!activeChar) return;
                try {
                    const chars = JSON.parse(
                        Storage.get(CHARS_KEY) || "[]",
                    );
                    const idx = chars.findIndex((c) => c.id === activeChar.id);
                    if (idx !== -1) {
                        chars[idx] = activeChar;
                        Storage.set(CHARS_KEY, JSON.stringify(chars));
                    }
                    autoSaveStory();
                } catch (e) {
                    console.error("Failed to save character", e);
                }
            }

            function saveStoryLog() {
                try {
                    Storage.set(LOG_KEY, JSON.stringify(chatHistory));
                    autoSaveStory();
                } catch (e) {
                    console.error("Failed to save story log", e);
                }
            }

            function getAnchoredWorldChanges() {
                try {
                    const storyId = getCurrentStoryId() || "_default";
                    const raw = Storage.get(ANCHORED_WORLD_CHANGES_KEY);
                    const root = raw ? JSON.parse(raw) : {};
                    return root && typeof root === "object" ? (root[storyId] || {}) : {};
                } catch {
                    return {};
                }
            }

            function saveAnchoredWorldChanges(changes) {
                try {
                    const storyId = getCurrentStoryId() || "_default";
                    const raw = Storage.get(ANCHORED_WORLD_CHANGES_KEY);
                    const root = raw ? JSON.parse(raw) : {};
                    root[storyId] = changes || {};
                    Storage.set(ANCHORED_WORLD_CHANGES_KEY, JSON.stringify(root));
                } catch (e) {
                    console.warn("Failed to save anchored world changes", e);
                }
            }

            function rememberAnchoredWorldChange(ts, change) {
                if (!ts || !change || !change.type) return;
                const changes = getAnchoredWorldChanges();
                const key = String(ts);
                if (!Array.isArray(changes[key])) changes[key] = [];
                const exists = changes[key].some((entry) => {
                    if (!entry || entry.type !== change.type) return false;
                    if (change.type === "npcDeath") return entry.npcId === change.npcId;
                    if (change.type === "eventExpired") {
                        const sigA = JSON.stringify(change.event || {});
                        const sigB = JSON.stringify(entry.event || {});
                        return entry.locId === change.locId && entry.bucket === change.bucket && entry.index === change.index && sigA === sigB;
                    }
                    return false;
                });
                if (!exists) {
                    changes[key].push(change);
                    saveAnchoredWorldChanges(changes);
                }
            }

            function buildCurrentWorldStamp(anchorTs = null) {
                const d = activeChar?.startingDate || {};
                return {
                    date: `${String(d.day || 1).padStart(2, "0")}.${String(d.month || 1).padStart(2, "0")}.${d.year || 1983}`,
                    time: d.time || "00:00",
                    location: document.getElementById("header-location")?.textContent || "Unknown Location",
                    logTs: anchorTs || null
                };
            }

            function applyNpcDeath(npcId, cause, anchorTs = null) {
                const id = String(npcId || "").trim();
                const deathCause = String(cause || "").trim();
                if (!id || !deathCause) return false;
                if (activeChar && activeChar.id === id) return false;
                const cards = getCards();
                const npc = cards.find((c) => c.genre === "character" && c.id === id);
                if (!npc) return false;

                rememberAnchoredWorldChange(anchorTs, {
                    type: "npcDeath",
                    npcId: npc.id,
                    previousStatus: npc.status || "Alive",
                    previousDeathCause: npc.deathCause || "",
                    previousDeathInfo: npc.deathInfo ? { ...npc.deathInfo } : null
                });

                npc.status = "Dead";
                npc.deathCause = deathCause;
                npc.deathInfo = {
                    ...buildCurrentWorldStamp(anchorTs),
                    id: npc.id,
                    cause: deathCause
                };
                sessionStorage.setItem(CARDS_KEY, JSON.stringify(cards));
                return true;
            }

            function addKnownSecret(npcId, secretText, anchorTs = null) {
                const id = String(npcId || "").trim();
                const secret = String(secretText || "").trim();
                if (!id || !secret) return false;
                if (activeChar && activeChar.id === id) return false; // Player can't learn secrets this way
                const cards = getCards();
                const npc = cards.find((c) => c.genre === "character" && c.id === id);
                if (!npc) return false;

                // Initialize knownSecrets array if needed
                if (!Array.isArray(npc.knownSecrets)) npc.knownSecrets = [];

                // Check if already known (avoid duplicates)
                const alreadyKnown = npc.knownSecrets.some(s =>
                    String(s.text || s).toLowerCase() === secret.toLowerCase()
                );
                if (alreadyKnown) return false;

                // Add to known secrets with metadata
                npc.knownSecrets.push({
                    text: secret,
                    learnedAt: Date.now(),
                    learnedByTs: anchorTs || null,
                    date: buildCurrentWorldStamp(anchorTs)
                });

                sessionStorage.setItem(CARDS_KEY, JSON.stringify(cards));
                return true;
            }

            function rollbackToLastWorldState() {
                if (!activeChar) return;
                // Find last Narrator entry; fallback to any last entry
                let entry = null;
                for (let i = chatHistory.length - 1; i >= 0; i--) {
                    const e = chatHistory[i];
                    if (typeof e !== "string" && e.sender === "Narrator") {
                        entry = e;
                        break;
                    }
                }
                if (!entry) {
                    for (let i = chatHistory.length - 1; i >= 0; i--) {
                        const e = chatHistory[i];
                        if (typeof e !== "string") {
                            entry = e;
                            break;
                        }
                    }
                }
                if (!entry) return;

                if (!activeChar.startingDate) activeChar.startingDate = {};
                const d = activeChar.startingDate;
                if (entry.date) {
                    const parts = entry.date.split(".");
                    if (parts.length === 3) {
                        d.day = parseInt(parts[0]) || d.day || 1;
                        d.month = parseInt(parts[1]) || d.month || 1;
                        d.year = parseInt(parts[2]) || d.year || 1983;
                    }
                }
                if (entry.time) {
                    d.time = entry.time;
                }
                updateHeaderTime();
                if (entry.location) {
                    updateLocation(entry.location);
                }

                // Restore level data if present in entry
                if (entry.levelData) {
                    activeChar.levelData = { ...entry.levelData };
                    // Update the character card in storage
                    const cards = getCards();
                    const idx = cards.findIndex(c => c.id === activeChar.id);
                    if (idx !== -1) {
                        cards[idx].levelData = { ...entry.levelData };
                        Storage.set("storyki_world_cards", JSON.stringify(cards));
                    }
                    // Update stats display
                    renderStatsLevel();
                }

                saveActiveCharacter();
            }

            function loadStoryLog() {
                try {
                    const raw = Storage.get(LOG_KEY);
                    if (raw) {
                        chatHistory = JSON.parse(raw);
                        if (!window._chatPageSize) window._chatPageSize = 12;
                        if (!window._chatLoadedCount) window._chatLoadedCount = 0;
                        window._chatLoadedCount = Math.min(window._chatPageSize, chatHistory.length);
                        renderChatWindow(false, 0);
                        const messagesEl = document.getElementById("messages");
                        if (messagesEl && !window._chatScrollBound) {
                            window._chatScrollBound = true;
                            messagesEl.addEventListener("scroll", function () {
                                if (messagesEl.scrollTop <= 5 && window._chatLoadedCount < chatHistory.length) {
                                    const prevHeight = messagesEl.scrollHeight;
                                    window._chatLoadedCount = Math.min(window._chatLoadedCount + window._chatPageSize, chatHistory.length);
                                    renderChatWindow(true, prevHeight);
                                }
                            });
                        }
                    }

            }

            function renderChatWindow(preserve, prevHeight) {

                if (!messagesEl) return;

                const start = Math.max(0, total - (window._chatLoadedCount || 0));

            function addToStoryLog(sender, text, tsOverride = null) {

            function updateHeaderTime() {
                if (!activeChar) return;
                const d = activeChar.startingDate || {};
                try { updateNPCBirthdays(d); updatePlayerBirthday(d); } catch {}
                const day = String(d.day || 1).padStart(2, "0");
                const mon = String(d.month || 1).padStart(2, "0");
                const yr = d.year || 1983;

            function applyTextSizeLimit(text) {
                try {
                    const settings = JSON.parse(Storage.get(SETTINGS_KEY) || "{}");
                    const size = (settings.textSize || "normal").toLowerCase();
                    let maxSentences = 0;
                    let maxChars = 1000;
                    if (size === "short") {
                        maxSentences = 2;
                        maxChars = 300;
                    } else if (size === "tall") {
                        maxSentences = 0;
                        maxChars = 2400;
                    } else {
                        maxSentences = 6;
                        maxChars = 1000;
                    }
                    if (!text) return text;
                    let out = text.trim();
                    if (maxSentences > 0) {
                        const sentences = out.match(/[^.!?…]+[.!?…]+(?:\s+|$)|[^.!?…]+$/g) || [out];
                        if (sentences.length > maxSentences) {
                            out = sentences.slice(0, maxSentences).join(" ").trim();
                        }
                    }
                    if (out.length > maxChars) {
                        const cutoff = maxChars;
                        const substr = out.substring(0, cutoff);
                        const lastPunct = Math.max(substr.lastIndexOf("."), substr.lastIndexOf("!"), substr.lastIndexOf("?"), substr.lastIndexOf("…"), substr.lastIndexOf("\n"));
                        const lastSpace = substr.lastIndexOf(" ");
                        const idx = lastPunct > 120 ? lastPunct : (lastSpace > 120 ? lastSpace : cutoff);
                        out = substr.substring(0, idx).trimEnd();
                        // avoid artificial ellipsis; ensure sentence closure
                        if (!/[.!?…]"?$/.test(out)) out += ".";
                    }
                    // Balance quotes (ASCII and curly)
                    const asciiQuotes = (out.match(/"/g) || []).length;
                    if (asciiQuotes % 2 === 1) out += '"';
                    const leftCurly = (out.match(/“|„/g) || []).length;
                    const rightCurly = (out.match(/”/g) || []).length;
                    if (leftCurly > rightCurly) out += "”";
                    return out;
                } catch {
                    return text;
                }
            }

            // Calendar helpers: real month lengths incl. leap years
            function isLeapYear(y) {
                y = parseInt(y, 10) || 0;
                return (y % 4 === 0 && y % 100 !== 0) || (y % 400 === 0);
            }
            function daysInMonth(m, y) {
                m = parseInt(m, 10) || 1;
                y = parseInt(y, 10) || 1983;
                if (m === 2) return isLeapYear(y) ? 29 : 28;
                if (m === 4 || m === 6 || m === 9 || m === 11) return 30;
                return 31;
            }
            function normalizeYMD(d) {
                d.day = parseInt(d.day || 1, 10);
                d.month = parseInt(d.month || 1, 10);
                d.year = parseInt(d.year || 1983, 10);
                // normalize month to 1..12
                while (d.month > 12) { d.month -= 12; d.year += 1; }
                while (d.month < 1)  { d.month += 12; d.year -= 1; }
                // carry overflow days forward
                let dim = daysInMonth(d.month, d.year);
                while (d.day > dim) {
                    d.day -= dim;
                    d.month += 1;
                    if (d.month > 12) { d.month = 1; d.year += 1; }
                    dim = daysInMonth(d.month, d.year);
                }
                // carry negative/underflow days backward
                while (d.day < 1) {
                    d.month -= 1;
                    if (d.month < 1) { d.month = 12; d.year -= 1; }
                    d.day += daysInMonth(d.month, d.year);
                }
                return d;
            }

            function addMinutes(mins) {
                if (!activeChar) return;
                if (!activeChar.startingDate) activeChar.startingDate = {};
                const d = activeChar.startingDate;

                let [h, m] = (d.time || "00:00").split(":").map(Number);
                let totalMins = h * 60 + m + (mins || 0);
                const dayLen = 24 * 60;
                let daysDelta = Math.floor(totalMins / dayLen);
                let rest = totalMins % dayLen;
                if (rest < 0) { rest += dayLen; daysDelta -= 1; }
                const nh = Math.floor(rest / 60);
                const nm = rest % 60;
                d.time = `${String(nh).padStart(2, "0")}:${String(nm).padStart(2, "0")}`;
                d.day = (d.day || 1) + daysDelta;
                normalizeYMD(d);
                syncNpcInactivityCounters();
                updateNPCBirthdays(d);
                updatePlayerBirthday(d);
                updateHeaderTime();
                saveActiveCharacter();
                console.log(`[Time Update] New Time: ${d.day}.${d.month}.${d.year} ${d.time}`);
            }

            function isNsfwBlockEnabled() {
                try {
                    const settings = JSON.parse(Storage.get(SETTINGS_KEY) || "{}");
                    return String(settings.nsfwBlock || "off").toLowerCase() === "on";
                } catch {
                    return false;
                }
            }

            function processAICommands(text) {
                if (!text) return "";
                if (!activeChar) return text.replace(/\[\[.*?\]\]/g, "").trim();
                if (isNsfwBlockEnabled() && /\[\[\s*NSFW\s*\]\]/i.test(text)) return NSFW_BLOCKED_TOKEN;
                if (!activeChar.startingDate) activeChar.startingDate = {};
                const d = activeChar.startingDate;
                if (!d.day) d.day = 1;
                if (!d.month) d.month = 1;
                if (!d.year) d.year = 1983;
                if (!d.time) d.time = "00:00";

                const tagPattern = /\[\[(.*?)\]\]/g;
                let match;
                let timeChanged = false;
                let locationChanged = false;
                let npcDeathsChanged = false;
                // Reset pending memory targets for this response
                window._pendingMemoryTargets = [];

                while ((match = tagPattern.exec(text)) !== null) {
                    const content = match[1].trim();
                    // Handle NPC memory ID list tags: [[Memory:ID1:Common,ID2:Important]]
                    const memIdList = content.match(/^Memory\s*:\s*(.+)$/i);
                    if (memIdList) {
                        try {
                            const payload = memIdList[1].trim();
                            const items = payload.split(/,\s*/).map(s => s.trim()).filter(Boolean);
                            const targets = [];
                            items.forEach(it => {
                                const m = it.match(/^([A-Za-z0-9\-]+)\s*:\s*(Common|Important)$/i);
                                if (m) {
                                    const id = m[1].trim();
                                    const level = (m[2] || "Common").toLowerCase() === "important" ? "Important" : "Common";
                                    targets.push({ id, level });
                                }
                            });
                            window._pendingMemoryTargets = targets;
                        } catch (e) {
                            console.warn("Memory tag parse failed", e);
                        }
                        continue;
                    }
                    const deathTag = content.match(/^(?:Death|Dead)\s*:\s*([A-Za-z0-9\-_]+)\s*\|\s*(.+)$/i);
                    if (deathTag) {
                        const npcId = deathTag[1].trim();
                        const deathCause = deathTag[2].trim();
                        if (applyNpcDeath(npcId, deathCause, currentNarrationTs)) {
                            npcDeathsChanged = true;
                        }
                        continue;
                    }
                    // Handle Killed tags: [[Killed:Species_ID:Player,NPC_ID,...]]
                    const killedTag = content.match(/^Killed\s*:\s*([A-Za-z0-9\-_]+)\s*:\s*(.+)$/i);
                    if (killedTag) {
                        const speciesId = killedTag[1].trim();
                        const recipientsStr = killedTag[2].trim();
                        processKillCommand(speciesId, recipientsStr);
                        continue;
                    }
                    // Handle SecretRevelation tags: [[SecretRevelation:NPC_ID|Secret text]]
                    const secretRevTag = content.match(/^SecretRevelation\s*:\s*([A-Za-z0-9\-_]+)\s*\|\s*(.+)$/i);
                    if (secretRevTag) {
                        const npcId = secretRevTag[1].trim();
                        const secretText = secretRevTag[2].trim();
                        addKnownSecret(npcId, secretText, currentNarrationTs);
                        continue;
                    }
                    const parts = content.split(/[,;]+/).map(s => s.trim()).filter(Boolean);

                    for (const part of parts) {
                        const addParty = part.match(/^AddToParty\s*:\s*(.+)$/i);
                        if (addParty) {
                            const payload = addParty[1].trim();
                            addSpeciesToPartyByRef(payload);
                            continue;
                        }
                        const locState = part.match(/^LocState\s*:\s*(.+)$/i);
                        if (locState) {
                            const payload = locState[1];
                            const kvs = payload.split(/;\s*/).filter(Boolean);
                            kvs.forEach(seg => {
                                const m = seg.match(/^([^=]+)=([^;]+)$/);
                                if (m) {
                                    const key = m[1].trim();
                                    const val = m[2].trim();
                                    let ttlDays = null;
                                    const ttlMatch = seg.match(/ttl\s*=\s*(\d+)\s*d/i);
                                    if (ttlMatch) ttlDays = parseInt(ttlMatch[1], 10);
                                    setLocationState(key, val, ttlDays, currentNarrationTs);
                                } else {
                                    const ttlOnly = seg.match(/^ttl\s*=\s*(\d+)\s*d/i);
                                    if (ttlOnly) {
                                        const ttlDays = parseInt(ttlOnly[1], 10);
                                        setLocationState("state", "updated", ttlDays, currentNarrationTs);
                                    }
                                }
                            });
                            continue;
                        }
                        const absTime = part.match(/^(\d+)\s*\|\s*(\d+)\s*\|\s*(\d+)\s*\|\s*(\d{2}:\d{2})$/)
                            || part.match(/^(\d+),\s*(\d+),\s*(\d+),\s*(\d{2}:\d{2})$/);
                        if (absTime) {
                            const day = parseInt(absTime[1]);
                            const month = parseInt(absTime[2]);
                            const year = parseInt(absTime[3]);
                            const timeStr = absTime[4];
                            d.day = day;
                            d.month = (month > 0 && month <= 12) ? month : d.month;
                            d.year = year;
                            d.time = timeStr;
                            timeChanged = true;
                            continue;
                        }

                        const relTime = part.match(/^(Year|Month|Week|Day|Time)\s*:\s*([+-]?\d+(?::\d{2})?)$/i);
                        if (relTime) {
                            const key = relTime[1].toLowerCase();
                            const valueStr = relTime[2];

                            const parseHM = (t) => {
                                const ps = (t || "00:00").split(":").map(Number);
                                return { h: ps[0] || 0, m: ps[1] || 0 };
                            };
                            const setHM = (h, m) => {
                                d.time = `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
                            };
                            const applyVal = (cur, valStr) => {
                                if (valStr.startsWith("+")) return cur + parseInt(valStr.substring(1));
                                if (valStr.startsWith("-")) return cur - parseInt(valStr.substring(1));
                                return parseInt(valStr);
                            };

                            if (key === "year") {
                                d.year = applyVal(d.year || 1983, valueStr);
                            } else if (key === "month") {
                                const isRel = valueStr.startsWith("+") || valueStr.startsWith("-");
                                if (isRel) {
                                    let m = (d.month || 1) + parseInt(valueStr);
                                    let y = d.year || 1983;
                                    while (m > 12) { m -= 12; y++; }
                                    while (m < 1) { m += 12; y--; }
                                    d.month = m;
                                    d.year = y;
                                } else {
                                    let m = parseInt(valueStr);
                                    d.month = (m > 0 && m <= 12) ? m : (d.month || 1);
                                }
                            } else if (key === "week") {
                                d.day = (d.day || 1) + (parseInt(valueStr) * 7);
                            } else if (key === "day") {
                                const isRel = valueStr.startsWith("+") || valueStr.startsWith("-");
                                if (isRel) {
                                    d.day = (d.day || 1) + parseInt(valueStr);
                                } else {
                                    d.day = parseInt(valueStr);
                                }
                            } else if (key === "time") {
                                if (valueStr.includes(":")) {
                                    d.time = valueStr;
                                } else {
                                    const mins = parseInt(valueStr);
                                    const cur = parseHM(d.time);
                                    let total = cur.h * 60 + cur.m + mins;
                                    while (total < 0) total += 24 * 60;
                                    total = total % (24 * 60);
                                    const nh = Math.floor(total / 60);
                                    const nm = total % 60;
                                    setHM(nh, nm);
                                }
                            }

                    // Normalize minutes and Y/M/D with real month lengths
                    (function norm() {
                        let [hh, mm] = (d.time || "00:00").split(":").map(Number);
                        let total = hh * 60 + mm;
                        const dayLen = 24 * 60;
                        let dd = Math.floor(total / dayLen);
                        let rest = total % dayLen;
                        if (rest < 0) { rest += dayLen; dd -= 1; }
                        hh = Math.floor(rest / 60);
                        mm = rest % 60;
                        d.time = `${String(hh).padStart(2, "0")}:${String(mm).padStart(2, "0")}`;
                        d.day = (d.day || 1) + dd;
                        normalizeYMD(d);
                    })();

                            timeChanged = true;
                            continue;
                        }

                        const locKV = part.match(/^(Location|Loc)\s*:\s*["']?(.+?)["']?$/i);
                        if (locKV) {
                            const locName = locKV[2].trim();
                            updateLocation(locName);
                            locationChanged = true;
                            continue;
                        }

                        if (!part.includes(":")) {
                            const num = parseInt(part);
                            if (isNaN(num)) {
                                updateLocation(part);
                                locationChanged = true;
                                continue;
                            }
                        }
                    }
                }

                // Parse final metadata block [[TIME: HH:MM, LOCATION: "Exact Name"]]
                const metaMatch = text.match(/\[\[\s*TIME\s*:\s*([0-2]?\d:\d{2})\s*,\s*LOCATION\s*:\s*["']?(.+?)["']?\s*\]\]\s*$/i);
                if (metaMatch) {
                    const tStr = metaMatch[1];
                    const locStr = metaMatch[2];
                    if (/^\d{1,2}:\d{2}$/.test(tStr)) {
                        d.time = tStr;
                        timeChanged = true;
                    }
                    if (locStr && locStr.trim()) {
                        updateLocation(locStr.trim());
                        locationChanged = true;
                    }
                }

                if (!timeChanged) {
                    addMinutes(1);
                    clearExpiredLocationEvents(currentNarrationTs);
                    try { recalcEventOverrides(); updatePresentNPCs(); } catch(e) { console.warn("recalcEventOverrides failed", e); }
                    clearExpiredNpcMemories();
                } else {
                    syncNpcInactivityCounters();
                    updateNPCBirthdays(d);
                    updatePlayerBirthday(d);
                    updateHeaderTime();
                    clearExpiredLocationEvents(currentNarrationTs);
                    try { recalcEventOverrides(); updatePresentNPCs(); } catch(e) { console.warn("recalcEventOverrides failed", e); }
                    saveActiveCharacter();
                    clearExpiredNpcMemories();
                }
                if (npcDeathsChanged) {
                    updatePresentNPCs();
                }

                return text.replace(/\[\[.*?\]\]/g, "").replace(/\s+/g, " ").trim();
            }

            function handleCommand(key, val) {
                if (!activeChar) return;
                if (!activeChar.startingDate) activeChar.startingDate = {};
                const d = activeChar.startingDate;
                key = key.toLowerCase();
                console.log(`[AI Command] ${key} = ${val}`);

                if (key === "time") {
                    if (val.startsWith("+")) {
                        addMinutes(parseInt(val.substring(1)) || 0);
                    } else if (val.startsWith("-")) {
                        addMinutes(-(parseInt(val.substring(1)) || 0));
                    } else {
                        d.time = val;
                    }
                } else if (key === "day") {
                    d.day = parseInt(val) || d.day;
                } else if (key === "month") {
                    d.month = parseInt(val) || d.month;
                } else if (key === "year") {
                    d.year = parseInt(val) || d.year;
                } else if (
                    key === "add_m" ||
                    key === "add_min" ||
                    key === "add_minutes"
                ) {
                    addMinutes(parseInt(val) || 0);
                } else if (
                    key === "add_h" ||
                    key === "add_hour" ||
                    key === "add_hours"
                ) {
                    addMinutes((parseInt(val) || 0) * 60);
                } else if (key === "location" || key === "loc") {
                    updateLocation(val);
                }
                
                syncNpcInactivityCounters();
                updateNPCBirthdays(d);
                updatePlayerBirthday(d);
                updateHeaderTime();
                saveActiveCharacter();
            }

            function _genId() { return Math.random().toString(36).slice(2, 10); }
            function addSpeciesToPartyByRef(ref) {
                try {
                    const cards = getCards();
                    let spec = null;
                    const idMatch = ref.match(/speciesId\s*=\s*([a-z0-9_-]+)/i);
                    if (idMatch) {
                        const id = idMatch[1];
                        spec = cards.find(c => c.genre === "species" && c.id === id) || null;
                    }
                    if (!spec) {
                        const quoted = ref.match(/["'](.+?)["']/);
                        const title = quoted ? quoted[1] : ref;
                        const t = title.trim().toLowerCase();
                        spec = cards.find(c => c.genre === "species" && (c.title || "").toLowerCase() === t) || null;
                    }
                    if (!spec) return;
                    const raw = Storage.get(CHARS_KEY) || "[]";
                    const chars = JSON.parse(raw);
                    const exists = chars.some(ch => (ch._fromSpeciesId && ch._fromSpeciesId === spec.id) && (ch.title || "") === (spec.title || ""));
                    if (exists) return;
                    const ch = {
                        id: _genId(),
                        genre: "character",
                        title: spec.title || "Creature",
                        appearance: spec.appearance || "",
                        personality: spec.personality || "",
                        raceName: spec.title || "",
                        status: "Alive",
                        isPlayable: false,
                        _fromSpeciesId: spec.id || "",
                        createdAt: Date.now(),
                        updatedAt: Date.now()
                    };
                    chars.push(ch);
                    Storage.set(CHARS_KEY, JSON.stringify(chars));
                } catch {}
            }
            function _cmpDate(a, b) {
                if ((a.year || 0) !== (b.year || 0)) return (a.year || 0) - (b.year || 0);
                if ((a.month || 0) !== (b.month || 0)) return (a.month || 0) - (b.month || 0);
                return (a.day || 0) - (b.day || 0);
            }
            function _doy(day, month) { return ((month || 1) - 1) * 30 + (day || 1); }
            function _birthsUpTo(date, bd) {
                if (!date || !bd) return 0;
                const y = date.year || 0;
                const passed = _doy(date.day || 1, date.month || 1) >= _doy(bd.day || 1, bd.month || 1) ? 1 : 0;
                return y + passed;
            }
            function _birthdaysDiff(a, b, bd) {
                if (!bd) return 0;
                return _birthsUpTo(b, bd) - _birthsUpTo(a, bd);
            }
            function updateNPCBirthdays(currentDate) {
                try {
                    const raw = Storage.get(CHARS_KEY) || "[]";
                    const chars = JSON.parse(raw);
                    let changed = false;
                    for (let i = 0; i < chars.length; i++) {
                        const c = chars[i];
                        if (!c || c.status === "Dead") continue;
                        const bd = readBirthdate(c);
                        if (!bd || (!bd.day && !bd.month)) continue;
                        if (!c.birthdate || c.birthdate.day !== bd.day || c.birthdate.month !== bd.month) {
                            c.birthdate = { day: bd.day, month: bd.month };
                            changed = true;
                        }
                        if (typeof c.age !== "number") continue;
                        if (!c._ageCheck || typeof c._ageCheck !== "object") {
                            c._ageCheck = { day: currentDate.day || 1, month: currentDate.month || 1, year: currentDate.year || 1983 };
                            changed = true;
                            continue;
                        }
                        const diff = _birthdaysDiff(c._ageCheck, currentDate, bd);
                        if (diff !== 0) {
                            c.age = Math.max(0, (c.age || 0) + diff);
                            c._ageCheck = { day: currentDate.day || 1, month: currentDate.month || 1, year: currentDate.year || 1983 };
                            changed = true;
                        }
                    }
                    if (changed) {
                        Storage.set(CHARS_KEY, JSON.stringify(chars));
                    }
                } catch {}
            }
            function updatePlayerBirthday(currentDate) {
                try {
                    if (!activeChar) return;
                    const bd = readBirthdate(activeChar);
                    if (!bd || (!bd.day && !bd.month)) return;
                    if (!activeChar.birthdate || activeChar.birthdate.day !== bd.day || activeChar.birthdate.month !== bd.month) {
                        activeChar.birthdate = { day: bd.day, month: bd.month };
                    }
                    if (typeof activeChar.age !== "number") return;
                    if (!activeChar._ageCheck || typeof activeChar._ageCheck !== "object") {
                        activeChar._ageCheck = { day: currentDate.day || 1, month: currentDate.month || 1, year: currentDate.year || 1983 };
                        return;
                    }
                    const diff = _birthdaysDiff(activeChar._ageCheck, currentDate, bd);
                    if (diff !== 0) {
                        activeChar.age = Math.max(0, (activeChar.age || 0) + diff);
                        activeChar._ageCheck = { day: currentDate.day || 1, month: currentDate.month || 1, year: currentDate.year || 1983 };
                    }
                } catch {}
            }

            /* ═══════════════════════════════════════
               BACKGROUND
            ═══════════════════════════════════════ */
            function loadBackground() {
                const raw = Storage.get(SETTINGS_KEY);
                let url = raw
                    ? JSON.parse(raw).backgroundUrl ||
                      "https://wallpapers.com/images/hd/lake-in-the-forest-nature-xavnq3nwry0es5if.webp"
                    : "https://wallpapers.com/images/hd/lake-in-the-forest-nature-xavnq3nwry0es5if.webp";
                try {
                    if (currentLocationId) {
                        const cards = getCards();
                        const loc = cards.find(c => c.id === currentLocationId);
                        if (loc && typeof loc.backgroundUrl === "string" && loc.backgroundUrl.trim()) {
                            url = loc.backgroundUrl.trim();

                } catch {}
                const el = document.getElementById("bg-layer");

            }
            function getScenariosLocal() {
                try { return JSON.parse(localStorage.getItem(SCENARIOS_KEY) || "[]"); } catch { return []; }
            }
            function setScenariosLocal(list) {
                localStorage.setItem(SCENARIOS_KEY, JSON.stringify(list));
