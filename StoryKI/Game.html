<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>StoryKI – Game</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                scrollbar-width: thin;
                scrollbar-color: rgba(255, 255, 255, 0.12) transparent;
            }
            *::-webkit-scrollbar {
                width: 4px;
            }
            *::-webkit-scrollbar-track {
                background: transparent;
            }
            *::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.12);
                border-radius: 2px;
            }

            

            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                font-family: "Segoe UI", Arial, sans-serif;
            }

            body {
                background: #0a0a0a;
                color: #fff;
                opacity: 0;
                transition: opacity 0.4s ease-in-out;
            }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.52);
                z-index: 0;
                pointer-events: none;
            }

            /* ─── Background Layer ─── */
            #bg-layer {
                position: fixed;
                inset: 0;
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
                z-index: -1;
                filter: blur(3px) brightness(0.5);
                transition: background-image 0.6s ease;
            }

            /* ─── App Shell ─── */
            #app {
                position: relative;
                z-index: 1;
                display: flex;
                flex-direction: column;
                height: 100vh;
                max-width: 820px;
                margin: 0 auto;
            }

            /* ════════════════════════════════════
               HEADER / TOP NAV
            ════════════════════════════════════ */
            #header {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 14px 20px;
                flex-shrink: 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.07);
                background: rgba(8, 8, 8, 0.55);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
            }

            .nav-back-btn {
                width: 36px;
                height: 36px;
                border-radius: 50%;
                border: 2px solid rgba(255, 255, 255, 0.18);
                background: rgba(28, 28, 28, 0.75);
                color: #fff;
                font-size: 15px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition:
                    background 0.2s,
                    border-color 0.2s;
                flex-shrink: 0;
            }
            .nav-back-btn:hover {
                background: rgba(55, 55, 55, 0.95);
                border-color: rgba(255, 255, 255, 0.4);
            }

            .nav-stats-btn {
                padding: 8px 14px;
                border-radius: 10px;
                border: 1px solid rgba(255, 255, 255, 0.15);
                background: rgba(40, 100, 140, 0.4);
                color: #7ec9ff;
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 6px;
                transition: all 0.2s;
                flex-shrink: 0;
            }
            .nav-stats-btn:hover {
                background: rgba(50, 120, 170, 0.6);
                border-color: rgba(255, 255, 255, 0.3);
            }

            /* Stats Panel */
            #stats-panel-overlay {
                opacity: 0;
                transition: opacity 0.2s;
            }
            #stats-panel-overlay.show {
                opacity: 1;
            }
            #stats-panel-overlay.show #stats-panel {
                transform: translateY(0);
            }
            #stats-panel {
                transform: translateY(20px);
                transition: transform 0.3s ease-out;
            }

            .stats-relation-item {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 10px 12px;
                background: rgba(255, 255, 255, 0.08);
                border-radius: 10px;
            }
            #stats-relations-list.horizontal {
                display: flex !important;
                flex-direction: row !important;
                flex-wrap: wrap !important;
                gap: 8px;
            }
            #stats-relations-list.horizontal .stats-relation-item {
                flex: 1 1 calc(50% - 4px);
                min-width: 140px;
                max-width: calc(50% - 4px);
            }

            .stats-relation-avatar {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.1);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
                flex-shrink: 0;
            }
            .stats-relation-info {
                flex: 1;
                display: flex;
                flex-direction: column;
                gap: 2px;
            }
            .stats-relation-name {
                color: #fff;
                font-size: 14px;
                font-weight: 600;
            }
            .stats-relation-type {
                color: rgba(255, 255, 255, 0.5);
                font-size: 12px;
                text-transform: capitalize;
            }
            .stats-no-relations {
                color: rgba(255, 255, 255, 0.4);
                font-size: 13px;
                font-style: italic;
                text-align: center;
                padding: 20px;
            }

            /* Stats Skills */
            .stats-skill-tag {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 8px 14px;
                background: rgba(100, 140, 100, 0.25);
                border: 1px solid rgba(100, 200, 100, 0.3);
                border-radius: 20px;
                color: #7ecf7e;
                font-size: 13px;
                font-weight: 500;
            }
            .stats-skill-tag::before {
                content: "🛠️";
                font-size: 12px;
            }
            .stats-no-skills {
                color: rgba(255, 255, 255, 0.4);
                font-size: 13px;
                font-style: italic;
                text-align: center;
                padding: 20px;
            }


            /* Info Block (Time/Loc) */
            #header-info {
                flex: 1;
                display: none;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                margin: 0 10px;
                text-align: center;
            }
            #header-location {
                font-size: 12px;
                font-weight: 700;
                color: rgba(255, 255, 255, 0.9);
                letter-spacing: 0.05em;
                text-transform: uppercase;
            }
            #header-time {
                font-size: 11px;
                color: rgba(255, 255, 255, 0.5);
                font-family: monospace;
                margin-top: 2px;
            }
            #header-event {
                font-size: 11px;
                font-weight: 700;
                color: rgba(255, 120, 120, 0.95);
                margin-top: 4px;
                text-shadow: 0 1px 2px rgba(0,0,0,0.45);
            }

            /* Character badge in header */
            #char-badge {
                display: none;
                align-items: center;
                gap: 8px;
                padding: 6px 12px;
                background: rgba(30, 30, 40, 0.8);
                border: 1.5px solid rgba(255, 255, 255, 0.1);
                border-radius: 20px;
                flex-shrink: 0;
            }
            #char-badge.visible {
                display: flex;
            }
            .char-avatar-sm {
                width: 24px;
                height: 24px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 13px;
                flex-shrink: 0;
            }
            .char-avatar-sm.male {
                background: rgba(30, 60, 110, 0.9);
                border: 1.5px solid rgba(80, 140, 220, 0.4);
            }
            .char-avatar-sm.female {
                background: rgba(110, 30, 60, 0.9);
                border: 1.5px solid rgba(220, 80, 140, 0.4);
            }
            .char-name-sm {
                font-size: 12px;
                font-weight: 700;
                color: rgba(255, 255, 255, 0.8);
            }
            .char-race-sm {
                font-size: 10px;
                color: rgba(200, 160, 60, 0.85);
                font-weight: 600;
            }

            /* NPCs Present Bar */
            #present-npcs-bar {
                display: none;
                background: rgba(12, 12, 12, 0.4);
                backdrop-filter: blur(8px);
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                padding: 8px 20px;
                overflow-x: auto;
                white-space: nowrap;
                gap: 12px;
                align-items: center;
                flex-shrink: 0;
            }
            #present-npcs-bar.visible {
                display: flex;
            }
            .npc-item {
                display: flex;
                align-items: center;
                gap: 6px;
                background: rgba(40, 40, 50, 0.6);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 16px;
                padding: 4px 10px;
                cursor: pointer;
                transition: background 0.2s;
            }
            .npc-item:hover {
                background: rgba(60, 60, 80, 0.8);
            }
            .npc-avatar-xs {
                width: 18px;
                height: 18px;
                border-radius: 50%;
                font-size: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #fff;
            }
            .npc-avatar-xs.male { background: #1e3c6e; }
            .npc-avatar-xs.female { background: #6e1e3c; }
            .npc-name-xs {
                font-size: 12px;
                font-weight: 600;
                color: rgba(255, 255, 255, 0.9);
            }

            /* ─── Status indicator ─── */
            #status-dot-wrap {
                display: flex;
                align-items: center;
                gap: 5px;
                flex-shrink: 0;
            }
            .status-dot {
                width: 7px;
                height: 7px;
                border-radius: 50%;
                background: rgba(80, 200, 100, 0.9);
                animation: pulse-dot 2.5s infinite;
            }
            .status-label {
                font-size: 11px;
                color: rgba(80, 200, 100, 0.85);
                font-weight: 600;
            }
            @keyframes pulse-dot {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.35;
                }
            }

            /* ════════════════════════════════════
               MESSAGES
            ════════════════════════════════════ */
            #messages {
                flex: 1;
                overflow-y: auto;
                padding: 24px 20px;
                display: flex;
                flex-direction: column;
                gap: 14px;
            }

            .msg-row {
                display: flex;
                flex-direction: column;
                gap: 3px;
            }
            .msg-row.user {
                align-items: flex-end;
            }
            .msg-row.ai {
                align-items: flex-start;
            }
            .msg-row.follow-up {
                margin-top: -8px;
            }

            .retry-switcher {
                display: inline-flex;
                align-items: center;
                gap: 10px;
                margin-top: 6px;
                padding: 6px 10px;
                border-radius: 12px;
                background: rgba(255, 255, 255, 0.04);
                border: 1px solid rgba(255, 255, 255, 0.08);
                user-select: none;
            }
            .retry-switcher-btn {
                width: 28px;
                height: 22px;
                border-radius: 10px;
                border: 1px solid rgba(255, 255, 255, 0.12);
                background: rgba(255, 255, 255, 0.06);
                color: rgba(255, 255, 255, 0.85);
                cursor: pointer;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                font-weight: 800;
            }
            .retry-switcher-btn:disabled {
                opacity: 0.35;
                cursor: default;
            }
            .retry-switcher-count {
                font-size: 11px;
                font-weight: 800;
                letter-spacing: 0.04em;
                color: rgba(255, 255, 255, 0.55);
                min-width: 52px;
                text-align: center;
            }

            .msg-sender {
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.06em;
                text-transform: uppercase;
                padding: 0 6px;
            }
            .msg-row.user .msg-sender {
                color: rgba(255, 255, 255, 0.28);
            }
            .msg-row.ai .msg-sender {
                color: rgba(255, 255, 255, 0.28);
            }

            .msg-bubble {
                padding: 12px 17px;
                border-radius: 16px;
                max-width: 76%;
                word-wrap: break-word;
                line-height: 1.65;
                font-size: 14px;
                white-space: pre-wrap;
            }
            .msg-row.user .msg-bubble {
                background: rgba(26, 26, 26, 0.92);
                border: 1px solid rgba(255, 255, 255, 0.09);
                border-bottom-right-radius: 4px;
                color: rgba(255, 255, 255, 0.88);
            }
            .msg-row.ai .msg-bubble {
                background: rgba(26, 26, 26, 0.92);
                border: 1px solid rgba(255, 255, 255, 0.09);
                border-bottom-left-radius: 4px;
                color: rgba(255, 255, 255, 0.88);
            }
            .msg-bubble strong {
                font-weight: 800;
            }
            .msg-bubble em {
                font-style: italic;
            }
            .msg-bubble del {
                text-decoration: line-through;
                opacity: 0.9;
            }
            .msg-bubble code {
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.14);
                border-radius: 6px;
                padding: 1px 6px;
                font-family: Consolas, "Courier New", monospace;
                font-size: 0.92em;
            }
            .msg-bubble pre {
                margin: 8px 0;
                padding: 10px 12px;
                border-radius: 10px;
                background: rgba(0, 0, 0, 0.35);
                border: 1px solid rgba(255, 255, 255, 0.14);
                overflow-x: auto;
            }
            .msg-bubble pre code {
                background: transparent;
                border: none;
                padding: 0;
                font-size: 0.9em;
            }
            .msg-bubble a {
                color: rgba(150, 200, 255, 0.95);
                text-decoration: underline;
                word-break: break-word;
            }
            .msg-bubble.thinking {
                color: rgba(255, 255, 255, 0.35);
                font-style: italic;
                animation: blink 1.4s infinite;
            }
            @keyframes blink {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.5;
                }
            }

            /* Typing dots */
            .typing-dots {
                display: inline-flex;
                gap: 4px;
                align-items: center;
                height: 18px;
            }
            .typing-dots span {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.4);
                animation: typing-bounce 1.2s infinite ease-in-out;
            }
            .typing-dots span:nth-child(2) {
                animation-delay: 0.2s;
            }
            .typing-dots span:nth-child(3) {
                animation-delay: 0.4s;
            }
            @keyframes typing-bounce {
                0%,
                80%,
                100% {
                    transform: translateY(0);
                    opacity: 0.4;
                }
                40% {
                    transform: translateY(-5px);
                    opacity: 1;
                }
            }

            /* Divider */
            .chat-divider {
                display: flex;
                align-items: center;
                gap: 12px;
                margin: 6px 0;
            }
            .chat-divider::before,
            .chat-divider::after {
                content: "";
                flex: 1;
                height: 1px;
                background: rgba(255, 255, 255, 0.07);
            }
            .chat-divider-label {
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: rgba(255, 255, 255, 0.2);
            }

            /* ════════════════════════════════════
               INPUT AREA
            ════════════════════════════════════ */
            #input-section {
                flex-shrink: 0;
                background: rgba(8, 8, 8, 0.55);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                border-top: 1px solid rgba(255, 255, 255, 0.07);
            }

            #input-area {
                display: flex;
                gap: 10px;
                align-items: flex-end;
                padding: 12px 16px 10px 16px;
            }

            #user-input {
                flex: 1;
                padding: 11px 16px;
                background: rgba(20, 20, 20, 0.95);
                border: 1.5px solid rgba(255, 255, 255, 0.1);
                border-radius: 22px;
                color: #fff;
                font-size: 14px;
                outline: none;
                font-family: inherit;
                resize: none;
                line-height: 1.5;
                max-height: 140px;
                overflow-y: auto;
                transition: border-color 0.2s;
            }
            #user-input::placeholder {
                color: rgba(255, 255, 255, 0.22);
            }
            #user-input:focus {
                border-color: rgba(255, 255, 255, 0.25);
            }

            #send-btn {
                width: 42px;
                height: 42px;
                border-radius: 50%;
                border: none;
                background: rgba(35, 85, 165, 0.9);
                color: #fff;
                font-size: 17px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition:
                    background 0.2s,
                    transform 0.15s,
                    opacity 0.2s;
                flex-shrink: 0;
                margin-bottom: 1px;
            }
            #send-btn:hover:not(:disabled) {
                background: rgba(50, 110, 200, 0.99);
                transform: scale(1.06);
            }
            #send-btn:disabled {
                opacity: 0.35;
                cursor: not-allowed;
                transform: none;
            }

            /* ─── Action Bar ─── */
            #action-bar {
                display: flex;
                gap: 7px;
                padding: 0 16px 14px 16px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .act-btn {
                padding: 7px 16px;
                border-radius: 18px;
                border: 1.5px solid rgba(255, 255, 255, 0.1);
                background: rgba(24, 24, 24, 0.9);
                color: rgba(255, 255, 255, 0.65);
                font-size: 12px;
                font-weight: 600;
                cursor: pointer;
                letter-spacing: 0.02em;
                white-space: nowrap;
                transition:
                    background 0.2s,
                    border-color 0.2s,
                    color 0.2s,
                    transform 0.15s;
                display: flex;
                align-items: center;
                gap: 5px;
            }
            .act-btn:hover {
                background: rgba(40, 40, 40, 0.98);
                border-color: rgba(255, 255, 255, 0.22);
                color: #fff;
                transform: translateY(-1px);
            }
            .act-btn:active {
                transform: translateY(0);
            }

            .act-btn.btn-retry {
                border-color: rgba(150, 150, 150, 0.2);
            }
            .act-btn.btn-edit {
                border-color: rgba(100, 170, 230, 0.25);
                color: rgba(130, 185, 240, 0.85);
            }
            .act-btn.btn-edit:hover {
                background: rgba(30, 60, 100, 0.6);
                color: #a8d0f8;
            }
            .act-btn.btn-continue {
                border-color: rgba(60, 180, 80, 0.3);
                color: rgba(100, 210, 120, 0.9);
            }
            .act-btn.btn-continue:hover {
                background: rgba(20, 65, 30, 0.8);
                color: #90e8a0;
            }
            .act-btn.btn-erase {
                border-color: rgba(180, 60, 60, 0.3);
                color: rgba(220, 100, 100, 0.85);
            }
            .act-btn.btn-erase:hover {
                background: rgba(70, 20, 20, 0.7);
                color: #ff9090;
            }
            .act-btn.btn-move {
                border-color: rgba(100, 100, 180, 0.3);
                color: rgba(140, 140, 220, 0.85);
                position: relative;
            }
            .act-btn.btn-move:hover {
                background: rgba(30, 30, 60, 0.7);
                color: #a0a0ff;
            }
            .act-btn.btn-travel {
                border-color: rgba(180, 100, 100, 0.3);
                color: rgba(220, 140, 140, 0.85);
                position: relative;
            }
            .act-btn.btn-travel:hover {
                background: rgba(60, 30, 30, 0.7);
                color: #ffa0a0;
            }
            #move-dropdown {
                position: fixed;
                background: rgba(30, 30, 35, 0.98);
                border: 1px solid rgba(255, 255, 255, 0.15);
                border-radius: 12px;
                padding: 8px 0;
                min-width: 200px;
                max-width: 280px;
                max-height: 300px;
                overflow-y: auto;
                display: none;
                flex-direction: column;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
                z-index: 1000;
            }
            #move-dropdown.show {
                display: flex;
            }
            #travel-dropdown {
                position: fixed;
                background: rgba(30, 30, 35, 0.98);
                border: 1px solid rgba(255, 255, 255, 0.15);
                border-radius: 12px;
                padding: 8px 0;
                min-width: 220px;
                max-width: 320px;
                max-height: 350px;
                overflow-y: auto;
                display: none;
                flex-direction: column;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
                z-index: 1000;
            }
            #travel-dropdown.show {
                display: flex;
            }
            .travel-header {
                padding: 10px 16px;
                color: rgba(220, 140, 140, 0.9);
                font-size: 12px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                margin-bottom: 4px;
            }
            .travel-option {
                padding: 10px 16px;
                color: rgba(255, 255, 255, 0.85);
                font-size: 13px;
                cursor: pointer;
                transition: background 0.15s;
                border: none;
                background: none;
                text-align: left;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
            }
            .travel-option:hover {
                background: rgba(180, 100, 100, 0.2);
                color: #fff;
            }
            .travel-option.selected {
                background: rgba(180, 100, 100, 0.35);
                color: #ff9f9f;
                border-left: 3px solid #ff9f9f;
            }
            .travel-option .travel-time {
                color: rgba(255, 255, 255, 0.5);
                font-size: 11px;
            }
            .travel-empty {
                padding: 16px;
                color: rgba(255, 255, 255, 0.5);
                font-size: 13px;
                text-align: center;
            }
            .move-option {
                padding: 10px 16px;
                color: rgba(255, 255, 255, 0.85);
                font-size: 13px;
                cursor: pointer;
                transition: background 0.15s;
                border: none;
                background: none;
                text-align: left;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .move-option:hover {
                background: rgba(100, 100, 180, 0.2);
                color: #fff;
            }
            .move-option.selected {
                background: rgba(100, 100, 180, 0.35);
                color: #7ec9ff;
                border-left: 3px solid #7ec9ff;
            }
            .move-option.current {
                color: rgba(140, 140, 220, 0.9);
                font-weight: 500;
            }
            .move-option.empty {
                color: rgba(255, 255, 255, 0.4);
                font-style: italic;
                cursor: default;
            }
            .move-option.empty:hover {
                background: none;
            }
            .act-btn.locked {
                opacity: 0.5;
                cursor: not-allowed !important;
                pointer-events: none;
            }

            /* ─── Toast ─── */
            #toast {

        <script>
            /* ═══════════════════════════════════════
               CONSTANTS
            ═══════════════════════════════════════ */
            const SETTINGS_KEY = "storyki_settings";
            const CHARS_KEY = "storyki_characters";
            const CARDS_KEY = "storyki_storycards";
            const LOG_KEY = "storyki_storylog";
            const SCENARIOS_KEY = "storyki_scenarios";
            const SELECTED_WORLD_ID_KEY = "storyki_selected_world_id";
            const CURRENT_STORY_ID_KEY = "storyki_current_story_id";
            const ANCHORED_WORLD_CHANGES_KEY = "storyki_anchored_world_changes";
            const PENDING_MESSAGE_KEY = "storyki_pending_message";
            const RELATIONS_LAYOUT_KEY = "storyki_relations_layout";
            const RELATIONS_FILTER_KEY = "storyki_relations_filter";
            const ACTIVE_SCENE_NPCS_KEY = "storyki_active_scene_npcs";
            /** Turns an „Szene aktiv“-Detail für die UI / Kontext; pro Spieler-Nachricht −1 (Retry zählt nicht doppelt). */
            const ACTIVE_SCENE_NPC_DETAIL_TURNS = 5;
            const NSFW_BLOCKED_TOKEN = "__NSFW_BLOCKED__";
            const NSFW_BLOCKED_TEXT = "The generated message contained offensive content which has been blocked due to your NSWF block.";

            // Storage Helper (Persistent localStorage for settings, sessionStorage for everything else)
            const Storage = {
                get: (key) => {
                    if (key === SETTINGS_KEY) {
                        const localVal = localStorage.getItem(key);
                        const sessionVal = sessionStorage.getItem(key);
                        if (localVal != null && sessionVal != null && localVal !== sessionVal) return localVal;
                        return localVal ?? sessionVal;
                    }
                    return sessionStorage.getItem(key);
                },
                set: (key, val) => {
                    if (key === SETTINGS_KEY) {
                        localStorage.setItem(key, val);
                        sessionStorage.setItem(key, val);
                    } else {
                        sessionStorage.setItem(key, val);
                    }
                },
                remove: (key) => {
                    if (key === SETTINGS_KEY) {
                        localStorage.removeItem(key);
                        sessionStorage.removeItem(key);
                    } else {
                        sessionStorage.removeItem(key);
                    }
                },
                clear: () => sessionStorage.clear()
            };

            /* ═══════════════════════════════════════
               STATE
            ═══════════════════════════════════════ */
            let chatHistory = [];
            let isBusy = false;
            let activeChar = null;
            let currentLocationId = null;
            let isFirstMessageProtected = false;
            let isEditing = false;
            let _editRow = null;
            let _editIndex = -1;
            let currentNarrationTs = null;

            function _activeSceneNpcStorageKey() {
                const storyId = Storage.get(CURRENT_STORY_ID_KEY) || "";
                return storyId ? `${ACTIVE_SCENE_NPCS_KEY}:${storyId}` : ACTIVE_SCENE_NPCS_KEY;
            }
            function getActiveSceneNpcState() {
                try {
                    const raw = Storage.get(_activeSceneNpcStorageKey());
                    const parsed = raw ? JSON.parse(raw) : null;
                    const ids = Array.isArray(parsed?.ids) ? parsed.ids.filter(Boolean) : [];
                    const turns = (parsed && typeof parsed.turns === "object" && parsed.turns) ? parsed.turns : {};
                    return { ids, turns };
                } catch {
                    return { ids: [], turns: {} };
                }
            }
            function setActiveSceneNpcState(state) {
                try {
                    const ids = Array.isArray(state?.ids) ? state.ids.filter(Boolean) : [];
                    const turns = (state && typeof state.turns === "object" && state.turns) ? state.turns : {};
                    Storage.set(_activeSceneNpcStorageKey(), JSON.stringify({ ids, turns }));
                } catch {}
            }
            function getActiveSceneNpcIds() {
                return getActiveSceneNpcState().ids;
            }
            function clearActiveSceneNpcState() {
                try { Storage.remove(_activeSceneNpcStorageKey()); } catch {}
            }
            function setActiveSceneNpcIds(ids, fullDetailTurns = ACTIVE_SCENE_NPC_DETAIL_TURNS, opts = null) {
                try {
                    const cards = getCards();
                    const chars = cards.filter(c => c && c.genre === "character");
                    const alive = new Set(chars.filter(c => (c.status || "Alive") !== "Dead").map(c => c.id));
                    let nextIds = (Array.isArray(ids) ? ids : [])
                        .map(s => String(s || "").trim())
                        .filter(Boolean)
                        .filter(id => alive.has(id));

                    const mergeFromTag = !!(opts && typeof opts === "object" && opts.mergeFromTag);
                    if (mergeFromTag && nextIds.length > 0) {
                        const st0 = getActiveSceneNpcState();
                        const prevIdsArr = Array.isArray(st0.ids) ? st0.ids : [];
                        const prevTurns0 = st0.turns || {};
                        const incomingSet = new Set(nextIds);
                        const kept = prevIdsArr.filter((id) =>
                            alive.has(id) &&
                            !incomingSet.has(id) &&
                            Math.max(0, parseInt(prevTurns0[id], 10) || 0) > 0
                        );
                        nextIds = [...nextIds, ...kept.filter((id) => !nextIds.includes(id))];
                    }

                    const st = getActiveSceneNpcState();
                    const prevIds = new Set(st.ids || []);
                    const nextTurns = { ...(st.turns || {}) };
                    nextIds.forEach(id => {
                        if (!prevIds.has(id)) nextTurns[id] = fullDetailTurns;
                        if (nextTurns[id] == null) nextTurns[id] = fullDetailTurns;
                        nextTurns[id] = Math.max(0, parseInt(nextTurns[id], 10) || 0);
                    });
                    Object.keys(nextTurns).forEach(id => {
                        if (!nextIds.includes(id)) delete nextTurns[id];
                    });

                    setActiveSceneNpcState({ ids: nextIds, turns: nextTurns });
                } catch {}
            }
            function getActiveNpcDetailTurnsRemaining(npcId) {
                const st = getActiveSceneNpcState();
                const t = st.turns ? st.turns[npcId] : 0;
                return Math.max(0, parseInt(t, 10) || 0);
            }
            function consumeActiveSceneNpcDetailTurns() {
                try {
                    const st = getActiveSceneNpcState();
                    const ids = Array.isArray(st.ids) ? st.ids : [];
                    const turns = { ...(st.turns || {}) };
                    const nextIds = [];
                    let changed = false;
                    ids.forEach(id => {
                        const cur = Math.max(0, parseInt(turns[id], 10) || 0);
                        if (cur <= 0) {
                            if (turns[id] != null) { delete turns[id]; changed = true; }
                            return;
                        }
                        const nv = cur - 1;
                        turns[id] = nv;
                        changed = true;
                        if (nv > 0) nextIds.push(id);
                        else delete turns[id];
                    });
                    if (changed || nextIds.length !== ids.length) {
                        setActiveSceneNpcState({ ids: nextIds, turns });
                    }
                } catch {}
            }

            function _setElDisplay(el, nextDisplay) {
                if (!el) return;
                if (el.dataset && el.dataset.prevDisplay == null) {
                    el.dataset.prevDisplay = el.style.display || "";
                }
                el.style.display = nextDisplay;
            }
            function _restoreElDisplay(el) {
                if (!el) return;
                const prev = el.dataset ? el.dataset.prevDisplay : null;
                if (prev != null) {
                    el.style.display = prev;
                    try { delete el.dataset.prevDisplay; } catch {}
                } else {
                    el.style.display = "";
                }
            }
            function enterEditModeUI() {
                const ids = ['send-btn','retry-btn','continue-btn','erase-btn','edit-btn','move-btn','dev-present-btn','travel-btn'];
                ids.forEach(id => _setElDisplay(document.getElementById(id), "none"));
                _setElDisplay(document.getElementById("edit-save-btn"), "inline-flex");
                _setElDisplay(document.getElementById("edit-cancel-btn"), "inline-flex");

            function normalizeBirthdate(raw) {
                if (!raw || typeof raw !== "object") return null;
                const day = parseInt(raw.day, 10) || null;
                const month = parseInt(raw.month, 10) || null;
                const year = parseInt(raw.year, 10) || null;
                if (!day || !month) return null;
                return year ? { day, month, year } : { day, month };
            }

            function readBirthdate(entity) {
                if (!entity || typeof entity !== "object") return null;
                return normalizeBirthdate(entity.birthdate || entity.birthDate || entity.birthday || null);
            }

            function ensurePlayerBirthYearFromAge(char) {
                if (!char || typeof char !== "object") return;
                const bd = readBirthdate(char);
                if (!bd || !bd.day || !bd.month) return;
                if (bd.year) return;
                const ageNum = parseInt(char.age, 10);
                const startYear = parseInt(char?.startingDate?.year, 10);
                if (!Number.isFinite(ageNum) || ageNum < 0) return;
                if (!Number.isFinite(startYear) || startYear <= 0) return;
                char.birthdate = { day: bd.day, month: bd.month, year: startYear - ageNum };
            }

            function formatBirthdate(bd) {
                if (!bd || !bd.day || !bd.month) return "";

            }

                        if (s && typeof s === "object") return String(s.text || "").trim();
                        return "";

            function getAnchoredWorldChanges() {
                try {
                    const storyId = getCurrentStoryId() || "_default";
                    const raw = Storage.get(ANCHORED_WORLD_CHANGES_KEY);
                    const root = raw ? JSON.parse(raw) : {};
                    return root && typeof root === "object" ? (root[storyId] || {}) : {};

            function saveAnchoredWorldChanges(changes) {
                try {
                    const storyId = getCurrentStoryId() || "_default";
                    const raw = Storage.get(ANCHORED_WORLD_CHANGES_KEY);
                    const root = raw ? JSON.parse(raw) : {};

            function rememberAnchoredWorldChange(ts, change) {
                if (!ts || !change || !change.type) return;
                const changes = getAnchoredWorldChanges();
                const key = String(ts);
                if (!Array.isArray(changes[key])) changes[key] = [];
                const exists = changes[key].some((entry) => {
                    if (!entry || entry.type !== change.type) return false;
                    if (change.type === "npcDeath") return entry.npcId === change.npcId;
                    if (change.type === "activeSceneNpcs") return true;
                    if (change.type === "scheduledEventUpsert") return entry.eventId === change.eventId;
                    if (change.type === "eventExpired") {
                        const sigA = JSON.stringify(change.event || {});
                        const sigB = JSON.stringify(entry.event || {});
                        return entry.locId === change.locId && entry.bucket === change.bucket && entry.index === change.index && sigA === sigB;
                    }
                    return false;
                });
                if (!exists) {
                    changes[key].push(change);
                    saveAnchoredWorldChanges(changes);
                }
            }

            function buildCurrentWorldStamp(anchorTs = null) {
                const d = activeChar?.startingDate || {};
                return {
                    date: `${String(d.day || 1).padStart(2, "0")}.${String(d.month || 1).padStart(2, "0")}.${d.year || 1983}`,
                    time: d.time || "00:00",
                    location: document.getElementById("header-location")?.textContent || "Unknown Location",
                    logTs: anchorTs || null
                };

            function applyNpcDeath(npcId, cause, anchorTs = null) {
                const id = String(npcId || "").trim();
                const deathCause = String(cause || "").trim();
                if (!id || !deathCause) return false;
                if (activeChar && activeChar.id === id) return false;
                const cards = getCards();
                const npc = cards.find((c) => c.genre === "character" && c.id === id);
                if (!npc) return false;

                rememberAnchoredWorldChange(anchorTs, {
                    type: "npcDeath",
                    npcId: npc.id,
                    previousStatus: npc.status || "Alive",
                    previousDeathCause: npc.deathCause || "",
                    previousDeathInfo: npc.deathInfo ? { ...npc.deathInfo } : null
                });

                npc.status = "Dead";
                npc.deathCause = deathCause;
                npc.deathInfo = {
                    ...buildCurrentWorldStamp(anchorTs),
                    id: npc.id,
                    cause: deathCause
                };
                sessionStorage.setItem(CARDS_KEY, JSON.stringify(cards));
                return true;
            }

            function addKnownSecret(npcId, secretText, anchorTs = null) {
                const id = String(npcId || "").trim();
                const secret = String(secretText || "").trim();
                if (!id || !secret) return false;
                if (activeChar && activeChar.id === id) return false; // Player can't learn secrets this way
                const cards = getCards();
                const npc = cards.find((c) => c.genre === "character" && c.id === id);
                if (!npc) return false;

                // Initialize knownSecrets array if needed
                if (!Array.isArray(npc.knownSecrets)) npc.knownSecrets = [];

                // Check if already known (avoid duplicates)
                const alreadyKnown = npc.knownSecrets.some(s =>
                    String(s.text || s).toLowerCase() === secret.toLowerCase()
                );
                if (alreadyKnown) return false;

                // Add to known secrets with metadata
                npc.knownSecrets.push({
                    text: secret,
                    learnedAt: Date.now(),
                    learnedByTs: anchorTs || null,
                    date: buildCurrentWorldStamp(anchorTs)
                });

                sessionStorage.setItem(CARDS_KEY, JSON.stringify(cards));
                return true;
            }

            function getActiveCharDisplayName() {
                if (!activeChar) return "Player";
                return [activeChar.firstName, activeChar.lastName].filter(Boolean).join(" ").trim()
                    || activeChar.title
                    || "Player";
            }

            function isFamilyRelationEntry(rel) {
                return !!rel && String(rel.relation || "").toLowerCase() === "family";
            }

            function normalizeRelationshipLabel(label) {
                const value = String(label || "").trim().toLowerCase();
                if (value === "friend") return "Friend";
                if (value === "spouse") return "Spouse";
                if (value === "lover") return "Lover";
                if (value === "enemy") return "Enemy";
                return "";
            }

            function findRelationEntry(relations, targetId, targetName) {
                if (!Array.isArray(relations)) return null;
                const normName = _normalizeText(targetName || "");
                return relations.find((r) => {
                    if (!r) return false;
                    if (targetId && r.targetId === targetId) return true;
                    const relName = _normalizeText(r.targetName || "");
                    return !!normName && relName === normName;
                }) || null;
            }

            function getNpcRelationToPlayer(npc) {
                if (!npc || !activeChar) return "Stranger (Unknown)";
                const playerName = getActiveCharDisplayName();
                const npcName = npc.title || npc.id || "Unknown";
                const npcSide = findRelationEntry(npc.relations, activeChar.id, playerName);
                if (npcSide) {
                    if (npcSide.relation === "Family") return npcSide.familySub || "Family";
                    if (npcSide.relation) return npcSide.relation;
                }
                const playerSide = findRelationEntry(activeChar.relations, npc.id, npcName);
                if (playerSide) {
                    if (playerSide.relation === "Family") return playerSide.familySub || "Family";
                    if (playerSide.relation) return playerSide.relation;
                }
                return "Stranger (Unknown)";
            }

            function setPlayerNpcRelationship(npcId, relationLabel) {
                if (!activeChar) return false;
                const npcIdStr = String(npcId || "").trim();
                const relation = normalizeRelationshipLabel(relationLabel);
                if (!npcIdStr || !relation) return false;
                if (activeChar.id && npcIdStr === activeChar.id) return false;

                const cards = getCards();
                const npc = cards.find((c) => c.genre === "character" && c.id === npcIdStr);
                if (!npc) return false;

                const playerName = getActiveCharDisplayName();
                const npcName = npc.title || npc.id || "Unknown";

                if (!Array.isArray(activeChar.relations)) activeChar.relations = [];
                if (!Array.isArray(npc.relations)) npc.relations = [];

                const playerSide = findRelationEntry(activeChar.relations, npc.id, npcName);
                const npcSide = findRelationEntry(npc.relations, activeChar.id, playerName);
                if (isFamilyRelationEntry(playerSide) || isFamilyRelationEntry(npcSide)) return false;

                let changed = false;
                const applyRelation = (entry, targetId, targetName) => {
                    if (!entry) return false;
                    let entryChanged = false;
                    if (entry.targetId !== targetId) {
                        entry.targetId = targetId;
                        entryChanged = true;
                    }
                    if ((entry.targetName || "") !== targetName) {
                        entry.targetName = targetName;
                        entryChanged = true;
                    }
                    if (entry.relation !== relation) {
                        entry.relation = relation;
                        entryChanged = true;
                    }
                    if (entry.familySub) {
                        delete entry.familySub;
                        entryChanged = true;
                    }
                    return entryChanged;
                };

                if (playerSide) {
                    changed = applyRelation(playerSide, npc.id, npcName) || changed;
                } else {
                    activeChar.relations.push({
                        targetId: npc.id,
                        targetName: npcName,
                        relation,
                    });
                    changed = true;
                }

                if (npcSide) {
                    changed = applyRelation(npcSide, activeChar.id, playerName) || changed;
                } else {
                    npc.relations.push({
                        targetId: activeChar.id,
                        targetName: playerName,
                        relation,
                    });
                    changed = true;
                }

                if (!changed) return false;

                activeChar.updatedAt = Date.now();
                npc.updatedAt = Date.now();
                sessionStorage.setItem(CARDS_KEY, JSON.stringify(cards));
                saveActiveCharacter();
                try { renderStatsRelations(); } catch {}
                return true;
            }

            function rollbackToLastWorldState() {
                if (!activeChar) return;
                // Find last Narrator entry; fallback to any last entry
                let entry = null;
                for (let i = chatHistory.length - 1; i >= 0; i--) {
                    const e = chatHistory[i];
                    if (typeof e !== "string" && e.sender === "Narrator") {
                        entry = e;
                        break;
                    }
                }
                if (!entry) {
                    for (let i = chatHistory.length - 1; i >= 0; i--) {
                        const e = chatHistory[i];
                        if (typeof e !== "string") {
                            entry = e;
                            break;
                        }
                    }
                }
                if (!entry) return;

                if (!activeChar.startingDate) activeChar.startingDate = {};
                const d = activeChar.startingDate;
                if (entry.date) {
                    const parts = entry.date.split(".");
                    if (parts.length === 3) {
                        d.day = parseInt(parts[0]) || d.day || 1;
                        d.month = parseInt(parts[1]) || d.month || 1;
                        d.year = parseInt(parts[2]) || d.year || 1983;
                    }
                }
                if (entry.time) {
                    d.time = entry.time;
                }
                updateHeaderTime();
                if (entry.location) {
                    updateLocation(entry.location);
                }

                // Restore level data if present in entry
                if (entry.levelData) {
                    activeChar.levelData = { ...entry.levelData };
                    // Update the character card in storage
                    const cards = getCards();
                    const idx = cards.findIndex(c => c.id === activeChar.id);
                    if (idx !== -1) {
                        cards[idx].levelData = { ...entry.levelData };
                        Storage.set("storyki_world_cards", JSON.stringify(cards));
                    }
                    // Update stats display
                    renderStatsLevel();
                }

                try {
                    if (entry.activeSceneNpcState && typeof entry.activeSceneNpcState === "object") {
                        const st = entry.activeSceneNpcState;
                        const ids = Array.isArray(st.ids) ? st.ids.slice() : [];
                        const turns = (st.turns && typeof st.turns === "object") ? { ...st.turns } : {};
                        setActiveSceneNpcState({ ids, turns });
                    }
                    updatePresentNPCs();
                } catch {}

                saveActiveCharacter();
            }

            function loadStoryLog() {
                try {
                    const raw = Storage.get(LOG_KEY);
                    if (raw) {
                        chatHistory = JSON.parse(raw);
                        if (!window._chatPageSize) window._chatPageSize = 12;
                        if (!window._chatLoadedCount) window._chatLoadedCount = 0;
                        window._chatLoadedCount = Math.min(window._chatPageSize, chatHistory.length);
                        renderChatWindow(false, 0);
                        try {
                            // Restore ActiveNPCs state from the latest log entry that has it
                            for (let i = chatHistory.length - 1; i >= 0; i--) {
                                const e = chatHistory[i];
                                if (!e || typeof e === "string") continue;
                                if (e.activeSceneNpcState && typeof e.activeSceneNpcState === "object") {
                                    const st = e.activeSceneNpcState;
                                    const ids = Array.isArray(st.ids) ? st.ids.slice() : [];
                                    const turns = (st.turns && typeof st.turns === "object") ? { ...st.turns } : {};
                                    setActiveSceneNpcState({ ids, turns });
                                    break;
                                }
                            }
                            updatePresentNPCs();
                        } catch {}
                        const messagesEl = document.getElementById("messages");
                        if (messagesEl && !window._chatScrollBound) {
                            window._chatScrollBound = true;
                            messagesEl.addEventListener("scroll", function () {
                                if (messagesEl.scrollTop <= 5 && window._chatLoadedCount < chatHistory.length) {
                                    const prevHeight = messagesEl.scrollHeight;
                                    window._chatLoadedCount = Math.min(window._chatLoadedCount + window._chatPageSize, chatHistory.length);
                                    renderChatWindow(true, prevHeight);
                                }
                            });
                        }
                    }
                } catch (e) {
                    console.error("Failed to load story log", e);
                }
            }

            function renderChatWindow(preserve, prevHeight) {
                const messagesEl = document.getElementById("messages");
                if (!messagesEl) return;
                messagesEl.innerHTML = "";
                const total = chatHistory.length;
                const start = Math.max(0, total - (window._chatLoadedCount || 0));
                for (let i = start; i < total; i++) {
                    const entry = chatHistory[i];
                    if (typeof entry === "string") {
                        addSystemDivider(entry, false);
                    } else {
                        const role = entry.sender === "Narrator" ? "ai" : "user";
                        appendBubble(role, entry.text, "", false);
                    }
                }
                if (preserve) {
                    messagesEl.scrollTop = messagesEl.scrollHeight - prevHeight + 5;
                } else {
                    messagesEl.scrollTop = messagesEl.scrollHeight;
                }
            }

            function addToStoryLog(sender, text, tsOverride = null, extra = null) {
                const d = activeChar?.startingDate || {};
                const day = String(d.day || 1).padStart(2, "0");
                const mon = String(d.month || 1).padStart(2, "0");
                const yr = d.year || 1983;
                const tm = d.time || "00:00";
                const loc = document.getElementById("header-location")?.textContent || "Unknown Location";

                // Save level data if level system is active
                const levelData = isLevelSystemActive() ? (activeChar?.levelData || { level: 1, xp: 0 }) : null;
                const currentActiveScene = getActiveSceneNpcState();
                const activeSceneNpcState = {
                    ids: Array.isArray(currentActiveScene.ids) ? currentActiveScene.ids.slice() : [],
                    turns: (currentActiveScene.turns && typeof currentActiveScene.turns === "object") ? { ...currentActiveScene.turns } : {}
                };

                const entry = {
                    sender: sender,
                    text: text,
                    date: `${day}.${mon}.${yr}`,
                    time: tm,
                    location: loc,
                    timestamp: tsOverride || Date.now(),
                    ...(levelData ? { levelData: { ...levelData } } : {}),
                    activeSceneNpcState,
                    ...(extra && typeof extra === "object" ? extra : {})
                };

                chatHistory.push(entry);
                saveStoryLog();
                return entry.timestamp;
            }

            function _readSettingsObj() {

            function _getScheduledEvents() {

            function _setScheduledEvents(list) {

            function _fmtDMY(day, month, year) {
                const dd = String(parseInt(day, 10) || 1).padStart(2, "0");
                const mm = String(parseInt(month, 10) || 1).padStart(2, "0");
                const yy = parseInt(year, 10) || 1983;
                return `${dd}.${mm}.${yy}`;
            }
            function _parseEventDateInput(dateStr) {
                try {
                    const raw = String(dateStr || "").trim();
                    if (!raw) return null;
                    const m = raw.match(/^(\d{1,2})\.(\d{1,2})(?:\.(\d{2}|\d{4}))?$/);
                    if (!m) return null;
                    const day = parseInt(m[1], 10);
                    const month = parseInt(m[2], 10);
                    let year = m[3] ? parseInt(m[3], 10) : null;
                    if (year != null && year < 100) year = year < 50 ? 2000 + year : 1900 + year;
                    if (year == null) year = parseInt(activeChar?.startingDate?.year, 10) || 1983;
                    if (!(day >= 1 && day <= 31 && month >= 1 && month <= 12)) return null;
                    const d = normalizeYMD({ day, month, year });
                    return {
                        day: d.day,
                        month: d.month,
                        year: d.year,
                        dayCount: _worldDayCount(d),
                        display: _fmtDMY(d.day, d.month, d.year)
                    };
                } catch {
                    return null;
                }
            }
            function _isCurrentLocationCustom() {
                try {
                    if (!currentLocationId) return false;
                    const cards = getCards();
                    const loc = cards.find(c => c && c.genre === "location" && c.id === currentLocationId);
                    const sub = String(loc?.locationSub || "").toLowerCase().trim();
                    return sub === "custom";
                } catch {
                    return false;
                }
            }
            function _getActiveScheduledEventsForCurrent() {
                try {
                    if (!activeChar?.startingDate) return [];
                    const nowCount = _worldDayCount(activeChar.startingDate);
                    const all = _getScheduledEvents();
                    const scopeMatch = _isCurrentLocationCustom();
                    if (!scopeMatch) return [];
                    return all
                        .filter(e => e && e.scope === "locationSub" && e.scopeValue === "custom")
                        .filter(e => Number.isFinite(parseInt(e.dayCount, 10)) && nowCount <= parseInt(e.dayCount, 10))
                        .sort((a, b) => (parseInt(a.dayCount, 10) || 0) - (parseInt(b.dayCount, 10) || 0));
                } catch {
                    return [];
                }
            }
            function updateHeaderEvent() {
                const el = document.getElementById("header-event");
                if (!el) return;
                const list = _getActiveScheduledEventsForCurrent();
                if (!list.length) {
                    el.textContent = "";
                    el.style.display = "none";
                    return;
                }
                const first = list[0] || {};
                const dateText = String(first.displayDate || first.date || "").trim();
                const txt = String(first.text || "").trim();
                const suffix = list.length > 1 ? ` (+${list.length - 1})` : "";
                el.textContent = `EVENT ${dateText ? "(" + dateText + ")" : ""}: ${txt}${suffix}`.trim();
                el.style.display = "block";
            }
            function _upsertScheduledEvent(dateObj, text, anchorTs = null) {
                try {
                    if (!dateObj || !Number.isFinite(dateObj.dayCount)) return null;
                    const t = String(text || "").replace(/\s+/g, " ").trim();
                    if (!t) return null;
                    const now = Date.now();
                    const list = _getScheduledEvents();
                    const newEntry = {
                        id: Math.random().toString(36).slice(2, 10),
                        scope: "locationSub",
                        scopeValue: "custom",
                        day: dateObj.day,
                        month: dateObj.month,
                        year: dateObj.year,
                        dayCount: dateObj.dayCount,
                        displayDate: dateObj.display,
                        text: t.slice(0, 260),
                        createdAt: now,
                        updatedAt: now
                    };
                    const matchIdx = list.findIndex(e =>
                        e &&
                        e.scope === "locationSub" &&
                        e.scopeValue === "custom" &&
                        parseInt(e.dayCount, 10) === dateObj.dayCount
                    );
                    if (matchIdx >= 0) {
                        const prev = JSON.parse(JSON.stringify(list[matchIdx] || null));
                        const updated = { ...(list[matchIdx] || {}), ...newEntry, id: list[matchIdx].id || newEntry.id };
                        list[matchIdx] = updated;
                        if (anchorTs) {
                            rememberAnchoredWorldChange(anchorTs, {
                                type: "scheduledEventUpsert",
                                eventId: updated.id,
                                existed: true,
                                previousEvent: prev
                            });
                        }
                        _setScheduledEvents(list);
                        try { updateHeaderEvent(); } catch {}
                        return updated;
                    }
                    list.push(newEntry);
                    if (anchorTs) {
                        rememberAnchoredWorldChange(anchorTs, {
                            type: "scheduledEventUpsert",
                            eventId: newEntry.id,
                            existed: false,
                            previousEvent: null
                        });
                    }
                    _setScheduledEvents(list);
                    try { updateHeaderEvent(); } catch {}
                    return newEntry;
                } catch {
                    return null;
                }
            }
            function _applyScheduledEventTagPayload(payload, anchorTs = null) {
                try {
                    const raw = String(payload || "").trim();
                    if (!raw) return null;
                    let sepIdx = raw.indexOf(",");
                    if (sepIdx === -1) sepIdx = raw.indexOf("|");
                    if (sepIdx === -1) return null;
                    const datePart = raw.slice(0, sepIdx).trim();
                    const textPart = raw.slice(sepIdx + 1).trim().replace(/^["']+/, "").replace(/["']+$/, "");
                    const d = _parseEventDateInput(datePart);
                    if (!d) return null;
                    return _upsertScheduledEvent(d, textPart, anchorTs);
                } catch {
                    return null;
                }
            }

            function applyTextSizeLimit(text) {
                try {
                    const settings = JSON.parse(Storage.get(SETTINGS_KEY) || "{}");
                    const size = (settings.textSize || "normal").toLowerCase();
                    let maxSentences = 0;
                    let maxChars = 1000;
                    if (size === "short") {
                        maxSentences = 2;
                        maxChars = 300;
                    } else if (size === "tall") {
                        maxSentences = 0;
                        maxChars = 2400;
                    } else {
                        maxSentences = 6;
                        maxChars = 1000;
                    }
                    if (!text) return text;
                    let out = text.trim();
                    if (maxSentences > 0) {
                        const sentences = out.match(/[^.!?…]+[.!?…]+(?:\s+|$)|[^.!?…]+$/g) || [out];
                        if (sentences.length > maxSentences) {
                            out = sentences.slice(0, maxSentences).join(" ").trim();
                        }
                    }
                    if (out.length > maxChars) {
                        const cutoff = maxChars;
                        const substr = out.substring(0, cutoff);
                        const lastPunct = Math.max(substr.lastIndexOf("."), substr.lastIndexOf("!"), substr.lastIndexOf("?"), substr.lastIndexOf("…"), substr.lastIndexOf("\n"));
                        const lastSpace = substr.lastIndexOf(" ");
                        const idx = lastPunct > 120 ? lastPunct : (lastSpace > 120 ? lastSpace : cutoff);
                        out = substr.substring(0, idx).trimEnd();
                        // avoid artificial ellipsis; ensure sentence closure
                        if (!/[.!?…]"?$/.test(out)) out += ".";
                    }
                    // Balance quotes (ASCII and curly)
                    const asciiQuotes = (out.match(/"/g) || []).length;
                    if (asciiQuotes % 2 === 1) out += '"';
                    const leftCurly = (out.match(/“|„/g) || []).length;
                    const rightCurly = (out.match(/”/g) || []).length;
                    if (leftCurly > rightCurly) out += "”";
                    return out;
                } catch {
                    return text;
                }
            }

            // Calendar helpers: real month lengths incl. leap years
            function isLeapYear(y) {
                y = parseInt(y, 10) || 0;
                return (y % 4 === 0 && y % 100 !== 0) || (y % 400 === 0);
            }
            function daysInMonth(m, y) {
                m = parseInt(m, 10) || 1;
                y = parseInt(y, 10) || 1983;
                if (m === 2) return isLeapYear(y) ? 29 : 28;
                if (m === 4 || m === 6 || m === 9 || m === 11) return 30;
                return 31;
            }
            function normalizeYMD(d) {
                d.day = parseInt(d.day || 1, 10);
                d.month = parseInt(d.month || 1, 10);
                d.year = parseInt(d.year || 1983, 10);
                // normalize month to 1..12
                while (d.month > 12) { d.month -= 12; d.year += 1; }
                while (d.month < 1)  { d.month += 12; d.year -= 1; }
                // carry overflow days forward
                let dim = daysInMonth(d.month, d.year);
                while (d.day > dim) {
                    d.day -= dim;
                    d.month += 1;
                    if (d.month > 12) { d.month = 1; d.year += 1; }
                    dim = daysInMonth(d.month, d.year);
                }
                // carry negative/underflow days backward
                while (d.day < 1) {
                    d.month -= 1;
                    if (d.month < 1) { d.month = 12; d.year -= 1; }
                    d.day += daysInMonth(d.month, d.year);
                }
                return d;
            }

            function addMinutes(mins) {
                if (!activeChar) return;
                if (!activeChar.startingDate) activeChar.startingDate = {};
                const d = activeChar.startingDate;

                let [h, m] = (d.time || "00:00").split(":").map(Number);
                const prevTotalMins = h * 60 + m;
                let totalMins = prevTotalMins + (mins || 0);
                const dayLen = 24 * 60;
                let daysDelta = Math.floor(totalMins / dayLen);
                let rest = totalMins % dayLen;
                if (rest < 0) { rest += dayLen; daysDelta -= 1; }
                const nh = Math.floor(rest / 60);
                const nm = rest % 60;
                d.time = `${String(nh).padStart(2, "0")}:${String(nm).padStart(2, "0")}`;
                d.day = (d.day || 1) + daysDelta;
                normalizeYMD(d);
                processNearbyNpcHourlyUpdate(prevTotalMins, mins || 0);
                syncNpcInactivityCounters();
                updateNPCBirthdays(d);
                updatePlayerBirthday(d);
                updateHeaderTime();
                saveActiveCharacter();
                console.log(`[Time Update] New Time: ${d.day}.${d.month}.${d.year} ${d.time}`);
            }

            function isNsfwBlockEnabled() {
                try {
                    const settings = JSON.parse(Storage.get(SETTINGS_KEY) || "{}");
                    return String(settings.nsfwBlock || "off").toLowerCase() === "on";

                }
            }

            function isAiCheckEnabled() {
                try {
                    const settings = JSON.parse(Storage.get(SETTINGS_KEY) || "{}");
                    return String(settings.aiCheck || "1") === "2";

            function isHardcoreModeEnabled() {
                try {

                    if (storyId) {
                        const story = getScenariosLocal().find((x) => x.id === storyId);
                        if (story?.data?.settings?.hardcoreMode != null) {

                    return String(settings.hardcoreMode || "off").toLowerCase() === "on";
                } catch {

                }
            }

            function applyHardcoreModeUI() {
                if (!isHardcoreModeEnabled()) return;
                ['retry-btn', 'edit-btn', 'erase-btn'].forEach((id) => {
                    const btn = document.getElementById(id);
                    if (!btn) return;
