            function getCurrentStoryId() {
                return Storage.get(CURRENT_STORY_ID_KEY);
            }
            function setCurrentStoryId(id) {
                Storage.set(CURRENT_STORY_ID_KEY, id);
            }
            function computeSig(cards, chars, log, settings, worldId) {
                return JSON.stringify({ w: worldId, c: cards.length, ch: chars.length, l: log.length, s: Object.keys(settings || {}).length });
            }
            function ensureStoryRecord() {
                const worldId = Storage.get(SELECTED_WORLD_ID_KEY);
                if (!worldId) return null;
                const cards = JSON.parse(Storage.get(CARDS_KEY) || "[]");
                const chars = JSON.parse(Storage.get(CHARS_KEY) || "[]");
                const log = JSON.parse(Storage.get(LOG_KEY) || "[]");
                const settings = JSON.parse(Storage.get(SETTINGS_KEY) || "{}");
                const anchoredWorldChanges = getAnchoredWorldChanges();
                let scenarios = getScenariosLocal();
                let storyId = getCurrentStoryId();
                let story = storyId ? scenarios.find(x => x.id === storyId) : null;
                if (!story) {
                    const id = Math.random().toString(36).slice(2, 10);
                    let name = "Story " + new Date().toLocaleString();
                    if (chars.length > 0) {
                        const mainChar = chars[0];
                        const fullName = [mainChar.firstName, mainChar.lastName].filter(Boolean).join(" ").trim() || "Story";
                        name = `${fullName} - ${new Date().toLocaleDateString()}`;
                    }
                    story = {
                        id,
                        worldId,
                        name,
                        createdAt: Date.now(),
                        updatedAt: Date.now(),
                        signature: computeSig(cards, chars, log, settings, worldId),
                        official: false,
                        data: { cards, characters: chars, log, settings, anchoredWorldChanges }
                    };
                    scenarios.push(story);
                    setScenariosLocal(scenarios);
                    setCurrentStoryId(id);
                }
                return story;
            }
            function autoSaveStory() {
                const worldId = Storage.get(SELECTED_WORLD_ID_KEY);
                if (!worldId) return;
                const cards = JSON.parse(Storage.get(CARDS_KEY) || "[]");
                const chars = JSON.parse(Storage.get(CHARS_KEY) || "[]");
                const log = JSON.parse(Storage.get(LOG_KEY) || "[]");
                const settings = JSON.parse(Storage.get(SETTINGS_KEY) || "{}");
                const anchoredWorldChanges = getAnchoredWorldChanges();
                let scenarios = getScenariosLocal();
                let storyId = getCurrentStoryId();
                let story = storyId ? scenarios.find(x => x.id === storyId) : null;
                if (!story) {
                    story = ensureStoryRecord();
                    scenarios = getScenariosLocal();
                }
                if (!story) return;
                const idx = scenarios.findIndex(x => x.id === story.id);
                if (idx === -1) return;
                scenarios[idx].updatedAt = Date.now();
                scenarios[idx].data = { cards, characters: chars, log, settings, anchoredWorldChanges };
                scenarios[idx].signature = computeSig(cards, chars, log, settings, worldId);
                if (!scenarios[idx].official) {
                    if (chars.length > 0) {
                        const mainChar = chars[0];
                        const fullName = [mainChar.firstName, mainChar.lastName].filter(Boolean).join(" ").trim();
                        if (fullName) {
                            scenarios[idx].name = `${fullName} - ${new Date().toLocaleDateString()}`;
                        }
                    }
                }
                setScenariosLocal(scenarios);
            }

            function loadLatestCharacter() {
                try {
                    const chars = JSON.parse(Storage.get(CHARS_KEY) || "[]");
                    if (!Array.isArray(chars) || chars.length === 0) return null;
                    // Prefer playable characters
                    const playable = chars.filter(c => c && c.isPlayable === true);
                    if (playable.length > 0) return playable[playable.length - 1];
                    // Otherwise take the last character
                    return chars[chars.length - 1] || null;
                } catch {
                    return null;
                }
            }

            function escHtml(text) {
                if (typeof text !== 'string') return '';
                return text
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            function applyCharacter(ch) {
                if (!ch) return;
                activeChar = ch;

                // Derive missing fields from title if necessary
                try {
                    if ((!ch.firstName || !ch.lastName) && (ch.title || "").trim()) {
                        const parts = (ch.title || "").trim().split(/\s+/);
                        if (!ch.firstName) ch.firstName = parts[0] || "Unknown";
                        if (!ch.lastName) ch.lastName = parts.slice(1).join(" ");
                    }
                    if (!ch.raceName) {
                        if (ch.raceId) {
                            const raceCard = getCards().find(c => c.genre === "race" && c.id === ch.raceId);
                            if (raceCard) ch.raceName = raceCard.title || "Unknown Race";
                        }
                        if (!ch.raceName) ch.raceName = "Unknown Race";
                    }
                    const bd = readBirthdate(ch);
                    if (bd) {
                        ch.birthdate = { day: bd.day, month: bd.month };
                    } else {
                        const sourceCard = getCards().find(c => c.genre === "character" && c.id === ch.id);
                        const sourceBd = readBirthdate(sourceCard);
                        if (sourceBd) ch.birthdate = { day: sourceBd.day, month: sourceBd.month };
                    }
                    if (ch.isPlayable !== true) ch.isPlayable = true;
                    // Initialize discoveredLocations for backwards compatibility
                    if (!Array.isArray(ch.discoveredLocations)) {
                        ch.discoveredLocations = [];
                    }
                    // Mark current location as discovered if set
                    if (ch.currentLocationId && !ch.discoveredLocations.includes(ch.currentLocationId)) {
                        ch.discoveredLocations.push(ch.currentLocationId);
                    }
                } catch {}

                const fullName = [ch.firstName, ch.lastName].filter(Boolean).join(" ") || (ch.title || "Unknown");
                const isF = ch.gender === "female";
                const icon = isF ? "♀" : "♂";
                const avatarClass = isF ? "female" : "male";


                // Header badge
                const badge = document.getElementById("char-badge");
                badge.classList.add("visible");
                const av = document.getElementById("header-avatar");
                av.textContent = icon;
                av.className = `char-avatar-sm ${avatarClass}`;
                document.getElementById("header-char-name").textContent =
                    fullName;
                document.getElementById("header-char-race").textContent =
                    ch.raceName || "Unknown Race";

                // Ensure starting date/time defaults if missing (derive from earliest event if available)
                try {
                    if (!activeChar.startingDate || typeof activeChar.startingDate !== "object") {
                        activeChar.startingDate = {};
                    }
                    const d = activeChar.startingDate;
                    if (!d.day || !d.month || !d.year || !d.time) {
                        const cards = getCards();
                        // Find earliest public event date in world
                        let earliest = null;
                        cards.filter(c => c.genre === "location").forEach(loc => {
                            const ev = loc.events || {};
                            ["custom"].forEach(k => {
                                (Array.isArray(ev[k]) ? ev[k] : []).forEach(e => {
                                    if (!e || e.type === "secret") return;
                                    const key = `${String(e.year||0).padStart(4,"0")}-${String(e.month||0).padStart(2,"0")}-${String(e.day||0).padStart(2,"0")} ${e.time||"00:00"}`;
                                    if (!earliest || key < earliest.key) earliest = { key, day: e.day||1, month: e.month||1, year: e.year||1983, time: e.time||"00:00" };
                                });
                            });
                        });
                        if (earliest) {
                            d.day = earliest.day;
                            d.month = earliest.month;
                            d.year = earliest.year;
                            d.time = earliest.time;
                        } else {
                            d.day = d.day || 1;
                            d.month = d.month || 1;
                            d.year = d.year || 1983;
                            d.time = d.time || "00:00";
                        }
                    }
                } catch {}

                // Time & Location
                updateHeaderTime();

                // Ensure a valid location (currentLocationId or spawnId or resident-derived)
                try {
                    if (activeChar.currentLocationId) {
                        updateLocation(activeChar.currentLocationId);
                    } else if (activeChar.spawnId) {
                        updateLocation(activeChar.spawnId);
                        activeChar.currentLocationId = activeChar.spawnId;
                    } else {
                        const cards = getCards();
                        // Find location where this character is a resident
                        let loc = cards.find(c => c.genre === "location" && Array.isArray(c.residents) && c.residents.includes(activeChar.id));
                        // Else: choose any spawnable location
                        if (!loc) loc = cards.find(c => c.genre === "location" && c.canBeSpawn);
                        // Else: choose the first location
                        if (!loc) loc = cards.find(c => c.genre === "location");
                        if (loc) {
                            updateLocation(loc.id);
                            activeChar.currentLocationId = loc.id;
                        } else {
                            document.getElementById("header-location").textContent = "UNKNOWN LOCATION";
                            updatePresentNPCs();
                        }
                    }
                } catch {
                    document.getElementById("header-location").textContent = "UNKNOWN LOCATION";
                    updatePresentNPCs();
                }
                document.getElementById("header-info").style.display = "flex";

                // Welcome overlay
                const wRow = document.getElementById("welcome-char-row");
                wRow.style.display = "flex";
                const wAv = document.getElementById("welcome-avatar");
                wAv.textContent = icon;
                wAv.className = `welcome-avatar ${avatarClass}`;
                document.getElementById("welcome-char-name").textContent =
                    fullName;

                // Spawn name
                let spawnName = "";
                if (ch.spawnId) {
                    try {
                        const cards = JSON.parse(
                            Storage.get(CARDS_KEY) || "[]",
                        );
                        const spawn = cards.find((c) => c.id === ch.spawnId);
                        if (spawn) spawnName = spawn.title;
                    } catch {}
                }
                document.getElementById("welcome-char-meta").textContent = [
                    ch.raceName,
                    spawnName ? "@ " + spawnName : "",
                ]
                    .filter(Boolean)
                    .join("  ·  ");
                try { syncNpcInactivityCounters(); } catch {}
                try { saveActiveCharacter(); } catch {}
            }

            function formatMessageText(text) {
                let s = String(text || "");
                const escapeHtml = (v) =>
                    v.replace(/&/g, "&amp;")
                     .replace(/</g, "&lt;")
                     .replace(/>/g, "&gt;")
                     .replace(/"/g, "&quot;")
                     .replace(/'/g, "&#39;");
                s = escapeHtml(s);
                const blocks = [];
                s = s.replace(/```([\s\S]*?)```/g, (_, code) => {
                    const key = `%%BLOCK_${blocks.length}%%`;
                    blocks.push(`<pre><code>${code.replace(/^\n+|\n+$/g, "")}</code></pre>`);
                    return key;
                });
                const inlines = [];
                s = s.replace(/`([^`\n]+)`/g, (_, code) => {
                    const key = `%%INLINE_${inlines.length}%%`;
                    inlines.push(`<code>${code}</code>`);
                    return key;
                });
                s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
                s = s.replace(/\*\*\*([^\n*][\s\S]*?[^\n*])\*\*\*/g, "<strong><em>$1</em></strong>");
                s = s.replace(/\*\*([^\n*][\s\S]*?[^\n*])\*\*/g, "<strong>$1</strong>");
                s = s.replace(/__([^\n_][\s\S]*?[^\n_])__/g, "<strong>$1</strong>");
                s = s.replace(/(^|[^*])\*([^*\n][\s\S]*?[^*\n])\*(?!\*)/g, "$1<em>$2</em>");
                s = s.replace(/(^|[^_])_([^_\n][\s\S]*?[^_\n])_(?!_)/g, "$1<em>$2</em>");
                s = s.replace(/~~([^\n~][\s\S]*?[^\n~])~~/g, "<del>$1</del>");
                inlines.forEach((html, i) => {
                    s = s.replace(`%%INLINE_${i}%%`, html);
                });
                blocks.forEach((html, i) => {
                    s = s.replace(`%%BLOCK_${i}%%`, html);
                });
                return s;
            }
            function appendBubble(role, text, cssExtra = "", scroll = true) {
                const messagesEl = document.getElementById("messages");
                
                // Determine sender label
                const senderLabel = role === "user" ? "You" : "Narrator";

                // Check if the previous message was from the same sender
                const lastRow = messagesEl.lastElementChild;
                const isSameSender = lastRow && lastRow.classList.contains("msg-row") && lastRow.classList.contains(role);

                const row = document.createElement("div");
                row.className = `msg-row ${role}`;

                if (!isSameSender) {
                    const senderEl = document.createElement("div");
                    senderEl.className = "msg-sender";
                    senderEl.textContent = senderLabel;
                    row.appendChild(senderEl);
                } else {
                    // Optional: add a class to indicate it's a follow-up message for tighter spacing if needed
                    row.classList.add("follow-up");
                }

                const bubble = document.createElement("div");
                bubble.className = `msg-bubble ${cssExtra}`;
                bubble.innerHTML = formatMessageText(text);

                row.appendChild(bubble);
                messagesEl.appendChild(row);
                if (scroll) messagesEl.scrollTop = messagesEl.scrollHeight;
                return bubble;
            }

            // Visited Locations Tracking
            function getVisitedLocations() {
                try {
                    return JSON.parse(localStorage.getItem("visitedLocations") || "[]");

                }
            }

            function trackVisitedLocation(locId) {

            function isLocationVisited(locId) {

            function buildSmartLocationContext() {
                try {
                    const cards = getCards();
                    const locations = cards.filter((c) => c.genre === "location");
                    if (!currentLocationId || locations.length === 0) return "";

                    const current = locations.find(l => l.id === currentLocationId);
                    if (!current) return "";

                    // Get ancestors (parent regions)
                    const ancestors = [];
                    let parent = current;
                    while (parent) {
                        ancestors.push(parent);
                        const nextParent = cards.find((c) => {
                            if (c.genre !== "location" || !c.sublocations) return false;
                            return Object.values(c.sublocations).some((arr) => (arr || []).includes(parent.id));
                        });
                        parent = nextParent;
                    }

                    // Get immediate children (sublocations)
                    const children = [];
                    if (current.sublocations) {
                        Object.values(current.sublocations).forEach(arr => {
                            if (Array.isArray(arr)) {
                                arr.forEach(id => {
                                    const child = locations.find(l => l.id === id);
                                    if (child) children.push(child);
                                });
                            }
                        });
                    }

                    const contextLines = [];
                    contextLines.push("\n# WORLD LOCATIONS (Smart Visibility)\n");

                    // ZONE 1: Current Location (FULL DETAILS)
                    contextLines.push("## CURRENT LOCATION (Full Details)\n");
                    const curType = (current.locationDetail || current.locationSub || "Location").toUpperCase();
                    contextLines.push(`- ${current.title} (${curType})`);
                    if (current.description) contextLines.push(`  Description: ${current.description}`);
                    if (current.lore) contextLines.push(`  Lore: ${current.lore}`);

                    // Residents at current location
                    if (current.residents && current.residents.length > 0) {
                        const chars = cards.filter(c => c.genre === "character");
                        current.residents.forEach(resId => {
                            const char = chars.find(c => c.id === resId);
                            if (char) {
                                const isDead = (char.status || "Alive") === "Dead";
                                const label = isDead ? "Dead Resident" : "Resident";
                                contextLines.push(`  * ${label}: ${char.title} (${char.raceName || "Character"})`);
                            }
                        });
                    }

                    // ZONE 2: Visited Ancestors (Summary only)
                    const visitedAncestors = ancestors.filter(a => a.id !== current.id && isLocationVisited(a.id));
                    if (visitedAncestors.length > 0) {
                        contextLines.push("\n## KNOWN REGIONS (Previously Visited)\n");
                        visitedAncestors.forEach(loc => {
                            const type = (loc.locationDetail || loc.locationSub || "Location").toUpperCase();
                            contextLines.push(`- ${loc.title} (${type})${loc.description ? `: ${loc.description.substring(0, 60)}...` : ""}`);
                        });
                    }

                    // ZONE 2b: Unvisited Ancestors (Name only)
                    const unvisitedAncestors = ancestors.filter(a => a.id !== current.id && !isLocationVisited(a.id));
                    if (unvisitedAncestors.length > 0) {
                        contextLines.push("\n## UNKNOWN PARENT REGIONS\n");
                        unvisitedAncestors.forEach(loc => {
                            contextLines.push(`- ${loc.title} [ID: ${loc.id}] (Region known but never visited)`);
                        });
                    }

                    // ZONE 3: Sublocations (Children) - Always show as "discoverable"
                    if (children.length > 0) {
                        contextLines.push("\n## SUBLOCATIONS (Can be entered)\n");
                        children.forEach(child => {
                            const isChildVisited = isLocationVisited(child.id);
                            const childType = (child.locationDetail || child.locationSub || "Location").toUpperCase();
                            if (isChildVisited) {
                                contextLines.push(`- ${child.title} (${childType}) - Visited: ${child.description ? child.description.substring(0, 50) + "..." : "No description"}`);
                            } else {
                                contextLines.push(`- ${child.title} (${childType}) - Not yet explored`);
                            }
                        });
                    }

                    // ZONE 4: All other locations (not in hierarchy) - minimal info
                    const knownIds = new Set([current.id, ...ancestors.map(a => a.id), ...children.map(c => c.id)]);
                    const otherVisited = locations.filter(l => !knownIds.has(l.id) && isLocationVisited(l.id));
                    if (otherVisited.length > 0) {
                        contextLines.push("\n## OTHER VISITED LOCATIONS\n");
                        otherVisited.forEach(loc => {
                            contextLines.push(`- ${loc.title} [ID: ${loc.id}]`);
                        });
                    }

                    return contextLines.join("\n") + "\n";
                } catch (e) {
                    console.error("Smart location context error", e);
                    return "";
                }
            }

            function buildLocationHierarchy() {
                try {
                    const cards = getCards();
                    const locations = cards.filter((c) => c.genre === "location");
                    const characters = cards.filter(
                        (c) => c.genre === "character",
                    );

                    const childrenMap = new Map();
                    const allSubIds = new Set();

                    locations.forEach((loc) => {
                        const subIds = [];
                        if (loc.sublocations) {
                            Object.values(loc.sublocations).forEach((arr) => {
                                if (Array.isArray(arr)) {
                                    arr.forEach((id) => {
                                        subIds.push(id);
                                        allSubIds.add(id);
                                    });
                                }
                            });
                        }
                        childrenMap.set(loc.id, subIds);
                    });

                    const roots = locations.filter(
                        (loc) => !allSubIds.has(loc.id),
                    );

                    function renderNode(id, depth = 0) {
                        const loc = locations.find((l) => l.id === id);
                        if (!loc) return "";

                        let indent = "  ".repeat(depth);
                        const isVisible = isLocationVisible(id);

                        if (!isVisible) {
                            // Not visible: only name and ID
                            return `${indent}- ${loc.title} [ID: ${loc.id}]\n`;
                        }

                        // Visible: full details
                        let type = (

                        // School-specific data

                            (loc.locationDetail === "school" ||
                                loc.locationDetail === "SCHOOL")
                        ) {
                            if (loc.schoolSchedule) {
                                const d = loc.schoolSchedule.days || [];
                                const labels = ["Mo","Di","Mi","Do","Fr","Sa","So"];
                                const openDays = labels
                                    .map((lbl, i) => (d[i] ? lbl : null))
                                    .filter(Boolean)
                                    .join(", ");
                                const start = loc.schoolSchedule.start || "08:00";
                                const end = loc.schoolSchedule.end || "16:00";
                                str += `${indent}  School Schedule: ${openDays || "—"} | ${start} - ${end}\n`;

                                    const tName = t ? t.title : (cls.teacherId ? "(Unknown)" : "—");
                                    const studs = (cls.studentIds || [])
                                        .map(id => {
                                            const ch = characters.find(c => c.id === id);
                                            return ch ? ch.title : "(Unknown)";
                                        })
                                        .join(", ");
                                    str += `${indent}    - ${cls.name || "Class "+(idx+1)} | Teacher: ${tName} | Students: ${studs || "—"}\n`;

                            }
                        }

                        const children = childrenMap.get(id) || [];
                        children.forEach((childId) => {
                            str += renderNode(childId, depth + 1);

                        return str;
                    }

                    if (roots.length === 0 && locations.length > 0) {

                            result += renderNode(l.id);

                        roots.forEach((root) => {
                            result += renderNode(root.id);

            // NPC Mention Tracking for continuity
            let _mentionedNpcIds = new Set();
            function trackMentionedNpc(npcId) {
                if (!npcId) return;
                _mentionedNpcIds.add(npcId);
                // Keep only last 5 mentioned NPCs to avoid bloat
                if (_mentionedNpcIds.size > 5) {
                    const arr = [..._mentionedNpcIds];
                    _mentionedNpcIds = new Set(arr.slice(-5));
                }
            }

            function extractAndTrackMentionedNpcs(text) {
                if (!text) return;
                const cards = getCards();
                const characters = cards.filter(c => c.genre === "character");
                
                characters.forEach(char => {
                    const name = char.title;
                    if (!name) return;
                    
                    // Simple name matching (case insensitive, word boundaries)
                    const regex = new RegExp(`\\b${name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\b`, 'i');
                    if (regex.test(text)) {
                        trackMentionedNpc(char.id);
                    }
                });
            }

            function buildSmartCharacterContext() {
                try {
                    const cards = getCards();
                    if (!currentLocationId) return "";

                    const currentLoc = cards.find((c) => c.id === currentLocationId);
                    if (!currentLoc) return "";

                    // Get ancestors (parent locations)
                    const ancestors = [];
                    let current = currentLoc;
                    while (current) {
                        ancestors.push(current);
                        const parent = cards.find((c) => {
                            if (c.genre !== "location" || !c.sublocations) return false;
                            return Object.values(c.sublocations).some((arr) => (arr || []).includes(current.id));
                        });
                        current = parent;
                    }

                    const ancestorIds = new Set(ancestors.map(a => a.id));
                    const scheduleNow = computeSchoolPresenceNow();
                    const scheduledByNpc = scheduleNow.byNpc || new Map();

                    // Get currently PRESENT NPCs (visible in bar)
                    const presentIds = getPresentNpcIds();
                    const presentSet = new Set(presentIds);

                    // Get all resident IDs from this location and ancestors
                    const residentIds = new Set();
                    ancestors.forEach((loc) => {
                        if (loc.residents) {
                            loc.residents.forEach((id) => residentIds.add(id));
                        }
                    });

                    // Categorize characters
                    const presentNPCs = [];
                    const residentNPCs = [];
                    const deadHereNPCs = [];
                    const mentionedNPCs = [];

                    // Process all present NPCs and residents (combine both sets)
                    const allRelevantIds = new Set([...presentSet, ...residentIds]);
                    allRelevantIds.forEach(id => {
                        const c = cards.find(card => card.genre === "character" && card.id === id);
                        if (!c) return;

                        const isDead = (c.status || "Alive") === "Dead";
                        const isPresent = presentSet.has(id);
                        const isResident = residentIds.has(id);

                        // Check school schedule - if at school, not present here
                        const sched = scheduledByNpc.get(c.id);
                        const atSchool = sched && !ancestorIds.has(sched.schoolId);

                        if (isDead) {
                            // Only show dead NPCs if they died HERE
                            if (c.deathLocationId === currentLocationId || ancestorIds.has(c.deathLocationId)) {
                                deadHereNPCs.push(c);
                            }
                        } else if (isPresent && !atSchool) {
                            presentNPCs.push(c);
                        } else if (isResident) {
                            // Resident but not present (could be elsewhere)
                            residentNPCs.push(c);
                        }
                    });

                    // Check for recently mentioned NPCs that might be elsewhere
                    _mentionedNpcIds.forEach(id => {
                        if (residentIds.has(id) || presentSet.has(id)) return; // Already covered
                        const c = cards.find(card => card.genre === "character" && card.id === id);
                        if (c && (c.status || "Alive") !== "Dead") {
                            mentionedNPCs.push(c);
                        }
                    });

                    // Build context with tiers
                    const contextLines = [];
                    contextLines.push("\n# CHARACTERS (Smart Visibility Tiers)\n");

                    // TIER 1: PRESENT - Full details
                    if (presentNPCs.length > 0) {
                        contextLines.push("## PRESENT (Physically Here - Full Details)\n");
                        contextLines.push("These NPCs are currently visible and can interact.\n");
                        presentNPCs.forEach((c) => {
                            const age = parseInt(c.age, 10);
                            const bd = readBirthdate(c);
                            const secrets = readSecrets(c);
                            const knownSecrets = readKnownSecrets(c);
                            
                            contextLines.push(`- ${c.title} [ID: ${c.id}] (${c.raceName || "Unknown Race"})`);
                            if (Number.isFinite(age) && age > 0) contextLines.push(`  Age: ${age}`);
                            if (bd) contextLines.push(`  Birthdate: ${formatBirthdate(bd)}`);
                            if (secrets.length > 0) contextLines.push(`  Secrets: ${secrets.join(" | ")}`);
                            if (knownSecrets.length > 0) contextLines.push(`  Known Secrets (learned from others): ${knownSecrets.join(" | ")}`);
                            if (c.appearance) contextLines.push(`  Appearance: ${c.appearance}`);
                            if (c.personality) contextLines.push(`  Personality: ${c.personality}`);
                            if (c.description) contextLines.push(`  Description: ${c.description}`);
                            if (c.lore) contextLines.push(`  Lore: ${c.lore}`);
                            
                            // Include recent memories for present NPCs
                            if (c.memories && c.memories.length > 0) {
                                const recentMems = c.memories.slice(-3);
                                contextLines.push(`  Recent Memories:`);
                                recentMems.forEach(m => {
                                    const txt = m.text || m;
                                    const lvl = m.level || "Common";
                                    contextLines.push(`    [${lvl}] ${txt.substring(0, 80)}${txt.length > 80 ? "..." : ""}`);
                                });
                            }
                            contextLines.push("");
                        });
                    }

                    // TIER 2: RESIDENTS - Summaries only
                    if (residentNPCs.length > 0) {
                        contextLines.push("## RESIDENTS (Live Here, Currently Elsewhere)\n");
                        contextLines.push("These NPCs belong to this location but are not currently present.\n");
                        residentNPCs.forEach((c) => {
                            const sched = scheduledByNpc.get(c.id);
                            let location = "Unknown location";
                            if (sched) {
                                const schoolCard = cards.find(card => card.id === sched.schoolId);
                                location = schoolCard ? `At ${schoolCard.title} (School)` : "At school";
                            }
                            contextLines.push(`- ${c.title} (${c.raceName || "Character"})${c.description ? ` - ${c.description.substring(0, 50)}...` : ""}`);
                            contextLines.push(`  Currently: ${location}`);
                        });
                        contextLines.push("");
                    }

                    // TIER 3: DEAD HERE - Atmosphere only
                    if (deadHereNPCs.length > 0) {
                        contextLines.push("## DEAD HERE (Former Residents)\n");
                        contextLines.push("These NPCs died at this location. Their presence lingers in memory.\n");
                        deadHereNPCs.forEach((c) => {
                            contextLines.push(`- ${c.title} (${c.raceName || "Character"}) - ${c.deathCause || "Unknown cause"}`);
                            if (c.lore) contextLines.push(`  Legend: ${c.lore.substring(0, 60)}...`);
                        });
                        contextLines.push("");
                    }

                    // TIER 4: MENTIONED - For continuity
                    if (mentionedNPCs.length > 0) {
                        contextLines.push("## MENTIONED (Referenced in Recent Story)\n");
                        contextLines.push("These NPCs were mentioned recently but are elsewhere.\n");
                        mentionedNPCs.forEach((c) => {
                            contextLines.push(`- ${c.title} (${c.raceName || "Character"}) - Not present here`);
                        });
                        contextLines.push("");
                    }

                    // KNOWN ELSEWHERE - Characters with relations to player
                    if (activeChar && activeChar.relations && activeChar.relations.length > 0) {
                        const knownIds = new Set();
                        activeChar.relations.forEach(r => {
                            if (r.targetId) knownIds.add(r.targetId);
                        });
                        // Filter out those already mentioned
                        const knownElsewhere = [];
                        knownIds.forEach(id => {
                            if (residentIds.has(id) || presentSet.has(id) || _mentionedNpcIds.has(id)) return;
                            const c = cards.find(card => card.genre === "character" && card.id === id);
                            if (c && (c.status || "Alive") !== "Dead") {
                                knownElsewhere.push(c);
                            }
                        });
                        
                        if (knownElsewhere.length > 0) {
                            contextLines.push("## KNOWN ELSEWHERE (Relations to Player)\n");
                            knownElsewhere.forEach((c) => {
                                const rel = activeChar.relations.find(r => r.targetId === c.id);
                                const relText = rel ? (rel.relation === "Family" ? rel.familySub : rel.relation) : "Known";
                                contextLines.push(`- ${c.title} (${c.raceName || "Character"}) - ${relText}`);
                            });
                            contextLines.push("");
                        }
                    }

                    return contextLines.join("\n");
                } catch (e) {
                    console.error("Smart character context error", e);
                    return "";
                }
            }

            function speciesKeyForLoc(loc) {
                const sub = (loc.locationSub || "").toLowerCase();
                const det = (loc.locationDetail || "").toLowerCase();
                if (sub === "custom") return "custom";
                if (sub === "building") return "building";
                if (sub === "forest") return "forest";
                if (sub === "land" && det === "forest") return "forest";
                if (sub === "landmark") return "landmark";
                if (sub === "ocean") return "ocean";
                return null;
            }

            function getPresentSpeciesCards() {
                try {
                    if (!currentLocationId) return [];
                    const cards = getCards();
                    const currentLoc = cards.find((c) => c.id === currentLocationId);
                    if (!currentLoc) return [];
                    const ancestors = [];
                    let cur = currentLoc;
                    while (cur) {
                        ancestors.push(cur);
                        const parent = cards.find((c) => {
                            if (c.genre !== "location" || !c.sublocations) return false;
                            return Object.values(c.sublocations).some((arr) => (arr || []).includes(cur.id));
                        });
                        cur = parent;
                    }
                    const ids = new Set();
                    ancestors.forEach((loc) => {
                        const key = speciesKeyForLoc(loc);
                        if (!key) return;
                        const spec = loc.species || {};
                        (spec[key] || []).forEach((id) => ids.add(id));
                    });
                    return cards.filter((c) => c.genre === "species" && ids.has(c.id));
                } catch (e) {
                    console.error("Species presence error", e);
                    return [];

            function buildEventsContext() {
                try {
                    const cards = getCards();
                    if (!currentLocationId) return "";
                    const d = activeChar?.startingDate || {};
                    const curDate = `${String(d.day || 1).padStart(2,"0")}.${String(d.month || 1).padStart(2,"0")}.${d.year || 1983}`;
                    const curTime = d.time || "00:00";
                    // Find ancestors of current location
                    const ancestors = [];
                    let current = cards.find(c => c.id === currentLocationId);
                    if (!current) return "";
                    while (current) {
                        ancestors.push(current);
                        const parent = cards.find((c) => {
                            if (c.genre !== "location" || !c.sublocations) return false;
                            return Object.values(c.sublocations).some((arr) => (arr || []).includes(current.id));
                        });
                        current = parent;
                    }
                    const contextLines = [];
                    contextLines.push("\nLOCATION EVENTS (Current area and parent regions):");
                    const nowDay = _nowDayKey();
                    ancestors.forEach(loc => {
                        if (loc.genre !== "location" || loc.locationSub !== "custom") return;
                        const ev = loc.events || null;
                        if (!ev) return;
                        const lists = [];
                        if (Array.isArray(ev["custom"])) lists.push(...ev["custom"].map(e => ({...e, _loc: loc.title})));
                        const normalized = lists
                            .filter(e => e && e.day != null && e.month != null && e.year != null)
                            .sort((a, b) => _eventTimeKey(a) - _eventTimeKey(b));
                        if (normalized.length === 0) return;
                        contextLines.push(`- ${loc.title}:`);
                        normalized.forEach(e => {
                            const type = (e.type === "secret") ? "SECRET EVENT" : "PUBLIC EVENT";
                            const eventDay = _eventDayKey(e);
                            const deltaDays = eventDay - nowDay;
                            let phase = "PAST";
                            if (deltaDays > 0) phase = "UPCOMING";
                            else if (deltaDays === 0) phase = "TODAY";
                            const dateStr = `${String(e.day||0).toString().padStart(2,"0")}.${String(e.month||0).toString().padStart(2,"0")}.${e.year||0}`;
                            const timeStr = e.time || "00:00";
                            let relativeBadge = "";
                            if (deltaDays === 0) relativeBadge = " (TODAY)";
                            else if (deltaDays === 1) relativeBadge = " (TOMORROW)";
                            else if (deltaDays > 1) relativeBadge = ` (IN ${deltaDays} DAYS)`;
                            else if (deltaDays === -1) relativeBadge = " (YESTERDAY)";
                            else relativeBadge = ` (${Math.abs(deltaDays)} DAYS AGO)`;
                            const desc = e.description || "";
                            contextLines.push(`  * [${type} | ${phase}] ${dateStr} ${timeStr}${relativeBadge} — ${desc}`);
                        });
                    });
                    if (contextLines.length <= 1) return "";
                    contextLines.push(`Current date reference: ${curDate} ${curTime}`);
                    contextLines.push("Future PUBLIC events are fixed calendar facts. Do not move them earlier or later.");
                    contextLines.push("Secret events are unknown to NPCs; use them only as hidden world triggers.");
                    return contextLines.join("\n") + "\n";
                } catch (e) {
                    console.error("Events context error", e);
                    return "";
                }
            }

                    const contextLines = [];
                    contextLines.push("\nLOCATION MEMORIES (Current area and parent regions):");
                    ancestors.forEach(loc => {
                        const mem = Array.isArray(loc.memories) ? loc.memories : [];
                        if (mem.length === 0) return;
                        contextLines.push(`- ${loc.title}:`);
                        mem.slice(-8).forEach(m => {
                            contextLines.push(`  * ${m.date} ${m.time} — ${m.text}`);
                        });
                    });
                    if (contextLines.length <= 1) return "";
                    contextLines.push(`Current time reference: ${curDate} ${curTime}`);
                    return contextLines.join("\n") + "\n";
                } catch (e) {
                    console.error("Location memory context error", e);
                    return "";
                }
            }

            // Helpers for school schedules
            function _timeToMinutes(t) {
                if (!t || typeof t !== "string") return 0;
                const parts = t.split(":").map((x) => parseInt(x, 10));
                return (parts[0] || 0) * 60 + (parts[1] || 0);
            }
            function _eventTimeKey(e) {
                const dd = _worldDayCount({ day: e.day || 1, month: e.month || 1, year: e.year || 1983 });
                const mm = _timeToMinutes(e.time || "00:00");
                return dd * 1440 + mm;
            }
            function _eventDayKey(e) {
                return _worldDayCount({ day: e.day || 1, month: e.month || 1, year: e.year || 1983 });
            }
            function _nowTimeKey() {
                const d = activeChar?.startingDate || {};
                const dd = _worldDayCount(d);
                const mm = _timeToMinutes(d.time || "00:00");
                return dd * 1440 + mm;
            }
            function _nowDayKey() {
                const d = activeChar?.startingDate || {};
                return _worldDayCount(d);
            }
            function _getAncestorsForCurrent() {
                const cards = getCards();
                const ancestors = [];
                if (!currentLocationId) return ancestors;
                let current = cards.find(c => c.id === currentLocationId);
                while (current) {
                    ancestors.push(current);
                    const parent = cards.find((c) => {
                        if (c.genre !== "location" || !c.sublocations) return false;
                        return Object.values(c.sublocations).some((arr) => (arr || []).includes(current.id));
                    });
                    current = parent;
                }
                return ancestors;
            }
            function _applyEventOverrideToCard(card, changes, snapshot) {
                if (!card || !changes) return;
                if (!snapshot[card.id]) snapshot[card.id] = {};
                const snap = snapshot[card.id];
                const setOnce = (key, val) => {
                    if (!(key in snap)) snap[key] = (card[key] !== undefined ? JSON.parse(JSON.stringify(card[key])) : undefined);
                    card[key] = val;
                };
                if (typeof changes.cardDescription === "string" && changes.cardDescription.trim()) {
                    setOnce("description", changes.cardDescription.trim());
                }
                if (Array.isArray(changes.residents)) {
                    setOnce("residents", changes.residents.slice());
                }
                // population removed
                if (changes.sublocations && typeof changes.sublocations === "object") {
                    const cur = Object.assign({}, card.sublocations || {});
                    Object.keys(changes.sublocations).forEach(k => { cur[k] = changes.sublocations[k].slice(); });
                    setOnce("sublocations", cur);
                }
                if (changes.species && typeof changes.species === "object") {
                    const cur = Object.assign({}, card.species || {});
                    Object.keys(changes.species).forEach(k => { cur[k] = changes.species[k].slice(); });
                    setOnce("species", cur);
                }
                // racial civilization removed
                if (Array.isArray(changes.curseTags)) {
                    setOnce("curseTags", changes.curseTags.map(c => ({ ...c })));
                }
            }
            function recalcEventOverrides() {
                try {
                    const cards = getCards();
                    if (!Array.isArray(cards) || !activeChar) return;
                    const nowDay = _nowDayKey();
                    if (!window._eventOverrideSnapshot) window._eventOverrideSnapshot = {};
                    if (!window._eventAppliedIds) window._eventAppliedIds = new Set();
                    if (window._eventAppliedIds.size > 0) {
                        let changed = false;
                        window._eventAppliedIds.forEach(id => {
                            const card = cards.find(c => c.id === id);
                            const snapAll = window._eventOverrideSnapshot[id] || null;
                            if (card && snapAll) {
                                Object.keys(snapAll).forEach(k => { card[k] = snapAll[k]; });
                                changed = true;
                            }
                        });
                        if (changed) sessionStorage.setItem(CARDS_KEY, JSON.stringify(cards));
                        window._eventAppliedIds.clear();
                        window._eventOverrideSnapshot = {};
                    }
                    const ancestors = _getAncestorsForCurrent().filter(c => c.genre === "location" && c.locationSub === "custom");
                    if (ancestors.length === 0) return;
                    const applicable = [];
                    ancestors.forEach(loc => {
                        const ev = loc.events || {};
                        const all = []
                            .concat(Array.isArray(ev["custom"]) ? ev["custom"] : []);
                        const eligible = all.filter(e => e && e.day != null && e.month != null && e.year != null && e.changes);
                        if (eligible.length === 0) return;
                        const latest = eligible
                            .filter(e => _eventDayKey(e) <= nowDay)
                            .sort((a,b) => _eventDayKey(a) - _eventDayKey(b))
                            .slice(-1)[0];
                        if (latest && latest.changes) {
                            applicable.push({ locId: loc.id, changes: latest.changes });
                        }
                    });
                    if (applicable.length === 0) return;
                    const snapshot = {};
                    applicable.reverse().forEach(({ locId, changes }) => {
                        const card = cards.find(c => c.id === locId);
                        if (!card) return;
                        _applyEventOverrideToCard(card, changes, snapshot);
                        window._eventAppliedIds.add(locId);
                    });
                    Object.keys(snapshot).forEach(id => { window._eventOverrideSnapshot[id] = snapshot[id]; });
                    sessionStorage.setItem(CARDS_KEY, JSON.stringify(cards));
                } catch (e) {
                    console.error("recalcEventOverrides error", e);
                }
            }
            function _weekdayMon0(day, month, year) {
                // JS: 0=Sun..6=Sat -> convert to Mon=0..Sun=6
                const js = new Date((year || 1983), (month || 1) - 1, (day || 1));
                const dow = js.getDay(); // 0..6
                return (dow + 6) % 7;
            }
            function _weekdayNameEn(day, month, year) {
                const names = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
                const idx = _weekdayMon0(day, month, year);
                return names[idx] || "Monday";
            }
            function computeSchoolPresenceNow() {
                try {
                    const cards = getCards();
                    const d = activeChar?.startingDate || {};
                    const wday = _weekdayMon0(d.day, d.month, d.year);
                    const nowMin = _timeToMinutes(d.time || "00:00");
                    const schools = cards.filter(
                        (c) =>
                            c.genre === "location" &&
                            c.locationSub === "building" &&
                            (c.locationDetail || "").toLowerCase() === "school",
                    );
                    const characters = cards.filter((c) => c.genre === "character");
                    const byNpc = new Map(); // npcId -> { schoolId, schoolTitle, className }
                    let context = "\nSCHEDULED NPC PRESENCE (Current time):\n";
                    schools.forEach((school) => {
                        const sched = school.schoolSchedule || null;
                        let isOpen = false;
                        if (sched && Array.isArray(sched.days)) {
                            const startMin = _timeToMinutes(sched.start || "08:00");
                            const endMin = _timeToMinutes(sched.end || "16:00");
                            isOpen = !!sched.days[wday] && nowMin >= startMin && nowMin < endMin;
                        }
                        if (!isOpen) return;
                        const classes = Array.isArray(school.schoolClasses)
                            ? school.schoolClasses
                            : [];
                        if (classes.length === 0) return;
                        context += `- ${school.title}: OPEN. Classes running now.\n`;
                        classes.forEach((cls, idx) => {
                            const t = characters.find((c) => c.id === cls.teacherId && (c.status || "Alive") !== "Dead");
                            const tName = t ? t.title : (cls.teacherId ? "(Unknown)" : "—");
                            const studs = (cls.studentIds || [])
                                .map((id) => {
                                    const ch = characters.find((c) => c.id === id && (c.status || "Alive") !== "Dead");
                                    return ch ? ch.title : null;
                                })
                                .filter(Boolean)
                                .join(", ");
                            context += `  * ${cls.name || "Class " + (idx + 1)} | Teacher: ${tName} | Students: ${studs || "—"}\n`;
                            // Fill lookup to constrain presence
                            if (t && cls.teacherId) byNpc.set(cls.teacherId, { schoolId: school.id, schoolTitle: school.title, className: cls.name || "" });
                            (cls.studentIds || []).forEach((sid) => {
                                const ch = characters.find((c) => c.id === sid && (c.status || "Alive") !== "Dead");
                                if (ch) byNpc.set(sid, { schoolId: school.id, schoolTitle: school.title, className: cls.name || "" });
                            });
                        });
                    });
                    if (byNpc.size === 0) context += "  (No classes in session)\n";
                    return { byNpc, context };
                } catch (e) {
                    console.error("schedule compute error", e);
                    return { byNpc: new Map(), context: "" };
                }
            }

            function computeShopPresenceNow() {

            function getCurrentLocationPath() {
                if (!currentLocationId) return "Unknown Location";
