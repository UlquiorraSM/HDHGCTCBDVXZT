                                .querySelector(".npc-name-xs")
                                .textContent.trim();
                            const card = cards.find(
                                (c) => c.genre === "character" && c.title === name,
                            );
                            return card ? card.id : null;
                        })
                        .filter(Boolean);

                    if (presentNpcIds.length === 0) return relationshipRules;

                    let summary = "\nCharacter Relationships:\n";
                    const playerFullName = activeChar
                        ? [activeChar.firstName, activeChar.lastName]
                              .filter(Boolean)
                              .join(" ")
                        : "Player";

                    presentNpcIds.forEach((npcId) => {
                        const npc = cards.find((c) => c.id === npcId);
                        if (!npc) return;

                        // 1. Relation NPC to Player (Check NPC side and Player side)
                        let playerRel = "Stranger (Unknown)";
                        
                        // Check NPC's side
                        if (npc.relations) {
                            const relObj = npc.relations.find(
                                (r) =>
                                    r.targetName.toLowerCase() ===
                                    playerFullName.toLowerCase(),
                            );
                            if (relObj && relObj.relation !== "Unknown") {
                                playerRel =
                                    relObj.relation === "Family"
                                        ? relObj.familySub
                                        : relObj.relation;
                            }
                        }
                        
                        // Check Player's side if still unknown
                        if (playerRel === "Stranger (Unknown)" && activeChar && activeChar.relations) {
                            const relObj = activeChar.relations.find(
                                (r) => r.targetId === npcId || r.targetName.toLowerCase() === npc.title.toLowerCase()
                            );
                            if (relObj && relObj.relation !== "Unknown") {
                                playerRel =
                                    relObj.relation === "Family"
                                        ? relObj.familySub
                                        : relObj.relation;
                            }
                        }
                        
                        summary += `- ${npc.title} to ${playerFullName}: ${playerRel}\n`;

                        // 2. Relation NPC to other present NPCs
                        presentNpcIds.forEach((otherId) => {
                            if (npcId === otherId) return;
                            const other = cards.find((c) => c.id === otherId);
                            if (!other) return;

                            let npcRel = "Stranger (Unknown)";
                            if (npc.relations) {
                                const relObj = npc.relations.find(
                                    (r) => r.targetId === otherId,
                                );
                                if (relObj && relObj.relation !== "Unknown") {
                                    npcRel =
                                        relObj.relation === "Family"
                                            ? relObj.familySub
                                            : relObj.relation;
                                }
                            }
                            summary += `  * ${npc.title} to ${other.title}: ${npcRel}\n`;
                        });
                    });

                    summary += relationshipRules;
                    return summary;
                } catch (e) {
                    console.error("Relationship summary error", e);
                    return relationshipRules;
                }
            }

            function updateLocation(nameOrId) {
                if (!nameOrId) return;
                // Strip surrounding quotes if present
                nameOrId = nameOrId.replace(/^["']|["']$/g, "").trim();
                const cards = getCards();
                let card = null;

                // 1. Try exact ID
                card = cards.find((c) => c.genre === "location" && c.id === nameOrId);
                
                // 2. Try exact title
                if (!card) {
                    const search = nameOrId.toLowerCase().trim();
                    card = cards.find((c) => c.genre === "location" && (c.title || "").toLowerCase() === search);
                }

                // 3. Try to handle "Region (Outside)" format
                if (!card && nameOrId.includes("(")) {
                    const regionName = nameOrId.split("(")[0].trim().toLowerCase();
                    card = cards.find((c) => c.genre === "location" && (c.title || "").toLowerCase() === regionName);
                }

                const el = document.getElementById("header-location");
                if (card) {
                    currentLocationId = card.id;
                    if (activeChar) activeChar.currentLocationId = card.id; // Save to activeChar
                    if (el) el.textContent = card.title.toUpperCase(); // Fixed: Show TITLE, not ID
                    // Track discovered location and its chain
                    addDiscoveredLocation(card.id);
                    // Track visited for smart location context
                    trackVisitedLocation(card.id);
                    try { recalcEventOverrides(); } catch(e) { console.warn("recalcEventOverrides failed", e); }
                } else {
                    // Fallback: If no card found, keep the text but try to find a parent if possible
                    // Or just keep the text and null the ID (AI will lose character context)
                    currentLocationId = null;
                    if (activeChar) activeChar.currentLocationId = null; // Save to activeChar
                    if (el) el.textContent = nameOrId.toUpperCase();
                    console.warn(`[Location] No card found for: ${nameOrId}`);
                }
                
                updatePresentNPCs();
                saveActiveCharacter(); // Save the location state
                try { loadBackground(); } catch {}
                updateTravelButtonVisibility(); // Show/hide travel button based on transport building
            }

            /* ═══════════════════════════════════════
               LOCATION DISCOVERY SYSTEM
            ═══════════════════════════════════════ */
            function addDiscoveredLocation(locId) {
                if (!activeChar || !locId) return;
                if (!Array.isArray(activeChar.discoveredLocations)) {
                    activeChar.discoveredLocations = [];
                }
                // Add current location
                if (!activeChar.discoveredLocations.includes(locId)) {
                    activeChar.discoveredLocations.push(locId);
                }
                // Also discover all parent locations (ancestors)
                const cards = getCards();
                let current = cards.find(c => c.id === locId);
                while (current) {
                    const parent = cards.find((c) => {
                        if (c.genre !== "location" || !c.sublocations) return false;
                        return Object.values(c.sublocations).some((arr) => (arr || []).includes(current.id));
                    });
                    if (parent && !activeChar.discoveredLocations.includes(parent.id)) {
                        activeChar.discoveredLocations.push(parent.id);
                    }
                    current = parent;
                }
                // Discover all sibling locations (same parent) - you know they exist
                const directParent = cards.find((c) => {
                    if (c.genre !== "location" || !c.sublocations) return false;
                    return Object.values(c.sublocations).some((arr) => (arr || []).includes(locId));
                });
                if (directParent && directParent.sublocations) {
                    Object.values(directParent.sublocations).forEach((siblingIds) => {
                        (siblingIds || []).forEach((sid) => {
                            if (sid !== locId && !activeChar.discoveredLocations.includes(sid)) {
                                activeChar.discoveredLocations.push(sid);
                            }
                        });
                    });
                }
            }

            function isLocationVisible(locId) {
                if (!activeChar || !locId) return false;
                if (!currentLocationId) return false;
                if (locId === currentLocationId) return true;

                const cards = getCards();

                // Check if it's an ancestor of current location
                let current = cards.find(c => c.id === currentLocationId);
                while (current) {
                    const parent = cards.find((c) => {
                        if (c.genre !== "location" || !c.sublocations) return false;
                        return Object.values(c.sublocations).some((arr) => (arr || []).includes(current.id));
                    });
                    if (parent) {
                        if (parent.id === locId) return true;
                        current = parent;
                    } else {
                        break;
                    }
                }

                // Check if it's a child (sublocation) of current location
                const currentLoc = cards.find(c => c.id === currentLocationId);
                if (currentLoc && currentLoc.sublocations) {
                    const allChildren = Object.values(currentLoc.sublocations).flat();
                    if (allChildren.includes(locId)) return true;
                }

                return false;
            }

            function getDiscoveredLocationContext(locId) {
                const cards = getCards();
                const loc = cards.find(c => c.id === locId);
                if (!loc) return "";
                const isVisible = isLocationVisible(locId);
                if (isVisible) {
                    // Full details for visible locations
                    let type = (loc.locationDetail || loc.locationSub || "Location").toUpperCase();
                    let str = `- ${loc.title} (${type})`;
                    if (loc.description) str += `: ${loc.description}`;
                    str += "\n";
                    if (loc.lore) str += `  Lore: ${loc.lore}\n`;
                    return str;
                } else {
                    // Only name and ID for non-visible locations
                    return `- ${loc.title} [ID: ${loc.id}]\n`;
                }
            }

            function updatePresentNPCs() {
                const bar = document.getElementById("present-npcs-bar");
                if (!bar) return;
                if (!currentLocationId) {
                    bar.classList.remove("visible");
                    bar.innerHTML = "";
                    return;
                }

                const cards = getCards();
                const currentLoc = cards.find((c) => c.id === currentLocationId);
                if (!currentLoc) {
                    bar.classList.remove("visible");
                    return;
                }

                // Find all ancestors
                const ancestors = [];
                let current = currentLoc;

                while (current) {
                    ancestors.push(current);
                    // find parent
                    const parent = cards.find((c) => {
                        if (c.genre !== "location" || !c.sublocations)
                            return false;
                        return Object.values(c.sublocations).some((arr) =>
                            (arr || []).includes(current.id),
                        );
                    });
                    current = parent;
                }

                // Collect residents from current and all ancestors
                const residentIds = new Set();
                ancestors.forEach((loc) => {
                    if (loc.residents) {
                        loc.residents.forEach((id) => residentIds.add(id));
                    }
                });

                const presentNPCs = [];
                residentIds.forEach((id) => {
                    const char = cards.find(
                        (c) => c.genre === "character" && c.id === id,
                    );
                    if (char && (char.status || "Alive") !== "Dead") presentNPCs.push(char);
                });

                if (presentNPCs.length === 0) {
                    bar.classList.remove("visible");
                    bar.innerHTML = "";
                    return;
                }

                bar.innerHTML = "";
                presentNPCs.forEach((npc) => {
                    const item = document.createElement("div");
                    item.className = "npc-item";
                    item.dataset.npcId = npc.id;
                    const isF = npc.gender === "female";
                    const icon = isF ? "♀" : "♂";
                    const avatarClass = isF ? "female" : "male";

                    item.innerHTML = `
                        <div class="npc-avatar-xs ${avatarClass}">${icon}</div>
                        <div class="npc-name-xs">${npc.title}</div>
                    `;
                    item.onclick = () => showNPCInfo(npc.id);
                    bar.appendChild(item);
                });
                bar.classList.add("visible");
            }

            function getPresentNpcIds() {
                const bar = document.getElementById("present-npcs-bar");
                if (!bar) return [];
                return Array.from(bar.querySelectorAll(".npc-item"))
                    .map((item) => {
                        // Try dataset.npcId first, then data-npc-id attribute
                        let id = item.dataset.npcId || item.getAttribute("data-npc-id");
                        if (!id) {
                            // Fallback: find by name text content
                            const nameEl = item.querySelector(".npc-name-xs");
                            if (nameEl) {
                                const name = nameEl.textContent.trim();
                                const npc = cards.find(c => c.genre === "character" && (c.title === name || c.name === name));
                                if (npc) id = npc.id;
                            }
                        }
                        return id || null;
                    })
                    .filter(Boolean);
            }

            function addNpcMemoriesFromNarration(text, anchorTs = null) {
                const ids = getPresentNpcIds();
                if (ids.length === 0) return;
                const cards = getCards();
                const d = activeChar?.startingDate || {};
                const dateStr = `${String(d.day || 1).padStart(2, "0")}.${String(d.month || 1).padStart(2, "0")}.${d.year || 1983}`;
                const timeStr = d.time || "00:00";
                const loc = document.getElementById("header-location")?.textContent || "Unknown Location";
                const entry = {
                    date: dateStr,
                    time: timeStr,
                    location: loc,
                    level: "Common",
                    dayCount: _worldDayCount(d),
                    text: String(text || "").slice(0, 800),
                    logTs: anchorTs || null
                };
                let changed = false;
                ids.forEach((id) => {
                    const npc = cards.find((c) => c.id === id);
                    if (!npc) return;
                    if (!Array.isArray(npc.memories)) npc.memories = [];
                    npc.memories.push(entry);
                    if (npc.memories.length > 100) npc.memories = npc.memories.slice(-100);
                    changed = true;
                });
                if (changed) {
                    sessionStorage.setItem(CARDS_KEY, JSON.stringify(cards));
                }
            }
            
            // Extract a short summary from narrative text (first 1-2 sentences, max 200 chars)
            function extractMemorySummary(text) {
                if (!text) return "";
                // Split by sentence endings
                const sentences = text.split(/(?<=[.!?])\s+/);
                let summary = "";
                for (let i = 0; i < Math.min(2, sentences.length); i++) {
                    const trimmed = sentences[i].trim();
                    if (trimmed) {
                        summary += trimmed + " ";
                    }
                }
                summary = summary.trim();
                // Fallback: if no clear sentences, take first 200 chars
                if (!summary) {
                    summary = text.slice(0, 200).trim();
                }
                return summary;
            }

            function addNpcMemoriesFromPending(narrativeText, anchorTs = null) {
                const targets = Array.isArray(window._pendingMemoryTargets) ? window._pendingMemoryTargets : [];
                if (targets.length === 0) return;
                const cards = getCards();
                const d = activeChar?.startingDate || {};
                const dateStr = `${String(d.day || 1).padStart(2, "0")}.${String(d.month || 1).padStart(2, "0")}.${d.year || 1983}`;
                const timeStr = d.time || "00:00";
                const locName = document.getElementById("header-location")?.textContent || "Unknown Location";
                
                // Generate short summary instead of full text
                const memorySummary = extractMemorySummary(narrativeText);
                
                let changed = false;
                targets.forEach(({ id, level }) => {
                    const npc = cards.find(c => c.genre === "character" && c.id === id);
                    if (!npc) return;
                    if (!Array.isArray(npc.memories)) npc.memories = [];
                    npc.memories.push({
                        date: dateStr,
                        time: timeStr,
                        location: locName,
                        level: (level || "Common"),
                        dayCount: _worldDayCount(d),
                        text: memorySummary,
                        logTs: anchorTs || null
                    });
                    // Keep more entries now since they're shorter (max 500 instead of 200)
                    if (npc.memories.length > 500) npc.memories = npc.memories.slice(-500);
                    changed = true;
                });
                if (changed) {
                    sessionStorage.setItem(CARDS_KEY, JSON.stringify(cards));
                }
                syncNpcInactivityCounters(targets.map(t => t.id));
                window._pendingMemoryTargets = [];
            }

            function addLocationMemoryFromNarration(text, anchorTs = null) {
                if (!currentLocationId || !text) return;
                
                // Only save to location if there's an actual location state change
                // Check for LocState tags [[LocState:key=value]]
                const hasLocState = /\[\[LocState:[^\]]+\]\]/i.test(text);
                
                // Check for explicit location change markers in text
                // (e.g., "The room is now dirty", "A gum spot appears on the floor")
                const locationChangeKeywords = [
                    /(?:room|floor|wall|door|window|ceiling|ground|table|chair|bed|desk|shelf|\bbench\b|\bcouch\b|\bsofa\b) (?:is|are|becomes?|got|gets?|turns?|now|appears?|materializes?|forms?|creates?|makes?)/i,
                    /(?:dirty|clean|messy|tidy|broken|fixed|open|closed|locked|unlocked|wet|dry|cold|warm|hot|dark|bright|light)/i,
                    /(?:kaugummi|gum|spot|fleck|dreck|schmutz|staub|dirt|dust|trash|müll)/i,
                    /(?:empty|full|filled|cleared|organized|cluttered|decorated|painted)/i
                ];
                const hasLocationDescription = locationChangeKeywords.some(pattern => pattern.test(text));
                
                // Only proceed if there's evidence of location state change
                if (!hasLocState && !hasLocationDescription) {
                    return; // Skip - this is likely just character action, not location change
                }
                
                const cards = getCards();
                const locCard = cards.find((c) => c.id === currentLocationId);
                if (!locCard) return;
                const d = activeChar?.startingDate || {};
                const dateStr = `${String(d.day || 1).padStart(2, "0")}.${String(d.month || 1).padStart(2, "0")}.${d.year || 1983}`;
                const timeStr = d.time || "00:00";
                const locName = document.getElementById("header-location")?.textContent || "Unknown Location";
                
                // Extract only the location-relevant part (first 2 sentences or LocState context)
                let relevantText = text;
                if (!hasLocState) {
                    // If no explicit state tag, extract just the location description part
                    const sentences = text.split(/(?<=[.!?])\s+/);
                    const locationSentences = sentences.filter(s => 
                        locationChangeKeywords.some(pattern => pattern.test(s))
                    );
                    if (locationSentences.length > 0) {
                        relevantText = locationSentences.slice(0, 2).join(" ");
                    }
                }
                
                const entry = {
                    date: dateStr,
                    time: timeStr,
                    location: locName,
                    level: hasLocState ? "Important" : "Common",
                    dayCount: _worldDayCount(d),
                    text: String(relevantText || "").slice(0, 300), // Shorter for location
                    logTs: anchorTs || null
                };
                if (!Array.isArray(locCard.memories)) locCard.memories = [];
                locCard.memories.push(entry);
                if (locCard.memories.length > 50) locCard.memories = locCard.memories.slice(-50); // Reduced from 200
                sessionStorage.setItem(CARDS_KEY, JSON.stringify(cards));
            }

            function _worldDayCount(d) {
                const day = parseInt(d.day || 1, 10);
                const month = parseInt(d.month || 1, 10);
                const year = parseInt(d.year || 1983, 10);
                // Days until start of current year
                const y = year - 1;
                let days = y * 365 + Math.floor(y / 4) - Math.floor(y / 100) + Math.floor(y / 400);
                // Days in months before current month
                for (let m = 1; m < month; m++) days += daysInMonth(m, year);
                // Current day
                days += day;
                return days;
            }
            function syncNpcInactivityCounters(resetNpcIds = []) {
                try {
                    if (!activeChar || !activeChar.startingDate) return;
                    const cards = getCards();
                    const nowDayCount = _worldDayCount(activeChar.startingDate);
                    const resetSet = new Set((Array.isArray(resetNpcIds) ? resetNpcIds : []).filter(Boolean));
                    let changed = false;
                    const readMemoryDayCount = (m) => {
                        const direct = parseInt(m?.dayCount, 10);
                        if (Number.isFinite(direct)) return direct;
                        const parts = String(m?.date || "").split(".");
                        if (parts.length === 3) {
                            const dd = parseInt(parts[0], 10) || 1;
                            const mm = parseInt(parts[1], 10) || 1;
                            const yy = parseInt(parts[2], 10) || 1983;
                            return _worldDayCount({ day: dd, month: mm, year: yy });
                        }
                        return null;
                    };
                    cards.forEach((c) => {
                        if (!c || c.genre !== "character") return;
                        if (activeChar && c.id === activeChar.id) return;
                        let startDay = parseInt(c.unusedDaysCounterStartDayCount, 10);
                        if (!Number.isFinite(startDay)) {
                            startDay = nowDayCount;
                            changed = true;
                        }
                        let latestUsageDay = null;
                        if (Array.isArray(c.memories) && c.memories.length > 0) {
                            c.memories.forEach((m) => {
                                const mc = readMemoryDayCount(m);
                                if (!Number.isFinite(mc)) return;
                                if (latestUsageDay == null || mc > latestUsageDay) latestUsageDay = mc;
                            });
                        }
                        if (resetSet.has(c.id)) {
                            latestUsageDay = nowDayCount;
                        }
                        let refDay = latestUsageDay == null ? startDay : latestUsageDay;
                        if (refDay > nowDayCount) refDay = nowDayCount;
                        const counter = Math.max(0, nowDayCount - refDay);
                        const lastSync = nowDayCount;
                        if (c.unusedDaysCounter !== counter) {
                            c.unusedDaysCounter = counter;
                            changed = true;
                        }
                        if (c.unusedDaysCounterLastSyncDayCount !== lastSync) {
                            c.unusedDaysCounterLastSyncDayCount = lastSync;
                            changed = true;
                        }
                        if (c.unusedDaysCounterStartDayCount !== startDay) {
                            c.unusedDaysCounterStartDayCount = startDay;
                            changed = true;
                        }
                    });
                    if (changed) {
                        sessionStorage.setItem(CARDS_KEY, JSON.stringify(cards));
                    }
                } catch (e) {
                    console.warn("syncNpcInactivityCounters failed", e);
                }
            }
            function setLocationState(key, value, ttlDays = null, byTs = null) {
                if (!currentLocationId) return;
                const cards = getCards();
                const locCard = cards.find((c) => c.id === currentLocationId);
                if (!locCard) return;
                const d = activeChar?.startingDate || {};
                if (!locCard.states || typeof locCard.states !== "object") locCard.states = {};
                const state = { value, updatedAt: Date.now(), untilDayCount: null, updatedByTs: byTs || null };
                if (ttlDays != null && !isNaN(ttlDays)) {
                    state.untilDayCount = _worldDayCount(d) + parseInt(ttlDays, 10);
                }
                locCard.states[key] = state;
                sessionStorage.setItem(CARDS_KEY, JSON.stringify(cards));
            }
            function clearExpiredLocationStates() {
                if (!currentLocationId) return;
                const cards = getCards();
                const locCard = cards.find((c) => c.id === currentLocationId);
                if (!locCard || !locCard.states) return;
                const d = activeChar?.startingDate || {};
                const nowCount = _worldDayCount(d);
                let changed = false;
                Object.keys(locCard.states).forEach((k) => {
                    const st = locCard.states[k];
                    if (st && st.untilDayCount != null && nowCount > st.untilDayCount) {
                        delete locCard.states[k];
                        changed = true;
                    }
                });
                if (changed) {
                    sessionStorage.setItem(CARDS_KEY, JSON.stringify(cards));
                }
            }
            function clearExpiredNpcMemories() {
                const cards = getCards();
                const d = activeChar?.startingDate || {};
                const nowCount = _worldDayCount(d);
                let changed = false;
                const parseCount = (m) => {
                    if (m.dayCount != null) return m.dayCount;
                    const parts = (m.date || "").split(".");
                    if (parts.length === 3) {
                        const dd = parseInt(parts[0]) || 1;
                        const mm = parseInt(parts[1]) || 1;
                        const yy = parseInt(parts[2]) || 1983;
                        return _worldDayCount({ day: dd, month: mm, year: yy });
                    }
                    return null;
                };
                cards.forEach((c) => {
                    if (c.genre !== "character" || !Array.isArray(c.memories)) return;
                    const before = c.memories.length;
                    c.memories = c.memories.filter((m) => {
                        if ((m.level || "Common") !== "Common") return true;
                        const mc = parseCount(m);
                        if (mc == null) return true;
                        return mc > (nowCount - 10);
                    });
                    if (c.memories.length !== before) changed = true;
                });
                if (changed) {
                    sessionStorage.setItem(CARDS_KEY, JSON.stringify(cards));
                }
            }
            function clearExpiredLocationEvents(byTs = null) {
                try {
                    if (!activeChar || !activeChar.startingDate) return false;
                    const cards = getCards();
                    if (!Array.isArray(cards) || cards.length === 0) return false;
                    const nowDay = _nowDayKey();
                    let changed = false;
                    cards.forEach((c) => {
                        if (!c || c.genre !== "location") return;
                        if (!c.events || typeof c.events !== "object") return;
                        Object.keys(c.events).forEach((bucket) => {
                            const list = c.events[bucket];
                            if (!Array.isArray(list) || list.length === 0) return;
                            const kept = [];
                            list.forEach((evt, idx) => {
                                if (!evt || evt.day == null || evt.month == null || evt.year == null) {
                                    kept.push(evt);
                                    return;
                                }
                                const isExpired = nowDay > _eventDayKey(evt);
                                if (!isExpired) {
                                    kept.push(evt);
                                    return;
                                }
                                changed = true;
                                if (byTs) {
                                    rememberAnchoredWorldChange(byTs, {
                                        type: "eventExpired",
                                        locId: c.id,
                                        bucket,
                                        index: idx,
                                        event: JSON.parse(JSON.stringify(evt))
                                    });
                                }
                            });
                            if (kept.length !== list.length) {
                                c.events[bucket] = kept;
                            }
                        });
                    });
                    if (changed) {
                        sessionStorage.setItem(CARDS_KEY, JSON.stringify(cards));
                    }
                    return changed;
                } catch (e) {
                    console.warn("clearExpiredLocationEvents failed", e);
                    return false;
                }
            }
            function rollbackAnchoredChangesByTs(ts) {
                try {
                    if (!ts) return;
                    const cards = getCards();
                    const anchoredChanges = getAnchoredWorldChanges();
                    const pendingChanges = Array.isArray(anchoredChanges[String(ts)]) ? anchoredChanges[String(ts)] : [];
                    let changed = false;
                    cards.forEach(c => {
                        if (c.genre === "character") {
                            if (Array.isArray(c.memories)) {
                                const lenBefore = c.memories.length;

                            if (c.states && typeof c.states === "object") {
                                const keys = Object.keys(c.states);
                                keys.forEach(k => {
                                    const st = c.states[k];
                                    if (st && st.updatedByTs === ts) {
                                        delete c.states[k];
                                        changed = true;
                                    }
                                });
                            }
                        }
                    });
                    pendingChanges.forEach((change) => {
                        if (!change || change.type !== "npcDeath" || !change.npcId) return;
                        const npc = cards.find((c) => c.genre === "character" && c.id === change.npcId);
                        if (!npc) return;
                        npc.status = change.previousStatus || "Alive";
                        npc.deathCause = change.previousDeathCause || "";
                        if (change.previousDeathInfo) {
                            npc.deathInfo = { ...change.previousDeathInfo };
                        } else {
                            delete npc.deathInfo;
                        }
                        changed = true;
                    });
                    pendingChanges.forEach((change) => {
                        if (!change || change.type !== "eventExpired" || !change.locId || !change.bucket) return;
                        const loc = cards.find((c) => c.genre === "location" && c.id === change.locId);
                        if (!loc) return;
                        if (!loc.events || typeof loc.events !== "object") loc.events = {};
                        if (!Array.isArray(loc.events[change.bucket])) loc.events[change.bucket] = [];

                        const restoredEvent = change.event ? JSON.parse(JSON.stringify(change.event)) : null;

                        const idx = Number.isFinite(parseInt(change.index, 10)) ? parseInt(change.index, 10) : list.length;
                        const boundedIdx = Math.max(0, Math.min(idx, list.length));
                        list.splice(boundedIdx, 0, restoredEvent);
                        changed = true;
                    });

            function askAI(prompt) {
                return new Promise((resolve, reject) => {
                    const requestId = Math.random().toString(36).substring(7);
                    const timeout = setTimeout(() => {
                        window.removeEventListener("message", handler);
                        reject("Die KI hat zu lange gebraucht.");
                    }, 45000);

                    const handler = (event) => {
                        if (event.data.requestId === requestId) {
                            clearTimeout(timeout);
                            window.removeEventListener("message", handler);
                            if (event.data.type === "AI_RESPONSE")
                                resolve(event.data.text);
                            else
                                reject(
                                    event.data.error || "Unbekannter Fehler",
                                );
                        }
                    };

                    window.addEventListener("message", handler);
                    window.parent.postMessage(
                        { type: "AI_REQUEST", instruction: prompt, requestId },
                        "*",
                    );
                });
            }

            async function askAIWithRetry(prompt) {
                while (true) {
                    try {
                        return await askAI(prompt);
                    } catch (err) {
                        console.warn("AI Request failed, retrying in 2 seconds...", err);
                        await new Promise((resolve) => setTimeout(resolve, 2000));
                    }
                }
            }

            function buildHistoryLines(limitFirst = 15) {
                const recentHistory = chatHistory.slice(0, Math.max(0, limitFirst));
                return recentHistory
                    .map((e) => {
                        if (typeof e === "string") return `--- ${e} ---`;
                        return `[${e.time} @ ${e.location}] ${e.sender}: ${e.text}`;
                    })
                    .join("\n");
            }

            function _normalizeText(s) {
                return String(s || "").replace(/\s+/g, " ").trim().toLowerCase();
            }

            // Build context for cards whose tags match words in the player's message
            // Matches Race cards and Location cards (Building/Custom subtypes only)
            function buildTagMatchedContext(playerText) {
                if (!playerText) return "";
                const text = _normalizeText(playerText);
                const words = text.split(/\s+/).filter(w => w.length >= 2);
                if (words.length === 0) return "";

                const cards = getCards();
                const matchedCards = [];

                // Filter for Race and Location (Building/Custom) cards with tags
                const taggableCards = cards.filter(c => {
                    if (c.genre === "race" && Array.isArray(c.tags) && c.tags.length > 0) return true;
                    if (c.genre === "location" && Array.isArray(c.tags) && c.tags.length > 0) {
                        const sub = c.locationSubType || "";
                        return sub === "building" || sub === "custom";
                    }
                    return false;
                });

                // Find matches
                for (const card of taggableCards) {
                    const cardTags = (card.tags || []).map(t => _normalizeText(t));
                    for (const tag of cardTags) {
                        if (tag.length < 2) continue;
                        // Check if any word in the message contains this tag or vice versa
                        for (const word of words) {
                            if (word.includes(tag) || tag.includes(word)) {
                                matchedCards.push(card);
                                break;
                            }
                        }
                        if (matchedCards.includes(card)) break;
                    }
                }

                if (matchedCards.length === 0) return "";

                // Build context string
                let result = "\n### MENTIONED TOPICS ###\n";
                matchedCards.forEach(card => {
                    const desc = (card.description || "").substring(0, 200);
                    result += `- ${card.title}${desc ? ": " + desc : ""}\n`;
                });
                return result;
            }

            function getLastNarratorText() {
                for (let i = chatHistory.length - 1; i >= 0; i--) {
                    const e = chatHistory[i];
                    if (typeof e !== "string" && e.sender === "Narrator") {
                        return e.text || "";
                    }
                }
                return "";
            }
            function buildHistoryLinesCombined(firstCount = 10, lastCount = 5) {
                const first = chatHistory.slice(0, Math.max(0, firstCount));
                const last = chatHistory.slice(-Math.max(0, lastCount));
                const merged = first.concat(last);
                return merged
                    .map((e) => {
                        if (typeof e === "string") return `--- ${e} ---`;
                        return `[${e.time} @ ${e.location}] ${e.sender}: ${e.text}`;
                    })
                    .join("\n");
            }
            function getLastNarratorTexts(count = 10) {
                const texts = [];
                for (let i = chatHistory.length - 1; i >= 0 && texts.length < count; i--) {
                    const e = chatHistory[i];
                    if (typeof e !== "string" && e.sender === "Narrator") {
                        texts.push(e.text || "");
                    }
                }
                return texts;
            }
            function isDuplicateText(t) {
                const norm = _normalizeText(t);
                const prev = getLastNarratorTexts(10).map(_normalizeText);
                return prev.includes(norm);
            }
            function uniqueSentences(t) {
                const txt = String(t || "");
                const parts = txt.split(/(?<=[\.!\?])\s+/).filter(Boolean);
                const seen = new Set();
                const out = [];
                for (const p of parts) {
                    const n = _normalizeText(p);
                    if (!seen.has(n)) {
                        seen.add(n);
                        out.push(p);
                    }
                }
                return out.join(" ").trim();
            }

                            const finalPrompt2 = systemInst + "\n\n### STORY LOG ###\n" + historyLines + "\n\nNote: Do not repeat previous narration. Continue the story with new actions and consequences.\n\nNarrator:";
                            const r2 = await askAIWithRetry(finalPrompt2);
                            const clean2 = processAICommands(r2);
                            finalText = clean2 === NSFW_BLOCKED_TOKEN ? NSFW_BLOCKED_TEXT : uniqueSentences(applyTextSizeLimit(clean2));
                        }
                    }
                    appendBubble("ai", finalText);
                    const ts = addToStoryLog("Narrator", finalText, currentNarrationTs);
                    if (finalText !== NSFW_BLOCKED_TEXT) {
                        addNpcMemoriesFromPending(finalText, ts);
                        addLocationMemoryFromNarration(finalText, ts);
                    }
                } catch (e) {
                    removeTypingIndicator();
                    // No error bubble displayed to user
                    console.error("Continue failed even with retries (unexpected)", e);
                } finally {
                    isBusy = false;
                    setSendDisabled(false);
                    setStatus(true);
                    unlockAllButtons(); // Unlock buttons when continue is complete
                    currentNarrationTs = null;
                }
            };

            /* ═══════════════════════════════════════
               MOVE TO LOCATION
            ═══════════════════════════════════════ */
            function findParentLocationOfCurrent() {
                if (!currentLocationId) return null;
                const cards = getCards();
                const currentLoc = cards.find(c => c.id === currentLocationId);
                if (!currentLoc) return null;
                // Find parent by checking all locations with sublocations
                for (const card of cards) {
                    if (card.genre !== "location" || !card.sublocations) continue;
                    for (const key of Object.keys(card.sublocations)) {
                        const arr = card.sublocations[key];
                        if (Array.isArray(arr) && arr.includes(currentLocationId)) {
                            return card;
                        }
                    }
                }
                return null;
            }

            function getSiblingLocations() {
                const parent = findParentLocationOfCurrent();
                if (!parent) return [];
                const cards = getCards();
                const siblings = [];
                // Get all sublocations from parent (all types)
                for (const key of Object.keys(parent.sublocations || {})) {
                    const arr = parent.sublocations[key];
                    if (Array.isArray(arr)) {
                        arr.forEach(id => {
                            if (id === currentLocationId) return; // Skip current
                            const loc = cards.find(c => c.id === id && c.genre === "location");
                            if (loc) siblings.push(loc);
                        });
                    }
                }
                return siblings.sort((a, b) => (a.title || "").localeCompare(b.title || ""));
            }

            function renderMoveDropdown() {
                const dropdown = document.getElementById("move-dropdown");
                if (!dropdown) return;
                dropdown.innerHTML = "";
                const siblings = getSiblingLocations();
                if (siblings.length === 0) {
                    const empty = document.createElement("div");
                    empty.className = "move-option empty";
                    empty.textContent = "No adjacent locations";
                    dropdown.appendChild(empty);
                } else {
                    siblings.forEach(loc => {
                        const btn = document.createElement("button");
                        btn.className = "move-option" + (pendingMoveLocationId === loc.id ? " selected" : "");
                        btn.innerHTML = `<span>📍</span> ${escHtml(loc.title || "Unnamed")}${pendingMoveLocationId === loc.id ? ' <span style="color:#7ec9ff">✓</span>' : ''}`;
                        btn.onclick = () => selectMoveDestination(loc.id, loc.title);
                        dropdown.appendChild(btn);
                    });
                }
            }

            function selectMoveDestination(locationId, locationName) {
                // Toggle selection
                if (pendingMoveLocationId === locationId) {
                    pendingMoveLocationId = null;
                    showToast("Move cancelled", "rgba(180, 60, 60, 0.85)");
                } else {
                    pendingMoveLocationId = locationId;
                    pendingTravel = null; // Clear any pending travel
                    showToast(`Will move to ${locationName || 'selected location'} when you send a message`, "rgba(60, 140, 180, 0.85)");
                }
                renderMoveDropdown();
                closeMoveDropdown();
            }

            function executePendingMove() {
                if (!pendingMoveLocationId) return false;
                const moved = moveToLocation(pendingMoveLocationId);
                pendingMoveLocationId = null;
                return moved;
            }

            function toggleMoveDropdown() {
                const dropdown = document.getElementById("move-dropdown");
                const btn = document.getElementById("move-btn");
                if (!dropdown || !btn) return;
                const isOpen = dropdown.classList.contains("show");
                if (isOpen) {
                    dropdown.classList.remove("show");
                } else {
                    renderMoveDropdown();
                    dropdown.classList.add("show");
                    // Position dropdown above the button
                    const rect = btn.getBoundingClientRect();
                    dropdown.style.position = "fixed";
                    dropdown.style.bottom = `calc(100vh - ${rect.top - 8}px)`;
                    dropdown.style.left = `${rect.left + rect.width / 2}px`;
                    dropdown.style.transform = "translateX(-50%)";
                }
            }

            function closeMoveDropdown() {
                const dropdown = document.getElementById("move-dropdown");
                if (dropdown) dropdown.classList.remove("show");
            }

            function moveToLocation(locationId) {
                closeMoveDropdown();
                if (!locationId || locationId === currentLocationId) return false;
                const cards = getCards();
                const loc = cards.find(c => c.id === locationId && c.genre === "location");
                if (!loc) {
                    showToast("Location not found.", "rgba(180, 60, 60, 0.85)");
                    return false;
                }
                // Update current location
                updateLocation(locationId);
                if (activeChar) {
                    activeChar.currentLocationId = locationId;
                    // Mark as discovered
                    if (!activeChar.discoveredLocations) activeChar.discoveredLocations = [];
                    if (!activeChar.discoveredLocations.includes(locationId)) {
                        activeChar.discoveredLocations.push(locationId);
                    }
                    saveStoryLog();
                }
                // Add system message about location change
                const locationName = loc.title || "Unknown Location";
                addSystemDivider(`Moved to: ${locationName}`);
                showToast(`Moved to ${locationName}`, "rgba(60, 140, 180, 0.85)");
                return true;
            }

            document.getElementById("move-btn").onclick = (e) => {
                e.stopPropagation();
                toggleMoveDropdown();
            };

            // Close dropdown when clicking outside
            document.addEventListener("click", (e) => {
                const dropdown = document.getElementById("move-dropdown");
                const btn = document.getElementById("move-btn");
                if (dropdown && btn && !dropdown.contains(e.target) && !btn.contains(e.target)) {
                    closeMoveDropdown();
                }
            });

            /* ═══════════════════════════════════════
               TRAVEL (Transport Building)
            ═══════════════════════════════════════ */
            function isCurrentLocationTransportBuilding() {
                if (!currentLocationId) return false;
                const cards = getCards();
                const currentLoc = cards.find(c => c.id === currentLocationId);
                if (!currentLoc) return false;
                return currentLoc.genre === "location" &&
                       currentLoc.locationSub === "building" &&
                       currentLoc.locationDetail === "transport";
            }

            function updateTravelButtonVisibility() {
                const travelBtn = document.getElementById("travel-btn");
                if (!travelBtn) return;
                if (isCurrentLocationTransportBuilding()) {
                    travelBtn.style.display = "inline-flex";
                } else {
                    travelBtn.style.display = "none";
                    closeTravelDropdown();
                }
            }

            function getTransportDestinations() {
                if (!currentLocationId) return [];
                const cards = getCards();
                const currentLoc = cards.find(c => c.id === currentLocationId);
                if (!currentLoc || !Array.isArray(currentLoc.transportDestinations)) return [];
                return currentLoc.transportDestinations.map(dest => {
                    const loc = cards.find(c => c.id === dest.id);
                    const building = dest.transportBuildingId ? cards.find(c => c.id === dest.transportBuildingId) : null;
                    return { ...dest, title: loc ? loc.title : "Unknown", buildingTitle: building ? building.title : null };
                });
            }

            function renderTravelDropdown() {
                const dropdown = document.getElementById("travel-dropdown");
                if (!dropdown) return;
                dropdown.innerHTML = "";
                const destinations = getTransportDestinations();
                if (destinations.length === 0) {
                    const empty = document.createElement("div");
                    empty.className = "travel-empty";
                    empty.textContent = "No destinations available";
                    dropdown.appendChild(empty);
                } else {
                    // Header
                    const header = document.createElement("div");
                    header.className = "travel-header";
                    header.textContent = "Select Destination";
                    dropdown.appendChild(header);
                    // Destinations
                    destinations.forEach(dest => {
                        const btn = document.createElement("button");
                        const isSelected = pendingTravel && pendingTravel.destinationId === dest.id;
                        btn.className = "travel-option" + (isSelected ? " selected" : "");
                        const timeDisplay = dest.time ? `<span class="travel-time">${escHtml(dest.time)}</span>` : "";
                        const buildingDisplay = dest.buildingTitle ? `<span style="font-size:10px;color:rgba(255,255,255,0.5);">📍 ${escHtml(dest.buildingTitle)}</span>` : "";
                        const checkMark = isSelected ? ' <span style="color:#7ec9ff">✓</span>' : '';
                        btn.innerHTML = `<div style="display:flex;flex-direction:column;gap:2px;"><span>${escHtml(dest.title || "Unnamed")}${checkMark}</span>${buildingDisplay}</div>${timeDisplay}`;
                        btn.onclick = () => selectTravelDestination(dest.id, dest.transportBuildingId, dest.time, dest.title);
                        dropdown.appendChild(btn);
                    });
                }
            }

            function toggleTravelDropdown() {
                const dropdown = document.getElementById("travel-dropdown");
                const btn = document.getElementById("travel-btn");
                if (!dropdown || !btn) return;
                const isOpen = dropdown.classList.contains("show");
                if (isOpen) {
                    dropdown.classList.remove("show");
                } else {
                    renderTravelDropdown();
                    dropdown.classList.add("show");
                    // Position dropdown above the button
                    const rect = btn.getBoundingClientRect();
                    dropdown.style.position = "fixed";
                    dropdown.style.bottom = `calc(100vh - ${rect.top - 8}px)`;
                    dropdown.style.left = `${rect.left + rect.width / 2}px`;
                    dropdown.style.transform = "translateX(-50%)";
                }
            }

            function closeTravelDropdown() {
                const dropdown = document.getElementById("travel-dropdown");
                if (dropdown) dropdown.classList.remove("show");
            }

            function parseTravelTime(timeStr) {
                if (!timeStr) return { hours: 0, minutes: 0 };
                const hoursMatch = timeStr.match(/(\d+)\s*h/);
                const minsMatch = timeStr.match(/(\d+)\s*min/);
                const hours = hoursMatch ? parseInt(hoursMatch[1]) : 0;
                const minutes = minsMatch ? parseInt(minsMatch[1]) : 0;
                return { hours, minutes };
            }

            function addTravelTimeToGameTime(hours, minutes) {
                const totalMinutesToAdd = hours * 60 + minutes;
                if (totalMinutesToAdd <= 0) return;
                const newMinutes = gameMinutes + totalMinutesToAdd;
                gameMinutes = newMinutes;
                // Update time of day display
                updateTimeOfDayDisplay();
            }

            function selectTravelDestination(destinationId, transportBuildingId, travelTime, destinationName) {
                // Toggle selection
                if (pendingTravel && pendingTravel.destinationId === destinationId) {
                    pendingTravel = null;
                    showToast("Travel cancelled", "rgba(180, 60, 60, 0.85)");
                } else {
                    pendingTravel = { destinationId, transportBuildingId, travelTime };
                    pendingMoveLocationId = null; // Clear any pending move
                    const timeStr = travelTime ? ` (${travelTime})` : '';
                    showToast(`Will travel to ${destinationName || 'selected destination'}${timeStr} when you send a message`, "rgba(60, 140, 180, 0.85)");
                }
                renderTravelDropdown();
                closeTravelDropdown();
            }

            function executePendingTravel() {
                if (!pendingTravel) return false;
                const { destinationId, transportBuildingId, travelTime } = pendingTravel;
                const traveled = travelToDestinationNow(destinationId, transportBuildingId, travelTime);
                pendingTravel = null;
                return traveled;
            }

            function travelToDestination(destinationId, transportBuildingId, travelTime) {
                // This is now just for immediate travel if needed elsewhere
                return travelToDestinationNow(destinationId, transportBuildingId, travelTime);
            }

            function travelToDestinationNow(destinationId, transportBuildingId, travelTime) {
                closeTravelDropdown();
                if (!destinationId || destinationId === currentLocationId) return false;
                const cards = getCards();
                const loc = cards.find(c => c.id === destinationId && c.genre === "location");
                if (!loc) {
                    showToast("Destination not found.", "rgba(180, 60, 60, 0.85)");
                    return false;
                }
                // Parse and add travel time
                const { hours, minutes } = parseTravelTime(travelTime);
                if (hours > 0 || minutes > 0) {
                    addTravelTimeToGameTime(hours, minutes);
                }
                // If transport building is specified, navigate to that building first, then to parent location
                if (transportBuildingId) {
                    const building = cards.find(c => c.id === transportBuildingId);
                    if (building) {
                        // Navigate to the transport building (child location)
                        updateLocation(transportBuildingId);
                        if (activeChar) {
                            activeChar.currentLocationId = transportBuildingId;
                            if (!activeChar.discoveredLocations) activeChar.discoveredLocations = [];
                            if (!activeChar.discoveredLocations.includes(transportBuildingId)) {
                                activeChar.discoveredLocations.push(transportBuildingId);
                            }
                            // Also discover the parent location
                            if (!activeChar.discoveredLocations.includes(destinationId)) {
                                activeChar.discoveredLocations.push(destinationId);
                            }
                            saveStoryLog();
                        }
                        // Add system message
                        const buildingName = building.title || "Station";
                        const locationName = loc.title || "Unknown Location";
                        const timeInfo = hours > 0 || minutes > 0 ? ` (${hours > 0 ? hours + "h " : ""}${minutes > 0 ? minutes + "min" : ""})` : "";
                        addSystemDivider(`Traveled to: ${buildingName} (${locationName})${timeInfo}`);
                        showToast(`Arrived at ${buildingName}${timeInfo}`, "rgba(60, 140, 180, 0.85)");
                        return true;
                    }
                }
                // Fallback: Update to destination location (old behavior)
                updateLocation(destinationId);
                if (activeChar) {
                    activeChar.currentLocationId = destinationId;
                    if (!activeChar.discoveredLocations) activeChar.discoveredLocations = [];
                    if (!activeChar.discoveredLocations.includes(destinationId)) {
                        activeChar.discoveredLocations.push(destinationId);
                    }
                    saveStoryLog();
                }
                // Add system message
                const locationName = loc.title || "Unknown Location";
                const timeInfo = hours > 0 || minutes > 0 ? ` (${hours > 0 ? hours + "h " : ""}${minutes > 0 ? minutes + "min" : ""})` : "";
                addSystemDivider(`Traveled to: ${locationName}${timeInfo}`);
                showToast(`Traveled to ${locationName}${timeInfo}`, "rgba(60, 140, 180, 0.85)");
                return true;
            }

            document.getElementById("travel-btn").onclick = (e) => {
                e.stopPropagation();
                toggleTravelDropdown();
            };

            // Close travel dropdown when clicking outside
            document.addEventListener("click", (e) => {
                const dropdown = document.getElementById("travel-dropdown");
                const btn = document.getElementById("travel-btn");
                if (dropdown && btn && !dropdown.contains(e.target) && !btn.contains(e.target)) {
                    closeTravelDropdown();
                }
            });

                    document.getElementById("stats-char-name").textContent = "No Character";

                    document.getElementById("stats-age").textContent = "—";
