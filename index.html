<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>StoryKI - Hauptmenü</title>
        <link rel="prefetch" href="Game.html" />
        <link rel="prefetch" href="settings.html" />
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: Arial, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
            }

            body::before {
                content: "";
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.4);
                z-index: -1;
            }

            .menu-container {
                text-align: center;
                min-width: 300px;
            }

            h1 {
                color: #fff;
                margin-bottom: 30px;
                font-size: 2.5em;
                text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            }

            .menu-buttons {
                display: flex;
                flex-direction: column;
                gap: 15px;
            }

            .menu-button {
                background: rgba(80, 80, 80, 0.8);
                color: #fff;
                border: none;
                padding: 15px 30px;
                border-radius: 8px;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.2s ease;
                min-width: 200px;
            }

            .menu-button:hover {
                background: rgba(100, 100, 100, 0.9);
                transform: translateY(-2px);
            }

            .menu-button:active {
                transform: translateY(0);
            }
        </style>
    </head>
    <body>
        <div class="menu-container">
            <h1>StoryKI</h1>
            <div class="menu-buttons">
                <button class="menu-button" onclick="continueGame()">
                    Continue
                </button>
                <button class="menu-button" onclick="newStory()">
                    New Story
                </button>
                <button class="menu-button" onclick="createStory()">
                    Create
                </button>
                <button class="menu-button" onclick="document.getElementById('file-input').click()">
                    Load (.json)
                </button>
                <input
                    type="file"
                    id="file-input"
                    style="display: none"
                    accept=".json"
                    onchange="loadGame(event)"
                />
                <button class="menu-button" onclick="saveGame()">Save</button>
                <button class="menu-button" onclick="openSettings()">
                    Settings
                </button>
            </div>
        </div>

        <script>
            // Storage Helper (Non-persistent session storage)
            const Storage = {
                get: (key) => sessionStorage.getItem(key),
                set: (key, val) => sessionStorage.setItem(key, val),
                remove: (key) => sessionStorage.removeItem(key),
                clear: () => sessionStorage.clear()
            };

            // Hintergrund aus Settings laden
            function loadBackground() {
                const settings = Storage.get("storyki_settings");
                if (settings) {
                    const data = JSON.parse(settings);
                    const backgroundUrl = data.backgroundUrl;
                    if (backgroundUrl) {
                        document.body.style.backgroundImage = `url(${backgroundUrl})`;
                        document.body.style.backgroundSize = "cover";
                        document.body.style.backgroundPosition = "center";
                        document.body.style.backgroundAttachment = "fixed";
                    } else {
                        // Default-Background verwenden
                        document.body.style.backgroundImage =
                            "url(https://4kwallpapers.com/images/walls/thumbs_3t/25523.jpg)";
                        document.body.style.backgroundSize = "cover";
                        document.body.style.backgroundPosition = "center";
                        document.body.style.backgroundAttachment = "fixed";
                    }
                } else {
                    // Default-Background verwenden, wenn keine Settings existieren
                    document.body.style.backgroundImage =
                        "url(https://4kwallpapers.com/images/walls/thumbs_3t/25523.jpg)";
                    document.body.style.backgroundSize = "cover";
                    document.body.style.backgroundPosition = "center";
                    document.body.style.backgroundAttachment = "fixed";
                }
            }

            // Hintergrund beim Laden anwenden
            window.addEventListener("load", loadBackground);

            // Auf Hintergrund-Änderungen von anderen Seiten reagieren
            window.addEventListener("backgroundChanged", function (event) {
                const backgroundUrl = event.detail.backgroundUrl;
                document.body.style.backgroundImage = `url(${backgroundUrl})`;
                document.body.style.backgroundSize = "cover";
                document.body.style.backgroundPosition = "center";
                document.body.style.backgroundAttachment = "fixed";
            });

            // Regelmäßig prüfen, ob sich der Hintergrund geändert hat
            setInterval(loadBackground, 1000);

            function continueGame() {
                const log = Storage.get("storyki_storylog");
                const chars = Storage.get("storyki_characters");
                
                if (!log && (!chars || JSON.parse(chars).length === 0)) {
                    alert("You currently have no story!");
                    return;
                }
                
                console.log("Continue Game");
                // Pass a flag to Game.html to skip welcome/narration
                navigateWithTransition("Game.html?mode=continue");
            }

            function newStory() {
                const log = Storage.get("storyki_storylog");
                const chars = Storage.get("storyki_characters");
                const hasExisting = log || (chars && JSON.parse(chars).length > 0);

                if (hasExisting) {
                    if (!confirm("Do you want to delete your existing story and start a new one?")) {
                        return;
                    }
                    // Clear existing story data but keep settings and cards
                    Storage.remove("storyki_storylog");
                    Storage.remove("storyki_characters");
                }

                console.log("New Story");
                navigateWithTransition("CharacterCreate.html");
            }

            function createStory() {
                // Logik für das Erstellen einer Story Card
                console.log("Create Story");
                navigateWithTransition("Create.html");
            }

            function loadGame(event) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = JSON.parse(e.target.result);
                        
                        // Import state into sessionStorage
                        if (data.create) {
                            Storage.set("storyki_storycards", JSON.stringify(data.create));
                        }
                        if (data.story) {
                            if (data.story.storyLog) Storage.set("storyki_storylog", JSON.stringify(data.story.storyLog));
                            if (data.story.characters) Storage.set("storyki_characters", JSON.stringify(data.story.characters));
                            if (data.story.settings) Storage.set("storyki_settings", JSON.stringify(data.story.settings));
                        }
                        
                        alert("Spielstand erfolgreich geladen!");
                        loadBackground(); // Update background immediately
                    } catch (err) {
                        console.error("Failed to parse JSON", err);
                        alert("Fehler beim Laden der Datei. Ist es eine gültige StoryKI JSON?");
                    }
                };
                reader.readAsText(file);
            }

            function openSettings() {
                // Logik zum Öffnen der Einstellungen
                console.log("Open Settings");
                navigateWithTransition("settings.html");
            }

            function saveGame() {
                try {
                    const cards = JSON.parse(Storage.get("storyki_storycards") || "[]");
                    const log = JSON.parse(Storage.get("storyki_storylog") || "[]");
                    const chars = JSON.parse(Storage.get("storyki_characters") || "[]");
                    const settings = JSON.parse(Storage.get("storyki_settings") || "{}");

                    const exportData = {
                        create: cards,
                        story: {
                            create: cards,
                            storyLog: log,
                            characters: chars,
                            settings: settings
                        }
                    };

                    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: "application/json" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    const timestamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
                    a.href = url;
                    a.download = `StoryKI_Save_${timestamp}.json`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    
                    console.log("Game saved successfully");
                } catch (e) {
                    console.error("Failed to save game", e);
                    alert("Fehler beim Speichern des Spielstands.");
                }
            }

            // Universelle Navigationsfunktion mit Übergang
            function navigateWithTransition(url) {
                // Fade out transition
                document.body.style.transition = "opacity 0.4s ease-in-out";
                document.body.style.opacity = "0";

                setTimeout(() => {
                    window.location.href = url;
                }, 400);
            }

            // Hintergrund beim Laden
            window.addEventListener("load", loadBackground);
        </script>
    </body>
</html>
