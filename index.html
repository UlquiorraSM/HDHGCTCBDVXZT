<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>StoryKI - Hauptmenü</title>
        <link rel="prefetch" href="Game.html" />
        <link rel="prefetch" href="settings.html" />
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: Arial, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
                transition: background-image 0.5s ease-in-out;
            }

            body::before {
                content: "";
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.4);
                z-index: -1;
            }

            .menu-container, .stories-container {
                text-align: center;
                width: 100%;
                max-width: 1200px;
                transition: opacity 0.3s ease;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .stories-container {
                display: none;
            }

            /* Search Bar Styles */
            .search-container {
                width: 100%;
                max-width: 400px;
                margin-bottom: 20px;
                position: relative;
            }

            .search-input {
                width: 100%;
                padding: 10px 15px;
                border-radius: 20px;
                border: 1px solid rgba(255, 255, 255, 0.2);
                background: rgba(0, 0, 0, 0.3);
                color: #fff;
                font-size: 14px;
                outline: none;
                transition: all 0.2s ease;
                backdrop-filter: blur(5px);
            }

            .search-input:focus {
                border-color: rgba(102, 126, 234, 0.6);
                background: rgba(0, 0, 0, 0.5);
                box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
            }

            /* Horizontal Scroll Styles */
            #scenarios-list {
                display: flex;
                gap: 20px;
                padding: 20px;
                overflow-x: auto;
                width: 100%;
                max-width: 100vw;
                justify-content: center;
                scroll-behavior: smooth;
                -webkit-overflow-scrolling: touch;
                scroll-snap-type: x mandatory;
                scroll-padding-left: 16px;
                scroll-padding-right: 16px;
            }

            #scenarios-list:empty {
                display: none;
            }

            /* Custom Scrollbar for horizontal list */
            #scenarios-list::-webkit-scrollbar {
                height: 6px;
            }
            #scenarios-list::-webkit-scrollbar-track {
                background: rgba(255, 255, 255, 0.05);
                border-radius: 10px;
            }
            #scenarios-list::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.2);
                border-radius: 10px;
            }
            #scenarios-list::-webkit-scrollbar-thumb:hover {
                background: rgba(255, 255, 255, 0.3);
            }

            .world-card {
                flex: 0 0 180px; /* narrower cards */
                display: flex;
                flex-direction: column;
                gap: 12px;
                padding: 16px;
                background: rgba(10, 10, 15, 0.7);
                border: 1px solid rgba(255, 255, 255, 0.12);
                border-radius: 16px;
                backdrop-filter: blur(12px);
                transition: all 0.2s ease;
                height: 160px; /* reduce height a bit */
                box-sizing: border-box; /* Ensure padding doesn't add to width */
                scroll-snap-align: start;
            }
            /* Story cards use a slightly smaller footprint */
            .story-card {
                flex: 0 0 160px;
                padding: 12px;
                height: 140px;
            }

            /* Make buttons inside story cards compact */
            .story-card .menu-button {
                min-width: 0;
                padding: 8px 10px;
                font-size: 12px;
            }

            /* Make buttons inside world cards compact, like stories */
            .world-card .menu-button {
                min-width: 0;
                padding: 8px 10px;
                font-size: 12px;
            }

            .world-card:hover {
                 transform: translateY(-5px);
                 border-color: rgba(255, 255, 255, 0.3);
                 background: rgba(0, 0, 0, 0.65);
             }

             /* Config Panel Styles */
             #world-conf-overlay {
                 position: fixed;
                 inset: 0;
                 background: rgba(0, 0, 0, 0.85);
                 display: none;
                 align-items: center;
                 justify-content: center;
                 z-index: 2000;
                 backdrop-filter: blur(10px);
             }

             .conf-panel {
                 background: rgba(30, 30, 35, 0.95);
                 border: 1px solid rgba(255, 255, 255, 0.15);
                 border-radius: 20px;
                 padding: 30px;
                 width: 100%;
                 max-width: 500px;
                 display: flex;
                 flex-direction: column;
                 gap: 20px;
                 box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
             }

             .conf-panel h2 {
                 color: #fff;
                 margin: 0;
                 font-size: 20px;
                 text-align: center;
             }

             .conf-group {
                 display: flex;
                 flex-direction: column;
                 gap: 8px;
             }

             .conf-label {
                 color: rgba(255, 255, 255, 0.6);
                 font-size: 12px;
                 font-weight: 700;
                 text-transform: uppercase;
                 letter-spacing: 0.05em;
             }

             .conf-input {
                 background: rgba(0, 0, 0, 0.3);
                 border: 1px solid rgba(255, 255, 255, 0.15);
                 border-radius: 10px;
                 padding: 12px 15px;
                 color: #fff;
                 font-size: 14px;
                 outline: none;
                 transition: border-color 0.2s;
             }

             .conf-input:focus {
                 border-color: rgba(102, 126, 234, 0.6);
             }

             .conf-actions {
                 display: flex;
                 gap: 12px;
                 margin-top: 10px;
             }

             .conf-btn {
                 flex: 1;
                 padding: 12px;
                 border-radius: 10px;
                 border: none;
                 font-weight: 700;
                 cursor: pointer;
                 transition: all 0.2s;
             }

             .conf-btn-save {
                 background: #4a90e2;
                 color: #fff;
             }

             .conf-btn-save:hover {
                 background: #357abd;
             }

             .conf-btn-cancel {
                 background: rgba(255, 255, 255, 0.1);
                 color: #fff;
             }

             .conf-btn-cancel:hover {
                 background: rgba(255, 255, 255, 0.2);
             }

            h1 {
                color: #fff;
                margin-bottom: 30px;
                font-size: 2.5em;
                text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            }

            .menu-buttons {
                display: flex;
                flex-direction: column;
                gap: 12px;
                background: rgba(0, 0, 0, 0.4);
                padding: 24px;
                border-radius: 20px;
                border: 1px solid rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(10px);
                margin-top: 10px;
                width: 100%;
                max-width: 320px;
            }

            .menu-button {
                background: rgba(80, 80, 80, 0.8);
                color: #fff;
                border: none;
                padding: 15px 30px;
                border-radius: 8px;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.2s ease;
                min-width: 200px;
            }

            .menu-button:hover {
                background: rgba(100, 100, 100, 0.9);
                transform: translateY(-2px);
            }

            .menu-button:active {
                transform: translateY(0);
            }
            
            /* ─────────────────────────────────────────
               Mobile Layout
            ───────────────────────────────────────── */
            @media (max-width: 600px) {
                body {
                    height: auto;
                    min-height: 100vh;
                    align-items: flex-start;
                    padding: 16px 12px calc(16px + env(safe-area-inset-bottom, 0)) 12px;
                }
                h1 {
                    font-size: 1.8em;
                    margin: 8px 0 14px 0;
                }
                .menu-container,
                .stories-container {
                    max-width: 100%;
                }
                .search-container {
                    max-width: 92vw;
                }
                #scenarios-list {
                    gap: 12px;
                    padding: 12px 6px;
                    justify-content: flex-start;
                }
                .world-card {
                    flex: 0 0 78vw;
                    height: auto;
                    padding: 14px;
                    gap: 10px;
                }
                .story-card {
                    flex: 0 0 74vw;
                    height: auto;
                    padding: 12px;
                }
                .menu-buttons {
                    width: 100%;
                    max-width: 92vw;
                    padding: 16px;
                    gap: 10px;
                    backdrop-filter: none;
                }
                .menu-button {
                    width: 100%;
                    min-width: 0;
                    padding: 14px 16px;
                    font-size: 15px;
                    border-radius: 12px;
                }
                .conf-panel {
                    padding: 20px;
                    max-width: 94vw;
                    border-radius: 16px;
                }
                .conf-actions {
                    gap: 10px;
                }
                #world-conf-overlay, #story-conf-overlay {
                    backdrop-filter: none !important;
                }
            }
        </style>
    </head>
    <body>
        <div id="version-badge" style="position: fixed; left: 12px; bottom: 12px; z-index: 3000; background: rgba(0,0,0,0.4); color: #fff; padding: 6px 10px; border-radius: 10px; font-size: 12px; letter-spacing: 0.03em; backdrop-filter: blur(8px); user-select: none;">v1.2.7</div>
        <div class="menu-container" id="main-menu">
            <h1>StoryKI</h1>
            
            <div id="scenarios-wrap" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                <div id="scenarios-title" style="color:#fff; font-weight:700; letter-spacing:.08em; text-transform:uppercase; margin-bottom:8px; opacity:.85;">
                    Worlds
                </div>

                <!-- World Search Bar -->
                <div class="search-container">
                    <input 
                        type="text" 
                        id="world-search" 
                        class="search-input" 
                        placeholder="Searching for worlds..." 
                        oninput="renderScenarios()"
                    />
                </div>

                <div id="scenarios-list">
                    <!-- Dynamically rendered -->
                </div>
                <div id="no-scenarios-hint" style="color:rgba(255,255,255,.8); text-align:center; margin: 20px 0; display:none;">
                    No world found. Create a new one with "Create World".
                </div>
            </div>
            <div class="menu-buttons">
                <button class="menu-button" onclick="createStory()">
                    Create World
                </button>
                <button class="menu-button" onclick="document.getElementById('file-input').click()">
                    Load (.json)
                </button>
                <input
                    type="file"
                    id="file-input"
                    style="display: none"
                    accept=".json"
                    onchange="loadGame(event)"
                />
                <button class="menu-button" onclick="saveGame()">Save</button>
                <button class="menu-button" onclick="openSettings()">
                    Settings
                </button>
            </div>
        </div>

        <div class="stories-container" id="stories-menu">
            <h1 id="selected-world-title">Welt Name</h1>
            <div id="stories-wrap" style="width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 20px;">
                <div id="stories-title" style="color:#fff; font-weight:700; letter-spacing:.08em; text-transform:uppercase; margin-bottom:12px; opacity:.85; text-align:center;">
                    Your stories
                </div>

                <!-- Story Search Bar -->
                <div class="search-container">
                    <input 
                        type="text" 
                        id="story-search" 
                        class="search-input" 
                        placeholder="Search for stories..." 
                        oninput="renderStories(Storage.get('storyki_selected_world_id'))"
                    />
                </div>

                <div id="stories-list" style="display:flex; gap:20px; padding:20px; overflow-x:auto; width:100%; justify-content:center;">
                    <!-- Dynamically rendered horizontal scroll -->
                </div>
                <div id="no-stories-hint" style="color:rgba(255,255,255,.8); text-align:center; margin-top:20px;">
                    No stories found.
                </div>
            </div>
            <div class="menu-buttons">
                <button class="menu-button" onclick="startNewStory()" style="background: rgba(60, 180, 80, 0.7);">
                    Start Story
                </button>
                <button class="menu-button" onclick="backToMainMenu()" style="background: rgba(120, 120, 120, 0.6);">
                    Back
                </button>
            </div>
        </div>
        
        <!-- Scenario Preview Overlay removed -->

        <!-- World Configuration Panel -->
        <div id="world-conf-overlay">
            <div class="conf-panel">
                <h2 id="conf-world-name-title">Configure world</h2>
                
                <div class="conf-group">
                    <label class="conf-label">Name of the world</label>
                    <input type="text" id="conf-world-name" class="conf-input" placeholder="Enter name...">
                </div>

                <div class="conf-group">
                    <label class="conf-label">Background URL</label>
                    <input type="text" id="conf-world-bg" class="conf-input" placeholder="https://...">
                    <div style="font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 4px;">This image is used as the background in Game.html.</div>
                </div>

                <div class="conf-actions">
                    <button class="conf-btn conf-btn-cancel" onclick="closeWorldConf()">Cancel</button>
                    <button class="conf-btn conf-btn-save" onclick="saveWorldConf()">Save</button>
                </div>
            </div>
        </div>

        <!-- Story Configuration Panel -->
        <div id="story-conf-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,.85); display:none; align-items:center; justify-content:center; z-index:2000; backdrop-filter:blur(10px);">
            <div class="conf-panel">
                <h2>Configure story</h2>
                
                <div class="conf-group">
                    <label class="conf-label">Story title</label>
                    <input type="text" id="conf-story-name" class="conf-input" placeholder="Story Name...">
                </div>

                <div class="conf-actions">
                    <button class="conf-btn conf-btn-cancel" onclick="closeStoryConf()">Cancel</button>
                    <button class="conf-btn conf-btn-save" onclick="saveStoryConf()">Save</button>
                </div>
            </div>
        </div>

        <script>
            // Storage Helper (Non-persistent session storage)
            const Storage = {
                get: (key) => sessionStorage.getItem(key),
                set: (key, val) => sessionStorage.setItem(key, val),
                remove: (key) => sessionStorage.removeItem(key),
                clear: () => sessionStorage.clear()
            };
            const SCENARIOS_KEY = "storyki_scenarios"; // localStorage
            const SELECTED_SCENARIO_KEY = "storyki_selected_scenario";
            const SELECTED_WORLD_ID_KEY = "storyki_selected_world_id"; // for session
            const CURRENT_STORY_ID_KEY = "storyki_current_story_id"; // for session
            let _selectedWorld = null;

            // Hintergrund aus Settings laden
            function applyBg(url) {
                if (!url) return;
                
                // Wir verzichten auf den String-Vergleich von currentBg vs newBg,
                // da Browser URLs unterschiedlich formatieren (quotes, absolute paths etc.).
                // Stattdessen setzen wir es einfach, loadBackground() wird nur 1x pro Sekunde gerufen.
                
                document.body.style.backgroundImage = `url("${url}")`;
                document.body.style.backgroundSize = "cover";
                document.body.style.backgroundPosition = "center";
                document.body.style.backgroundAttachment = "fixed";
            }

            function loadBackground() {
                // Prüfen, ob wir in der Story-Auswahl einer Welt sind
                const worldId = Storage.get(SELECTED_WORLD_ID_KEY);
                const storiesMenu = document.getElementById("stories-menu");
                
                // Wir prüfen nun über getComputedStyle, ob das Menü WIRKLICH sichtbar ist (nicht nur inline)
                const isStoriesVisible = storiesMenu && window.getComputedStyle(storiesMenu).display === "flex";
                
                if (isStoriesVisible && worldId) {
                    const scenarios = getScenarios();
                    const world = scenarios.find(x => x.id === worldId);
                    if (world && world.data?.settings?.backgroundUrl) {
                        applyBg(world.data.settings.backgroundUrl);
                        return;
                    }
                }

                // Falls nicht in Stories oder kein Welt-Hintergrund:
                // Globaler Background aus Settings
                const settings = Storage.get("storyki_settings");
                if (settings) {
                    try {
                        const data = JSON.parse(settings);
                        if (data.backgroundUrl) {
                            applyBg(data.backgroundUrl);
                            return;
                        }
                    } catch(e) {}
                }
                
                // Default-Fallback
                applyBg("https://4kwallpapers.com/images/walls/thumbs_3t/25523.jpg");
            }

            // Hintergrund beim Laden anwenden
            window.addEventListener("load", () => {
                const storiesMenu = document.getElementById("stories-menu");
                const isStoriesVisible = storiesMenu && window.getComputedStyle(storiesMenu).display === "flex";
                
                if (!isStoriesVisible) {
                    Storage.remove(SELECTED_WORLD_ID_KEY);
                    // Falls wir zuvor für Game/CharacterCreate die Settings überschrieben haben,
                    // stellen wir die globalen Settings wieder her.
                    const backup = Storage.get("storyki_settings_backup");
                    if (backup) {
                        Storage.set("storyki_settings", backup);
                        Storage.remove("storyki_settings_backup");
                    }
                }
                loadBackground();
            });

            // Auf Hintergrund-Änderungen von anderen Seiten reagieren
            window.addEventListener("backgroundChanged", function (event) {
                const backgroundUrl = event.detail.backgroundUrl;
                document.body.style.backgroundImage = `url(${backgroundUrl})`;
                document.body.style.backgroundSize = "cover";
                document.body.style.backgroundPosition = "center";
                document.body.style.backgroundAttachment = "fixed";
            });

            // Regelmäßig prüfen, ob sich der Hintergrund geändert hat
            let _bgIntervalId = setInterval(loadBackground, 4000);
            document.addEventListener("visibilitychange", () => {
                if (document.hidden) {
                    if (_bgIntervalId) {
                        clearInterval(_bgIntervalId);
                        _bgIntervalId = null;
                    }
                } else {
                    loadBackground();
                    if (!_bgIntervalId) {
                        _bgIntervalId = setInterval(loadBackground, 4000);
                    }
                }
            });

            // --- Scenarios (Welten & Stories) ---
            function getScenarios() {
                try { return JSON.parse(localStorage.getItem(SCENARIOS_KEY) || "[]"); } catch { return []; }
            }
            function setScenarios(list) {
                localStorage.setItem(SCENARIOS_KEY, JSON.stringify(list));
            }
            
            function renderScenarios() {
                const listEl = document.getElementById("scenarios-list");
                const hintEl = document.getElementById("no-scenarios-hint");
                const searchInput = document.getElementById("world-search");
                const searchTerm = searchInput ? searchInput.value.toLowerCase().trim() : "";
                
                listEl.innerHTML = "";
                
                // Welten filtern: Keine parent worldId UND Suchbegriff vorhanden
                let scenarios = getScenarios().filter(s => !s.worldId);
                
                if (searchTerm) {
                    scenarios = scenarios.filter(s => 
                        (s.name || "").toLowerCase().includes(searchTerm)
                    );
                }
                
                if (!scenarios.length) {
                    hintEl.style.display = "block";
                    hintEl.textContent = searchTerm ? "No world with that name was found." : "No world available. Create a new one with „Create World“.";
                    return;	
                }
                
                hintEl.style.display = "none";
                
                // Desktop/Mobile alignment:
                // - Mobile or many cards: align left for scrolling
                // - Few cards on desktop: center
                const isMobile = window.innerWidth <= 700;
                if (isMobile || scenarios.length > 3) {
                    listEl.style.justifyContent = "flex-start";
                    listEl.scrollLeft = 0;
                } else {
                    listEl.style.justifyContent = "center";
                }

                scenarios.forEach(s => {
                    const card = document.createElement("div");
                    card.className = "world-card";
                    
                    const header = document.createElement("div");
                    header.style.cssText = "display:flex; flex-direction:column; gap:2px; margin-bottom: 5px;";
                    
                    const name = document.createElement("div");
                    name.textContent = s.name || "Unnamed World";
                    name.style.cssText = "color:#fff; font-weight:700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;";
                    header.appendChild(name);
                    
                    const actions = document.createElement("div");
                    actions.style.cssText = "display:flex; flex-direction:column; gap:8px; margin-top: auto;";
                    
                    const row1 = document.createElement("div");
                    row1.style.cssText = "display:flex; gap:6px; justify-content:center;";
                    
                    const selectBtn = document.createElement("button");
                    selectBtn.textContent = "Select";
                    selectBtn.className = "menu-button";
                    selectBtn.style.cssText = "padding:8px 6px; font-size:12px; width:72px; min-width:0; flex:none;";
                    selectBtn.onclick = () => { openWorldStories(s.id); };

                    const confBtn = document.createElement("button");
                    confBtn.textContent = "Conf";
                    confBtn.className = "menu-button";
                    confBtn.style.cssText = "padding:8px 6px; font-size:12px; width:72px; min-width:0; flex:none; background: rgba(100, 100, 100, 0.6);";
                    confBtn.onclick = () => { openWorldConf(s.id); };
                    
                    row1.appendChild(selectBtn);
                    row1.appendChild(confBtn);

                    const row2 = document.createElement("div");
                    row2.style.cssText = "display:flex; gap:0; border-radius:8px; overflow:hidden;";

                    const editBtn = document.createElement("button");
                    editBtn.textContent = "Edit";
                    editBtn.className = "menu-button";
                    editBtn.style.cssText = "padding:8px 0; font-size:12px; flex:1; background: rgba(74, 144, 226, 0.6); border-radius:0;";
                    editBtn.onclick = () => { editWorld(s.id); };
                    editBtn.style.borderTopLeftRadius = "8px";
                    editBtn.style.borderBottomLeftRadius = "8px";

                    const downloadBtn = document.createElement("button");
                    downloadBtn.textContent = "📥";
                    downloadBtn.className = "menu-button";
                    downloadBtn.title = "Download world (.json)";
                    downloadBtn.style.cssText = "padding:8px 0; font-size:14px; flex:1; background: rgba(90,160,90,0.7); border-radius:0;";
                    downloadBtn.onclick = () => { exportWorld(s.id); };

                    const deleteBtn = document.createElement("button");
                    deleteBtn.textContent = "🗑️";
                    deleteBtn.className = "menu-button";
                    deleteBtn.style.cssText = "padding:8px 0; font-size:14px; flex:1; background: rgba(150,40,40,0.7); border-radius:0;";
                    deleteBtn.onclick = () => {
                        if (!confirm("Welt wirklich löschen? Alle zugehörigen Stories gehen verloren!")) return;
                        const items = getScenarios().filter(x => x.id !== s.id && x.worldId !== s.id);
                        setScenarios(items);
                        renderScenarios();
                    };
                    deleteBtn.style.borderTopRightRadius = "8px";
                    deleteBtn.style.borderBottomRightRadius = "8px";

                    row2.appendChild(editBtn);
                    row2.appendChild(downloadBtn);
                    row2.appendChild(deleteBtn);
                    
                    actions.appendChild(row1);
                    actions.appendChild(row2);
                    
                    card.appendChild(header);
                    card.appendChild(actions);
                    listEl.appendChild(card);
                });
            }

            function openWorldStories(worldId) {
                const scenarios = getScenarios();
                const world = scenarios.find(x => x.id === worldId);
                if (!world) return;
                
                _selectedWorld = world;
                Storage.set(SELECTED_WORLD_ID_KEY, worldId);
                
                // Clear story search input when opening a world
                const storySearchInput = document.getElementById("story-search");
                if (storySearchInput) storySearchInput.value = "";
                
                document.getElementById("main-menu").style.opacity = "0";
                setTimeout(() => {
                    document.getElementById("main-menu").style.display = "none";
                    document.getElementById("stories-menu").style.display = "flex";
                    document.getElementById("selected-world-title").textContent = world.name;
                    // Zeige sofort den Welt-Hintergrund in der Story-Szene
                    if (world.data?.settings?.backgroundUrl) {
                        applyBg(world.data.settings.backgroundUrl);
                    }
                    renderStories(worldId);
                    loadBackground(); // Sofort Hintergrund wechseln
                    setTimeout(() => {
                        document.getElementById("stories-menu").style.opacity = "1";
                    }, 50);
                }, 300);
            }

            function renderStories(worldId) {
                const listEl = document.getElementById("stories-list");
                const hintEl = document.getElementById("no-stories-hint");
                const searchInput = document.getElementById("story-search");
                const searchTerm = searchInput ? searchInput.value.toLowerCase().trim() : "";
                
                listEl.innerHTML = "";
                
                let stories = getScenarios().filter(s => s.worldId === worldId);
                
                if (searchTerm) {
                    stories = stories.filter(s => 
                        (s.name || "").toLowerCase().includes(searchTerm)
                    );
                }
                
                if (!stories.length) {
                    hintEl.style.display = "block";
                    hintEl.textContent = searchTerm ? "No story found with this name." : "You have no stories in this world yet.";
                    return;
                }
                hintEl.style.display = "none";
                
                // Adjust justification
                if (stories.length > 3) {
                    listEl.style.justifyContent = "flex-start";
                } else {
                    listEl.style.justifyContent = "center";
                }

                stories.forEach(s => {
                    const card = document.createElement("div");
                    card.className = "world-card story-card";
                    
                    const header = document.createElement("div");
                    header.style.cssText = "display:flex; flex-direction:column; gap:2px; margin-bottom: 5px;";
                    
                    const name = document.createElement("div");
                    name.textContent = s.name || "Unnamed Story";
                    name.style.cssText = "color:#fff; font-weight:700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;";
                    header.appendChild(name);
                    
                    const meta = document.createElement("div");
                    const charCount = s.data?.characters?.length || 0;
                    meta.textContent = `${charCount} Charakter${charCount===1?'':'e'}`;
                    meta.style.cssText = "color:rgba(255,255,255,.5); font-size: 10px;";
                    header.appendChild(meta);
                    
                    const actions = document.createElement("div");
                    actions.style.cssText = "display:flex; flex-direction:column; gap:8px; margin-top: auto;";
                    
                    const playBtn = document.createElement("button");
                    playBtn.textContent = "Continue";
                    playBtn.className = "menu-button";
                    playBtn.style.cssText = "padding:8px 10px; font-size:12px; align-self:stretch;";
                    playBtn.onclick = () => { resumeStory(s); };
                    
                    const btnRow = document.createElement("div");
                    btnRow.style.cssText = "display:flex; gap:0; border-radius:8px; overflow:hidden;";

                    const confBtn = document.createElement("button");
                    confBtn.textContent = "⚙️";
                    confBtn.className = "menu-button";
                    confBtn.style.cssText = "padding:8px 0; font-size:14px; flex:1; background: rgba(100, 100, 100, 0.6); border-radius:0;";
                    confBtn.title = "Rename story";
                    confBtn.onclick = () => { openStoryConf(s.id); };
                    confBtn.style.borderTopLeftRadius = "8px";
                    confBtn.style.borderBottomLeftRadius = "8px";

                    const copyBtn = document.createElement("button");
                    copyBtn.textContent = "📋";
                    copyBtn.className = "menu-button";
                    copyBtn.style.cssText = "padding:8px 0; font-size:14px; flex:1; background: rgba(90, 160, 90, 0.6); border-radius:0;";
                    copyBtn.title = "Copy";
                    copyBtn.onclick = () => { copyStory(s.id); };

                    const deleteBtn = document.createElement("button");
                    deleteBtn.textContent = "🗑️";
                    deleteBtn.className = "menu-button";
                    deleteBtn.style.cssText = "padding:8px 0; font-size:14px; flex:1; background: rgba(150,40,40,.7); border-radius:0;";
                    deleteBtn.title = "Delete";
                    deleteBtn.onclick = () => {
                        if (!confirm("Really delete the story?")) return;
                        const items = getScenarios().filter(x => x.id !== s.id);
                        setScenarios(items);
                        renderStories(worldId);
                    };
                    deleteBtn.style.borderTopRightRadius = "8px";
                    deleteBtn.style.borderBottomRightRadius = "8px";
                    
                    btnRow.appendChild(confBtn);
                    btnRow.appendChild(copyBtn);
                    btnRow.appendChild(deleteBtn);

                    actions.appendChild(playBtn);
                    actions.appendChild(btnRow);
                    
                    card.appendChild(header);
                    card.appendChild(actions);
                    listEl.appendChild(card);
                });
            }

            let _confStoryId = null;
            function openStoryConf(storyId) {
                const scenarios = getScenarios();
                const story = scenarios.find(x => x.id === storyId);
                if (!story) return;
                
                _confStoryId = storyId;
                document.getElementById("conf-story-name").value = story.name || "";
                document.getElementById("story-conf-overlay").style.display = "flex";
            }

            function closeStoryConf() {
                _confStoryId = null;
                document.getElementById("story-conf-overlay").style.display = "none";
            }

            function saveStoryConf() {
                if (!_confStoryId) return;
                
                const newName = document.getElementById("conf-story-name").value.trim();
                if (!newName) {
                    alert("Bitte einen Namen eingeben.");
                    return;
                }
                
                const scenarios = getScenarios();
                const idx = scenarios.findIndex(x => x.id === _confStoryId);
                
                if (idx >= 0) {
                    scenarios[idx].name = newName;
                    scenarios[idx].updatedAt = Date.now();
                    setScenarios(scenarios);
                    renderStories(Storage.get(SELECTED_WORLD_ID_KEY));
                    closeStoryConf();
                }
            }

            function copyStory(storyId) {
                const scenarios = getScenarios();
                const orig = scenarios.find(x => x.id === storyId);
                if (!orig) return;
                const now = Date.now();
                const id = Math.random().toString(36).slice(2, 10);
                const dataCopy = JSON.parse(JSON.stringify(orig.data || {}));
                const cards = dataCopy.cards || [];
                const chars = dataCopy.characters || [];
                const log = dataCopy.log || [];
                const settings = dataCopy.settings || {};
                const sig = JSON.stringify({ w: orig.worldId, c: cards.length, ch: chars.length, l: log.length, s: Object.keys(settings).length });
                const name = (orig.name || "Story") + " (Copy)";
                const copy = {
                    id,
                    worldId: orig.worldId,
                    name,
                    createdAt: now,
                    updatedAt: now,
                    signature: sig,
                    official: orig.official === true,
                    data: dataCopy
                };
                scenarios.push(copy);
                setScenarios(scenarios);
                renderStories(Storage.get(SELECTED_WORLD_ID_KEY));
            }

            function backToMainMenu() {
                _selectedWorld = null;
                Storage.remove(SELECTED_WORLD_ID_KEY);
                
                document.getElementById("stories-menu").style.opacity = "0";
                setTimeout(() => {
                    document.getElementById("stories-menu").style.display = "none";
                    document.getElementById("main-menu").style.display = "flex";
                    renderScenarios();
                    loadBackground(); // Sofort Hintergrund zurücksetzen
                    setTimeout(() => {
                        document.getElementById("main-menu").style.opacity = "1";
                    }, 50);
                }, 300);
            }

            function startNewStory() {
                if (!_selectedWorld) return;
                
                // Welt-Daten in Session laden
                Storage.set("storyki_storycards", JSON.stringify(_selectedWorld.data.cards || []));
                Storage.set("storyki_storylog", JSON.stringify([]));
                Storage.set("storyki_characters", JSON.stringify([]));
                // Globale Settings sichern und für das Spiel welt-spezifische Settings setzen
                const globalSettingsRaw = Storage.get("storyki_settings");
                if (globalSettingsRaw) Storage.set("storyki_settings_backup", globalSettingsRaw);
                let mergedSettings = {};
                try {
                    const globalSettings = globalSettingsRaw ? JSON.parse(globalSettingsRaw) : {};
                    const worldSettings = _selectedWorld?.data?.settings || {};
                    mergedSettings = { ...globalSettings, ...worldSettings };
                } catch {
                    mergedSettings = _selectedWorld?.data?.settings || {};
                }
                Storage.set("storyki_settings", JSON.stringify(mergedSettings));
                
                // worldId für spätere Speicherung merken
                Storage.set(SELECTED_WORLD_ID_KEY, _selectedWorld.id);
                Storage.remove(CURRENT_STORY_ID_KEY); // Neue Story, keine ID vorhanden
                
                navigateWithTransition("CharacterCreate.html");
            }

            function resumeStory(story) {
                // Story-Daten in Session laden
                Storage.set("storyki_storycards", JSON.stringify(story.data.cards || []));
                Storage.set("storyki_storylog", JSON.stringify(story.data.log || []));
                Storage.set("storyki_characters", JSON.stringify(story.data.characters || []));
                // Globale Settings sichern und für das Spiel passende Settings setzen
                const globalSettingsRaw = Storage.get("storyki_settings");
                if (globalSettingsRaw) Storage.set("storyki_settings_backup", globalSettingsRaw);
                // Falls die Story keine eigenen Settings hat, auf Welt-Settings zurückfallen
                let effectiveSettings = story.data?.settings || {};
                if (!effectiveSettings.backgroundUrl) {
                    const scenarios = getScenarios();
                    const world = scenarios.find(x => x.id === story.worldId);
                    if (world?.data?.settings) {
                        effectiveSettings = { ...world.data.settings, ...effectiveSettings };
                    }
                }
                // Mit globalen Einstellungen mergen, damit Benutzerpräferenzen (z. B. KI-Sprache/Textgröße) erhalten bleiben
                try {
                    const globalSettings = globalSettingsRaw ? JSON.parse(globalSettingsRaw) : {};
                    const mergedSettings = { ...globalSettings, ...effectiveSettings };
                    Storage.set("storyki_settings", JSON.stringify(mergedSettings));
                } catch {
                    Storage.set("storyki_settings", JSON.stringify(effectiveSettings));
                }
                
                // worldId und storyId merken
                Storage.set(SELECTED_WORLD_ID_KEY, story.worldId);
                Storage.set(CURRENT_STORY_ID_KEY, story.id);
                
                // Direkt zum Spiel
                navigateWithTransition("Game.html");
            }

            function captureDraftFromSessionIfAny() {
                try {
                    const cards = JSON.parse(Storage.get("storyki_storycards") || "[]");
                    if (!cards || cards.length === 0) return;
                    
                    const chars = JSON.parse(Storage.get("storyki_characters") || "[]");
                    const log = JSON.parse(Storage.get("storyki_storylog") || "[]");
                    const settings = JSON.parse(Storage.get("storyki_settings") || "{}");
                    const worldId = Storage.get(SELECTED_WORLD_ID_KEY);
                    const currentStoryId = Storage.get(CURRENT_STORY_ID_KEY);
                    
                    if (!worldId) return;

                    // Signatur zur Vermeidung unnötiger Updates (wenn sich nichts geändert hat)
                    const sig = JSON.stringify({ w: worldId, c: cards.length, ch: chars.length, l: log.length, s: Object.keys(settings || {}).length });
                    const scenarios = getScenarios();
                    
                    const already = scenarios.some(x => x.signature === sig);
                    if (already) return;
                    
                    let targetStory = null;
                    if (currentStoryId) {
                        targetStory = scenarios.find(x => x.id === currentStoryId);
                    }
                    
                    if (targetStory) {
                        // Vorhandene Story aktualisieren
                        targetStory.updatedAt = Date.now();
                        targetStory.signature = sig;
                        targetStory.data = { cards, characters: chars, log, settings };
                        
                        // Wenn der Charakter-Name im Story-Titel sein soll:
                        if (chars.length > 0 && targetStory.name.startsWith("Story ")) {
                             const mainChar = chars[0];
                             targetStory.name = `${mainChar.firstName} ${mainChar.lastName} - ${new Date().toLocaleDateString()}`;
                        }
                    } else {
                        // Neue Story anlegen
                        const id = Math.random().toString(36).slice(2, 10);
                        let name = "Story " + new Date().toLocaleString();
                        if (chars.length > 0) {
                            const mainChar = chars[0];
                            name = `${mainChar.firstName} ${mainChar.lastName} - ${new Date().toLocaleDateString()}`;
                        }
                        
                        scenarios.push({
                            id, 
                            worldId,
                            name, 
                            createdAt: Date.now(), 
                            updatedAt: Date.now(),
                            signature: sig,
                            data: { cards, characters: chars, log, settings }
                        });
                    }
                    
                    setScenarios(scenarios);
                    renderScenarios();
                } catch (e) {
                    console.error("Capture draft failed", e);
                }
            }

            // Removed old Continue / New Story flows

            function createStory() {
                // Logik für das Erstellen einer Story Card
                console.log("Create Story");
                Storage.remove(SELECTED_WORLD_ID_KEY); // Sicherstellen, dass keine Welt-ID geladen wird (für neue Welt)
                navigateWithTransition("Create.html");
            }

            function editWorld(worldId) {
                 const scenarios = getScenarios();
                 const world = scenarios.find(x => x.id === worldId);
                 if (!world) return;
                 
                 // Welt-Daten in Session laden für Create.html
                 Storage.set("storyki_storycards", JSON.stringify(world.data.cards || []));
                 
                 // worldId merken, damit Create.html weiß, dass es eine Bearbeitung ist
                 Storage.set(SELECTED_WORLD_ID_KEY, worldId);
                 
                 navigateWithTransition("Create.html");
             }

             let _confWorldId = null;
             function openWorldConf(worldId) {
                 const scenarios = getScenarios();
                 const world = scenarios.find(x => x.id === worldId);
                 if (!world) return;
                 
                 _confWorldId = worldId;
                 document.getElementById("conf-world-name").value = world.name || "";
                 document.getElementById("conf-world-bg").value = world.data?.settings?.backgroundUrl || "";
                 document.getElementById("conf-world-name-title").textContent = `„${world.name}“ konfigurieren`;
                 
                 document.getElementById("world-conf-overlay").style.display = "flex";
             }

             function closeWorldConf() {
                 _confWorldId = null;
                 document.getElementById("world-conf-overlay").style.display = "none";
             }

             function saveWorldConf() {
                 if (!_confWorldId) return;
                 
                 const newName = document.getElementById("conf-world-name").value.trim();
                 const newBg = document.getElementById("conf-world-bg").value.trim();
                 
                 if (!newName) {
                     alert("Bitte einen Namen eingeben.");
                     return;
                 }
                 
                 const scenarios = getScenarios();
                 const idx = scenarios.findIndex(x => x.id === _confWorldId);
                 
                 if (idx >= 0) {
                     scenarios[idx].name = newName;
                     if (!scenarios[idx].data.settings) scenarios[idx].data.settings = {};
                     scenarios[idx].data.settings.backgroundUrl = newBg;
                     scenarios[idx].updatedAt = Date.now();
                     
                     // Auch alle Stories dieser Welt aktualisieren
                     scenarios.forEach(s => {
                         if (s.worldId === _confWorldId) {
                             if (!s.data.settings) s.data.settings = {};
                             s.data.settings.backgroundUrl = newBg;
                             s.updatedAt = Date.now();
                         }
                     });
                     
                     setScenarios(scenarios);
                     renderScenarios();
                     closeWorldConf();
                 }
             }

            function loadGame(event) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = JSON.parse(e.target.result);
                        // World export import
                        if (data && (data.type === "world_export" || data.world)) {
                            let scenarios = getScenarios();
                            const world = data.world;
                            if (!world || !world.data) throw new Error("Ungültige Welt-Datei.");
                            let newWorldId = world.id || Math.random().toString(36).slice(2, 10);
                            if (scenarios.some(x => x.id === newWorldId)) newWorldId = Math.random().toString(36).slice(2, 10);
                            scenarios.push({
                                id: newWorldId,
                                name: world.name || "Imported World",
                                createdAt: Date.now(),
                                updatedAt: Date.now(),
                                data: {
                                    cards: world.data.cards || [],
                                    settings: world.data.settings || {}
                                }
                            });
                            const stories = Array.isArray(data.stories) ? data.stories : [];
                            stories.forEach(st => {
                                let sid = st.id || Math.random().toString(36).slice(2, 10);
                                if (scenarios.some(x => x.id === sid)) sid = Math.random().toString(36).slice(2, 10);
                                scenarios.push({
                                    id: sid,
                                    worldId: newWorldId,
                                    name: st.name || "Imported Story",
                                    createdAt: Date.now(),
                                    updatedAt: Date.now(),
                                    signature: st.signature || "",
                                    data: {
                                        cards: st.data?.cards || [],
                                        characters: st.data?.characters || [],
                                        log: st.data?.log || [],
                                        settings: st.data?.settings || {}
                                    }
                                });
                            });
                            setScenarios(scenarios);
                            renderScenarios();
                            loadBackground();
                            alert("Welt und Stories importiert.");
                            return;
                        }
                        
                        // Import state into sessionStorage
                        if (data.create) {
                            Storage.set("storyki_storycards", JSON.stringify(data.create));
                        }
                        if (data.story) {
                            if (data.story.storyLog) Storage.set("storyki_storylog", JSON.stringify(data.story.storyLog));
                            if (data.story.characters) Storage.set("storyki_characters", JSON.stringify(data.story.characters));
                            if (data.story.settings) Storage.set("storyki_settings", JSON.stringify(data.story.settings));
                        }
                        
                        alert("Spielstand erfolgreich geladen!");
                        loadBackground(); // Update background immediately
                    } catch (err) {
                        console.error("Failed to parse JSON", err);
                        alert("Fehler beim Laden der Datei. Ist es eine gültige StoryKI JSON?");
                    }
                };
                reader.readAsText(file);
            }

            function openSettings() {
                // Logik zum Öffnen der Einstellungen
                console.log("Open Settings");
                navigateWithTransition("settings.html");
            }

            function saveGame() {
                try {
                    const cards = JSON.parse(Storage.get("storyki_storycards") || "[]");
                    const log = JSON.parse(Storage.get("storyki_storylog") || "[]");
                    const chars = JSON.parse(Storage.get("storyki_characters") || "[]");
                    const settings = JSON.parse(Storage.get("storyki_settings") || "{}");

                    const exportData = {
                        create: cards,
                        story: {
                            create: cards,
                            storyLog: log,
                            characters: chars,
                            settings: settings
                        }
                    };

                    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: "application/json" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    const timestamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
                    a.href = url;
                    a.download = `StoryKI_Save_${timestamp}.json`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    
                    console.log("Game saved successfully");
                } catch (e) {
                    console.error("Failed to save game", e);
                    alert("Fehler beim Speichern des Spielstands.");
                }
            }

            // Universelle Navigationsfunktion mit Übergang
            function navigateWithTransition(url) {
                // Fade out transition
                document.body.style.transition = "opacity 0.4s ease-in-out";
                document.body.style.opacity = "0";

                setTimeout(() => {
                    window.location.href = url;
                }, 400);
            }

            // Hintergrund beim Laden
            window.addEventListener("load", loadBackground);
            // Render scenarios and capture drafts if returned from Create.html
            window.addEventListener("load", () => {
                captureDraftFromSessionIfAny();
                renderScenarios();
            });

            function exportWorld(worldId) {
                const scenarios = getScenarios();
                const world = scenarios.find(x => x.id === worldId && !x.worldId);
                if (!world) { alert("Welt nicht gefunden."); return; }
                const stories = scenarios.filter(x => x.worldId === worldId);
                const payload = {
                    version: 1,
                    type: "world_export",
                    exportedAt: new Date().toISOString(),
                    world: {
                        id: world.id,
                        name: world.name,
                        data: {
                            cards: world.data?.cards || [],
                            settings: world.data?.settings || {}
                        }
                    },
                    stories: stories.map(s => ({
                        id: s.id,
                        name: s.name,
                        signature: s.signature || "",
                        data: {
                            cards: s.data?.cards || [],
                            characters: s.data?.characters || [],
                            log: s.data?.log || [],
                            settings: s.data?.settings || {}
                        }
                    }))
                };
                const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                const safeName = (world.name || "World").replace(/[^a-z0-9_\- ]/gi, "_");
                const timestamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
                a.href = url;
                a.download = `${safeName}_export_${timestamp}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }
        </script>
