<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>StoryKI - Light Novel</title>
        <style>
            * { margin:0; padding:0; box-sizing:border-box; }
            html, body { width:100%; height:100%; background:#0a0a0a; color:#fff; font-family:"Segoe UI", Arial, sans-serif; }
            body { opacity:0; transition:opacity .4s ease-in-out; }
            .container { max-width:900px; margin:0 auto; padding:24px; }
            .topbar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px; }
            .title { font-size:20px; font-weight:700; color:#fff; }
            .count { font-size:12px; color:rgba(255,255,255,.7); }
            .actions { display:flex; gap:8px; }
            .btn { padding:10px 14px; border-radius:8px; border:1px solid rgba(255,255,255,.2); background:rgba(30,30,30,.8); color:#fff; font-size:13px; font-weight:600; cursor:pointer; }
            .btn:hover { background:rgba(50,50,50,.9); }
            .content { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.12); border-radius:16px; padding:24px; line-height:1.7; font-size:15px; }
            .content p { margin:0 0 16px 0; color:rgba(255,255,255,.92); }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="topbar">
                <div class="title" id="story-title">Light Novel</div>
                <div class="actions">
                    <button class="btn" onclick="back()">← Back</button>
                    <button class="btn" onclick="copyText()">📋 Copy</button>
                </div>
            </div>
            <div class="count" id="story-count"></div>
            <div class="content" id="novel-content"></div>
        </div>

        <script>
            const SCENARIOS_KEY = "storyki_scenarios";
            function getScenarios() { try { return JSON.parse(localStorage.getItem(SCENARIOS_KEY) || "[]"); } catch { return []; } }
            function navigateWithTransition(url) { document.body.style.transition = "opacity .4s ease-in-out"; document.body.style.opacity = "0"; setTimeout(() => { window.location.href = url; }, 400); }
            function back() { navigateWithTransition("index.html"); }
            function escHtml(s) { return String(s || "").replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c])); }
            function entryToText(e) {
                if (typeof e === "string") return e;
                if (!e || typeof e !== "object") return "";
                const t = e.text || e.content || e.message || e.dialogue || e.description || e.line || "";
                if (t) return t;
                const tn = e.title ? e.title + ":" : "";
                const d = e.detail || e.body || "";
                if (tn || d) return [tn, d].filter(Boolean).join(" ");
                try { return JSON.stringify(e); } catch { return ""; }
            }
            function getParam(name) { const u = new URL(window.location.href); return u.searchParams.get(name); }
            function render() {
                const id = getParam("story");
                const scenarios = getScenarios();
                const story = scenarios.find(x => x.id === id);
                const titleEl = document.getElementById("story-title");
                const countEl = document.getElementById("story-count");
                const contentEl = document.getElementById("novel-content");
                if (!story) { titleEl.textContent = "Story not found"; countEl.textContent = ""; contentEl.textContent = ""; return; }
                titleEl.textContent = story.name || "Light Novel";
                const log = Array.isArray(story?.data?.log) ? story.data.log : [];
                countEl.textContent = "Entries: " + log.length;
                const out = [];
                log.forEach(e => {
                    const txt = entryToText(e).trim();
                    if (!txt) return;
                    out.push("<p>" + escHtml(txt) + "</p>");
                });
                contentEl.innerHTML = out.join("");
            }
            function copyText() {
                const el = document.getElementById("novel-content");
                const tmp = document.createElement("textarea");
                tmp.style.position = "fixed";
                tmp.style.opacity = "0";
                tmp.value = el.innerText || "";
                document.body.appendChild(tmp);
                tmp.select();
                try { document.execCommand("copy"); } catch {}
                document.body.removeChild(tmp);
            }
            window.addEventListener("load", () => { document.body.style.opacity = "1"; render(); });
        </script>
    </body>
</html>
