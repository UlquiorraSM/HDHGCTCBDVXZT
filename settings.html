<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryKI - Einstellungen</title>
    <link rel="prefetch" href="index.html">
    <link rel="prefetch" href="Game.html">
    <link rel="preload" href="index.html" as="document">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            overflow: hidden;
        }
        
        /* Scrollbar komplett unsichtbar machen - stärkste Regeln */
        *::-webkit-scrollbar {
            width: 0 !important;
            height: 0 !important;
            background: transparent !important;
            display: none !important;
        }
        
        *::-webkit-scrollbar-thumb {
            width: 0 !important;
            height: 0 !important;
            background: transparent !important;
            display: none !important;
        }
        
        *::-webkit-scrollbar-track {
            width: 0 !important;
            height: 0 !important;
            background: transparent !important;
            display: none !important;
        }
        
        *::-webkit-scrollbar-button {
            width: 0 !important;
            height: 0 !important;
            background: transparent !important;
            display: none !important;
        }
        
        *::-webkit-scrollbar-corner {
            width: 0 !important;
            height: 0 !important;
            background: transparent !important;
            display: none !important;
        }
        
        /* Für alle Browser */
        * {
            scrollbar-width: none !important;
            -ms-overflow-style: none !important;
        }
        
        html, body {
            overflow-x: hidden !important;
            overflow-y: auto !important;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }
        
        .settings-layout {
            display: flex;
            width: 100%;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .settings-sidebar {
            width: 180px;
            background: rgba(30, 30, 30, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 0;
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            z-index: 10;
        }
        
        .settings-tab {
            padding: 15px 20px;
            cursor: pointer;
            border-left: 3px solid transparent;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
            margin: 5px 0;
        }
        
        .settings-tab:hover {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
        }
        
        .settings-tab.active {
            background: rgba(102, 126, 234, 0.2);
            border-left-color: #667eea;
            color: #667eea;
            font-weight: 600;
        }
        
        .settings-content {
            flex: 1;
            padding: 60px;
            margin-left: 180px;
            overflow-y: auto;
            background: rgba(30, 30, 30, 0.95);
            min-height: 100vh;
            max-height: 100vh;
            box-sizing: border-box;
            position: relative;
        }
        
        .fixed-title {
            position: fixed;
            top: 60px;
            left: 240px;
            color: #fff;
            font-size: 1.8em;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            z-index: 50;
            pointer-events: none;
        }
        
        .content-padding {
            margin-top: 80px;
        }
        
        /* Scrollbar unsichtbar machen */
        .settings-content::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        
        .settings-content::-webkit-scrollbar-thumb {
            width: 0px;
            background: transparent;
        }
        
        .settings-content::-webkit-scrollbar-track {
            width: 0px;
            background: transparent;
        }
        
        /* Für Firefox */
        .settings-content {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .settings-group {
            margin-bottom: 50px;
        }
        
        .settings-group h3 {
            color: #fff;
            margin-bottom: 30px;
            font-size: 1.3em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .setting-item {
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(50, 50, 50, 0.6);
            border-radius: 8px;
            border-left: 3px solid transparent;
            transition: all 0.2s ease;
        }
        
        .setting-item:hover {
            background: rgba(60, 60, 60, 0.8);
            border-left-color: #667eea;
        }

        .setting-label {
            color: rgba(255, 255, 255, 0.8);
        }

        input[type="url"], input[type="number"], select {
            background-color: rgba(20, 20, 20, 0.9) !important;
            border: 2px solid rgba(102, 126, 234, 0.6) !important;
            color: #fff !important;
            padding: 12px 16px !important;
            border-radius: 8px !important;
            font-size: 14px !important;
            min-width: 200px !important;
            transition: all 0.2s ease !important;
            -webkit-appearance: none !important;
            -moz-appearance: none !important;
            appearance: none !important;
        }
        
        input[type="url"]:focus, input[type="number"]:focus, select:focus {
            background-color: rgba(25, 25, 25, 0.95) !important;
            border-color: #667eea !important;
            outline: none !important;
            box-shadow: 0 0 8px rgba(102, 126, 234, 0.3) !important;
        }

        input[type="url"]::placeholder {
            color: rgba(255, 255, 255, 0.6) !important;
        }
        
        /* Für Select-Dropdowns */
        select option {
            background-color: rgba(20, 20, 20, 0.95) !important;
            color: #fff !important;
        }

        .back-button-fixed {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
        }
        
        .settings-section {
            display: none;
        }
        
        .settings-section.active {
            display: block;
        }
        
        .setting-item {
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(50, 50, 50, 0.6);
            border-radius: 8px;
            border-left: 3px solid transparent;
            transition: all 0.2s ease;
        }
        
        .setting-item:hover {
            background: rgba(60, 60, 60, 0.8);
            border-left-color: #667eea;
        }
        
        .setting-label {
            color: rgba(255, 255, 255, 0.8);
            flex: 1;
            margin-right: 20px;
        }
        
        .setting-control {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            justify-content: flex-end;
        }
        
        input[type="range"] {
            width: 180px;
        }
        
        input[type="checkbox"] {
            width: 20px;
            height: 20px;
        }
        
        select, input[type="url"] {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background: white;
            font-size: 0.9em;
        }
        
        input[type="url"] {
            width: 250px;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }
        
        .btn,
        .btn-secondary,
        .btn-danger {
            background: #6f6f6f;
            color: #fff;
            border: none;
            padding: 12px 25px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn:hover,
        .btn-secondary:hover,
        .btn-danger:hover {
            background: #7a7a7a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        .settings-footer {
            position: fixed;
            inset: 0 0 0 0;
            z-index: 100;
            pointer-events: none;
        }

        .footer-left, .footer-right {
            display: flex;
            gap: 12px;
            pointer-events: auto;
        }
        .footer-left {
            position: fixed;
            left: 20px;
            bottom: 20px;
            align-items: center;
            justify-content: flex-start;
        }
        .footer-right {
            position: fixed;
            right: 20px;
            bottom: 20px;
            align-items: center;
            justify-content: flex-end;
        }
    </style>
</head>
<body>
    <div class="settings-sidebar">
        <div class="settings-tab active" onclick="switchTab('general')">General</div>
        <div class="settings-tab" onclick="switchTab('ai')">AI Settings</div>
    </div>
    
    <div class="settings-content">
        <!-- Fixierter Titel für Allgemein -->
        <div id="general-title" class="fixed-title">General Settings</div>
        <div id="ai-title" class="fixed-title" style="display: none;">AI Settings</div>
        
        <div class="content-padding">
            <!-- Allgemein Section -->
            <div id="general-section" class="settings-section active">
                <div class="settings-group">
                    <h3>Background</h3>
                    <div class="setting-item">
                        <span class="setting-label">Background URL</span>
                        <div class="setting-control">
                            <input type="url" id="background-url" placeholder="https://...">
                        </div>
                    </div>
                </div>
            </div>    
            <!-- KI-Einstellungen Section -->
            <div id="ai-section" class="settings-section">
                <div class="settings-group">
                    <h3>AI Behavior</h3>
                    <div class="setting-item">
                        <span class="setting-label">Text Size</span>
                        <div class="setting-control">
                            <select id="text-size">
                                <option value="short">Short</option>
                                <option value="normal" selected>Normal</option>
                                <option value="tall">Tall</option>
                            </select>
                        </div>
                    </div>
                    <div class="setting-item">
                        <span class="setting-label">AI Language</span>
                        <div class="setting-control">
                            <select id="ai-language">
                                <option value="en" selected>English</option>
                                <option value="de">German</option>
                                <option value="ja">Japanese</option>
                                <option value="fr">French</option>
                                <option value="es">Spanish</option>
                                <option value="it">Italian</option>
                                <option value="ru">Russian</option>
                                <option value="ko">Korean</option>
                                <option value="zh">Chinese</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Footer mit Save und Zurück Button -->
        <div class="settings-footer">
            <div class="footer-left">
                <button class="btn btn-danger" onclick="backToMenu()">Back</button>
                <button class="btn" onclick="saveSettings()">Save</button>
            </div>
            <div class="footer-right">
                <button class="btn btn-secondary" onclick="resetSettings()">Reset</button>
            </div>
        </div>
    </div>

    <script>
        // Tab switching functionality
        function switchTab(tabName) {
            // Remove active class from all tabs and sections
            document.querySelectorAll('.settings-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.settings-section').forEach(section => section.classList.remove('active'));
            document.querySelectorAll('.fixed-title').forEach(title => title.style.display = 'none');
            
            // Add active class to selected tab and section
            document.querySelector(`[onclick="switchTab('${tabName}')"]`).classList.add('active');
            document.getElementById(`${tabName}-section`).classList.add('active');
            document.getElementById(`${tabName}-title`).style.display = 'block';
        }
        
        // Zusätzliches Preloading für index.html
        function preloadPage(url) {
            const link = document.createElement('link');
            link.rel = 'prefetch';
            link.href = url;
            document.head.appendChild(link);
        }
        
        // Storage Helper (Non-persistent session storage)
        const Storage = {
            get: (key) => sessionStorage.getItem(key),
            set: (key, val) => sessionStorage.setItem(key, val),
            remove: (key) => sessionStorage.removeItem(key),
            clear: () => sessionStorage.clear()
        };

        // Preload
        window.addEventListener('load', () => {
            preloadPage('index.html');
            preloadPage('Game.html');
        });
        
        // Einstellungen laden
        function loadSettings() {
            const settings = Storage.get('storyki_settings');
            if (settings) {
                const data = JSON.parse(settings);
                // Allgemein
                document.getElementById('background-url').value = data.backgroundUrl || 'https://wallpapers.com/images/hd/lake-in-the-forest-nature-xavnq3nwry0es5if.webp';
                
                // KI-Einstellungen
                document.getElementById('text-size').value = data.textSize || 'normal';
                document.getElementById('ai-language').value = data.aiLanguage || 'en';
                
                applyBackground(true);
            } else {
                // Standard-Hintergrund anwenden
                document.getElementById('background-url').value = 'https://wallpapers.com/images/hd/lake-in-the-forest-nature-xavnq3nwry0es5if.webp';
                applyBackground(true);
            }
            
            // Fade in effect
            setTimeout(() => {
                document.body.style.opacity = '1';
            }, 100);
        }
        
        // Hintergrund anwenden
        function applyBackground(isInitialLoad = false) {
            const backgroundUrl = document.getElementById('background-url').value;
            if (backgroundUrl) {
                // Hintergrund sofort auf allen Seiten anwenden
                document.body.style.backgroundImage = `url(${backgroundUrl})`;
                document.body.style.backgroundSize = 'cover';
                document.body.style.backgroundPosition = 'center';
                document.body.style.backgroundAttachment = 'fixed';
                
                // In Storage speichern für andere Seiten
                const settings = Storage.get('storyki_settings') || '{}';
                const data = JSON.parse(settings);
                data.backgroundUrl = backgroundUrl;
                Storage.set('storyki_settings', JSON.stringify(data));
                
                // Event für andere Seiten auslösen (falls sie offen sind)
                window.dispatchEvent(new CustomEvent('backgroundChanged', { 
                    detail: { backgroundUrl } 
                }));
            }
        }
        
        // Einstellungen speichern
        function saveSettings() {
            const settings = {
                // Allgemein
                backgroundUrl: document.getElementById('background-url').value,
                
                // KI-Einstellungen
                textSize: document.getElementById('text-size').value,
                aiLanguage: document.getElementById('ai-language').value
            };
            
            Storage.set('storyki_settings', JSON.stringify(settings));
            applyBackground(false);
            alert('Einstellungen wurden gespeichert!');
        }
        
        // Einstellungen zurücksetzen
        function resetSettings() {
            if (confirm('Möchten Sie wirklich alle Einstellungen auf die Standardwerte zurücksetzen?')) {
                Storage.remove('storyki_settings');
                loadSettings();
                alert('Einstellungen wurden zurückgesetzt.');
            }
        }
        
        // Debug-Informationen anzeigen
        function showDebugInfo() {
            const settings = Storage.get('storyki_settings');
            console.log('Aktuelle Einstellungen:', settings ? JSON.parse(settings) : 'Keine Einstellungen gefunden');
            
            const cards = Storage.get('storyki_storycards');
            console.log('Anzahl Story Cards:', cards ? JSON.parse(cards).length : 0);
            
            const characters = Storage.get('storyki_characters');
            console.log('Anzahl Charaktere:', characters ? JSON.parse(characters).length : 0);
        }
        
        // Export / Import
        function exportData() {
            const data = {
                settings: JSON.parse(Storage.get('storyki_settings') || '{}'),
                cards: JSON.parse(Storage.get('storyki_storycards') || '[]'),
                characters: JSON.parse(Storage.get('storyki_characters') || '[]'),
                logs: JSON.parse(Storage.get('storyki_storylog') || '[]')
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'storyki_data_export.json';
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function importData(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (data.settings) Storage.set('storyki_settings', JSON.stringify(data.settings));
                        if (data.cards) Storage.set('storyki_storycards', JSON.stringify(data.cards));
                        if (data.characters) Storage.set('storyki_characters', JSON.stringify(data.characters));
                        if (data.logs) Storage.set('storyki_storylog', JSON.stringify(data.logs));
                        
                        loadSettings();
                        alert('Daten erfolgreich importiert!');
                    } catch (err) {
                        alert('Fehler beim Importieren der Datei.');
                    }
                };
                reader.readAsText(file);
            }
        }
        
        // Zurück zum Hauptmenü
        function backToMenu() {
            if (hasUnsavedChanges()) {
                if (confirm('Du hast ungespeicherte Änderungen. Möchtest du diese speichern, bevor du zurückgehst?')) {
                    saveSettings();
                }
            }
            navigateWithTransition("index.html");
        }

        // Prüfen auf ungespeicherte Änderungen
        function hasUnsavedChanges() {
            const currentSettings = {
                backgroundUrl: document.getElementById('background-url').value,
                textSize: document.getElementById('text-size').value,
                aiLanguage: document.getElementById('ai-language').value
            };
            
            const savedSettingsRaw = Storage.get('storyki_settings');
            if (!savedSettingsRaw) return true;
            
            const savedSettings = JSON.parse(savedSettingsRaw);
            
            // Vergleiche alle Felder
            return (
                currentSettings.backgroundUrl !== (savedSettings.backgroundUrl || 'https://wallpapers.com/images/hd/lake-in-the-forest-nature-xavnq3nwry0es5if.webp') ||
                currentSettings.textSize !== (savedSettings.textSize || 'normal') ||
                currentSettings.aiLanguage !== (savedSettings.aiLanguage || 'en')
            );
        }
        
        // Universelle Navigationsfunktion mit Übergang (genau wie in index.html)
        function navigateWithTransition(url) {
            // Fade out transition
            document.body.style.transition = 'opacity 0.4s ease-in-out';
            document.body.style.opacity = '0';
            
            setTimeout(() => {
                window.location.href = url;
            }, 400);
        }
        
        // Cache leeren
        function clearCache() {
            if (confirm('Möchtest du wirklich den Cache leeren?')) {
                Storage.clear();
                alert('Cache wurde geleert!');
            }
        }
        
        // Einstellungen exportieren
        function exportSettings() {
            const settings = Storage.get('storyki_settings');
            if (settings) {
                const blob = new Blob([settings], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'storyki-settings.json';
                a.click();
                URL.revokeObjectURL(url);
            } else {
                alert('Keine Einstellungen zum Exportieren gefunden.');
            }
        }
        
        // Einstellungen importieren
        function importSettings() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const settings = JSON.parse(e.target.result);
                            Storage.set('storyki_settings', JSON.stringify(settings));
                            loadSettings();
                            alert('Einstellungen wurden importiert!');
                        } catch (err) {
                            alert('Fehler beim Importieren der Einstellungen.');
                        }
                    };
                    reader.readAsText(file);
                }
            };
            input.click();
        }
        
        // Event Listener
        document.getElementById('background-url').addEventListener('input', () => applyBackground(false));
        
        // Einstellungen beim Laden laden
        window.addEventListener('load', loadSettings);
    </script>
</body>
</html>
