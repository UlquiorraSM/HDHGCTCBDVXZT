<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StoryKI • Universe</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            color: #fff;
            background: #0e0f13 url("https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExdXk5emR1bW9na2hzenEybzlvemllem4wZXlxZ2J3MnI2eXM5MTZscyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/iicDrNGWxHmDrIni6j/giphy.gif") center/cover fixed no-repeat;
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }
        .page {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 24px 16px 40px;
            backdrop-filter: blur(2px);
            background: linear-gradient(180deg, rgba(10,10,15,.55), rgba(10,10,15,.65));
        }
        h1 {
            margin: 8px 0 6px 0;
            font-size: 36px;
            letter-spacing: .02em;
            text-shadow: 0 2px 8px rgba(0,0,0,.6);
        }
        .subtitle {
            text-transform: uppercase;
            letter-spacing: .08em;
            opacity: .85;
            margin-bottom: 12px;
            font-weight: 700;
            text-shadow: 0 1px 3px rgba(0,0,0,.6);
        }
        .search-input {
            width: 100%;
            max-width: 620px;
            padding: 13px 16px;
            background: rgba(22,22,22,.92);
            border: 1.5px solid rgba(255,255,255,.1);
            border-radius: 10px;
            color: #fff;
            outline: none;
            box-shadow: 0 2px 8px rgba(0,0,0,.35);
        }
        .world-card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 220px;
            height: 220px;
            border-radius: 18px;
            padding: 14px;
            background: rgba(30,30,35,.65);
            background-size: cover;
            background-position: center;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,.08), 0 6px 18px rgba(0,0,0,.35);
        }
        .world-grid {
            width: 100%;
            max-width: 820px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 14px;
        }
        .name {
            font-weight: 700;
            text-shadow: 0 1px 3px rgba(0,0,0,.6);
        }
        .count {
            font-size: 12px;
            opacity: .9;
            text-shadow: 0 1px 3px rgba(0,0,0,.6);
        }
        .menu-button {
            padding: 12px 18px;
            background: rgba(255,255,255,.12);
            border: 1px solid rgba(255,255,255,.15);
            color: #fff;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            min-width: 120px;
            transition: background .2s, border-color .2s, transform .05s;
        }
        .menu-button:hover{
            background: rgba(255,255,255,.18);
            border-color: rgba(255,255,255,.25);
        }
        .menu-button:active{
            transform: translateY(1px);
        }
        .top-row {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }
    </style>
</head>
<body>
    <div class="page">
        <h1>Universe</h1>
        <div class="subtitle">Browse Worlds</div>
        <input id="universe-search" class="search-input" placeholder="Search default worlds..." />
        <div id="universe-list" class="world-grid"></div>
        <div class="top-row">
            <button class="menu-button" onclick="navigateWithDissolve('index.html')">Back</button>
        </div>
    </div>

    <script>
        (function(){
            function onReady(fn){ if(document.readyState!=="loading") fn(); else document.addEventListener("DOMContentLoaded", fn); }
            onReady(function(){
                try{
                    document.body.style.opacity = "0";
                    document.body.style.transition = "opacity .35s ease";
                    requestAnimationFrame(function(){ document.body.style.opacity = "1"; });
                }catch(e){}
            });
            window.navigateWithDissolve = function(url){
                try{
                    const overlay = document.createElement("div");
                    overlay.id = "page-fade";
                    overlay.style.cssText = "position:fixed;inset:0;background:#000;opacity:0;transition:opacity .35s ease;pointer-events:none;z-index:5000;";
                    document.body.appendChild(overlay);
                    requestAnimationFrame(function(){
                        overlay.style.opacity = "1";
                        setTimeout(function(){ window.location.href = url; }, 380);
                    });
                }catch(_){
                    window.location.href = url;
                }
            };
        })();

        function _safeParseJson(text) {
            if (typeof text !== "string") return null;
            try { return JSON.parse(text); } catch {}
            try {
                const start = text.indexOf("{");
                const end = text.lastIndexOf("}");
                if (start >= 0 && end > start) {
                    const slice = text.slice(start, end + 1);
                    return JSON.parse(slice);
                }
            } catch {}
            return null;
        }
        async function _loadJsonLocal(url) {
            try {
                const resp = await fetch(url, { cache: "no-cache" });
                if (resp && typeof resp.json === "function") {
                    try { return await resp.json(); } catch {}
                }
                if (resp && typeof resp.text === "function") {
                    try {
                        const txt = await resp.text();
                        return _safeParseJson(txt);
                    } catch {}
                }
            } catch {}
            try {
                return await new Promise((resolve) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open("GET", url, true);
                    xhr.overrideMimeType("application/json");
                    xhr.onreadystatechange = () => {
                        if (xhr.readyState === 4) {
                            if ((xhr.status >= 200 && xhr.status < 300) || xhr.status === 0) {
                                resolve(_safeParseJson(xhr.responseText));
                            } else {
                                resolve(null);
                            }
                        }
                    };
                    xhr.onerror = () => resolve(null);
                    try { xhr.send(); } catch { resolve(null); }
                });
            } catch {}
            return null;
        }
        function _extractWorld(payload) {
            try {
                if (payload && payload.world && payload.world.data && Array.isArray(payload.world.data.cards)) {
                    return {
                        id: payload.world.id || "",
                        name: payload.world.name || "World",
                        data: { cards: payload.world.data.cards || [], settings: payload.world.data.settings || {} },
                        stories: Array.isArray(payload.stories) ? payload.stories : []
                    };
                }
                if (payload && payload.data && Array.isArray(payload.data.cards)) {
                    return {
                        id: payload.id || "",
                        name: payload.name || "World",
                        data: { cards: payload.data.cards || [], settings: payload.data.settings || {} },
                        stories: Array.isArray(payload.stories) ? payload.stories : []
                    };
                }
                if (payload && Array.isArray(payload.cards) && payload.name) {
                    return {
                        id: payload.id || payload.name || "",
                        name: payload.name || "World",
                        data: { cards: payload.cards || [], settings: payload.settings || {} },
                        stories: []
                    };
                }
            } catch {}
            return null;
        }
        async function listUniverseWorlds() {
            const results = [];
            async function pushFromUrl(url, preferredName = "") {
                const data = await _loadJsonLocal(url);
                const w = data ? _extractWorld(data) : null;
                if (!w) return;
                results.push({
                    url,
                    id: w.id || "",
                    name: w.name || preferredName || (url.split("/").pop().replace(/\.json$/i, "")) || "World",
                    settings: w.data?.settings || {},
                    cardsCount: Array.isArray(w.data?.cards) ? w.data.cards.length : 0
                });
            }
            try {
                const manifest = await _loadJsonLocal("worlds/manifest.json");
                const files = Array.isArray(manifest) ? manifest : [];
                for (const name of files) {
                    const url = `worlds/${name}`;
                    await pushFromUrl(url, name.replace(/\.json$/i, ""));
                }
            } catch {}
            if (results.length === 0) {
                const FALLBACKS = ["worlds/DefaultWorld.json", "worlds/Higurashi.json"];
                for (const url of FALLBACKS) {
                    try { await pushFromUrl(url); } catch {}
                }
            }
            return results;
        }
        async function chooseUniverseWorld(url) {
            try {
                let world = null;
                let stories = [];
                const data = await _loadJsonLocal(url);
                const w = data ? _extractWorld(data) : null;
                if (w) {
                    world = { id: w.id, name: w.name, data: w.data };
                    stories = Array.isArray(w.stories) ? w.stories : [];
                }
                if (!world) {
                    const base = (url || "").split("/").pop().replace(/\.json$/i, "");
                    world = { id: base, name: base, data: { cards: [], settings: {} } };
                }
                const SCENARIOS_KEY = "storyki_scenarios";
                const SELECTED_WORLD_ID_KEY = "storyki_selected_world_id";
                function getScenarios() { try { return JSON.parse(localStorage.getItem(SCENARIOS_KEY) || "[]"); } catch { return []; } }
                function setScenarios(v) { localStorage.setItem(SCENARIOS_KEY, JSON.stringify(v)); }
                const scenarios = getScenarios();
                const exists = scenarios.some(s => !s.worldId && (s.name === world.name || s.id === (world.id || world.name)));
                if (exists) { alert("World already added."); return; }
                const now = Date.now();
                const worldId = world.id || Math.random().toString(36).slice(2, 10);
                scenarios.push({
                    id: worldId,
                    name: world.name || "World",
                    createdAt: now,
                    updatedAt: now,
                    data: { cards: Array.isArray(world.data.cards) ? world.data.cards : [], settings: world.data.settings || {} }
                });
                if (stories && stories.length) {
                    stories.forEach(st => {
                        scenarios.push({
                            id: st.id || Math.random().toString(36).slice(2, 10),
                            worldId,
                            name: st.name || "Story",
                            createdAt: now,
                            updatedAt: now,
                            signature: st.signature || "",
                            data: {
                                cards: Array.isArray(st.data?.cards) ? st.data.cards : [],
                                characters: Array.isArray(st.data?.characters) ? st.data.characters : [],
                                log: Array.isArray(st.data?.log) ? st.data.log : [],
                                settings: st.data?.settings || {}
                            }
                        });
                    });
                }
                setScenarios(scenarios);
                sessionStorage.setItem(SELECTED_WORLD_ID_KEY, worldId);
                alert("World added to your Worlds.");
                window.location.href = "index.html";
            } catch (e) {
                alert("Failed to add world.");
            }
        }
        async function renderUniverse() {
            const listEl = document.getElementById("universe-list");
            const q = (document.getElementById("universe-search")?.value || "").toLowerCase().trim();
            listEl.innerHTML = "";
            const worlds = await listUniverseWorlds();
            worlds
                .filter(w => !q || (w.name || "").toLowerCase().includes(q))
                .sort((a,b) => (a.name || "").localeCompare(b.name || ""))
                .forEach(w => {
                    const row = document.createElement("div");
                    row.className = "world-card";
                    const coverUrl = w.settings?.coverUrl || w.settings?.backgroundUrl || "";
                    if (coverUrl) row.style.backgroundImage = `linear-gradient(rgba(10,10,15,.55), rgba(10,10,15,.55)), url('${coverUrl}')`;
                    const info = document.createElement("div");
                    const nameEl = document.createElement("div");
                    nameEl.className = "name";
                    nameEl.textContent = w.name;
                    const countEl = document.createElement("div");
                    countEl.className = "count";
                    countEl.textContent = `${w.cardsCount} cards`;
                    info.appendChild(nameEl);
                    info.appendChild(countEl);
                    const btns = document.createElement("div");
                    const choose = document.createElement("button");
                    choose.className = "menu-button";
                    choose.textContent = "Choose";
                    choose.onclick = async () => { await chooseUniverseWorld(w.url); };
                    btns.appendChild(choose);
                    row.appendChild(info);
                    row.appendChild(btns);
                    listEl.appendChild(row);
                });
        }
        document.getElementById("universe-search").addEventListener("input", renderUniverse);
        renderUniverse();
    </script>
</body>
</html>
